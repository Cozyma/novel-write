<title>話2改 v3 読了判定シート</title>
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --ink: #2b2a26;
    --ink-soft: #6b675e;
    --line: #e3ddd2;
    --accent: #3d5a80;
    --accent-soft: #e8eef5;
    --good: #2e7d4f;
    --good-bg: #e3f1e8;
    --mid: #b07d10;
    --mid-bg: #f7edd4;
    --bad: #b03a2e;
    --bad-bg: #f8e3e0;
    --prose-bg: #fffdf9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #201f1c; --surface: #2a2925; --ink: #e8e4dc; --ink-soft: #a09a8e;
      --line: #44423c; --accent: #8fb0d4; --accent-soft: #32405233;
      --good: #7fc79d; --good-bg: #23392c; --mid: #d9b35c; --mid-bg: #3d3521;
      --bad: #e08a80; --bad-bg: #462a26; --prose-bg: #262521;
    }
  }
  :root[data-theme="dark"] {
    --bg: #201f1c; --surface: #2a2925; --ink: #e8e4dc; --ink-soft: #a09a8e;
    --line: #44423c; --accent: #8fb0d4; --accent-soft: #32405233;
    --good: #7fc79d; --good-bg: #23392c; --mid: #d9b35c; --mid-bg: #3d3521;
    --bad: #e08a80; --bad-bg: #462a26; --prose-bg: #262521;
  }
  :root[data-theme="light"] {
    --bg: #faf7f2; --surface: #ffffff; --ink: #2b2a26; --ink-soft: #6b675e;
    --line: #e3ddd2; --accent: #3d5a80; --accent-soft: #e8eef5;
    --good: #2e7d4f; --good-bg: #e3f1e8; --mid: #b07d10; --mid-bg: #f7edd4;
    --bad: #b03a2e; --bad-bg: #f8e3e0; --prose-bg: #fffdf9;
  }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    line-height: 1.7; margin: 0; padding: 2rem 1rem 5rem;
  }
  main { max-width: 44rem; margin: 0 auto; }
  header h1 { font-size: 1.35rem; margin: 0 0 .3rem; letter-spacing: .02em; text-wrap: balance; }
  header .sub { color: var(--ink-soft); font-size: .85rem; margin: 0 0 1.5rem; }
  .howto {
    background: var(--accent-soft); border: 1px solid var(--line); border-radius: 6px;
    padding: .7rem 1rem; font-size: .85rem; margin-bottom: 2rem;
  }
  section.seg {
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    margin-bottom: 1.4rem; overflow: hidden;
  }
  .seg-head { display: flex; align-items: baseline; gap: .6rem; padding: .6rem 1rem .4rem; flex-wrap: wrap; }
  .seg-head h2 { font-size: .95rem; margin: 0; }
  .chip {
    font-size: .7rem; background: var(--accent-soft); color: var(--accent);
    border-radius: 999px; padding: .1rem .6rem; white-space: nowrap;
  }
  .prose {
    background: var(--prose-bg); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    padding: 1rem 1.2rem;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif;
    font-size: .98rem; line-height: 2;
  }
  .prose p { margin: 0 0 1em; }
  .prose p:last-child { margin-bottom: 0; }
  .judge { display: flex; align-items: center; gap: .5rem; padding: .7rem 1rem; flex-wrap: wrap; }
  .judge .label { font-size: .8rem; color: var(--ink-soft); }
  .jbtn {
    font-size: 1.05rem; width: 2.6rem; height: 2.2rem;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--surface); color: var(--ink); cursor: pointer;
  }
  .jbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .jbtn[data-v="m"].on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: bold; }
  .jbtn[data-v="o"].on { background: var(--good-bg); border-color: var(--good); color: var(--good); font-weight: bold; }
  .jbtn[data-v="s"].on { background: var(--mid-bg); border-color: var(--mid); color: var(--mid); font-weight: bold; }
  .jbtn[data-v="x"].on { background: var(--bad-bg); border-color: var(--bad); color: var(--bad); font-weight: bold; }
  .memo {
    flex: 1 1 14rem; font: inherit; font-size: .85rem;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--prose-bg); color: var(--ink);
    padding: .4rem .6rem; min-height: 1.4rem; resize: vertical;
  }
  .overall {
    background: var(--surface); border: 2px solid var(--accent); border-radius: 8px;
    padding: 1rem; margin-top: 2rem;
  }
  .overall h2 { font-size: 1rem; margin: 0 0 .6rem; }
  .overall h3 { font-size: .85rem; margin: 1rem 0 .3rem; }
  .obtns { display: flex; gap: .5rem; margin-bottom: .7rem; }
  .obtn {
    font-size: 1.1rem; width: 3rem; height: 2.4rem;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--surface); color: var(--ink); cursor: pointer;
  }
  .obtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .obtn.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: bold; }
  .overall textarea { width: 100%; box-sizing: border-box; }
  .req { color: var(--bad); font-size: .75rem; }
  .actions { margin-top: 1.5rem; display: flex; gap: .8rem; flex-wrap: wrap; }
  .primary {
    font: inherit; background: var(--accent); color: var(--bg);
    border: none; border-radius: 6px; padding: .6rem 1.4rem;
    cursor: pointer; font-weight: bold;
  }
  .primary:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  #out {
    width: 100%; box-sizing: border-box; margin-top: 1rem;
    font-family: Consolas, monospace; font-size: .8rem; min-height: 16rem;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--prose-bg); color: var(--ink);
    padding: .6rem; display: none;
  }
  .note { font-size: .75rem; color: var(--ink-soft); margin-top: .4rem; }
</style>

<main>
<header>
  <h1>話2改 v3（検分と庇い・最終版）— 読了判定シート</h1>
  <p class="sub">3版目＝上限（判定にかかわらずクローズ） ｜ 差し替え＝段7（庇い＝完全な作り話として受け直す）・段9（帳場説明削除・契約＝嘘を本当にする行為へ再構成） ｜ 他はv2不変 ｜ 2026-07-08 ｜ 台帳: 話2改</p>
</header>

<div class="howto">
  判定対象＝<strong>差し替えた段7・段9</strong>（他はスキップ可）。最後に総評と<strong>「一番良かった一拍」（必須）</strong>→「テキストで表示」→コピー→チャットへ。途中経過は自動保存されます。
</div>

<div id="segs"></div>

<div class="overall">
  <h2>総評</h2>
  <div class="obtns" id="obtns">
    <button class="obtn" data-v="◎">◎</button>
    <button class="obtn" data-v="○">○</button>
    <button class="obtn" data-v="△">△</button>
    <button class="obtn" data-v="×">×</button>
  </div>
  <textarea class="memo" id="omemo" rows="3" placeholder="総評コメント（任意）"></textarea>
  <h3>一番良かった一拍 <span class="req">※必須</span></h3>
  <textarea class="memo" id="best" rows="2" placeholder="どの文・どの一拍が一番良かったか（正例の採掘用）"></textarea>
</div>

<div class="actions">
  <button class="primary" id="show">テキストで表示（コピー用）</button>
</div>
<textarea id="out" readonly></textarea>
<p class="note">※サンドボックス制約によりダウンロード・自動コピーは使えません。表示されたテキストを Ctrl+C でコピーしてください。</p>
</main>

<script>
const SEGS = [
  {
    "t": "段1：現場と検分者",
    "chip": "○維持・不変",
    "body": [
      "翌朝、聞き込みで覚えた道を北通りへ歩いた。無加護でも口を利く店があるという。灰色の看板。——その手前で、足が勝手に速度を落とした。",
      "昨夜の路地の口に、人が立っている。野次馬ではない。制式装備を隙なく着た女がひとり、焼け跡の前にしゃがんで、綴りに何かを書き付けていた。姿勢がいい。手順を省略しない手つきだった。腰の記章はギルドのものだ。",
      "スラムの小火に、検分。聞いたことがない。金にならない場所には、制度は来ないのが相場だ。"
    ]
  },
  {
    "t": "段2：店の女の気づき",
    "chip": "「帳場」語を除去（初出管理）",
    "body": [
      "店の戸口には昨夜の女が立って、検分者と何か話していた。俺に気づいて、目が動く。安堵が先で、警戒が後。順番が逆だろう、と思う。狙われたのはそっちだ。"
    ]
  },
  {
    "t": "段3：事件の枠が開く（新規）",
    "chip": "昏倒男二名＝事件性",
    "body": [
      "「そこの方。少しよろしいですか」",
      "検分の女が立ち上がって、まっすぐこちらへ来た。近くで見ると若い。目つきは硬いが、敵意の類ではない。定規のような硬さだ。",
      "「ギルド委託で調べています。マーレン・エスリッド。町会からの依頼が、ギルドに回ってきましたので。——昨夜の出火と、現場で昏倒していた男性二名について」",
      "二名。",
      "昏倒、ときた。俺が眠らせた連中だ。倒れたまま朝まで転がっていたらしい。そして倒れていた側は、綴りの上では被害者になる。眠らせた側の顔を、二人とも間近で見ていることは、綴りには書いていない。"
    ]
  },
  {
    "t": "段4：詰問——公文書になっていく夜（新規）",
    "chip": "リスクのある受け答え",
    "body": [
      "「昨夜、この近くにいらっしゃいましたね。体格と外套が、証言と一致します」",
      "「通りかかっただけだ」",
      "「時刻は」",
      "「宿へ帰る途中だ。鐘は数えてない」",
      "「争うような音を、聞きましたか」",
      "聞いたどころではない。出したのは俺だ。",
      "「揉め声くらいは。スラムの夜には珍しくない」",
      "「揉め声。……人影は」",
      "「煙で、何も」",
      "女の筆は、答えるそばから走った。消える筆ではない。口から出た順に、俺の夜が公文書になっていく。嘘は書かせたくないが、本当は書かせられない。答えるたび、その隙間が薄くなる。"
    ]
  },
  {
    "t": "段5：検算読みと最後の問い（新規・旧段6を吸収）",
    "chip": "定規が真相の一寸手前に",
    "body": [
      "女は綴りに目を落としたまま、要点を小さく読み上げた。自分の書いたものを検算する声だった。",
      "「火元が特定できない。焼けは浅い。倒れていた二名に火傷はなく、打撲のみ。火の前後に、争う音」",
      "顔が上がった。",
      "「——最後にもう一度うかがいます。あなたは、何を見ましたか」",
      "定規が、真相の一寸手前に当たっていた。"
    ]
  },
  {
    "t": "段6：神籍の圧（語彙差し替え）",
    "chip": "C10の初画面",
    "body": [
      "「お名前と、身分証を。神籍は、どちらの組で?」",
      "「名前はある。神籍は——無い」",
      "筆が、初めて止まった。",
      "「……無い、というのは、写しをお持ちでないという意味ですか」",
      "「無いという意味だ。どこの神も奉じていない」",
      "「神籍の無い方は、証言の記録も、冒険者登録も、本来は受けられません。身元の保証が無い記述は、あとで全部疑われますから。——規程では、詰所で身元の確認を」"
    ]
  },
  {
    "t": "段7：庇い（v3差し替え）",
    "chip": "完全な作り話として受け直す",
    "body": [
      "「うちの者です」",
      "声は戸口から来た。店の女が、まっすぐこちらへ歩いてくる。",
      "「うちで働いてもらうことになってる人。身元は、うちの判子で引き受けます」",
      "初耳だった。そんな約束は、どこにもない。彼女はいま、役人の綴りに載る嘘を、俺のためにひとつ拵えた。噓をついた顔ではなかった。値札を読む時の顔だった。",
      "命を貸した相手に、名前を借りる朝になった。"
    ]
  },
  {
    "t": "段8：受理と退場",
    "chip": "planted圧縮＝一行",
    "body": [
      "「灰の斡旋所の、名義引受。……と、記録します」",
      "検分の女は書き付けて、手続きの続きを淡々と回した。俺の夜は「揉め声を聞いた。煙で何も見ていない」の二行に畳まれ、正確にそう書かれた。見た通りではなく、言った通りに書く。そういう筆だった。",
      "〈綴りの要点、三行。火元不明、負傷者二名、目撃者一名。……署名欄は、店の判子です。〉",
      "俺の夜が三行で、署名は他人の判子か。妥当な値付けだ。",
      "「手続きですので、お気を悪くなさらず」",
      "女はそう言って綴りを鞄に納め、姿勢のいい背中で通りを去った。あの紙はギルドへ行く。火事の形をした何か、と読める書き方で。"
    ]
  },
  {
    "t": "段9：店内——嘘を本当にする（v3差し替え）",
    "chip": "帳場説明削除・契約の再構成",
    "body": [
      "店に入ると、外の張り詰めた空気は戸一枚で終わっていた。狭い土間に古い机。奥で湯の沸く音がしている。",
      "「座って。……その前に」",
      "女は深々と頭を下げた。命を拾われた側の、まっすぐすぎる礼だった。受け取り方が分からず、視線を机の木目に逃がす。",
      "「昨夜は、言いそびれたから。……どうして助けてくれたの」",
      "「近道だったんでな。成り行きだ」",
      "「成り行きでも、あたしは生きてるから」",
      "嘘を疑う色が、どこにもなかった。それはそれで調子が狂う。だから、こちらから言うことにした。",
      "「さっきのは嘘だ」",
      "「うん」",
      "「役人の綴りに載った。バレれば、あんたの店の判子に傷がつく。命の借りの返し方としては、割に合わない」",
      "女は欠けた椀に白湯を注いで、こちらへ置いた。当たり前のことを言う声だった。",
      "「だから、本当にしましょう。本当になれば、嘘じゃなくなるから」",
      "抽斗から木札が出て、店の印が捺され、こちらへ滑ってきた。",
      "「割符。あなたの名前の代わりだから、なくさないでね。細かい話は板の前で。約束は二つ——危ない札は取らない。終わったら、うちに寄る」",
      "損得の帳簿で言えば、借りが一方的に積み上がっている。数え方を知らない相手との貸し借りほど、高くつくものはない。",
      "「構わない」"
    ]
  },
  {
    "t": "段10：〆",
    "chip": "○維持",
    "body": [
      "店を出ると、朝の陽が高くなっていた。懐の割符が、服の下で軽い。",
      "名前を訊かれて詰んだ朝に、名前の代わりを一枚もらった。勘定としては、悪くない。",
      "札場は、ギルドの裏手だという。"
    ]
  }
];

const KEY = "ep2r_v3_review";
const state = JSON.parse(localStorage.getItem(KEY) || "{}");
state.segs = state.segs || SEGS.map(() => ({ v: "", memo: "" }));
state.overall = state.overall || { v: "", memo: "", best: "" };

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

const MARK = { m: "◎", o: "○", s: "△", x: "×" };
const wrap = document.getElementById("segs");

SEGS.forEach((seg, i) => {
  const sec = document.createElement("section");
  sec.className = "seg";
  const paras = seg.body.map(p => "<p>" + p + "</p>").join("");
  sec.innerHTML =
    '<div class="seg-head"><h2>' + seg.t + '</h2><span class="chip">' + seg.chip + "</span></div>" +
    '<div class="prose">' + paras + "</div>" +
    '<div class="judge"><span class="label">判定:</span>' +
    '<button class="jbtn" data-v="m">◎</button>' +
    '<button class="jbtn" data-v="o">○</button>' +
    '<button class="jbtn" data-v="s">△</button>' +
    '<button class="jbtn" data-v="x">×</button>' +
    '<textarea class="memo" rows="1" placeholder="メモ（任意）"></textarea></div>';
  wrap.appendChild(sec);

  const btns = sec.querySelectorAll(".jbtn");
  const memo = sec.querySelector(".memo");
  function paint() {
    btns.forEach(b => b.classList.toggle("on", MARK[b.dataset.v] === state.segs[i].v));
  }
  btns.forEach(b => b.addEventListener("click", () => {
    const m = MARK[b.dataset.v];
    state.segs[i].v = state.segs[i].v === m ? "" : m;
    paint(); save();
  }));
  memo.value = state.segs[i].memo;
  memo.addEventListener("input", () => { state.segs[i].memo = memo.value; save(); });
  paint();
});

const obtns = document.querySelectorAll(".obtn");
const omemo = document.getElementById("omemo");
const best = document.getElementById("best");
function paintO() {
  obtns.forEach(b => b.classList.toggle("on", b.dataset.v === state.overall.v));
}
obtns.forEach(b => b.addEventListener("click", () => {
  state.overall.v = state.overall.v === b.dataset.v ? "" : b.dataset.v;
  paintO(); save();
}));
omemo.value = state.overall.memo;
omemo.addEventListener("input", () => { state.overall.memo = omemo.value; save(); });
best.value = state.overall.best;
best.addEventListener("input", () => { state.overall.best = best.value; save(); });
paintO();

document.getElementById("show").addEventListener("click", () => {
  const lines = ["【話2改 v3 読了判定】"];
  SEGS.forEach((seg, i) => {
    const s = state.segs[i];
    lines.push("段" + (i + 1) + ": " + (s.v || "未") + (s.memo ? " | " + s.memo : ""));
  });
  lines.push("総評: " + (state.overall.v || "未") + (state.overall.memo ? " | " + state.overall.memo : ""));
  lines.push("一番良かった一拍: " + (state.overall.best || "（未記入）"));
  const out = document.getElementById("out");
  out.value = lines.join("\n");
  out.style.display = "block";
  out.focus();
  out.select();
});
</script>
</main>
