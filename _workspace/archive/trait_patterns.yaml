# -----------------------------------------------------
# キャラ特性×変数寄与の抽象パターン定義（マッピング層）
# -----------------------------------------------------
# 世界観や特定の固有名詞に依存しない、純粋な「行動原理と変数の関係」を定義したメタ・アルゴリズム層です。
# ※「負荷（Load）」と「報酬（Reward）」はシーンの作劇側（ペーシング・プロット）が動的に決定する出力変数であるため、
# ここではキャラクターが提供する「素材（入力変数：危機、共感、感覚、驚き、探求）」のみを定義します。

patterns:
  limitation:
    name: "制限（Limitation）"
    description: "自発的・あるいは強制的に課された枷や制約。"
    variable_contribution:
      crisis: "【危機↑】行動の選択肢を狭めることで、自らを窮地へと導く素材を提供する。"
      empathy: "【共感↑】なぜその制限を受け入れているのかという背景が、読者の共感を生む素材となる。"

  compliance:
    name: "規範・迎合（Compliance）"
    description: "既存のルールや組織の規範に過剰に適応・依存する特性。"
    variable_contribution:
      crisis: "【危機↑】想定外の事態やルールの通じない状況に対して脆弱になる素材を提供する。"
      empathy: "【共感↑】システムから排除されることを恐れる切実な自己防衛が、悲哀の素材となる。"

  optimization:
    name: "最適化・圧倒（Optimization）"
    description: "既存の障害や不合理を無視し、純粋な効率と実力で事態を解決する特性。"
    variable_contribution:
      sensation: "【感覚（冷徹）】過剰な感情や劇的な展開に対する「静寂・冷や水」として機能し、シーンにコントラストの素材を提供する。"

  subversion:
    name: "破壊・異端（Subversion）"
    description: "その状況における絶対の前提やルールを無効化する異物としての特性。"
    variable_contribution:
      surprise: "【驚き↑】前提条件を覆すことで、読者や周囲の予測を裏切る素材を提供する。"

  observation:
    name: "傍観・利用（Observation）"
    description: "構造の外側に立ち、状況の理不尽さを俯瞰・利用する特性。"
    variable_contribution:
      quest: "【探求↑】表層では見えない構造や裏側の理屈を俯瞰し、新たな情報を提示する素材となる。"
