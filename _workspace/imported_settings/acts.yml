title: "TBD"
logline: "辺境都市ナーヴェルで元実験部隊のノルクが規範至上の副官マーレンと反目しつつ、非殺の現場判断で密造網に挑む。"
acts:
  act1_setup:
    hook: "半地下の手配屋の格下感と、スィグナの裏印での仮登録" # 読者が掴まれる導入
    incident: "警備隊から合同任務の指名（新人副官マーレン同行）" # 事件/依頼/召喚
    show_evil: "薬物強化の小型魔物／報告・通達偏重の硬直" # 悪の支配を提示
    stakes_win: "市民被害最小＋現場への信頼形成" # 勝てば
    stakes_lose: "強硬通達で被害拡大、ノルクは処分／密造網は潜伏強化" # 負ければ
  act2a_trouble:
    wrong_actions: [ "規程軽視の独断（非殺制圧の先行）", "情報共有不足の現場最適化" ] # 誤った戦い方
    losses: [ "マーレンとの対立の深刻化", "士官の恨みを買う（検問強化）", "評価の割れで信頼損"] # 失敗/亀裂/信頼損
    midpoint_trigger: "ノルクの出自が露見し、正規側との断絶が表面化（委任章の破損・固定化）" # 反転の引き金
  midpoint:
    revelation_or_break: "ノルクの出自の露見→正規側との断絶が明確化（委任章の破損・固定化）" # 真相/決裂/自白
    new_intent: "立場/財産を代償にしても、市民を守るため規程を逆用する" # 新しい意図
  act2b_fightback:
    try_with_cost: [
      "旧所属部隊の手配屋にノルクの財産と命令権を引き渡す",
      "私物装備の放出（売却/供出）",
      "裏回線への借りの返済として、長期のタダ働き契約を結ぶ"
    ] # 新方針の試行（代償ビート3本）
    rising_cost: [ "検問強化と時間切迫", "恨みの可視化（報復リスク増）", "立場や財産の損耗が現実化" ] # 代償/タイムリミット増
    old_self_pushback: "独断で突っ走りかけるが、マーレンに前線の危険な戦闘を任せ、役割分担と共有に切り替える" # 古い自分の逆流
  act3_finale:
    showdown: "密造の現場を非殺で封じ、証拠を押さえる選択" # 最終競技/選択
    embodiment_of_will: "自分の立場を差し出し（処分の矢面に立つ）、市民優先を行為で示す" # 行為で示す想い
    aftermath_beat: "評価の収束と小さな関係修復（和解の兆し） – scene_110" # 結果への反応: ワンエピソード
    theme_hammer: "『正しさ』と『生き延びる知恵』の接点を行為で示す" # ダメ押しの象徴行為
