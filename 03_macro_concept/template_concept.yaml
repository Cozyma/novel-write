work_title: "TBD"
logline: "[物語の一言要約]"

# -----------------------------------------------------
# 【マクロ変数定義（物語を牽引する4つのエンジン）】
# -----------------------------------------------------
macro_variables:
  quest: "[探求: 作品全体を通底する最大の謎や未解決問題]"
  crisis: "[危機: 究極のタイムリミットや破滅条件（lose時の状態）]"
  reward: "[報酬: 読者に約束する最大のカタルシス（win時の状態）]"
  surprise: "[驚き: 読者の前提を覆す世界観の隠された真実]"

# -----------------------------------------------------
# 【設定要素と変数の連動】
# 各設定がどの変数（マクロ/ミクロ）を駆動するかを明記する
# -----------------------------------------------------
front_story:
  incident: "[事件/競技/目標]"
  stakes:
    win: "[勝てば：【報酬】の最大化に直結]"
    lose: "[負ければ：【危機】の最大化に直結]"
  chance_arrival: "[非日常の到来：【探求】や【驚き】のトリガー]"

back_story:
  secret_want: "[主人公の秘めたる想い：読者の【共感】の源泉であり、最終的な【報酬】の形]"
  wrong_belief: "[間違い/歪み：誤闘を引き起こし、【報酬】を遠ざけ【危機】を増大させる原因]"
  betrayal_origin: "[由来となる裏切り/屈辱：【共感】を補強する過去]"
  approver: "[承認役：主人公の想いを肯定し、【報酬】を確定させる存在]"

evils:
  # 悪の支配は、シーンの目的に応じて【探求】【危機】【驚き】のいずれかで表現し、
  # 描写時は【感覚】を高めて不快感・重圧を読者に体感させる。
  external: ["..."] # 権力/制度/敵/時間
  internal: ["..."] # 諦め/虚栄/恐怖/罪悪感

validation_hook:
  # 以下がすべてYES（true）であること
  is_stakes_linked_to_reward_and_crisis: false
  is_wrong_belief_causing_crisis: false
  is_evils_variable_defined: false
