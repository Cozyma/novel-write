work_title: "TBD"
logline: "[物語の一言要約]"



# -----------------------------------------------------
# 【1. Dramatic Skeleton（ハリウッド式・物語の推進力）】
# -----------------------------------------------------
# 語彙マッピング（実データ concept.yaml との対応。語彙の単一出典は実データ側の用語）:
#   wrong_belief（間違った縛り）⇔ core_concept.internal_flaw【誤闘】
#   evils.external ⇔ core_concept.core_conflict【究極の危機】
#   secret_want ⇔ core_concept.ultimate_goal
# ハリウッド式の適用範囲は 00_system/ARCHITECTURE.md 2.3 を参照（L1への一回性三幕の固定は禁止）。
front_story:
  incident: "[事件のきっかけ：主人公が巻き込まれる非日常]"
  stakes:
    win: "[勝てばどうなるか]"
    lose: "[負ければどうなるか（Crisisに直結）]"

back_story:
  secret_want: "[主人公の秘めたる願い：真の目的・共感の源泉]"
  wrong_belief: "[間違った縛り：主人公が自ら課している制約や思い込み（＝実データの internal_flaw【誤闘】）]"

evils:
  external: "[外的な敵：権力、制度、強大な敵対者（＝実データの core_conflict【究極の危機】）]"
  internal: "[内的な敵：諦め、恐怖、自己防衛など]"

# -----------------------------------------------------
# 【2. Catharsis Engine（ギャップ無双・快感の出力装置）】
# -----------------------------------------------------
core_misunderstanding:
  truth: "[真実：読者と主人公側だけが知っている圧倒的な事実]"
  public_misconception: "[世間の誤認：表社会や敵が抱く過小評価や見当違い]"
  
catharsis_engine:
  trigger: "[無双の引き金：どのような状況下で力を振るうか]"
  execution: "[蹂躙のプロセス：敵の常識をどう打ち砕くか]"
  reaction: "[周囲の反応：目撃者の畏怖や、さらに深まる勘違い]"

tone_contrast:
  protagonist_pov: "[主人公視点の文体：冷徹、無頓着など（【共感】の抑制）]"
  others_pov: "[他者視点の文体：過剰な驚愕、畏怖など（【感覚】の増幅）]"

# -----------------------------------------------------
# 【3. Series Engine（連載牽引の構造）】
# -----------------------------------------------------
series_engine:
  long_term_mystery: "[長期的な謎：全体を通して小出しにする最大の伏線や謎]"
  escalation_rule: "[エスカレーション法則：章ごとに敵や舞台のスケールがどう拡大するか]"
  reward_cycle: "[報酬のループ構造：「過小評価（底辺手配屋）→危機→無双（元最凶兵器）→畏怖」の定番展開パターン]"

# -----------------------------------------------------
# 【4. Priority Variables（マクロ4変数の抽象集約）】
# -----------------------------------------------------
# コンセプト＝マクロ駆動系4変数（探求/報酬/驚き/危機）の抽象レベルでの集約。
# 本作の面白さを変数の式として宣言する（下位レイヤー〔キャラ・アーク・章〕の核はすべてこの式のインスタンスになる）。
priority_variables:
  primary:
    - variable: "[最優先の変数（例：【報酬】（カタルシス））]"
      description: "[この変数を何で駆動するかの具体形]"

validation_hook:
  # 「記入されているか（ハコの存在）」ではなく「具体的に言えるか」を検査する。抽象語・約束手形は不可。
  is_dramatic_skeleton_defined: false
  is_catharsis_engine_defined: false # 蹂躙のプロセスが具体的な手順として書けているか
  is_series_engine_defined: false
  is_variable_aggregation_stated: false # 本作の面白さがマクロ4変数の式として一文で言えるか
