core_concept:
  logline: "仲間から受け継いだ義理と習慣で動いているくせに『打算だ』と言い張るのをやめられない元特殊部隊の男が、工夫と代償付きの高出力によって強者の誤認と冷血漢の誤認を同時に育て、次々とヤバい連中に絡まれていく物語。"
  ultimate_goal: "日々の平穏な生活と資金の確保。その象徴として『正規の身分を取り戻し、表社会で誰にも追われずブックカフェを開く』夢を持つ——ただしそれが純粋に自分の夢か死んだ仲間から染みついた夢かを本人は区別していない（しかし自身の能力と周囲の評価、そして抹消された経歴がそれを許さない）。"
  ultimate_mystery: "【究極の探求】人工精霊同期を生んだ魔導院の古い禁忌研究機関『第零機関』はなぜ立ち上げられ、なぜ抹消されたのか。そして、その遺産を非合法任務に流用した部隊『深淵の境界（ヴェルミ）』は、なぜ使い捨てられたのか。"
  core_conflict: "【究極の危機】出自を差別する教条主義的な社会制度（環境的脅威）と、勘違いから絡んでくる実力者たち（物理的脅威）による望まぬ連戦。"
  internal_flaw: "【主人公の誤闘】義理や情から動いていると認めると情に引きずられて面倒なことになる——その回避として打算の仮面を習慣的につけ続けている行動パターンの固着。『自分が何者でいたいか』を決断せず、行動の理由を外部（仕事・金）に預け続けている。"
  stakes: # ハリウッド式 front_story.stakes に相当（勝敗の賭け金）
    win: "依頼をこなし平穏を守り切れば：開業資金と裏社会での安全な地位が積み上がり、正規身分の回復とブックカフェの夢に近づく。セリファ復旧の手がかり（第零機関の遺産）にも接近する。"
    lose: "正体（不協和音の痕跡・抹消された経歴）が露見すれば：教条システムの監視対象として追われ、平穏どころか存在そのものが再び抹消の対象になる。セリファ復旧の道も断たれる。"

priority_variables:
  primary:
    - variable: "【報酬】（カタルシス）"
      description: "特殊部隊時代の泥臭い『工夫』や、いざという時の『代償付き超火力』により、神の加護を笠に着るエリートの理不尽を叩き潰す痛快さ。"
    - variable: "【驚き】（予測の裏切り）"
      description: "本人は必死に誤魔化している（あるいは代償に苦しんでいる）にも関わらず、周囲からは『余裕の隠者』『深淵の化け物』として圧倒的に誤認されていくギャップ。"


protagonist_growth_roadmap:
  theme: "誤闘の解凍：打算の仮面が剥がれていく過程として、『隠れる平穏』から『信頼した少数に見られていても成り立つ日常』への再定義。アーク設計（L2）時に現在の段数を確認し、1アークで一段以上は進めないこと。"
  milestones:
    - step: 1
      label: "知られる"
      description: "信頼できる他者（マーレン）が力の危うさを知る。【第1アークで達成】"
    - step: 2
      label: "頼る"
      description: "隠匿や尻拭いを一人で抱え込まず、バディに役割を委ねることを覚える。"
    - step: 3
      label: "選ぶ"
      description: "損得を超えて「降りない」選択を自覚的に行い、打算の言い訳が剥がれる。"
    - step: 4
      label: "過去と対峙"
      description: "部隊惨殺・第零機関の真相（究極の探求）と正面から向き合う。"
    - step: 5
      label: "再定義"
      description: "息を潜める平穏ではなく、守りたいものがある日常を「自分の平穏」として選び直す（夢の形も『客の来ない静かな店』から『常連の声がする店』へ変わる）。"

catharsis_engine:
  setup: "生活資金や平穏を維持するため、本意ではないグレーな厄介事を引き受ける。"
  trigger: "メジャー神の加護を盾にする教条主義的なエリート層や実力者から、理不尽な暴力を受ける（または巻き込まれる）。"
  execution: "基本は『工夫（戦術・妨害）』でギリギリを凌ぐが、越えられない加護の壁に対しては、セリファの超高度演算で加護の要件を特定し、保持者自身に要件違反を犯させて加護を自壊させた上で、最適化された『規格外の物理超火力』を雑に叩き込む。"
  reaction: "敵は理解不能なシステム外の暴力に圧倒されて敗北する。ヒロイン（マーレン）は彼の『危うさ』に勘付きバディとして補完関係を結ぶ一方、後輩（ファン役）の無邪気な神格化や、ジョーカー的実力者の異常な妄信・執着によって、ノルクはさらなる死地や面倒事に引きずり込まれていく。"
  misunderstanding_escalation:
    - label: "敗者の証言が神話化する"
      description: "敵は何が起きたか自分でも理解できない（工夫戦術は即興、術式阻害は『なぜか加護が消えた』にしか見えない）。理解できない敗北は伝言ゲームで誇張され、絡んでくる相手の危険度が自然にインフレしていく。"
    - label: "否定が証拠になる逆説"
      description: "彼は明らかに何かを隠している（隠匿制約の行動パターンが滲む）。実力者はその隠している感を読み、否定を謙遜あるいは煙幕として解釈する。低姿勢を保てば保つほど伝説が育つ構造。"
    - label: "スィグナ・ギルド記録が広告代理店化"
      description: "スィグナの評価が裏社会に流通し、信頼できる目利きのお墨付きとして神話が公式化される。マーレンのギルド査定報告も同様——説明のつかない解決が公的記録として積み上がり、危険な依頼者・ライバルを引き寄せる。"
