core_concept:
  logline: "平穏な生活を求める元特殊部隊の男が、戦闘技術しか資本がないためグレーな仕事に就き、工夫と代償付きの高出力による『勘違い』から次々と実力者に絡まれていく物語。"
  ultimate_goal: "日々の平穏な生活と資金の確保（しかし自身の能力と周囲の評価がそれを許さない）。"
  ultimate_mystery: "【究極の探求】人工精霊との同期という『禁忌研究部隊（第零機関）』はなぜ立ち上げられ、そしてなぜ抹消されたのか。"
  core_conflict: "【究極の危機】出自を差別する教条主義的な社会制度（環境的脅威）と、勘違いから絡んでくる実力者たち（物理的脅威）による望まぬ連戦。"
  internal_flaw: "【主人公の誤闘】『ただ息を潜めるだけの生活が本当に理想の平穏なのか？』という内面問題に向き合わず、目を背け続けている歪み。"

priority_variables:
  primary:
    - variable: "【報酬】（カタルシス）"
      description: "特殊部隊時代の泥臭い『工夫』や、いざという時の『代償付き超火力』により、神の加護を笠に着るエリートの理不尽を叩き潰す痛快さ。"
    - variable: "【驚き】（予測の裏切り）"
      description: "本人は必死に誤魔化している（あるいは代償に苦しんでいる）にも関わらず、周囲からは『余裕の隠者』『深淵の化け物』として圧倒的に誤認されていくギャップ。"


catharsis_engine:
  setup: "生活資金や平穏を維持するため、本意ではないグレーな厄介事を引き受ける。"
  trigger: "メジャー神の加護を盾にする教条主義的なエリート層や実力者から、理不尽な暴力を受ける（または巻き込まれる）。"
  execution: "基本は『工夫（戦術・妨害）』でギリギリを凌ぐが、越えられない壁に対しては『代償アリの規格外火力（不協和音の力）』を放つ。"
  reaction: "敵は理解不能な力に圧倒されて敗北し、ヒロインや他の実力者たちは彼を『底知れない強者』と誤認し、さらなる面倒事に引き込もうとする。"
