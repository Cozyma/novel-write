# 【第1アーク凍結（2026-07-05・人間決定＝作者の認知負荷の削減）】
# 深層レイヤー（仲間・部隊ヴェルミ・第零機関・遺技ロード・ナーヴェル来訪の実の目的）は、第1アークでは
# 開示しない・章設計の材料にしない・執筆時に参照しない（凍結ボックス＝削除ではない。設計はDBに存続し第2アークの資産）。
# 物語の軸は「ギリギリ戦闘＋勘違い」に絞る。応援燃料は現在形で供給する——セリファとの掛け合い・マーレンとの前進・
# 生活の温度（第1〜4話ドラフトで実証済み）。過去由来の共感は第2アーク以降の縦の報酬として温存。
# アーク内の接点は最小3点に固定：CH05痕跡（説明なしの一行）／CH16-17（「復旧中の相棒を壊すリスク」としてのみ・
# 残響の中身は出さない）／CH19経歴の引き。追加の接続はAIが機会を見て「提案」までに留め、人間承認なしに
# 本文・章設計へ持ち込まない。凍結解除の判断は第2アーク設計時。
core_concept:
  logline: "仲間から受け継いだ義理と習慣で動いているくせに『打算だ』と言い張るのをやめられない元特殊部隊の男が、工夫と段階的な代償のやりくりによって『底知れない強者』の誤認を育て、次々とヤバい連中に絡まれていく物語。"
  # 2026-07-05改訂：「冷血漢の誤認」を絡まれエンジンから降格（序盤ドラフト実態への同期）。冷血漢誤読は対マーレン限定の関係軸装置として存続（characters.yaml / nork misunderstanding_gap・CH06→CH18）。
  ultimate_goal: "日々の平穏な生活と資金の確保。その象徴として『正規の身分を取り戻し、表社会で誰にも追われずブックカフェを開く』夢を持つ——ただしそれが純粋に自分の夢か死んだ仲間から染みついた夢かを本人は区別していない（しかし自身の能力と周囲の評価、そして抹消された経歴がそれを許さない）。"
  ultimate_mystery: "【究極の探求】人工精霊同期を生んだ魔導院の古い禁忌研究機関『第零機関』はなぜ立ち上げられ、なぜ抹消されたのか。そして、その遺産を非合法任務に流用した部隊『深淵の境界（ヴェルミ）』は、なぜ使い捨てられたのか。——そして人工精霊同期の研究と『古い血（先住の系譜）』はどう繋がるのか（2026-07-05・A+B統合で同根化：setting_worldview / zero_institution・old_blood.land_distribution）。"
  core_conflict: "【究極の危機】信仰が物理的な実利（加護＝実力）になる世界——思想が報われて自己強化され廃れないため、各神＝各思想のクランが乱立し衝突が構造的に絶えない（setting_worldview.yaml / divine_economy）。望まぬ連戦の供給源はこの世界構造そのものであり、出自を差別する律神クランの教条主義（環境的脅威）はその一パターンに過ぎない。勘違いから絡んでくる各クランの実力者たち（物理的脅威）と次々に衝突していく。"
  internal_flaw: "【主人公の誤闘】義理や情から動いていると認めると情に引きずられて面倒なことになる——その回避として打算の仮面を習慣的につけ続けている行動パターンの固着。『自分が何者でいたいか』を決断せず、行動の理由を外部（仕事・金）に預け続けている。"
  stakes: # ハリウッド式 front_story.stakes に相当（勝敗の賭け金）
    win: "依頼をこなし平穏を守り切れば：開業資金と裏社会での安全な地位が積み上がり、正規身分の回復とブックカフェの夢に近づく。セリファ復旧の手がかり（第零機関の遺産）にも接近する。"
    lose: "正体（説明のつかない力・抹消された経歴）が露見すれば：ヴェルミを消した主体に『生き残りがいる』と知られ、平穏どころか存在そのものが再び抹消の対象になる——脅威の経路は機械の監視ではなく、人の目と噂（setting_magic.yaml / concealment_rule。2026-07-05に波形監視機構を完全削除＝追っ手の顔は縦軸の敵そのもの）。セリファ復旧の道も断たれる。"

priority_variables:
  primary:
    - variable: "【報酬】（カタルシス）"
      description: "報酬はざまぁ（理不尽の打倒）に固定しない——泥臭い『工夫』や読みが決まる有能感、被差別側の尊厳の回復、バディの関係前進など複数の型を持つ（catharsis_engine / reward_palette 参照）。神の加護を笠に着るエリートを相手取り、決着に火力が要る場面の『代償付き超火力』は温存する伏せ札。"
    - variable: "【驚き】（予測の裏切り）"
      description: "本人は必死に誤魔化している（あるいは代償に苦しんでいる）にも関わらず、周囲からは『涼しい顔の手練れ』『底の知れない化け物』として圧倒的に誤認されていくギャップ。"
  secondary:
    - variable: "【探求】（情報ギャップ）の戦闘レイヤー運用"
      description: "加護バトルにおける『敵の要件は何か』の推理ゲームを読者へ定常供給する（要件の開示＝そのキャラが何を誓って生きてきたかの内面開示と連動）。ただし探求は報酬（決着）と驚き（誤認ギャップ）への前振りであり、単体で章の核にはしない。"
    - variable: "【共感】生活の値段のテクスチャ（ミクロ恒常）"
      description: "底辺の生活実感（残金の勘定・宿代・古本・温かい飯）を毎話の地に敷き、殺伐→明転→ほの温かさの緩急で話を締める——乾いた一人称に体温を通す文体の売り（第1〜4話ドラフトで確立・2026-07-05還流）。食事モチーフ＝日常の象徴（world/food DB化はTODO B節）。掛け合いの定常ユーモア（ノルク×セリファの締めオチ）もこの層で供給する（characters.yaml / serifa speech_rule）。"


protagonist_growth_roadmap:
  # 【最重要・暫定 status: provisional】本作はバディもの。成長柱は2本——ノルク（本ロードマップ）と
  # マーレン（characters.yaml / marlen.growth_roadmap、ノルクと鏡映）。アーク検査は二人制（ARCHITECTURE 2.3）：
  # ①各キャラ1アーク1段以内 ②アークごとに主役サイドの誰か1人以上が前進 ③ノルクが2アーク連続で据え置きにならない。
  # 段定義そのものも各アーク設計の着手時に見直す（固定しない）。
  status: provisional
  theme: "誤闘の解凍：打算の仮面が剥がれていく過程として、『隠れる平穏』から『信頼した少数に見られていても成り立つ日常』への再定義。アーク設計（L2）時に現在の段数を確認し、1アークで一段以上は進めないこと。"
  milestones:
    - step: 1
      label: "知られる"
      description: "信頼できる他者（マーレン）が力の危うさを知る。【第1アークで達成】"
    - step: 2
      label: "頼る"
      description: "隠匿や尻拭いを一人で抱え込まず、バディに役割を委ねることを覚える。"
    - step: 3
      label: "選ぶ"
      description: "損得を超えて「降りない」選択を自覚的に行い、打算の言い訳が剥がれる。"
    - step: 4
      label: "過去と対峙"
      description: "部隊惨殺・第零機関の真相（究極の探求）と正面から向き合う。"
    - step: 5
      label: "再定義"
      description: "息を潜める平穏ではなく、守りたいものがある日常を「自分の平穏」として選び直す（夢の形も『客の来ない静かな店』から『常連の声がする店』へ変わる）。"

catharsis_engine:
  priority_rule: "【主従ルール】加護バトルの駆け引き（要件の読み合い・違反誘発）は誤解の生産装置＝手段であり、作品の核は勘違い構造（誤認ギャップ）に置く。章のcatharsis_coreは原則『誤読が育つ瞬間』か『綱渡りの決着（読み・工夫・代償のやりくりが決まる瞬間）』に置き、トリックの妙単体を核とする章は連発しない（純粋な能力バトルものへの重心移動の防止。駆け引きが精緻になるほど観測者には理解不能＝誤読の余地が広がる、という従属関係を維持する）。蹂躙（超火力の祭り）は章・アークの標準決着ではない——数アークに一度の縦の報酬軸の頂点として温存し（series_engine / arsenal_progression）、『蹂躙』の語は観測者から見たラベルとして用いる（実態は常に綱渡り。ARCHITECTURE 2.3 の曲線段名も同義）。"
  setup: "生活資金や平穏を維持するため、本意ではないグレーな厄介事を引き受ける——表の理由は金。実は下請けの現場仕事＝討伐区域（第零機関の遺構候補域）へ入る口実を兼ねる（セリファ復旧の手がかり探し。characters.yaml / nork background 三層構造・2026-07-05）。クエスト受注の反復自体が hidden_want に静かに駆動される。"
  trigger: "メジャー神の加護を盾にする教条主義的なエリート層や実力者から、理不尽な暴力を受ける（または巻き込まれる）。"
  execution: "戦い方の本質は、生身の工夫を土台にセリファ支援で段階的に強化を積む『代償のやりくり』——各段が別々の代償（神経・肉体・相棒セリファの摩耗）を伴い、予算が尽きる・体が壊れる前に決着できるかの綱渡りが内心ギリギリの正体（超火力は最後の伏せ札で常用しない）。基本は『工夫（戦術・妨害）』と、必要なら段1の自己強化（神経同期＝反応強化・筋力強化。setting_magic.yaml / neural_sync）でギリギリを凌ぐ。越えられない加護の壁に対しては、加護を支える前提を読んで崩す——前提が論理的要件ならセリファの演算で特定し保持者自身に要件違反を犯させて自壊させ、前提が保持者の認識（確信・余裕、座との接続の自明性など）なら心理的圧力（時にバディとの連携）で崩して出力源ごと揺さぶる。決着に火力が要る場面では最適化された『規格外の物理超火力』を雑に叩き込む（数アークに一度の祭り＝縦の報酬軸の頂点。第1アークでは温存する伏せ札）。"
  reaction: "敵は自分の理屈（思想・立場・要件・掟）の内側で詰まされ、何が起きたのか再構成できないまま敗北する——この再構成不能さが誤読と神話化の燃料になる（misunderstanding_escalation）。ヒロイン（マーレン）は彼の『危うさ』に勘付きバディとして補完関係を結ぶ一方、後輩（ファン役）の無邪気な神格化や、ジョーカー的実力者の異常な妄信・執着によって、ノルクはさらなる死地や面倒事に引きずり込まれていく。"
  # 連載牽引の構造（template_concept.yaml の series_engine に対応）
  series_engine:
    long_term_mystery: "第零機関とヴェルミ、二重の抹消の謎（ultimate_mysteryと同一。小出しの伏線は長距離台帳 02_dynamic_states/resources_states.yaml で管理）。"
    escalation_rule: "アークごとに新しい神の加護（とその要件＝思想）を持つクランの敵が登場し、敵と舞台のスケールが拡大する。開示は段階管理——神の存在・所属は早期に出てよいが、要件を読み合う加護バトルを章の核にするのは1アーク1柱（arc1＝律神。setting_worldview.yaml / disclosure_rule）。"
    reward_cycle: "過小評価（底辺の下請け便利屋）→危機→報酬（reward_palette から選択。加護の前提を崩す決着は『要件自壊／認識崩し＋一撃』で、温存中は超火力を抜かない）→畏怖と誤読の深化、の定番ループ。報酬はざまぁに固定せず、即効の踏み潰しより『溜めて効かせる』カタルシスを基調とする。敗者の証言が神話化し、次の厄介事と強敵を自然に引き寄せる。"
    arsenal_progression: "【縦の報酬軸】ノルクの引き出し（手札・遺技・予算）は固定でなく、物語の前進とともに少しずつ開く＝連載の縦の報酬。ゲートはセリファの復旧（hidden_want＋第零機関の謎に依存するため勝手に暴走しない）。各解禁は遺技＝死んだ同僚の人柄開示（【共感】供給）か新しい段の獲得。やりすぎ防止を内蔵——①新しい段／遺技は必ず新しいコストを連れてくる（強化＝やりくり対象の追加であって綱渡りの解消ではない）②敵スケールが上がる（escalation_rule）ので予算は常にカツカツ＝報酬は『楽に勝てる』でなく『やりくりの選択肢が一枚増える』。正本：setting_magic.yaml / legacy_load・biological_cost。"
    reward_palette: # 章の報酬＝ざまぁに固定せず、4マクロ変数（探求/報酬/驚き/危機）のどのピークに乗せるかで選ぶ（variable_rules.md）。ハイブリッド運用：序盤は『鮮やかな解決＋勘違いの開花』をこまめに（初速）、ボス級で『ざまぁ＋尊厳の回復』、節目で『関係・謎の前進』。
      - "ざまぁ（理不尽の打倒）→【報酬】。ボス級・節目に限定し連発しない"
      - "鮮やかな解決（工夫・読みが決まる有能感）→【報酬】。各話の主力。有能な敵を一枚上で上回る"
      - "勘違いの開花（誤読が一段育つ瞬間そのもの）→【驚き】。各話。笑い×驚きで供給"
      - "尊厳の回復（被差別側が『格下』扱いを跳ね返す上昇）→【報酬】。ざまぁの裏面で、視点を悪の転落でなく弱者の解放に置く"
      - "関係の前進（バディの信頼・理解が一歩進む）→【報酬】＋ミクロ【共感】。節目"
      - "謎の前進（第零機関・縦軸が動く）→【探求】。数話に一度"
      - "引き出しの解禁・強化（手札／遺技／予算が一枚開く）→【報酬】＋【共感】（遺技＝同僚の人柄開示）。連載の縦の報酬軸＝数アークに一度の節目（series_engine / arsenal_progression）"
    enemy_design_rule: "敵を雑に愚かにしない。基準は『有能さ』ではなく『一貫性』——敵の言動が本人の思想・立場・状況から筋が通っていること。一貫していれば弱い敵やある面で愚かな敵も可（思想ゆえの盲点で崩れるのはむしろ良い）。禁止は『雑なデザイン＝主人公を勝たせるためだけの場当たりの愚行』：自分の思想と矛盾する行動、罠と分かる挑発への都合のよい誘導、説明のつかない油断。敗北は敵自身の一貫した論理（思想・立場・加護要件）からの帰結として設計する（SELF_REVIEW §3 対立構造の実在／能力と要件の同一コイン）。『鮮やかな解決』を報酬の主力に置く章ほど障害に手応え（一貫性と相応の難度）が要る。誤読も観測者の知性を貶めない——無加護が超出力＝『謎の加護持ち』と読むのが世界の理屈上最自然、という合理の上に成立させる（misunderstanding_escalation）。"
  misunderstanding_escalation:
    - label: "理解不能な敗北が、あり得ない武勇伝になる"
      description: "敵も目撃者も何が起きたか再構成できない（工夫戦術は即興で不可視、条項告発は『なぜか加護が消えた』、神経同期は『謎の加護持ち』にしか見えない）。空白は最も劇的な説明で埋められ、『魔獣を一睨みで退けた』『組織を一晩で壊滅させた』式の荒唐無稽な風評が独り歩きする。誰も真っ向から否定できないのは——①敗者は地味な真実（無加護の便利屋に小細工で負けた）を面子上認められず自ら話を盛る②ノルクは隙を見せない生存則（characters.yaml / nork core_axis）で否定も説明もせず、その否定すら謙遜・煙幕と読まれて噂が育つ（下記『否定が証拠になる逆説』）③核の事実（現に勝った・退けた）だけは本物で説明がつかない。"
    - label: "盛られた噂を、賢い者ほど切り捨てられない（社会を愚かにしない）"
      description: "スィグナや高位の実力者は『一睨みで撃退』を文字通りには信じない。だが核の事実が説明不能である以上、『話は盛られているが、何か本物の異常がいる』という別種の——より危険な——過大評価に着地する。風評は内容こそ荒唐無稽だが、広がる経路（面子・再構成不能・否定の逆説）は一貫しており、信じる側の知性を貶めない（00_system/SELF_REVIEW.md §3【敵デザインの一貫性（雑な愚かさの禁止）】と整合）。"
    - label: "否定が証拠になる逆説"
      description: "彼は明らかに何かを隠している（隠匿の生存則の行動パターンが滲む。setting_magic.yaml / concealment_rule）。実力者はその隠している感を読み、否定を謙遜あるいは煙幕として解釈する。低姿勢を保てば保つほど伝説が育つ構造。"
    - label: "スィグナ・ギルド記録が広告代理店化"
      description: "スィグナの評価が裏社会に流通し、信頼できる目利きのお墨付きとして神話が公式化される。マーレンのギルド査定報告も同様——説明のつかない解決が公的記録として積み上がり、危険な依頼者・ライバルを引き寄せる。"
    - label: "例外レーン：実力を直接見た者は、誤読でなく黙契で繋がる（2026-07-05明文化＝CH03ドラフト還流）"
      description: "誤読エンジンの適用外——ノルクの手口を実際に見た・敗れた少数者（ヴィクテル型）は神話でなく実像に保険を掛け、正体を伏せ合う黙契・公認・監視の緊張を供給する（characters.yaml / viktel concept_relation）。勘違いの受け皿（ファン・狂信者）とは別装置として運用し、混ぜない。"
