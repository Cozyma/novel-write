long_range_facts:
  - fact_id: "muddy_blood_paradox"
    description: "濁り血の逆説——教条上は加護阻害の根拠が無い（公式教典に存在しない民間信仰）にもかかわらず、マーレンには実際に加護が発動しない。設定の不整合を修正せず謎として公式化したもの（2026-06-12）。真相の最有力候補（未確定）：律神の加護が『人』対象仕様であるため、人ならざる古い血（setting_worldview.yaml / old_blood）には仕様通り発動しない。2026-07-06補強：血の根＝旧神の系譜（pantheon.old_god）が確定したため、『別の神の帳簿に属する血には、現行の神の加護が乗らない』という機構的な筋が候補として立った——採否・開示時期は凍結のまま。同根の仕込み候補（採否・開示時期未定）：マーレンの違反はそもそも神の履歴にも記録されない可能性——彼女の縛りプレイは一度も検証されたことのない恐怖の上に建っている。いずれも本編では一貫して『根拠のない民間信仰』としてのみ描く（表示ルール）。律神システムの正体・第零機関の謎（究極の探求）へ接続する。"
    planted_at: "未仕込み（仕込み章は壁打ちで決定。TODO A-5②参照）"
    payoff_due: "究極の探求の本筋（律神システムの真実）"
    status: "planned"
  - fact_id: "signa_important_asset"
    description: "スィグナが先代から継いだ『重要なもの』——正体は本人も知らない未定義スロット（第2アーク設計時に確定。設計候補＝ヴェルミ／第零機関絡みの遺産だが、第1アークでは『裏社会の重要品』としてのみ運用）。CH01の襲撃＝これの在処を吐かせる尋問（暗殺者の依頼主の筋も未定義スロット）。スィグナは語れない運び手（characters.yaml / signa）——頭出しは物の扱い方・言葉の濁し方のみ・機会主義・提案ベース（concept.yaml冒頭の凍結規律・スィグナ回線）。"
    planted_at: "arc_01/CH01（尋問として本文に仕込み済み・正体非開示）"
    payoff_due: "第2アーク以降（凍結解除時に確定）"
    status: "planted"
  - fact_id: "boss_public_face"
    description: "ボス（律神特権を持つギルド管理職）の表の顔＝『規程と公正の体現者』。CH03でフロアの権威として遠景に一瞥、CH07で血筋棄却を『規程は誰にも等しく＝だから出自確認も等しく』の公正レトリックで追認（同章で汚職証拠＝有形報酬3も入手）。回収＝CH10で裏の汚職ボスと同一人物だと判明（『あの管理職が裏で』のクリック）、CH16で『公正の体現者』の仮面にCH07の汚職証拠を突きつけ『お前の制度こそがお前を除名する』と分からせる（認識崩しの第二波＝座との癒着を断つ燃料）。読者には半歩のアイロニーを許すが、汚職核心・律神特権の判明はCH10初出（【驚き】温存）。仮面を事前提示することでCH16の剥がしの効きを上げる狙い。"
    planted_at: "arc_01/CH03（遠景の一瞥）・CH07（公正レトリックで血筋棄却を追認）"
    payoff_due: "arc_01/CH10（同一人物判明）・CH16（除名の宣告＝認識崩し第二波）"
    status: "planned"
