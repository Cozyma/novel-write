causality_next: "CH04（第5話〜）：明朝六の鐘、街道への出立と道中——マーレンの察知より一拍早い位置取りに『適当な便利屋』の認識が崩れ始める。"

decision_log:
  - "【粒度判断 2026-07-02】第4話＝CH03全体を1シーン1話に統合（単一ロケーション・連続時間・核と引きの同居）。要人間確認。"
  - "【発明・E5】符牒の返し（『買われるほどのことは…』／『物覚えがいい方でね』）＝黙契の一言合意を発明——平板章の三点検査①能動の一手＋③会話の賭け金を担う。正体の指摘はしない（均衡＝互いの利益、で敵を愚かにしない）。"
  - "【発明・E6】優遇の体感化（列の消失・書類三枚→一枚・敬語化）＋『神話は履歴より速い』の認識句——三点検査②報酬の体感化。"
  - "【発明・E7】『目を見ない群衆』＝瞳徴（琥珀金）の社会的裏面を空気で描く（視線が瞳の高さの手前で逸れる）。ノルクだけが目を見る→彼女の一拍＝バディの種（appearance.rule の転回素材の実装）。"
  - "【確定 2026-07-02】実力者の名＝ヴィクテル（characters.yaml / viktel 登録済。旧仮置きアルヴィスから差し替え）。"
