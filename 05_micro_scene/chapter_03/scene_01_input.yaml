scene_id: "01"
chapter_id: "CH_03"
place_time: "CH02の翌朝。冒険者ギルド本館の受付フロア（昨日、正規登録を門前払いされた同じ建物——今日は下請けの立ち入り資格で入る）。"
pov_character: "ノルク一人称（文体アンカー準拠。event_timeline は語り非依存の正本）"

# 【第4話＝CH03全体を1シーン1話に統合】単一ロケーション（ギルドフロア）・連続時間のため分割しない。
# 核（公認の神話公式化）と引き（最悪の顔合わせ）を同一読書単位に保つ。
# event_timeline 規律：①WHAT限定 ②正本は起稿〜再生成のみ ③採用発明は decision_log 経由で還流。
event_timeline:
  - id: E1
    event: "翌朝、ノルクが依頼の手続きと雇い主との顔合わせのため、下請けとしてギルドへ出向く。正規登録なら紙の山でも通らないが、下請けの立ち入りは斡旋所の割印がある紙一枚で通る（CH02門前払いとの対比）。フロアに入って三歩で出口を数え直す（正面大扉・東の資材搬入口・職員用の三つ）。"
  - id: E2
    event: "受付前で、暇な冒険者の一団が新顔の下請けに定番のいびりを始める（相場の三分の一の荷運び口の押しつけ・嘲笑）。ノルクは損得で受け流す——揉めれば飛ぶのは案件の方（下請けの立ち入りは雇い主と案件あってのもの）＝『値段の合わない客にする顔』（困った風・要領を得ない風）で早く飽きさせる算段。フロアの奥に『規程と公正の体現者』と囁かれる文官服のギルド管理職の遠景（ボスの表の顔・薄い頭出し）——いびる側もその目の届く範囲では声を一段絞る（静まる圧）。公正の秩序の内側で、血筋の値付けだけが当然のように回っている。"
  - id: E3
    event: "いびりが一拍続く（嘲笑の追加）中、ヴィクテルが無音で一団の背後に立つ——出口を数え気配を拾って生きてきたノルクが、五歩の距離まで気づかない（格の演出＝夜の稼業の無音の地続き。説明はしない・E4照合の前振り）。気安い一言（『楽しそうだな。混ぜろよ』→『稽古をつけてやる。実戦形式で』）でいびりの一団を蹴散らす——礼節で叱らず、強さの文化で場を払う武人。研がれた剣のように端正な立ち姿・軽い実戦装備。ボスの一角が『静まる圧』なら、この男の周りは『沸く圧』（律神と闘神の対比を同フロアで見せる）。"
  - id: E4
    event: "ノルクが声と重心の置き方（右に乗る癖＝CH01の照合点）で照合し、セリファが一致を告げる（〈歩幅、重心、一致〉＝知覚由来）——昨夜の暗殺者の表の顔だと確信する。ヴィクテルも一目でノルクを認める（目の奥で一瞬の検算・その計算の速さごと隠す口元の緩み）。互いに気づき、互いに初対面の顔を作る（黙契の成立）。"
  - id: E5
    event: "実力者はいびりを散らした流れのまま、面白がるようにノルクを過剰に持ち上げる——『俺はこの男を買っている。覚えておくといい』（catharsis_core 正本の台詞・本人にだけ分かる含み）。ノルクは符牒の返しで均衡を確認する（『買われるほどのことは、した覚えがありませんよ』→『そうか？ 俺は物覚えがいい方でね』＝互いの手の内は互いの懐の中、の一言合意。会話の綱渡り＝一言間違えば互いの秘密が場に出る）。内心では『借り』ではなく『化け物と敵対しないための保険をかけられた（公認＝掛け金）』と正しく読み、裏返しの事実——正体を知る男がギルド中枢に常在する（公認という名の監視）——まで認識する。職員の『ヴィクテル様が……』の囁きでフロアがざわつき、ヴィクテルは言うだけ言って去る。"
  - id: E6
    event: "実力者公認の効果が即物的に現れる——受付職員の敬語化・順番待ちの消失・三枚要るはずの書類が一枚で済む（【有形報酬2】下請け優遇認定の体感化）。『評判ってのは、履歴より速い』の認識（※内心の語彙は『評判・噂』——『神話』は設計語彙のためキャラの声に出さない）。職員の取次『雇い主の方がお見えです』でマーレン登場へ繋ぐ。"
  - id: E7
    event: "雇い主マーレンが現れる。フロアの反応＝**立場はあるが、全員から見下されている**：道だけが空き、正規冒険者への立場だけの会釈はあるが、声はどこからも飛ばない（ヴィクテルの『沸く』・ボスの『静まる』と並ぶ第三の圧＝『下がる』）。顔は見る・装備は見る・目だけを全員が避ける。きっちり結い上げた濃色の髪・体格に窮屈そうな制式装備・姿勢のいい美人（appearance参照）→最初は『美人だから見られている』と読める→ノルクだけが真っ直ぐ目を見る→深い琥珀金の瞳→**札の消された二文字とのクリック**（『《濁り血》。瞳に出るという、あれか』＝CH02の知識の回収）→濁りの恣意性の内心（old_blood.visible_mark）→『綺麗な目だと思った。そう思ったのは、たぶん、この場で俺だけだった』→フロアの温度の正体を**短い断定**で言い切る（『立場だけは、ある。だから道は空く。敬意だけが、無い。全員が当たり前の顔で下に見ている——それをフロア中が上品にやっている』。迂遠な解説はしない）。目を見られ慣れていない彼女が一瞬、瞬きを止める。"
  - id: E8
    event: "顔合わせ。名乗り合い→断定調・規程通りに明朗な条件提示（集合＝明朝六の鐘・装備各自・行程三日＝街道筋の調査と護衛・危険手当等級二・前払い三割/残り完了査定後）→融通ビート（五の鐘半/六で結構/遅れたら置いていきます）→条件の公正さへの引っかかりに『存在しません』（fixed_line・公正の実演）。【賭け金の開示】『降りるなら手付けを返して今日のうちに——今月で三人、道中で消えた』＝札の空いた釘の回収・逃げられ続けた雇い主という傷が滲む（説明しない）。【噛み合わない実務】『三人、いずれも夜に』→ノルク『夜番は俺が持つよ——逃げる気のある奴には一番いい持ち場だから、逃げるつもりなら初日の夜に白黒がつく。三日疑い合って歩くより楽だ、お互いに』（**試験の前倒し**の論理＝疑いを晴らすのでなく、白黒の決着を早める打算話法。わざわざ試されに行く奇妙さが値踏みを詰まらせる）——見くびりと整合しない申し出に彼女の値踏みが処理に詰まる一拍（『……好きにしなさい』。CH04夜の道中の前振り）。【誤爆＝会話の核】凝視に気づいた彼女が『さっきから、何を見ているの』→ノルクが考えるより先に『いい目だと思ってね』——**不意の侮辱として描く**：説明の内心語りを置かず、彼女の身体反応（顎がわずかに引かれる＝殴られ慣れた人間の反射）と『しまった、と思ったときには、もう遅い』の手遅れの一拍で示す（誤読の理屈は読者が瞳徴の文脈から自力で繋ぐ）。空気が凍り、『ふざけているの?』『本気だよ。本気で楽をしたいだけだ。——夜番も、目の話も』（banter予約語の初回転・本人比で本気なのに声が軽い）→琥珀金から温度が抜け（苛立ち→冷え）、規程通りの角度の一礼で去る。"
    fixed_line: "「下請けだから削っていいという条項は、存在しません」（マーレンの公正の実演）／「いい目だと思ってね」（誤爆の核。ヴィクテルの『いい目をしている』〔E5〕との章内対句＝同じ言葉が公認にも侮辱にも化ける。いずれも catharsis_core への還流候補＝人間判定で要決定）"
  - id: E9
    event: "去るマーレンの背をフロアの視線が（目を避けたまま）見送る。セリファの一言（〈雇用主の規程遵守率——実測を、開始します〉）に『実測するな』と返し、顔を上げると——フロアが静まり返っている。**目の話は聞こえていた**。憐れみを通り越したドン引き——ノルクの内心はここを**主観でしか受けない**（『崖っぷちで逆立ちを始めた男を見る顔』＝他人の表情を読むのは芸のうち／だが自分への誤読の筋書き・評判の形成は言語化しない＝characters.yaml / nork layer_rule【自己神話の分析禁止】。誤読の中身は読者の推測に委ねる）。書類の落ちる音の一拍。締めは経験則のぼやき（『こういう朝の後は、決まって、面倒が増える』＝分析でなく予感）→頭を抱えて退場（明朝六の鐘＝CH04街道へ接続）。"

# Pre-Hook検証用
scene_facts:
  goal: "（ノルク）依頼の手続きと顔合わせを、波風立てず・正体を悟らせずに済ませる。（実力者）化け物と敵対しない保険をかける。（マーレン）割り当ての下請けと規程通りに任務を開始する。"
  opponent: "いびりの冒険者たち（下請けの立場の弱さ）／実力者との黙契の会話（互いの秘密の均衡）／マーレンの断定調と苛立ち。"
  conflict: "いびりに怒れば案件が飛び、実力者との会話は一言間違えば互いの秘密が場に出る——どちらも『受け流しの精度』が賭け金。公認されるほど平穏（目立たないこと）から遠ざかる。"
  pinch: "実力者はノルクの正体（昨夜の男）を知る唯一の人物としてギルド中枢に常在することになる——公認という名の監視。"

# 【必須・執筆着手前】未決リスト。提案 resolution 付き（最終確認は人間判定に併合）。
open_questions:
  - question: "第4話の粒度——CH03 の scenes 2項を分割するか統合するか"
    resolution: "統合（1シーン1話）。単一ロケーション・連続時間で、核（公認）と引き（顔合わせ）を同一読書単位に保つ。"
  - question: "ノルクは実力者＝昨夜の暗殺者と気づくか"
    resolution: "気づく（声・重心・所作の照合＝観測の男の必然。セリファの一致報告は知覚由来でcanon準拠）。互いに気づき表面は初対面の体＝黙契。符牒の返し一往復で均衡を確認する（正体の指摘・脅しはしない——均衡こそが互いの利益）。"
  - question: "実力者の名前"
    resolution: "【ヴィクテル】で確定（2026-07-02人間決定。víg〔戦い・殺し〕＋týr〔神〕の日本人可読アレンジ＝naming_rules準拠・語源が二重生活の二重写し）。characters.yaml / viktel へ正式登録済（実力者枠・再登場キャラ）。"
  - question: "マーレンの瞳（琥珀金）の見せ方"
    resolution: "『目を見ない群衆』→『目を見るノルク』の対比で転回（美人ゆえの視線と読める→忌避と分かる）。彼女が一瞬瞬きを止める＝目を見られ慣れていない、をバディの種として置く（説明しない）。"
  - question: "マーレンの公正さの初提示"
    resolution: "苛立ちながらも支払い条件・危険負担の提示は規程通り明朗——『下請けの扱いは裁量次第』の世界で彼女だけ公正（characters.yaml / marlen background）。ノルクの内心の『おや』一拍のみ、深追いしない。"
  - question: "ボス遠景の分量"
    resolution: "一瞥のみ（名前なし・裏の顔なし）。『規程と公正の体現者』の印象アンカーと、いびりが声をひそめる空気だけ（disclosure_rule・CH07への前段）。"

