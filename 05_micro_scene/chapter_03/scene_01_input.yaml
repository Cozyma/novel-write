scene_id: "01"
chapter_id: "CH_03"
place_time: "CH02の翌朝。冒険者ギルド本館の受付フロア（昨日、正規登録を門前払いされた同じ建物——今日は下請けの立ち入り資格で入る）。"
pov_character: "ノルク一人称（文体アンカー準拠。event_timeline は語り非依存の正本）"

# 【第4話＝CH03全体を1シーン1話に統合】単一ロケーション（ギルドフロア）・連続時間のため分割しない。
# 核（公認の神話公式化）と引き（最悪の顔合わせ）を同一読書単位に保つ。
# event_timeline 規律：①WHAT限定 ②正本は起稿〜再生成のみ ③採用発明は decision_log 経由で還流。
event_timeline:
  - id: E1
    event: "翌朝、ノルクが依頼の手続きと雇い主との顔合わせのため、下請けとしてギルドへ出向く。昨日あれだけ書いて通らなかった建物に、今日は下請けの立ち入り資格・一枚きりの書類で入れる皮肉。入って三歩で出口を数える癖。"
  - id: E2
    event: "受付前で、暇な冒険者の一団が新顔の下請けに定番のいびりを始める。ノルクは損得で受け流す算段（揉めれば案件ごと飛ぶ＝下請けの立場の賭け金を内心で明示）。フロアの奥に『規程と公正の体現者』と目されるギルド管理職の遠景（ボスの表の顔・薄い頭出し）——いびる側もその目の届く範囲では声をひそめる。公正の秩序の内側で、血筋の値付けだけが当然のように回っている。"
  - id: E3
    event: "高位冒険者が通りかかり、『下請けに絡むのは品がない』の一言でいびりの場を収める。フロアの空気が変わる格。"
  - id: E4
    event: "ノルクが声と重心の置き方で照合し、セリファが一致を告げる（〈歩幅、重心、一致〉＝知覚由来）——昨夜の暗殺者の表の顔だと確信する。相手も一目でノルクを認めている。互いに気づき、互いに表面は初対面の体を保つ（黙契の成立）。"
  - id: E5
    event: "実力者はいびりを散らした流れのまま、面白がるようにノルクを過剰に持ち上げる——『私はこの男を買っている。覚えておくといい』（catharsis_core 正本の台詞・本人にだけ分かる含み）。ノルクは符牒の返しで均衡を確認する（『買われるほどのことは、した覚えがありませんよ』→『そうか？ 私は物覚えがいい方でね』＝互いの手の内は互いの懐の中、の一言合意。会話の綱渡り＝一言間違えば互いの秘密が場に出る）。内心では『借り』ではなく『化け物と敵対しないための保険をかけられた』と正しく読む。"
  - id: E6
    event: "実力者公認の効果が即物的に現れる——受付職員の敬語化・順番待ちの消失・三枚要るはずの書類が一枚で済む（【有形報酬2】下請け優遇認定の体感化）。『神話は履歴より速い』の認識。"
  - id: E7
    event: "雇い主マーレンが現れる。フロアの視線の異様さ——皆、彼女の顔は見るのに目を見ない（視線が瞳の高さの手前で滑って逸れる）。最初は『美人だから見られている』と読める→ノルクだけが真っ直ぐ目を見る（読む男の癖）→深い琥珀金の瞳（古い血の徴。setting_worldview / old_blood.visible_mark）→視線の正体が憐れみと忌避だと分かる（美貌の提示と差別構造の転回を一手で）。目を見られ慣れていない彼女が一瞬、瞬きを止める。"
  - id: E8
    event: "顔合わせ。マーレンは断定調の事務確認（集合時刻・装備・規程の遵守）を並べ、ノルクの気の抜けた返事に苛立つ——『ふざけているの?』『本気だよ。本気で楽をしたいだけだ』（banter基調の初回転）。ただし支払い条件と危険負担の提示は規程通りに明朗＝下請けにも公正な扱いを徹底する（他の雇い主との対比点。ノルクが内心『おや』と思う種）。"
  - id: E9
    event: "周囲の冒険者たちの『濁り血と組まされる新人』への憐れみの視線。実力者公認の初日に、フロア中の憐れみを集める配属になった皮肉に頭を抱える。セリファの一言（〈雇用主の規程遵守率——実測を、開始します〉）に『実測するな』と返して引く（第3話の100%ギャグの回収・翌朝六の鐘の集合＝CH04街道へ接続）。"

# Pre-Hook検証用
scene_facts:
  goal: "（ノルク）依頼の手続きと顔合わせを、波風立てず・正体を悟らせずに済ませる。（実力者）化け物と敵対しない保険をかける。（マーレン）割り当ての下請けと規程通りに任務を開始する。"
  opponent: "いびりの冒険者たち（下請けの立場の弱さ）／実力者との黙契の会話（互いの秘密の均衡）／マーレンの断定調と苛立ち。"
  conflict: "いびりに怒れば案件が飛び、実力者との会話は一言間違えば互いの秘密が場に出る——どちらも『受け流しの精度』が賭け金。公認されるほど平穏（目立たないこと）から遠ざかる。"
  pinch: "実力者はノルクの正体（昨夜の男）を知る唯一の人物としてギルド中枢に常在することになる——公認という名の監視。"

# 【必須・執筆着手前】未決リスト。提案 resolution 付き（最終確認は人間判定に併合）。
open_questions:
  - question: "第4話の粒度——CH03 の scenes 2項を分割するか統合するか"
    resolution: "統合（1シーン1話）。単一ロケーション・連続時間で、核（公認）と引き（顔合わせ）を同一読書単位に保つ。"
  - question: "ノルクは実力者＝昨夜の暗殺者と気づくか"
    resolution: "気づく（声・重心・所作の照合＝観測の男の必然。セリファの一致報告は知覚由来でcanon準拠）。互いに気づき表面は初対面の体＝黙契。符牒の返し一往復で均衡を確認する（正体の指摘・脅しはしない——均衡こそが互いの利益）。"
  - question: "実力者の名前"
    resolution: "【ヴィクテル】で確定（2026-07-02人間決定。víg〔戦い・殺し〕＋týr〔神〕の日本人可読アレンジ＝naming_rules準拠・語源が二重生活の二重写し）。characters.yaml / viktel へ正式登録済（実力者枠・再登場キャラ）。"
  - question: "マーレンの瞳（琥珀金）の見せ方"
    resolution: "『目を見ない群衆』→『目を見るノルク』の対比で転回（美人ゆえの視線と読める→忌避と分かる）。彼女が一瞬瞬きを止める＝目を見られ慣れていない、をバディの種として置く（説明しない）。"
  - question: "マーレンの公正さの初提示"
    resolution: "苛立ちながらも支払い条件・危険負担の提示は規程通り明朗——『下請けの扱いは裁量次第』の世界で彼女だけ公正（characters.yaml / marlen background）。ノルクの内心の『おや』一拍のみ、深追いしない。"
  - question: "ボス遠景の分量"
    resolution: "一瞥のみ（名前なし・裏の顔なし）。『規程と公正の体現者』の印象アンカーと、いびりが声をひそめる空気だけ（disclosure_rule・CH07への前段）。"

