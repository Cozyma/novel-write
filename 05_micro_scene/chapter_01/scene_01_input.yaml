  - "【細密化】『人除けの結界』を新設＝暗殺者の襲撃インフラ（魔導具系・痕跡なし）。ノルクが斡旋所のと誤読→解析で襲撃用と判明、E13で逆用（人目を断つ結界を人目で埋める皮肉）＝catharsis_core 強化の還流候補。"
  - "【細密化】見張り(力仕事2)を機能化＝ノルクを『標的の加勢』と勘違いして襲い無力化される（加勢勘違い＝過大評価の最小単位）。従来は背景だった2人に役割。"
  - "【細密化】暗殺者の驚き(E8)を追加＝プロが短時間で仕留められず動揺（暗殺者側の過大評価の芽）。"
