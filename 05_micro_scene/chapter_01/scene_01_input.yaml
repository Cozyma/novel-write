scene_id: "01"
chapter_id: "CH_01"
place_time: "夜・都市ナーヴェルのスラムの裏通り（双影通り周辺の路地）。窓灯りと遠い松明のわずかな光源のみ。一帯に襲撃用の『人除けの結界』が張られ人払いされている。"
pov_character: "ノルク一人称（語り確定 2026-06-18＝文体アンカー。理由：①情報（動機・読み・打算）を内から出しやすい ②乾いた一人称で文体の重さを抜ける。三人称ノルク寄り版（旧 scene_01_draft.md／regen）は不採用・git履歴へ退避済（コミットで参照可・2026-06-19削除）。event_timeline は語り非依存の正本ゆえ事象は不変、描写のみ一人称で確定）"

# 【プロトタイプ 2026-06-17 / 2026-06-18 展開を細密化】event_timeline ＝ 描写中立の原子的事象列（WHAT のみ）。
# POV・文体・描写密度を変えて再生成する際、この事象列を固定参照することで再現度を確保する。
# 規律：①動詞・事実のみ（HOW=情景の再話は書かない＝episode_index型ドリフト回避）
#       ②正本は起稿〜再生成フェーズのみ。07_final_text 確定後は本文が正本に戻り本ファイルは履歴。
#       ③採用発明は decision_log 経由でここへ還流、章核に関わるものは catharsis_core へ。
# レビュー/細密化反映済（区画全体警報・撤退の損得・初手読み・光源／セリファ会話・人除け結界・見張りの加勢勘違い・暗殺者の驚き・足が止まる位置移設）。
event_timeline:
  - id: E1
    event: "ノルクがスラムの路地を行きながら、脳内の相棒セリファと会話する。正規の冒険者ギルドに登録を断られ（無加護・出自ゆえの門前払いを仄めかす）、職を求めて場末をうろついていることが分かる（無加護でも雇う口を探しているが、特定の宛て先や店の名は持たない＝『灰の斡旋所』の名はノルクには未知で scene_02 のスィグナの口で初出）。会話に長距離ビートを必ず含める【還流 2026-07-03】——セリファが門前払いの理由候補に続けて『提出した書式は本当に不備だった。三箇所』と指摘し、ノルクが受ける（CH02冒頭の清書再提出＝不備ゼロ、およびセリファの『人間は書式を三箇所は間違える』ジョークが回収する planted。省略不可＝B節 resources_states 初期投入の対象候補）。"
    fixed_line: "「……次から清書するよ」（セリファの『三箇所』指摘への返し。CH02が回収する長距離セットアップの仕込み側）"
  - id: E2
    event: "ノルクが一帯に張られた『人除けの結界』（魔導具系の弱い非神の行使）に気づき、セリファの演算で解析する。当初『斡旋所が裏稼業用に人払いしているインフラか』と読むが、解析の結果それは斡旋所のものではなく、襲撃のために急ごしらえで張られたもの＝人目を断って何かを為す気だ、と判明する。"
  - id: E3
    event: "結界の縁で、襲撃側の見張り要員（力仕事2）がノルクを『標的が呼んだ加勢（助っ人）』と勘違いして襲いかかる。ノルクは段0〜1で手際よく無力化する（非殺＝死体が出ると書類と面倒が増えるため）。"
  - id: E4
    event: "人払いされた結界の奥（死角）で、フードの暗殺者がスィグナを壁際に詰めている。スィグナはそれなりに抗ったが（煙管型魔導具を構える腕はあるが）加護持ちの専業には押し負け、間合いを潰されて追い詰められている。暗殺者は即殺さず低く問うている（捕縛・尋問目的＝情報や在処を吐かせたい）。見張りを片付けたノルクは、ここで離脱もできる（もう自分の仕事ではない）。【外見注意（還流 2026-07-03）】夜の暗がりでスィグナの顔・髪色は見えない——外見タグ（氷色の髪・別嬪）の初出は第2話（scene_02）の屋台通りの明転が正本決定（2026-07-02）。本話では手つき・声・足さばき等の非視覚の読みだけで人物を立てる。"
  - id: E5
    event: "ノルクは一度その場を離れかけ、三歩で足が止まり引き返す（理由は語られない＝人柄のズレの起点）。引き返しながら、乏しい光で路地の出口を二つ数える（北の本通り・東の崩れた塀。結界で人払いされている＝後の偽火事が効く下地でもある）。"
  - id: E6
    event: "ノルクが介入する【構造改変 2026-07-03・人間指示＝逃走試行→先回りの旧構造を全面廃止（逃走を許す/塞ぐの理屈が立たない問題を根治）】。①ノルクは歩きながら立ち姿・重心（右）から初太刀の線を読み、剣を先に抜き（挨拶を待つ相手ではないと読んでいる）、男とスィグナの間へ半身を割り込ませる位置で軽口を掛ける（『店じまい』）②**言葉の途中で、暗殺者が問答・誰何・値踏みなしの全力で殺しに来る**——理屈＝スィグナは殺せない（尋問対象）が、闖入者＝目撃者は瞬殺すれば目的達成（『見られてはならない』稼業の手順。この即時排除の反射が E10 の掟読みの最初の証拠を兼ねる）③ノルクは相手の算盤を即座に読む（女は殺せない／俺は消していい・消すのが手順）——ただし『掟』の語彙はまだ使わない（E10三点測量の払い落としを先食いしない）。"
  - id: E7
    event: "初太刀を、事前の重心読み（E6①）＋段1（神経同期＝知覚・反応強化）で紙一重に躱す。二の太刀からは使い古した軍用の片手剣（頑丈さが取り柄。CH01では詳述しない＝武器語りをしない）で受けに徹し、読み＋段1の反応＋剣の頑丈さの三点で数合を防ぐ。数合で『腕では勝てない』と見切る。続けて**逃走も検討の上で却下**——背を向けた瞬間に終わる速度差＋人払いの袋＝目撃者ゼロの殺し放題の盤面は敵が金を積んで組んだ庭→**勝ち筋の再定義＝剣でも足でもなく、盤面（人目ゼロ）をひっくり返す**（E13偽火事の必然。段1は数分限定・後で反動の借金。武装再設計 2026-07-03＝丸腰を廃止、得物の正本は characters.yaml / nork）。"
  - id: E8
    event: "暗殺者の側に動揺が混じる——瞬殺で済むはずだった闖入者の排除（使い古した剣一本の便利屋）が、短時間で仕留まらない。プロの計算が狂い、苛立ちと訝りが生じる（暗殺者側の過大評価の芽）。"
  - id: E9
    event: "スィグナがその攻防（自分が押し負けた加護持ちの専業を、古びた剣一本の便利屋が凌ぎ切っている）を見て過大評価を抱く。【POV注意（2026-07-03）】括弧内の比較の計算はスィグナ側の認識＝設計記述であり、ノルクの地の文で言語化しない（layer_rule【自己神話の分析禁止】）。レンダーは彼女の反応の観測（息・視線）＋ノルクの主観の気配（『どう映っているかは、想像がつく』）まで——誤読の中身は読者がE4（武装して押し負けた）から自力で組む。"
  - id: E10
    event: "ノルクは軽口＝観測として、暗殺者の所作（顔を隠す角度・灯りを避ける足運び・声に応じない徹底）に、人目を断つ結界という一晩限りの設備投資と、闇討ちに不釣り合いな『見せる剣』の癖を重ねて三点測量し、彼を縛る掟＝『見られてはならない稼業』と、その裏の『見られてもいい顔（表）を持つ男』まで半歩読む（人除け結界を張ったのも同じ掟ゆえ、と繋がる。闘神・加護要件の語は本文に出さない＝disclosure_rule）。"
  - id: E11
    event: "ノルクが本通り方向へ誘導を試みる→暗殺者は『古い手だ』と見抜き、ノルクの肩を浅く裂いて逆方向へ体を流す。"
  - id: E12
    event: "暗殺者の体の開き方から、彼の本命退路をノルクが割る（読み取る）。"
  - id: E13
    event: "段1の残りが尽きかけ、仕掛けは一発勝負。ノルクが、解析済みの人除け結界を破りながら【機構固定（還流 2026-07-03）＝指先を干渉波の縁に触れさせ、綻びから内側へ引き裂く。安物の術式・物理/受動の無効化＝痕跡なし（楔や機材の破壊描写にしない）】、破礼具（煙玉）を暗殺者の本命退路側へ投げ、白煙＋『火事だ』で偽火事を起こす。人払いが解けた区画に、延焼を恐れた住民・自警が一斉に雪崩れ込み全出口が目撃化される——暗殺者自身が人目を断つために張った結界を、逆に人目で埋める皮肉。方角の読みは『暗殺者の最良の逃走路を最も厚く塞ぐ』最適化。"
  - id: E14
    event: "群衆形成は即応。暗殺者は『殺せるが消えられない』状況を即座に認識する。彼にとって露見は（伏せた表の立場を壊す）致命傷であり、標的1人の価値を上回る、と瞬時に天秤にかける。（ノルクの反転の決め台詞は chapter_01_summary / catharsis_core 準拠＝ここへ複製しない＝一台詞一ホーム）"
  - id: E15
    event: "暗殺者『いい手だ。今夜は降りよう』と恨みなく職業判断で撤退、煙の中へ消える（CH03で表の顔＝高位冒険者として再登場する布石。本シーンでは正体を伏せる）。"
  - id: E16
    event: "ノルクは追わない／追えない。緊張が切れた一拍後、段1の反動（こめかみの鈍痛・指先の震え）が遅延噴出し、物陰で噛み殺す（誰にも見えない＝余裕の誤認の正体）。"
  - id: E17
    event: "スィグナがノルクを見る（助かった安堵でなく、底の知れない何かを見た目）。『……あんた、何者?』で引く（scene_02＝なぜ助けた問答へ）。"

# Pre-Hook検証用
scene_facts:
  goal: "職を探しに来ただけのはずが、スィグナを救い自分も無傷で（書類と面倒を出さず）この場を切り抜ける。"
  opponent: "闘神の加護を帯びた暗殺者（腕では格上）＋見張りの力仕事2。人払いの結界（襲撃インフラ）。"
  conflict: "腕では勝てず、背を向ければ速度差で終わる（逃走は選択肢にならない）／殺せば書類と面倒／長引かせれば段1の反動。勝利条件を殺傷から『相手の損得（露見リスク）』へずらし、盤面（人目ゼロ）をひっくり返すしかない。"
  pinch: "知覚より速い刃。段1は数分で崩壊。人払い結界で目撃者ゼロ＝暗殺者に有利な盤面。群衆形成より先に仕留められれば終わり。"

open_questions:
  - question: "暗殺者の闘神加護の戦闘型（トリック成立条件）"
    resolution: "速度・反応の超強化型（刃が見えてから間合いを食う）。得物は短剣でぼかす。要件攻略は核にしない＝disclosure_rule（浅い頭出し）。"
  - question: "『人除けの結界』の性質と痕跡"
    resolution: "魔導具系の弱い非神の行使（setting_worldview / mana_substrate＝市井の弱い行使に該当）。ノルクの解析は受動観測＝痕跡なし、破壊も物理/機器無効化＝痕跡なし（dissonance_trace準拠）。暗殺者の掟『見られてはならない』と同根のインフラ＝偽火事(E13)で逆用される伏線。"
  - question: "セリファを冒頭(E1)で出すか（存在の早期開示）"
    resolution: "存在は出す（脳内の相棒・演算役・ポンコツ気味の論理）。ただし正体（第零機関・遺技ロード・超火力）は伏せる（氷山）。関係性の素地を早期に置く。"
  - question: "足が止まる（人柄のズレ起点）の位置"
    resolution: "見張り戦(E3)の後(E5)へ移設。見張りは片付き離脱できる状況ゆえ『残る』が巻き込まれでなく真の選択になる（CH01 design_note の介入描写＝『通り過ぎる→足が止まる→引き返す』と整合。要還流確認）。"
  - question: "なぜ暗殺者はスィグナを即殺さず詰めているか"
    resolution: "情報・在処を引き出す目的（捕縛/尋問寄り）。スィグナはそれなりに戦えるが加護持ちの専業に押し負け追い詰められた状態でノルク到着が間に合う（行動妥当性）。護衛は登場させない＝スィグナ自身の自衛設定で単身行動の説明がつき、倒れた護衛の生死宙ぶらりんも回避（2026-06-19）。"
  - question: "偽火事で『消えられない』が成立するか（別ルート問題）"
    resolution: "結界破り＋偽火事で区画全体の火災警報＝全出口を目撃化（延焼が全員の死活問題のスラム前提）。方角読みは最良ルートを最厚で塞ぐ最適化。群衆即応で殺し→別口脱出の隙を潰す。"
  - question: "暗殺者が撤退する合理性"
    resolution: "露見＝伏せた表の立場（CH03で高位冒険者と判明）を壊す致命傷＞標的1人。職業判断で撤退。CH01では正体を伏せ『見られてはならない稼業』の徹底で匂わせる。"
  - question: "スラム/双影通りの地理の質感（DB未整備）"
    resolution: "仮置き：木と紙の密集長屋・延焼即死活・窓灯りと松明の微光・崩れた塀。執筆確定後に geography へ正式化（TODO起票済）。"

