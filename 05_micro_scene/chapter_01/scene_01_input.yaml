decision_log:
  - "【細密化 2026-06-18】冒頭にセリファ会話を追加（ギルド門前払い・斡旋所探しの動機提示＋相棒の早期登場）。正体は伏せる（氷山）。→構造変更ゆえ chapter_01_summary への還流候補。"
  - "【細密化】『人除けの結界』を新設＝暗殺者の襲撃インフラ（魔導具系・痕跡なし）。ノルクが斡旋所のと誤読→解析で襲撃用と判明、E13で逆用（人目を断つ結界を人目で埋める皮肉）＝catharsis_core 強化の還流候補。"
  - "【細密化】見張り(力仕事2)を機能化＝ノルクを『標的の加勢』と勘違いして襲い無力化される（加勢勘違い＝過大評価の最小単位）。従来は背景だった2人に役割。"
  - "【細密化】暗殺者の驚き(E8)を追加＝プロが短時間で仕留められず動揺（暗殺者側の過大評価の芽）。"
  - "【細密化】足が止まる(人柄のズレ起点)を見張り戦の後(E5)へ移設＝離脱可能ゆえ『残る』が真の選択に。CH01 design_note の介入描写と整合確認のうえ chapter_01_summary へ還流候補。"
  - "暗殺者＝速度反応型の闘神加護（得物は短剣でぼかす）を仮確定（disclosure_rule準拠）。"
  - "物理整合フィックス（E13区画全体警報）・行動妥当性フィックス（E4捕縛・E14露見>標的）は維持。"
