scene_id: "01"
chapter_id: "CH_01"
place_time: "夜・都市ナーヴェルのスラムの裏通り（双影通り周辺の路地）。窓灯りと遠い松明のわずかな光源のみ。一帯に襲撃用の『人除けの結界』が張られ人払いされている。"
pov_character: "ノルク（語りはPOV未確定——三人称ノルク寄り限定／一人称の比較中。event_timeline は語り非依存の正本）"

# 【プロトタイプ 2026-06-17 / 2026-06-18 展開を細密化】event_timeline ＝ 描写中立の原子的事象列（WHAT のみ）。
# POV・文体・描写密度を変えて再生成する際、この事象列を固定参照することで再現度を確保する。
# 規律：①動詞・事実のみ（HOW=情景の再話は書かない＝episode_index型ドリフト回避）
#       ②正本は起稿〜再生成フェーズのみ。07_final_text 確定後は本文が正本に戻り本ファイルは履歴。
#       ③採用発明は decision_log 経由でここへ還流、章核に関わるものは catharsis_core へ。
# レビュー/細密化反映済（区画全体警報・撤退の損得・初手読み・光源／セリファ会話・人除け結界・見張りの加勢勘違い・暗殺者の驚き・足が止まる位置移設）。
event_timeline:
  - id: E1
    event: "ノルクがスラムの路地を行きながら、脳内の相棒セリファと会話する。正規の冒険者ギルドに登録を断られ（無加護・出自ゆえの門前払いを仄めかす）、職を求めて場末の『灰の斡旋所』を探しに来たことが分かる。"
  - id: E2
    event: "ノルクが一帯に張られた『人除けの結界』（魔導具系の弱い非神の行使）に気づき、セリファの演算で解析する。当初『斡旋所が裏稼業用に人払いしているインフラか』と読むが、解析の結果それは斡旋所のものではなく、襲撃のために急ごしらえで張られたもの＝人目を断って何かを為す気だ、と判明する。"
  - id: E3
    event: "結界の縁で、襲撃側の見張り要員（力仕事2）がノルクを『標的が呼んだ加勢（助っ人）』と勘違いして襲いかかる。ノルクは段0〜1で手際よく無力化する（非殺＝死体が出ると書類と面倒が増えるため）。"
  - id: E4
    event: "人払いされた結界の奥（死角）で、フードの暗殺者がスィグナを壁際に詰めている。護衛は既に倒れ、暗殺者は即殺さず低く問うている（捕縛・尋問目的＝情報や在処を吐かせたい）。見張りを片付けたノルクは、ここで離脱もできる（もう自分の仕事ではない）。"
  - id: E5
    event: "ノルクは一度その場を離れかけ、三歩で足が止まり引き返す（理由は語られない＝人柄のズレの起点）。引き返しながら、乏しい光で路地の出口を二つ数える（北の本通り・東の崩れた塀。結界で人払いされている＝後の偽火事が効く下地でもある）。"
  - id: E6
    event: "ノルクが軽口で介入し、暗殺者が応戦する。"
  - id: E7
    event: "ノルクは暗殺者の立ち方・重心から初太刀を読み、段1（神経同期＝反応強化）で紙一重に凌ぐ。数合で『腕では勝てない』と見切る（段1は数分限定・後で反動の借金）。"
  - id: E8
    event: "暗殺者の側に動揺が混じる——一刀で仕留まるはずの丸腰の便利屋が、短時間で仕留まらない。プロの計算が狂い、苛立ちと訝りが生じる（暗殺者側の過大評価の芽）。"
  - id: E9
    event: "スィグナがその攻防（加護持ち暗殺者と丸腰便利屋が互角）を見て過大評価を抱く。"
  - id: E10
    event: "ノルクは軽口＝観測として暗殺者の所作（顔を隠す角度・灯りを避ける足運び・声に応じない徹底）を読み、彼を縛る掟＝『見られてはならない稼業』を特定する（人除け結界を張ったのも同じ掟ゆえ、と繋がる）。"
  - id: E11
    event: "ノルクが本通り方向へ誘導を試みる→暗殺者は『古い手だ』と見抜き、ノルクの肩を浅く裂いて逆方向へ体を流す。"
  - id: E12
    event: "暗殺者の体の開き方から、彼の本命退路をノルクが割る（読み取る）。"
  - id: E13
    event: "ノルクが、解析済みの人除け結界を破りながら、破礼具（煙玉）を暗殺者の本命退路側へ投げ、白煙＋『火事だ』で偽火事を起こす。人払いが解けた区画に、延焼を恐れた住民・自警が一斉に雪崩れ込み全出口が目撃化される——暗殺者自身が人目を断つために張った結界を、逆に人目で埋める皮肉。方角の読みは『暗殺者の最良の逃走路を最も厚く塞ぐ』最適化。"
  - id: E14
    event: "群衆形成は即応。暗殺者は『殺せるが消えられない』状況を即座に認識する。彼にとって露見は（伏せた表の立場を壊す）致命傷であり、標的1人の価値を上回る、と瞬時に天秤にかける。（ノルクの反転の決め台詞は chapter_01_summary / catharsis_core 準拠＝ここへ複製しない＝一台詞一ホーム）"
  - id: E15
    event: "暗殺者『いい手だ。今夜は降りよう』と恨みなく職業判断で撤退、煙の中へ消える（CH03で表の顔＝高位冒険者として再登場する布石。本シーンでは正体を伏せる）。"
  - id: E16
    event: "ノルクは追わない／追えない。緊張が切れた一拍後、段1の反動（こめかみの鈍痛・指先の震え）が遅延噴出し、物陰で噛み殺す（誰にも見えない＝余裕の誤認の正体）。"
  - id: E17
    event: "スィグナがノルクを見る（助かった安堵でなく、底の知れない何かを見た目）。『……あんた、何者?』で引く（scene_02＝なぜ助けた問答へ）。"

# Pre-Hook検証用
scene_facts:
  goal: "職を探しに来ただけのはずが、スィグナを救い自分も無傷で（書類と面倒を出さず）この場を切り抜ける。"
  opponent: "闘神の加護を帯びた暗殺者（腕では格上）＋見張りの力仕事2。人払いの結界（襲撃インフラ）。"
  conflict: "腕では勝てない／殺せば書類と面倒／長引かせれば段1の反動。勝利条件を殺傷から『相手の損得（露見リスク）』へずらすしかない。"
  pinch: "知覚より速い刃。段1は数分で崩壊。人払い結界で目撃者ゼロ＝暗殺者に有利な盤面。群衆形成より先に仕留められれば終わり。"

open_questions:
  - question: "暗殺者の闘神加護の戦闘型（トリック成立条件）"
    resolution: "速度・反応の超強化型（刃が見えてから間合いを食う）。得物は短剣でぼかす。要件攻略は核にしない＝disclosure_rule（浅い頭出し）。"
  - question: "『人除けの結界』の性質と痕跡"
    resolution: "魔導具系の弱い非神の行使（setting_worldview / mana_substrate＝市井の弱い行使に該当）。ノルクの解析は受動観測＝痕跡なし、破壊も物理/機器無効化＝痕跡なし（dissonance_trace準拠）。暗殺者の掟『見られてはならない』と同根のインフラ＝偽火事(E13)で逆用される伏線。"
  - question: "セリファを冒頭(E1)で出すか（存在の早期開示）"
    resolution: "存在は出す（脳内の相棒・演算役・ポンコツ気味の論理）。ただし正体（第零機関・遺技ロード・超火力）は伏せる（氷山）。関係性の素地を早期に置く。"
  - question: "足が止まる（人柄のズレ起点）の位置"
    resolution: "見張り戦(E3)の後(E5)へ移設。見張りは片付き離脱できる状況ゆえ『残る』が巻き込まれでなく真の選択になる（CH01 design_note の介入描写＝『通り過ぎる→足が止まる→引き返す』と整合。要還流確認）。"
  - question: "なぜ暗殺者は護衛排除後すぐスィグナを殺さず詰めているか"
    resolution: "情報・在処を引き出す目的（捕縛/尋問寄り）。護衛排除後もスィグナが生存しノルク到着が間に合う（行動妥当性）。"
  - question: "偽火事で『消えられない』が成立するか（別ルート問題）"
    resolution: "結界破り＋偽火事で区画全体の火災警報＝全出口を目撃化（延焼が全員の死活問題のスラム前提）。方角読みは最良ルートを最厚で塞ぐ最適化。群衆即応で殺し→別口脱出の隙を潰す。"
  - question: "暗殺者が撤退する合理性"
    resolution: "露見＝伏せた表の立場（CH03で高位冒険者と判明）を壊す致命傷＞標的1人。職業判断で撤退。CH01では正体を伏せ『見られてはならない稼業』の徹底で匂わせる。"
  - question: "スラム/双影通りの地理の質感（DB未整備）"
    resolution: "仮置き：木と紙の密集長屋・延焼即死活・窓灯りと松明の微光・崩れた塀。執筆確定後に geography へ正式化（TODO起票済）。"

