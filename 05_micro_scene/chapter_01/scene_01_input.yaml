  - "【構造改変 2026-07-03・人間指示＝戦闘経緯の全面再設計】旧構造（引き剥がし→逃走試行→先回りで塞がれる）を廃止——『逃走を許す/塞ぐ』はどう理屈をつけても不合理が残る（無警戒→雑な油断／あえて通す→許す利益が敵に無い、の二度の指摘）。新構造＝**尋問目的ゆえスィグナは殺せないが、闖入者＝目撃者は瞬殺すれば目的達成→話しかけた言葉の途中で問答無用の全力→段1の知覚強化でギリギリ殺せない→計算が狂う→隙をついて偽火事**。目撃者の即時排除＝掟の手順そのものであり、掟が初撃を駆動し同じ掟が偽火事で撤退を強制する単一原理の円環になる。E6/E7/E8・scene_facts・block4・章正本build_up・design_note安い答えの死・CSV row1を同期。scene_02言い訳は偽火事との同語彙接地のため影響なし。"
