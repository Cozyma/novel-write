scene_id: "01"
chapter_id: "CH_01"
place_time: "夜・都市ナーヴェルのスラムの裏通り（双影通り周辺の路地）。窓灯りと遠い松明のわずかな光源のみ。"
pov_character: "ノルク（語りはPOV未確定——三人称ノルク寄り限定／一人称の比較中。event_timeline は語り非依存の正本）"

# 【プロトタイプ 2026-06-17】event_timeline ＝ 描写中立の原子的事象列（WHAT のみ）。
# POV・文体・描写密度を変えて再生成する際、この事象列を固定参照することで再現度を確保する。
# 規律：①動詞・事実のみ（情景の再話＝HOW は書かない／それは generation_blocks と本文の仕事）
#       ②本シーンの正本は起稿〜再生成フェーズのみ。07_final_text 確定後は本文が正本に戻り本ファイルは履歴。
#       ③良い初版の採用発明は decision_log 経由でここへ還流（粒度を上げた「執筆段階の発明の還流」）。
# レビュー反映済（06_draft_output/chapter_01/scene_01_review.md のフィックスを事象レベルで適用：E1捕縛/E4初手読み/E9区画全体警報/E10-11撤退合理性/光源）。
event_timeline:
  - id: E1
    event: "ノルクが路地裏を通りかかる。奥でスィグナが3人（フードの暗殺者1・力仕事2）に壁際へ詰められ、護衛は既に倒れている。暗殺者は即殺さず詰めている＝スィグナから何か（情報・在処）を引き出す目的（だから護衛排除後も生存・到着が間に合う）。"
  - id: E2
    event: "ノルクは一度通り過ぎ、三歩で足が止まり引き返す（理由は語られない）。引き返しながら路地の出口を二つ数える（北の本通り・東の崩れた塀）。"
  - id: E3
    event: "ノルクが軽口で介入し、暗殺者が応戦する。"
  - id: E4
    event: "ノルクは暗殺者の立ち方・重心から初太刀を読み、段1（神経同期＝反応強化）で紙一重に凌ぐ。数合で『腕では勝てない』と見切る。段1は数分限定・後で反動が来る借金。"
  - id: E5
    event: "スィグナがその攻防（加護持ち暗殺者と丸腰便利屋が互角）を見て過大評価を抱く。"
  - id: E6
    event: "ノルクは軽口＝観測として暗殺者の所作（顔を隠す角度・灯りを避ける足運び・声に応じない徹底）を読み、彼を縛る掟＝『見られてはならない稼業』を特定する。"
  - id: E7
    event: "ノルクが本通り方向へ誘導を試みる→暗殺者は『古い手だ』と見抜き、ノルクの肩を浅く裂いて逆方向へ体を流す。"
  - id: E8
    event: "暗殺者の体の開き方から、彼の本命退路をノルクが割る（読み取る）。"
  - id: E9
    event: "ノルクが破礼具（煙玉）を暗殺者の本命退路側へ投げ、白煙＋『火事だ』で偽火事を起こす。偽火事は区画全体の火災警報として機能し（延焼＝全員の死活問題のスラム）、住民・自警が一斉に湧いて全出口が目撃化される。方角の読みは『暗殺者の最良の逃走路を最も厚く塞ぐ』最適化。"
  - id: E10
    event: "群衆形成は即応（火災は即時反応）。暗殺者は『殺せるが消えられない』状況を即座に認識する。彼にとって露見は（伏せられた表の立場を壊す）致命傷であり、標的1人の価値を上回る。"
  - id: E11
    event: "暗殺者『いい手だ。今夜は降りよう』と恨みなく職業判断で撤退、煙の中へ消える（CH03で表の顔＝高位冒険者として再登場する布石。本シーンでは正体を伏せる）。"
  - id: E12
    event: "ノルクは追わない／追えない。緊張が切れた一拍後、段1の反動（こめかみの鈍痛・指先の震え）が遅延噴出し、物陰で噛み殺す（誰にも見えない＝余裕の誤認の正体）。"
  - id: E13
    event: "スィグナがノルクを見る（助かった安堵でなく、底の知れない何かを見た目）。『……あんた、何者?』で引く（scene_02＝なぜ助けた問答へ）。"

# Pre-Hook検証用
scene_facts:
  goal: "スィグナを救い、自分も無傷で（書類と面倒を出さず）この場を切り抜ける。"
  opponent: "闘神の加護を帯びた暗殺者（腕では格上）＋力仕事2。"
  conflict: "腕では勝てない／殺せば書類と面倒／長引かせれば段1の反動。勝利条件を殺傷から『相手の損得』へずらすしかない。"
  pinch: "知覚より速い刃。段1は数分で崩壊。群衆形成より先に仕留められれば終わり、の時間勝負。"

open_questions:
  - question: "暗殺者の闘神加護の戦闘型（トリック成立条件）"
    resolution: "速度・反応の超強化型（刃が見えてから間合いを食う）。得物は短剣でぼかす。要件攻略は核にしない＝disclosure_rule（浅い頭出し）。"
  - question: "なぜ暗殺者は護衛排除後すぐスィグナを殺さず詰めているか"
    resolution: "情報・在処を引き出す目的（捕縛/尋問寄り）。これで護衛が倒れた後もスィグナが生存しノルク到着が間に合う（行動妥当性フィックス）。"
  - question: "偽火事で本当に『消えられない』が成立するか（別ルート問題）"
    resolution: "偽火事＝区画全体の火災警報として全出口を目撃化（延焼が全員の死活問題のスラム前提）。方角読みは最良ルートを最厚で塞ぐ最適化。群衆即応で殺し→別口脱出の隙を潰す（物理整合フィックス。地理DBにスラム質感の正式化が要＝下記）。"
  - question: "暗殺者が撤退する合理性"
    resolution: "露見＝伏せた表の立場（CH03で高位冒険者と判明）を壊す致命傷＞標的1人。職業判断で撤退。CH01では正体を伏せ『見られてはならない稼業』の徹底で匂わせる。"
  - question: "スラム/双影通りの地理の質感（DB未整備）"
    resolution: "仮置き：木と紙の密集長屋・延焼即死活・窓灯りと松明の微光・崩れた塀。執筆確定後に setting_worldview / geography へ正式化（要TODO）。"

# 段落ごとの指示（event_timeline を render する単位＋ミクロ3変数）。POVで描写は変わるが参照する事象は同一。
