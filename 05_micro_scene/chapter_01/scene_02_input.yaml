place_time: "scene_01 直後。偽火事で群衆と自警団が湧いた双影通り。人目を避け、二人は路地の外れ（崩れた塀の陰・人だかりの届かぬ暗がり）へ移る。煙管の残り火と窓灯りのみ。"
