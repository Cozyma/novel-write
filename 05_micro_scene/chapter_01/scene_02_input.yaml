# 【scene_02 / 第2話】「なぜ助けた」問答＝二重勘違いの確立＋斡旋所への招き。
# 正本：chapter_01_summary act3_climax（turn後半・cliffhanger）。決め台詞・核台詞はそこを参照（一台詞一ホーム）。
# event_timeline 規律：①WHAT限定（HOW=情景の再話を混ぜない）②正本は起稿〜再生成のみ ③採用発明は decision_log 経由で還流。
event_timeline:
  - id: E1
    event: "スィグナの『あんた、何者?』（scene_01末の問い）に、ノルクははぐらかして答える（便利屋だと軽く流す）。同時に、偽火事で人と自警団が湧いた路地から二人はその場を離れる——スィグナは裏稼業ゆえ目撃化を嫌い、ノルクも長居の理由がない（職探しの続きへ戻りたい体）。崩れた塀の陰など人目の届かぬ暗がりへ移る。"
  - id: E2
    event: "ノルクがその場を立ち去ろうとする（義理で助けたが、それを認めず先を急ぐ）。スィグナがそれを呼び止め、核心を問う——金も縁もない見ず知らずの自分を、なぜ助けたのか。"
  - id: E3
    event: "ノルクは真の理由（足が止まった理由＝義理／人柄のズレの起点）を一切語らず、打算でラッピングした言い訳を返す。言い訳の語彙は、たった今の戦法（偽火事で暗殺者の退路を人で塞いだ手）と同一の語彙で落ちる＝『（自分が）路地を塞がれると帰れなくなるところだった』の体で、自分の退路確保が理由だったかのように偽装する。"
    # fixed_line 注：言い訳の核は chapter_01_summary act3_climax.turn「路地が塞がれると帰れなかった」が正本ホーム。ここへ語句を複製せず、戦法（scene_01 E13）と同語彙で落とす規律のみ固定。
  - id: E4
    event: "スィグナは、その言い訳の語彙が直前の戦法（他人の退路を精密に読み切って人で埋めた手）と一致することに気づく。『自分の退路のために、あれほど精密に他人の退路を潰せる男』という解釈に転び、底の見えない何かを見る（人柄のズレ＝打算の仮面が、むしろ底知れなさを増幅。否定するほど神話が育つ逆説）。"
  - id: E5
    event: "スィグナは加護持ち暗殺者と互角に渡り合い『頭で』退かせた攻防（scene_01）を見ている。ノルクの『ただの便利屋・運がよかっただけ』という否定はむしろ証拠として働き、彼女は『底知れない実力者』という過大評価を固める（無形報酬1＝力のズレ。人柄のズレと二重で機能）。"
  - id: E6
    event: "スィグナが目利き（人材発掘の本能）を発動し、この男を逃さないと決める。恩を稼ぎ口に換える申し出をする——命の借りは仕事で返す主義だ、明日、灰の斡旋所に来い、と。恩返しと人材確保を一手で済ます手際。"
  - id: E7
    event: "スィグナが名指した『灰の斡旋所』はノルクには初耳の名で、所在も知らない。ただし何の口を回す場所かは文脈で知れる＝加護も出自も問わずこういう夜の後始末を回す手配所＝今夜まさに探していた種類の職口だ（無加護ゆえギルド門前払い・断る理由がない）。それが、よりにもよって、たった今命を拾ってやった裏社会の女から差し出される。彼はそれを口には出さない。"
  - id: E8
    event: "ノルクは『裏社会の中枢に見込まれてしまった』予感（平穏から遠ざかる方向）を、内心の渋面＋軽口で蓋をして引き受ける／受け流す。第2話（章）の引き。"

# Pre-Hook検証用
scene_facts:
  goal: "（ノルク）義理で助けたことを悟られず、面倒を増やさずこの場を切り上げて職探しに戻る。／（スィグナ）この男の正体を測り、人材として確保する。"
  opponent: "スィグナの観察眼・目利き（戦闘ではなく見抜き/見誤りの攻防）。ノルク自身の隠匿（本心を出さない鎧 core_axis）。"
  conflict: "ノルクは真の動機（義理）を語れない（internal_flaw＝打算で蓋）が、蓋をするほど底知れなさが増し過大評価が育つ逆説。否定が証拠になる。"
  pinch: "スィグナの問いが人柄のズレの核心を突く。言い訳一つ間違えれば本心が露れる／うまく蓋をするほど厄介事（斡旋所への招き＝平穏喪失）に近づく、出口のないダブルバインド。"

# 【必須・執筆着手前】未決リスト。提案 resolution 付き。人間の確認・修正後に全resolvedとして初版生成へ。
open_questions:
  - question: "問答の場所——群衆が湧いたその場か、移動後か"
    resolution: "提案：移動後（崩れた塀の陰・人目の外れ）。理由＝①スィグナは裏稼業ゆえ目撃化を嫌う ②ノルクも段1反動を見せたくない／長居の理由がない ③偽火事の火元がない事実が露れる前に離れるのが自然。E1で移動を済ませる。"
  - question: "ノルクの段1反動（こめかみ鈍痛・指先の震え）をスィグナに見られるか"
    resolution: "提案：見られない（隠匿の核＝scene_01 E16で物陰に噛み殺し済み・誰の目にも触れない方針を維持）。scene_02開始時には反動は引きかけ。スィグナが見た『底知れなさ』は反動ではなく戦法と言い訳の精密さに由来させる（誤読の根を能力でなく振る舞いに置く）。"
  - question: "『灰の斡旋所』はノルクにとって既知か（scene_01 との継続性）"
    resolution: "確定（人間判定修正 2026-06-18）：ノルクには初出・所在も未知。scene_01 では特定の店名を持たず『無加護でも雇う口』を探して当てもなく場末をうろつく形に同期（両ドラフト・E1 から固有名を除去）。名と所在はスィグナの口（明日来い）で初めて示す。皮肉は『欲しかった種類の職口が、避けたい裏社会の縁から来る』こと＝特定名の一致ではない。"
  - question: "護衛（scene_01で倒れていた）の生死——スィグナの損害の重さとトーン"
    resolution: "提案：重傷だが生存。理由＝死なせると第1話の暗度が増し、スィグナの『面白がる余裕・大人の余裕』（speech_rule）と整合しにくい。scene_02で深掘りせず、生きている前提を一言で押さえる程度（氷山）。"
  - question: "スィグナが暗殺者に襲われた理由の開示度"
    resolution: "提案：明かさない（氷山）。裏社会の地位ゆえの厄介事、とぼかす。理由の解明は後続の引きに温存（影の結社/イーサの落胤＝characters.yaml signa background）。"
  - question: "二重勘違い（力のズレ＋人柄のズレ）の読者開示——誤認設計"
    resolution: "提案：読者はノルクの真の動機（義理・足が止まった）を一人称で知る／スィグナは誤読（底知れない実力者＋冷徹に退路を読む男）。reader_knowledge.yaml への初期投入（B節・perception_models[signa]＋reader_disclosure[nork_true_motive]）は本章人間判定通過後に行う。"
  - question: "cliffhanger の招き台詞をどこまで固定するか"
    resolution: "提案：核は chapter_01_summary cliffhanger『命の借りは仕事で返す主義なの。明日、灰の斡旋所に来なさい』が正本ホーム。語句はそれに準拠（複製でなく参照）。スィグナの口調は characters.yaml signa dialogue_samples（飄々・現実主義・大人の余裕）に寄せる。"

