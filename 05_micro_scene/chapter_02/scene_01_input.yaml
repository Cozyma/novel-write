    micro_variables: { load: "40%", sense: "Mid", empathy: "Mid" }
    fact: "清書の再提出→不備ゼロでも『総合的な判断』で見送り→書式は理由でなかったと確定→セリファの候補列挙と第三候補の切断→残金の乏しさ。"
  - block: "2_裏路地へ（E3）"
    micro_variables: { load: "30%", sense: "High", empathy: "Low" }
