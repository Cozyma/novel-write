scene_id: "01"
chapter_id: "CH_02"
place_time: "CH01の翌日。①朝：冒険者ギルド本館の受付窓口（表通り・石造の立派な建物）②夕方寄り：灰の斡旋所（裏路地・看板のない実務的な店構え）。"
pov_character: "ノルク一人称（文体アンカー準拠＝scene_01/02 と同一。event_timeline は語り非依存の正本）"

# 【第3話＝CH02全体を1シーン1話に統合】catharsis_core が「朝ノルク側・夕マーレン側の一日での対比」で成立するため、
# scenes 2項（門前払い／斡旋所）は本 input 内の場面転換として実装（分割すると核が泣き別れる。decision_log 参照）。
# event_timeline 規律：①WHAT限定 ②正本は起稿〜再生成のみ ③採用発明は decision_log 経由で還流。
event_timeline:
  - id: E1
    event: "翌朝、ノルクが清書し直した登録書類を正規ギルドの窓口へ再提出する（CH01『次から清書するよ』の実行）。書式に不備は無い——それでも『総合的な判断』と理由を示されず一言で弾かれる。書式は理由ではなかったと確定する（安い理由の死＝外した手が本命を教える型の日常版）。窓口係は悪意でなく決まりの悪さで応対する（制度の顔・敵を愚かにしない）。"
  - id: E2
    event: "セリファが却下要因の候補（無加護・出自）を挙げ、第三候補（照会しても経歴が存在しない＝抹消の影）にノルクの思考が触れかけ、意図的に切る（氷山・探求の種のみ）。生活の残金が乏しい（宿代を払えばあと数日分）ことが示される。"
  - id: E3
    event: "道すがら古本の露店に足が半歩止まる（素の癖＝quirks）が、財布事情で通り過ぎる。灰の斡旋所に到着——裏路地の飾りのない店構え、出入りする下請けたちの実務的な足。スィグナが『来ると思ってた』の余裕で迎える。"
  - id: E4
    event: "スィグナが『昨日のあれはどこまで計算だったのか』と探り、ノルクは打算の言い訳（先行投資）で受ける。スィグナは既に浅く洗っており、『この街の筋という筋に、顔の売れた形跡が無い＝名前ひとつ拾えない』空白を検出している——『経歴は消えない。無いのは、消したか消してもらったか＝消せる側の人間』というより危険な読みへ転ぶ（盛らずに深まる過大評価＝misunderstanding_escalation）。だが現実主義で詮索を切り上げ、『使い勝手のいい駒』と値踏みして先へ進む。"
  - id: E5
    event: "正式登録。求められるのは名乗りと分け前の取り決めだけ（朝のギルドと対照＝書類の通らない男を、書類の要らない世界だけが受け入れる皮肉）。ここでノルクが初めて名乗る（スィグナが名を知る初出＝CH01/02で名乗っていない継続性と整合）。非専属の出来高制（三割抜き）で取引成立＝裏社会のコネの正式確立（【有形報酬1】）。"
  - id: E6
    event: "最初の依頼札が回される。『新人には難しくない案件』という前置きに対し、書面の中身（街道筋の調査・護衛の単独下請け／新人向けと釣り合わない良すぎる報酬／受付板に掛かって残り続けた札の痕跡）が釣り合っていないことをノルクが一目で読む——誰も取りたがらなかった案件だと分かる。"
  - id: E7
    event: "雇い主の名が示される——正規冒険者マーレン・エスリッド。札の隅に書かれて消された『濁り血』の走り書きと、周囲の下請けの無言の反応が事情を語る。誰も説明せず、案件は新人へ回される（冷遇の慣行＝冷遇①）。ノルクは朝の自分の門前払いと同じ構造（理由を言語化しないまま決まりだけが決まっている）を静かに認識する——選べない者同士。受けて店を出た後、セリファが雇い主の公開記録を照会し『規程遵守率100%（統計上ほぼあり得ない）』を報告——そんな数字を出す人間がなぜ札を取ってもらえないのか、という予感で引く（CH03の顔合わせへの前振り）。"

# Pre-Hook検証用
scene_facts:
  goal: "（ノルク）正規の口への再挑戦が潰えた後、灰の斡旋所で職と実入りを確保する（開業資金への現実路線）。（スィグナ）昨日の男の実態を測りつつ、駒として正式に確保する。"
  opponent: "制度の壁（理由を言語化しない門前払い）／スィグナの探り（調べと値踏み）。"
  conflict: "経歴の空白を探られたくない／だが仕事は要る。受け流すほど『消せる側の人間』という一段危険な過大評価が育つ（否定が証拠になる逆説の変奏）。"
  pinch: "スィグナの調べが『何も出てこない』に到達済み——空白そのものが糸口として目立ち始めている。"

# 【必須・執筆着手前】未決リスト。提案 resolution 付き（scene_02方式＝最終確認は人間判定に併合）。
open_questions:
  - question: "第3話の粒度——CH02 の scenes 2項を分割するか統合するか"
    resolution: "統合（1シーン1話）。catharsis_core が朝夕の一日対比で成立するため、分割すると核が泣き別れる。chapter_02_summary の scenes 2項は本 input 内の場面転換として実装。"
  - question: "ギルド門前払いの形式——なぜ二度目の訪問か"
    resolution: "CH01 E1 の『書式不備・三箇所』『次から清書するよ』を回収——清書再提出が不備ゼロでも弾かれることで『書式は理由ではなかった』を確定させる（安い理由の死）。却下の言葉は『総合的な判断』＝理由の非言語化そのものを制度の顔として描く。窓口係に悪意を持たせない。"
  - question: "『書類が通らない』の作中理屈をどこまで開示するか"
    resolution: "非開示。セリファの候補列挙（無加護・出自・第三候補は言わせない）とノルクの思考の切断で、抹消経歴の影を読者に匂わせるだけ（氷山。正本＝resources_states の長距離伏線・回収はCH19スィグナ）。"
  - question: "スィグナの調べの深さと読みの方向"
    resolution: "顔ベースの聞き込みで『名前ひとつ拾えない』空白の検出まで（中身には届かない。名を知るのは登録時が初＝継続性整合）。読みは『消せる側の人間』——盛らず、より危険な過大評価へ（misunderstanding_escalation 2項目目に準拠）。詮索は現実主義で切り上げる（彼女の格の維持）。"
  - question: "取引条件の具体"
    resolution: "非専属・出来高・三割抜き、でぼかし運用（経済ディテールのDBは未整備。深入りしない）。"
  - question: "マーレンの扱い——名前と情報の開示範囲"
    resolution: "名前（マーレン・エスリッド）と『濁り血』の消された走り書き・周囲の無言まで。姿は出さない（対面はCH03）。セリファの規程遵守率100%照会を人物の前振り＋引きに使う（数字＝彼女の縛りプレイの外形。意味の開示はしない）。"
  - question: "食事モチーフ（定点装置）の扱い"
    resolution: "本話はスキップ（毎話必須にしない＝間隔運用）。素の供給は古本露店の quirk 一拍で代替。"

# 段落ごとの指示（event_timeline を render する単位＋ミクロ3変数）。POV=一人称。
