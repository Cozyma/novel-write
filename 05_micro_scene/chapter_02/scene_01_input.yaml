causality_next: "CH03（第4話〜）：依頼の手続きでギルドへ出向き、高位冒険者（昨夜の暗殺者の表の顔）の公認持ち上げと、雇い主マーレンとの最悪の顔合わせへ。"

decision_log:
  - "【平板対策 2026-07-02・人間承認（推奨案採用）】受け身章の三点補強——A能動の一手＝条件交渉の小勝ち（値切り二割五分・対価は事後報告＝スィグナの情報網の実務・ケチquirk初出）B報酬の体感化＝手付け（E2残金三日分の回収・裏は即日払う対比）C会話の綱渡り化＝探りの一歩踏み込み（消してもらえる伝手は限られる→無表情の仕事で凌ぐ）。診断は SELF_REVIEW §3b【平板章の三点検査】として普遍化。"
  - "【粒度判断 2026-07-02】第3話＝CH02全体（朝の門前払い＋夕の斡旋所）を1シーン1話に統合。catharsis_core（一日での両側可視化）を守るため。要人間確認。"
  - "【発明・E1】CH01『次から清書するよ』の回収として清書再提出→不備ゼロでも却下、を事象化（安い理由の死）。窓口の却下語彙『総合的な判断』を制度の顔として発明。"
  - "【発明・E4】スィグナの調べを顔ベース（名前を知らない状態）とし、『経歴の空白＝消せる側の人間』という読みを発明——盛らずに深まる過大評価（misunderstanding_escalation 2項目目）準拠。名乗りの初出は登録時（E5）＝CH01/02で名乗っていない継続性を確認済み。"
  - "【発明・E7】受付板の空いた釘・消された『濁り血』の走り書き＝冷遇の無言の可視化。札に折り込まれた雇い主のギルド査定の写し（斡旋所が下請けに渡す実務＝制度ディテールの発明）をノルクが検め、セリファが読み取って遵守率100%を告げる＝マーレン人物像の前振り＋ポンコツ論理ジョークの供給（『人間は書式を三箇所間違える生き物』＝E1回収）。"
  - "【接続修正 2026-07-02・人間指摘】『斡旋所に来いと言われた翌朝にギルドへ行くのが不自然』への対応——再訪をやめるのではなく動機の橋を架けた：招きを保留し『表の口が通るなら裏と縁を結ぶ理由が消える』と先に確かめる（平穏志向の必然＝選べない者になる過程の可視化で章の核を強化）。E1に動機を明文化、E3にスィグナの『寄り道してきた顔ね』（目利きの読み当て）を追加。"
  - "【canon修正 2026-07-02・人間指示】初版の『セリファが公開記録を照会』を撤回——セリファに外部照会は存在しない（入力はノルクの知覚のみ。characters.yaml / serifa combat_style へ制約を正本化）。査定写しをノルクが読む形へ差し替え。"
