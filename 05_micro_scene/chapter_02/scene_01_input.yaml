  - block: "3_問答と値踏み（E4）"
    micro_variables: { load: "45%", sense: "Mid", empathy: "High" }
    fact: "『どこまで計算だったの』→先行投資の打算ラッピング→『名前ひとつ拾えなかった』→『消せる側』の読み→一歩踏み込み（消してもらえる伝手は限られる＝会話の綱渡り・無表情の仕事で凌ぐ）→詮索の切り上げと駒の値踏み。"
  - block: "4_登録と最初の依頼（E5-E6）"
    micro_variables: { load: "40%", sense: "Mid", empathy: "Mid" }
