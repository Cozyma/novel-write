causality_next: "CH03（第4話〜）：依頼の手続きでギルドへ出向き、高位冒険者（昨夜の暗殺者の表の顔）の公認持ち上げと、雇い主マーレンとの最悪の顔合わせへ。"

decision_log:
  - "【粒度判断 2026-07-02】第3話＝CH02全体（朝の門前払い＋夕の斡旋所）を1シーン1話に統合。catharsis_core（一日での両側可視化）を守るため。要人間確認。"
  - "【発明・E1】CH01『次から清書するよ』の回収として清書再提出→不備ゼロでも却下、を事象化（安い理由の死）。窓口の却下語彙『総合的な判断』を制度の顔として発明。"
  - "【発明・E4】スィグナの調べを顔ベース（名前を知らない状態）とし、『経歴の空白＝消せる側の人間』という読みを発明——盛らずに深まる過大評価（misunderstanding_escalation 2項目目）準拠。名乗りの初出は登録時（E5）＝CH01/02で名乗っていない継続性を確認済み。"
  - "【発明・E7】受付板の空いた釘・消された『濁り血』の走り書き＝冷遇の無言の可視化。セリファの規程遵守率100%照会＝マーレン人物像の前振り＋ポンコツ論理ジョークの供給（『人間は書式を三箇所間違える生き物』＝E1回収）。"
