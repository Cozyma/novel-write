scene_id: "YY"
place_time: "TBD"
pov_character: "TBD"

# Pre-Hook検証用：以下が明確でないと生成プロンプトを発行しない
scene_facts:
  goal: "[目的：このシーンで勝ち取るもの/回避するもの]"
  opponent: "[対決相手/障害]"
  conflict: "[葛藤：二者択一/代償/矛盾]"
  pinch: "[ピンチ：具体的な刻限/接近/露見]"

# 【必須・執筆着手前】未決リスト：上位サマリーが決めていない事項のうち、執筆中の場当たり補完に任せたくないもの。
# 作成時にAIが列挙し、人間との対話（最小質問）で解決してから生成に入る。「執筆中に発見された手形は暗黙に埋まり検出不能になる」ことへの防御。
# 解決済みの項目は resolution を記入。全項目が resolved になるまで生成プロンプトを発行しない。
open_questions:
  - question: "[例：暗殺者の得物は何か（CH01のトリックの成立条件に関わる）]"
    resolution: "[対話での決定内容。未解決なら空欄]"

# 段落ごとの指示（ミクロ3変数と描写Fact）
generation_blocks:
  - block: "1_契約"
    micro_variables:
      load: "40%"
      sense: "High"
      empathy: "Low"
    fact: "[何が行われるか。視覚/行動で始める。勝敗条件の提示]"

  - block: "2_誤闘と代償"
    micro_variables:
      load: "60%"
      sense: "High"
      empathy: "Mid"
    fact: "[最短で勝とうとするが通らない。代償を払う]"

  - block: "3_反転"
    micro_variables:
      load: "30%"
      sense: "Low"
      empathy: "High"
    fact: "[新情報や自己暴露による不可逆な方針転換]"

  - block: "4_新方針と進展"
    micro_variables:
      load: "70%"
      sense: "Mid"
      empathy: "High"
    fact: "[古い自分では打てない手を打つ。条件の変化（次への因果）を残す]"

causality_next: "[次シーンへの因果：誰が何をしに来るのか]"

# 【生成後に添付】判断ログ：生成AIがサマリー・scene_inputに無い判断（解釈・補完・発明）を行った場合、本文と必ずセットで提出する。
# 人間がレビューするのは本文だけでなくこの判断一覧。出来事レベルの発明は人間承認後にcatharsis_coreへ還流する。
decision_log:
  - "[例：暗殺者の退き際の台詞として『仕事じゃなくなった』を発明（職業判断の撤退を本人に言わせた）——出来事レベルのため要還流判断]"
