arc_id: "arc_XX"
title: "TBD"

# 【スキーマ方針】アーク全体を1本の映画スケールとみなし、本作自身のカタルシス曲線（積み上げ→絶望→蹂躙）を背骨に持たせる（ARCHITECTURE 2.3）。読みレンズは起承転結。
#  - acts          ＝アークの物語曲線の正本（4段：setup→buildup→despair→catharsis＝起承転結）。各段は role（構造役割の一文）＋drive_variable のみ。出来事の再話はしない（事実の正本は各 chapter_XX_summary.yaml、章→段の束ねは chapter_sequence.csv の episode_id 列）。不可逆点（buildup）と能動的選択の着地（catharsis の embodiment_of_will）を推進力の検証アンカーとして保持。
#  - reward_chain  ＝多段報酬連鎖の番号台帳（語彙の単一出典。章サマリー・CSVの【報酬N】はここを参照）
#  - design_notes  ＝検証所見・ループ修正の追記先（chapter_summaryのdesign_notesと対称）
# 【禁止1】章の出来事を言い換えた派生散文（旧 episode_index の summary、acts 内の hook/incident/showdown 等の出来事再話）は持たない。構造的に必ずドリフトするため（2026-06-16の実地証拠で廃止）。
# 【禁止2】ハリウッド式の規範ビート表（midpoint=twist/驚きの最大化・all is lost 等）をアークに強制しない。借用は不可逆点と能動的選択の着地の2チェックのみ（ARCHITECTURE 2.3。2026-06-16にレンズごと撤去）。

macro_linkage:
  # 03_macro_concept で定義された全体設定に対する、このアークでの「部分的な割り当て（下位構造）」
  sub_quest: "[このアークで追う部分的な謎（全体の【探求】へどう繋がるか）]"
  sub_crisis: "[このアークでの敗北条件（全体の【危機】の予兆・一部としてのピンチ）]"
  local_evil: "[全体悪の末端、あるいはこのアーク特有の障害となる【悪】]"
  # 【必須】このアークの最大カタルシス（全体の【報酬】＝catharsis_engineのインスタンス）。
  # 探求・危機・悪と同様に「面白さ」も継承フィールドとして強制する。一文で言えなければアーク未設計。
  sub_catharsis: "[このアークの最大カタルシスの具体形（例：三波で『制度はお前を守らない』を分からせて座との癒着を断ち、セリファが読んだ接続のゆらぎの窓にマーレンの一撃を通す連携必殺——認識崩し部の実体化）。catharsis_engineのどの部分をどう実体化するか]"
  # 【必須・二人制】バディ二人のロードマップについて、このアークで進む段を記入（ARCHITECTURE 2.3）。
  # 各キャラ1アーク1段以内／アークごとに1人以上前進／ノルクが2アーク連続据え置きにならないこと。進まない側は「据え置き＋理由」を書く。
  roadmap_step:
    nork: "[例：step 1『知られる』——マーレンが力の危うさを知る]"
    marlen: "[例：step 1『揺らぐ』——絶対視した教条が崩れる]"

macro_peaks:
  # アーク全体で最大化する変数を指定（探求/報酬/驚き/危機）
  primary_variable: "危機"
  secondary_variable: "探求"

acts:
  # 本作自身のカタルシス曲線（積み上げ→絶望→蹂躙＝起承転結）。各段に chapters（章範囲）を明記。各段は role（その段が物語曲線で果たす構造役割の一文。出来事の再話でなく機能で書く）＋ drive_variable のみ。
  # buildup と catharsis は検証アンカー（irreversible／embodiment_of_will）を terse な一文で保持する（validation_hook の根拠）。
  setup:        # 起
    chapters: "[例：CH01-04]"
    role: "[この段の構造役割：掴み＋事件＋悪の支配の提示を一文で（出来事の列挙でなく機能で）]"
    drive_variable: "[探求/危機/驚きのいずれか]"
  buildup:      # 承（トラブルの積層＋不可逆点）
    chapters: "[例：CH05-10]"
    role: "[誤った戦い方の連鎖と失敗/亀裂の積み上げ→後戻り不可の決定までを一文で]"
    drive_variable: "[危機/驚きのいずれか]"
    irreversible: "[後戻り不可になる決定/事象を一文で（validation: has_irreversible_point の根拠）]"
  despair:      # 転（どん底・all is lost）
    chapters: "[例：CH11-14]"
    role: "[新方針の試行→代償増→all is lost の曲線を一文で]"
    drive_variable: "[危機のピーク]"
  catharsis:    # 結（蹂躙＋着地）
    chapters: "[例：CH15-19（エピローグは末尾に内包）]"
    role: "[最終競技/選択とカタルシスの着地を一文で]"
    drive_variable: "[報酬の最大化＋負荷の最小化]"
    embodiment_of_will: "[行為で示す想い＝古い自分では打てない手を一文で（validation: has_embodiment_landing の根拠）]"

# 報酬番号の正本（多段報酬連鎖の台帳）。章サマリー・chapter_sequence.csv の【有形報酬N】【無形報酬N】はここを参照する。
reward_chain:
  tangible:
    - id: "有形報酬1"
      content: "[具体的な物質的報酬]"
      chapter: "[CHXX]"
  intangible:
    - id: "無形報酬1"
      content: "[評価・神話・関係性などの無形報酬]"
      chapter: "[CHXX]"

# 検証所見・ループ修正の追記先（chapter_summary の design_notes と対称。本編開示義務なし）。
# 例：不可逆点がカタルシス曲線のどこに来るか、embodimentとroadmapのズレの整理、危機ドリブン/驚きドリブンの性格づけなど。
design_notes:
  notes: "[検証で見つかった所見・例外・割り切りを完結文で記録（SELF_REVIEW【設計メモの自己完結性】準拠）]"

validation_hook:
  is_linked_to_macro_concept: false # 全体の探求・危機・悪の「下位構造」になっているか
  has_irreversible_point: false # buildup に後戻り不可の決定/事象があるか
  has_embodiment_landing: false # catharsis が能動的選択（古い自分では打てない手）で着地するか
  has_catharsis_core: false # sub_catharsisがcatharsis_engineの具体的なインスタンスとして一文で成立しているか（抽象語・約束手形は不可）
  is_roadmap_within_one_step: false # 二人制検査：各キャラ1段以内 AND アークごとに1人以上前進 AND ノルクが2アーク連続据え置きでない（ARCHITECTURE 2.3）

total_chapters: 0
