chapter_id: "CH_07"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "危機" # 社会的・組織的な行き詰まり

catharsis_core: "マニュアルに完璧に準拠した証拠が『濁り血が提出する証拠は、追加審査が必要だ』の一言で棄却される——直後、ノルクの低い一言で査定官個人は口を結ぶが、書面は1ミリも動かない。個人の威圧は通り、制度の壁は不変——小カタルシスと絶望が同居するオチ。"

chapter_acts:
  act1_intro:
    hook: "街に帰還。無傷の魔物は高額で買い取られ、ノルクは多額の特別ボーナスを獲得。"
  act2_conflict:
    build_up: "魔物現場で露見した不正（危険な討伐を規定人数以下で下請けに使い潰し、その死を揉み消す不正）の証拠をもとに、マーレンが上層部に捜査権を申請する。証拠は完全にマニュアルに準拠している。それでも握り潰される。"
  act3_climax:
    turn: "却下の理由として、申請者の『立場』が持ち出される。「濁り血が提出する証拠は、追加審査が必要だ」。棄却を伝える査定官の背後には、捜査権の可否を握るギルド管理職——CH03でフロアの『公正の体現者』として遠景に置かれた、あの表の顔——が控えている。彼は穏やかに、隙なく言い添える。「規程は誰にも等しく適用される。だからこそ、出自の確認も等しく規程通りに」。正論もマニュアルも完璧だったのに、最後は血筋で棄却される——しかもそれが『公正』の名の下に。マーレンが積み上げてきたシステムへの信頼が、ここで根元から崩れる。"
    cliffhanger: "沈黙。隣に立っていたノルクが査定官に目を向け、低く一言だけ放つ。査定官は口を結んだ——だが、その背後で公正を説いた管理職の余裕は、眉ひとつ動かない（個人の威圧は通り、制度＝公正の建前を纏った権威は揺るがない）。ノルクはその顔を、必要より一拍長く見てから目を逸らす。「行くぞ」と先に廊下へ出る。ルールを守り続けた先に待っていたのは『最初から対象外』という事実だった。マーレンの手詰まりはそのまま残る。"

design_notes:
  - "【有形報酬3】無傷の魔物の高額買い取りによる特別ボーナスと、ボスの汚職（規定人数以下の使い潰し＋下請けの死の揉み消し）の決定的証拠。番号の正本は arc_summary.yaml / reward_chain。"
  - "冷遇の明示の2段目：CH03の空気（無言の差別）が個人攻撃の台詞になる。『濁り血』という語が初めて台詞として使われる章（setting_worldview.yaml / vocabulary.discriminated_slang）。"
  - "マーレンの誤闘（教条への依存。characters.yaml / marlen internal_flaw）が初めて正面から機能不全を起こす——CH08の無謀な単独行動の動機の直接の原因。CH03→CH07→CH08の冷遇2段構造により単独行動が必然化する。"
  - "本章の『査定官』はギルド内勤職（setting_worldview.yaml / guild.staff_vocabulary）であり、マーレンとは別人。棄却を伝える査定官（内勤職）と、その背後で可否を握り公正の建前を説くギルド管理職（＝後の裏ボス）は別の格——威圧が効くのは査定官個人まで。"
  - "ボスの表の顔の頭出し（本命・2点目）：CH03で遠景に置いた『公正の体現者』ギルド管理職を、ここで血筋棄却を『規程は誰にも等しく＝だから出自確認も等しく』という公正のレトリックで追認する姿として一段近づける。一手で三つ仕込む——①CH16で剥がす仮面（公正の体現者という自己像）を読者に持たせる②偽善の現物化（公言する公正 vs 危険案件の使い潰し汚職。本章で有形報酬3＝汚職証拠も入手）③CH09-10の正体判明を『あの管理職が裏で』の同一人物クリックにする布石。ノルクの威圧が査定官個人にしか効かず管理職の『公正』の余裕は揺るがない描写は、正面・威圧では割れない無謬の余裕＝CH11-14の正面敗北とCH16の連携必殺の必要性の前振り（setting_magic.yaml / anti_mage.combat_style）。氷山：キャラ間ではまだ汚職と結びつけない（読者に半歩のアイロニー）。"

scenes:
  - scene_01: "ボーナスの獲得と証拠の発見"
  - scene_02: "捜査申請の血筋を理由にした棄却と、ノルクが査定官を一言で黙らせるが書類は動かない小カタルシス"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
