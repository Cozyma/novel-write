chapter_id: "CH_07"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "危機" # 社会的・組織的な行き詰まり

chapter_acts:
  act1_intro:
    hook: "街に帰還。無傷の魔物は高額で買い取られ、ノルクは多額の特別ボーナスを獲得。【有形報酬3: 特別ボーナスと決定的な証拠】"
  act2_conflict:
    build_up: "魔物から検出された薬物の痕跡（証拠）をもとに、マーレンが上層部に密造網の捜査権を申請する。証拠は完全にマニュアルに準拠している。それでも握り潰される。"
  act3_climax:
    turn: "却下の理由として、申請者の『立場』が持ち出される。「濁り血が提出する証拠は、追加審査が必要だ」——正論もマニュアルも完璧だったのに、最後は血筋で棄却される。（冷遇の明示②：構造的差別が個人攻撃として降りてくる瞬間。「濁り血」という語が初めて台詞として使われ、CH03で示した空気感に名前がつく。マーレンが積み上げてきたシステムへの信頼が、ここで根元から崩れる）"
    cliffhanger: "ルールを守り続けた先に待っていたのは『お前は最初から対象外だった』という事実。完全に手詰まりとなる絶望感で引く。"

scenes:
  - scene_01: "ボーナスの獲得と証拠の発見"
  - scene_02: "捜査申請の個人攻撃による却下——冷遇の明示（異端の血を根拠にした棄却）"

