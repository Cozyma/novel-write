chapter_id: "CH_07"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "危機" # 社会的・組織的な行き詰まり

catharsis_core: "マニュアルに完璧に準拠した証拠が『濁り血が提出する証拠は、追加審査が必要だ』の一言で棄却される——直後、ノルクの低い一言で査定官個人は口を結ぶが、書面は1ミリも動かない。個人の威圧は通り、制度の壁は不変——小カタルシスと絶望が同居するオチ。"

chapter_acts:
  act1_intro:
    hook: "街に帰還。無傷の魔物は高額で買い取られ、ノルクは多額の特別ボーナスを獲得。"
  act2_conflict:
    build_up: "魔物現場で露見した不正（危険案件の使い潰し・下請けの死の揉み消し）の証拠をもとに、マーレンが上層部に捜査権を申請する。証拠は完全にマニュアルに準拠している。それでも握り潰される。"
  act3_climax:
    turn: "却下の理由として、申請者の『立場』が持ち出される。「濁り血が提出する証拠は、追加審査が必要だ」——正論もマニュアルも完璧だったのに、最後は血筋で棄却される。マーレンが積み上げてきたシステムへの信頼が、ここで根元から崩れる。"
    cliffhanger: "沈黙。隣に立っていたノルクが査定官に目を向け、低く一言だけ放つ。査定官は口を結んだ——個人は黙った。しかし書面は動かない。「行くぞ」と先に廊下へ出るノルク。ルールを守り続けた先に待っていたのは『最初から対象外』という事実だった。マーレンの手詰まりはそのまま残る。"

design_notes:
  - "【有形報酬3】無傷の魔物の高額買い取りによる特別ボーナスと、ボスの汚職（危険案件の使い潰し）の決定的証拠。番号の正本は arc_summary.yaml / reward_chain。"
  - "冷遇の明示の2段目：CH03の空気（無言の差別）が個人攻撃の台詞になる。『濁り血』という語が初めて台詞として使われる章（setting_worldview.yaml / vocabulary.discriminated_slang）。"
  - "マーレンの誤闘（教条への依存。characters.yaml / marlen internal_flaw）が初めて正面から機能不全を起こす——CH08の無謀な単独行動の動機の直接の原因。CH03→CH07→CH08の冷遇2段構造により単独行動が必然化する。"
  - "本章の『査定官』はギルド内勤職（setting_worldview.yaml / guild.staff_vocabulary）であり、マーレンとは別人。"

scenes:
  - scene_01: "ボーナスの獲得と証拠の発見"
  - scene_02: "捜査申請の血筋を理由にした棄却と、ノルクが査定官を一言で黙らせるが書類は動かない小カタルシス"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
