chapter_id: "CH_01"
arc_linkage: "第1アーク / 導入（起）"

chapter_stimulus:
  peak_variable: "報酬" # 腕で負けて頭で勝つカタルシス + 強者誤認の幕開け

catharsis_core: "腕で勝てない暗殺者の『完璧に人目を避けた殺し場』が『出口の少ない袋』でもあることを突き、煙玉ひとつの偽火事で退路側に人目を製造、『殺せるが消えられない』へ盤面を反転させて職業撤退に追い込む——言い訳『路地が塞がれると帰れなかった』が戦法と同じ語彙で落ちる。反転の決め台詞〔固定・正本ホーム〕：「腕は、あんたが上だ。だが今夜ここじゃ、殺れても消えられない。——それじゃ、あんたの商売あがったりだろ?」"

chapter_acts:
  act1_intro:
    hook: "路地裏でスィグナが暗殺者に追い詰められている。それなりに抗える女だが加護持ちの専業には押し負け、策も尽きかけている——そこへ、通り過ぎようとして数歩先で足が止まった男が、溜め息をひとつついて踏み込んでくる。男は剣を抜く前に、まず路地の出口を数える。"
  act2_conflict:
    build_up: "ノルクは歩きながら剣を抜き（挨拶を待つ相手ではないと読んでいる）、男とスィグナの間へ割り込んで軽口を掛ける——言葉の途中で、暗殺者が問答・誰何・値踏みなしの全力で殺しに来る。理屈＝スィグナは殺せない（尋問対象）が、闖入者＝目撃者は瞬殺すれば目的達成：『見られてはならない』稼業の手順であり、この即時排除の反射が後の掟読み（三点測量）の最初の証拠になる。事前の重心読み（右）と段1の知覚強化で初太刀を紙一重に凌ぎ、数合で『腕では勝てない』と見切る。逃走も検討の上で却下——背を向けた瞬間に終わる速度差、そして人払いの袋＝目撃者ゼロの盤面は敵が金を積んで組んだ庭。ならば奪い返すべきは剣の間合いでも足でもなく盤面のほうだ、と勝ち筋が再定義される。格上の暗殺者（強さこそ正義の系譜）と渡り合うため、セリファの高速演算と神経支援による超反応（段1：反応強化）で打ち合いをいなすが、それは数分と保たず神経の反動が後から来る——だから長引かせられない。地形と心理圧力でギリギリ凌ぎながら、ノルクは三点測量で観察を続ける——顔を隠す所作・灯りからの距離の取り方、人目を断つ結界という一晩限りの設備投資、そして闇討ちに不釣り合いな『見せる剣』の癖。この男を縛る掟（目撃されてはならない稼業）と、その裏の『見られてもいい顔（表）を持つ男』まで半歩読む。位置取りで人通りへ誘導を試みるが『誘導か。古い手だ』と読まれて切り捨てられる——だがその切り捨て方、どちらへ体を逃がしたかが、本命の退路をノルクに教える。"
  act3_climax:
    turn: "段1の残りは僅か——仕掛けは一発勝負。煙玉ひとつを暗殺者の第一退路の方角で焚き、『火事だ』の騒ぎを製造する。悲鳴は黙殺するスラムも、煙には全員が出てくる——野次馬と自警が退路側に湧き、殺しの時間は残っているのに、消える時間だけが消失する。反転の決め台詞を突きつける（語句の正本＝catharsis_core〔固定・正本ホーム〕。2026-07-05：turn内の複製が『腕は俺が上だ』と話者の主張が逆転するまでドリフトしていたため、語句を撤去し参照化）——暗殺者は短く笑い、「いい手だ。今夜は、降りよう」と賞賛さえ残して、職業判断として恨みなく撤退する（ノルクは追わない——追えないのでもある。超反応がもう保たず、神経の反動が遅れて噛みつき始めている＝コストの頭出し。人目の引いた一拍で物陰に凭れ、こめかみの鈍痛と指先の震えを噛み殺す）。事後、「なぜ助けた」——「路地が塞がれると帰れなかった」。たった今の戦法と同じ語彙で返る言い訳に、スィグナは底の見えない何かを見る。"
    cliffhanger: "「命の借りは仕事で返す主義なの。明日、灰の斡旋所に来なさい」。恩を稼ぎ口に換えて返す——恩返しと人材確保を一手で済ます目利きの手際に、職にあぶれた身では断る理由が見つからない。裏社会の中枢に『見込まれてしまった』という、平穏から遠ざかる予感で引く。"

design_notes:
  - "人柄のズレの起点：ノルクが助けに入った理由を、地の文でも本人の台詞でも説明しないこと（言い訳は打算に偽装される）。介入は『一度通り過ぎる→数歩先で足が止まる→溜め息をついて引き返す』という行為の連なりだけで描く——義理を行為で見せ、言葉では否定する。concept.yaml / misunderstanding_gap【人柄のズレ】の最初の点火。"
  - "【無形報酬1】本章の戦闘の見返りとして、スィグナがノルクに『底知れない化け物』という過大評価を与える（力のズレに人柄のズレ〔動機の不可視化〕が合流した単一の過大評価。冷血漢誤読はここでは形成されない——対マーレン・CH06初出。2026-07-05是正）。番号は第1アーク内の多段報酬連鎖の通し番号。"
  - "加護戦闘の文法の初出し：加護は正面の打ち合い（守りと膂力）では格上を作るが、位置取り・退路・社会的損得までは守らない——本章の戦闘はこの線引きを読者に体験として示す（setting_worldview.yaml / blessing_types、characters.yaml / nork combat_style 手札④）"
  - "多神クランの浅い頭出し（disclosure_rule）：暗殺者の格上の腕は闘神の加護（強さこそ正義）に由来する。世界が多神クラン乱立であることを示すため一柱を浅く出すが、要件の読み合いは核にしない（setting_worldview.yaml / divine_economy.pantheon.toushin・disclosure_rule）。"
  - "段1神経同期（反応強化）の初出し＋コストの頭出し：超反応で格上といなすが数分で同期が崩壊し、戦闘後に神経の反動（こめかみの鈍痛・指先の震え）が遅れて噴く——CH17の代償噴出へ繋がる伏線。条項告発・遺技ロードは温存（伏せ札。隠匿の生存則＝setting_magic.yaml / concealment_rule）。"
  - "観測の所作の初運用（characters.yaml / nork combat_style 手札①）：本章で読むのは加護の要件ではなく『稼業の掟』。読みは三点測量——所作（顔を隠す・灯り避け・無言の徹底）＋結界（人目を断つ設備投資＝掟の物理化）＋太刀筋（闇討ちに不釣り合いな『見せる剣』の癖）——で、掟に加え『表を持つ男』まで半歩読む。セリファの演算と併走する『相手を縛るルールを読む』戦闘文法を確立し、CH16で加護の出力のゆらぎ読みへスケールアップする（同型の前振り）。"
  - "安い答えの死（CH01版・2026-07-03改訂）：『割って入って軽口の一つも利ける』という便利屋の見積もりが、言葉の途中の問答無用の初撃で死ぬ。目撃者の即時排除は『見られてはならない』掟の手順そのものであり、初撃の反射がE10の掟読みの最初の証拠を兼ねる——**掟が男を初撃に駆り立て、同じ掟が偽火事で男を退かせる（単一原理の円環）**。E5の『出口を数える』は逃走の検討（却下＝背を向けた瞬間に終わる速度差）と偽火事の方角配分で二度働く。整合：scene_02の言い訳『路地が塞がれると帰れなかった』は偽火事＝自分で路地を人で塞いだ戦法との同語彙で落ちる（逃走試行には依存しない）。※旧構造（逃走試行→先回り）は2026-07-03に全面廃止＝逃走を許す/塞ぐの理屈が立たないため。"
  - "破礼具（煙玉）の初出し：本来は発声・詠唱を妨害する道具を、偽火事の煙に目的外利用する。作中で道具の解説はしない——ただの煙玉に見えてよい（setting_magic.yaml / harei_tools）"
  - "出口を数える癖（characters.yaml / nork speech_rule・無意識のリスク管理）が本章ではそのまま武器になる——日常描写の癖が伏線を兼ねる構造"
  - "フェイク誘導の一拍は二役：①暗殺者の格の維持（誘導を『古い手』と読み切る有能さ）②観測（切り捨てる際の体の逃がし方が本命の退路を割る）——『外した手が本命を教える』型のシリーズ初出（CH05の乗らない陽動→本能の序列、CH12-13の効かない挑発→個人の不在、へ系列化。安い手を実地に外し、外れ方を最大の観測に変える読みのゲームの共通文法）"
  - "「路地が塞がれると帰れなかった」は打算ラッピング（characters.yaml / nork speech_rule）と本章の戦法の語彙一致。観測者には『お前の退路を塞いだ』という宣言にも聞こえる（concept.yaml / misunderstanding_escalation・箴言化の種）"
  - "暗殺者の格の維持：敗走ではなく、手の見事さを認めて賞賛しつつ退く。プロ同士の決着として恨みを残さない——CH03で実力者枠（表の顔＝高位冒険者）として再登場し、いびりをたしなめてノルクを面白がって持ち上げる連続性の前提"
  - "暗殺者には表の顔（ギルド上位者）がある——本章では明かさず、CH03の再会で回収。『退路ごと読まれた』男への一目置きの根拠をここで成立させる"
  - "撤退の天秤の構造的根拠（2026-07-02追記・本文変更なし）：闘神の加護の要件は『強さの実演』（setting_worldview.yaml / divine_economy.general_mechanics）だが、見られてはならない稼業は実演の場を持てない——表の顔（高位冒険者）は偽装ではなく、加護を養う実演の場＝生存インフラ。ゆえに『露見＝表の立場の喪失』は面子でなく加護の生命線の問題で、標的1人＜露見回避の天秤（E14）が構造的必然になる（敵の理屈の内側で詰ます・同一コイン：稼業を支える掟と加護を支える要件の縫い目が、偽火事で突かれた急所）。ノルクは三点測量の半歩読み（『表を持つ男』）に基づき、半ば意図してこの縫い目を突く——ただし加護要件そのものは知らない（闘神・実演の語は本文に出さない＝disclosure_rule・氷山。読みは『見せる剣の癖』『表のある男』の描写語まで）。CH03で表の顔を知った読者が遡って全容に気づく二度おいしい構造。"

scenes:
  - scene_01: "スィグナの窮地とノルクの介入——出口を数える観察、腕で負ける攻防とフェイク誘導、煙玉の偽火事による反転、暗殺者の職業撤退"
  - scene_02: "「なぜ助けた」問答——強者誤認の確立と、命の借りを口実にした斡旋所への招き"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
