chapter_id: "CH_01"
arc_linkage: "第1アーク / 導入（起）"

chapter_stimulus:
  peak_variable: "報酬" # 工夫で格上を退けるカタルシス + 二重勘違いの幕開け

chapter_acts:
  act1_intro:
    hook: "路地裏でスィグナが暗殺者に追い詰められている。護衛は倒れ、策も尽きかけている——そこへ、通り過ぎようとして数歩先で足が止まった男が、溜め息をひとつついて踏み込んできた。介入の理由は語られない。（人柄のズレの起点）"
  act2_conflict:
    build_up: "ノルクが地形利用・フェイント・心理圧力を総動員した泥臭い工夫で、律神の加護を帯びた格上の暗殺者をギリギリでいなし続ける。傷はつかないが、深追いできない状況を作り続ける。終始気だるげな佇まいのまま。スィグナには『実力を隠した余裕の制圧』に映る。【加護の戦闘層・初出し：加護持ちには傷をつけられないが退かせることはできるという前提を体験として示す】"
  act3_climax:
    turn: "暗殺者が底の見えない不気味さに戦慄し、深追いを避けて敗走する（ノルクは追わない）。「なぜ助けた」——「路地が塞がれると帰れなかった」（打算ラッピング）。力のズレ（工夫の戦闘を余裕の制圧と誤読）と人柄のズレ（義理の介入を綿密な計算と誤読）が初手で同時成立。【無形報酬1: スィグナからの底知れない化け物評価（力＋人柄の二重誤読）】"
    cliffhanger: "「明日、灰の斡旋所に来なさい」。弱みを握られ強引に裏の所属を決められる——平穏から遠ざかる予感で引く。"

scenes:
  - scene_01: "スィグナの窮地とノルクの介入——泥臭い工夫によるギリギリの攻防と暗殺者の敗走"
  - scene_02: "「なぜ助けた」問答——二重勘違いの確立と強制登録予告"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
