chapter_id: "CH_01"
arc_linkage: "第1アーク / 導入（起）"

chapter_stimulus:
  peak_variable: "報酬" # 腕で負けて頭で勝つカタルシス + 二重勘違いの幕開け

catharsis_core: "腕で勝てない暗殺者の『完璧に人目を避けた殺し場』が『出口の少ない袋』でもあることを突き、煙玉ひとつの偽火事で退路側に人目を製造、『殺せるが消えられない』へ盤面を反転させて職業撤退に追い込む——言い訳『路地が塞がれると帰れなかった』が戦法と同じ語彙で落ちる。"

chapter_acts:
  act1_intro:
    hook: "路地裏でスィグナが暗殺者に追い詰められている。護衛は倒れ、策も尽きかけている——そこへ、通り過ぎようとして数歩先で足が止まった男が、溜め息をひとつついて踏み込んでくる。男は剣を抜く前に、まず路地の出口を数える。"
  act2_conflict:
    build_up: "数合で『腕では勝てない』と見切る。加護を帯びた格上の暗殺者を地形と心理圧力でギリギリいなしながら、ノルクは観察を続ける——人目を避け抜いた完璧な襲撃地点の選定、顔を隠す所作、灯りからの距離の取り方。この男を縛る掟（目撃されてはならない稼業）を読む。位置取りで人通りへ誘導を試みるが『誘導か。古い手だ』と読まれて切り捨てられる——だがその切り捨て方、どちらへ体を逃がしたかが、本命の退路をノルクに教える。"
  act3_climax:
    turn: "煙玉ひとつを暗殺者の第一退路の方角で焚き、『火事だ』の騒ぎを製造する。悲鳴は黙殺するスラムも、煙には全員が出てくる——野次馬と自警が退路側に湧き、殺しの時間は残っているのに、消える時間だけが消失する。『腕は俺が上だ。だが今夜ここで殺せるのは、消えられる方だけだ』——暗殺者は短く笑い、「いい手だ。今夜は降りよう」と賞賛さえ残して、職業判断として恨みなく撤退する（ノルクは追わない）。事後、「なぜ助けた」——「路地が塞がれると帰れなかった」。たった今の戦法と同じ語彙で返る言い訳に、スィグナは底の見えない何かを見る。"
    cliffhanger: "「命の借りは仕事で返す主義なの。明日、灰の斡旋所に来なさい」。恩を稼ぎ口に換えて返す——恩返しと人材確保を一手で済ます目利きの手際に、職にあぶれた身では断る理由が見つからない。裏社会の中枢に『見込まれてしまった』という、平穏から遠ざかる予感で引く。"

design_notes:
  - "人柄のズレの起点：ノルクが助けに入った理由を、地の文でも本人の台詞でも説明しないこと（言い訳は打算に偽装される）。介入は『一度通り過ぎる→数歩先で足が止まる→溜め息をついて引き返す』という行為の連なりだけで描く——義理を行為で見せ、言葉では否定する。concept.yaml / misunderstanding_gap【人柄のズレ】の最初の点火。"
  - "【無形報酬1】本章の戦闘の見返りとして、スィグナがノルクに『底知れない化け物』という過大評価を与える（力のズレ＋人柄のズレの二重誤読）。番号は第1アーク内の多段報酬連鎖の通し番号。"
  - "加護戦闘の文法の初出し：加護は正面の打ち合い（守りと膂力）では格上を作るが、位置取り・退路・社会的損得までは守らない——本章の戦闘はこの線引きを読者に体験として示す（setting_worldview.yaml / blessing_types、characters.yaml / nork combat_style 手札④）"
  - "観測の所作の初運用（characters.yaml / nork combat_style 手札①）：ただし本章で読むのは加護の要件ではなく『稼業の掟』。『相手を縛るルールを読む』という戦闘文法を、セリファと切り札を一切出さずに確立する。CH16で同じ文法が加護の消失要件読みへスケールアップする（同型の前振り）"
  - "破礼具（煙玉）の初出し：本来は発声・詠唱を妨害する道具を、偽火事の煙に目的外利用する。作中で道具の解説はしない——ただの煙玉に見えてよい（setting_magic.yaml / harei_tools）"
  - "出口を数える癖（characters.yaml / nork speech_rule・無意識のリスク管理）が本章ではそのまま武器になる——日常描写の癖が伏線を兼ねる構造"
  - "フェイク誘導の一拍は二役：①暗殺者の格の維持（誘導を『古い手』と読み切る有能さ）②観測（切り捨てる際の体の逃がし方が本命の退路を割る）"
  - "「路地が塞がれると帰れなかった」は打算ラッピング（characters.yaml / nork speech_rule）と本章の戦法の語彙一致。観測者には『お前の退路を塞いだ』という宣言にも聞こえる（concept.yaml / misunderstanding_escalation・箴言化の種）"
  - "暗殺者の格の維持：敗走ではなく、手の見事さを認めて賞賛しつつ退く。プロ同士の決着として恨みを残さない——CH03で実力者枠（表の顔＝高位冒険者）として再登場し、いびりをたしなめてノルクを面白がって持ち上げる連続性の前提"
  - "暗殺者には表の顔（ギルド上位者）がある——本章では明かさず、CH03の再会で回収。『退路ごと読まれた』男への一目置きの根拠をここで成立させる"

scenes:
  - scene_01: "スィグナの窮地とノルクの介入——出口を数える観察、腕で負ける攻防とフェイク誘導、煙玉の偽火事による反転、暗殺者の職業撤退"
  - scene_02: "「なぜ助けた」問答——二重勘違いの確立と、命の借りを口実にした斡旋所への招き"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
