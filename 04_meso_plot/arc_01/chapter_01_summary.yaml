chapter_id: "CH_01"
arc_linkage: "第1アーク / 導入（起）"

chapter_stimulus:
  peak_variable: "探求" # なぜ足を止めたのか——人柄のズレの起点

chapter_acts:
  act1_intro:
    hook: "正規ギルドの窓口で一言断られ、溜め息をつきながら双影通り（スラム）へ向かうノルク。教条主義システムが弾く者としての社会的立場と、生活のために裏の仕事を探しているという動機が一息で示される。"
  act2_conflict:
    build_up: "裏稼業の口を探してスラムを歩く中、路地裏でスィグナが暗殺者に追い詰められている場面を目撃する。護衛はすでに倒れ、スィグナの策も尽きかけている。ノルクは一瞥して、足を止めず通り過ぎようとする。"
  act3_climax:
    turn: "しかし数歩先で足が止まる。「……面倒だ」と一言呟き、溜め息をひとつついて引き返す。介入の理由は語られない。"
    cliffhanger: "なぜ戻ったのかという謎の【探求】と、絶体絶命の窮地という【危機】の二重の引きで次話へ。"

scenes:
  - scene_01: "ギルド門前払いとスラムへの移動（世界観・立場の圧縮説明）"
  - scene_02: "スィグナの窮地目撃→通り過ぎようとして足が止まる選択"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
