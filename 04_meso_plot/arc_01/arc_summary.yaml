arc_id: "arc_01"
title: "第1アーク：教条の崩壊と理不尽な救済"
episodes:
  - episode_id: 1
    title: "スラムの邂逅（プロローグ相当）"
    summary: "ギルド門前払い→スラムで裏稼業探し中にスィグナの窮地へ介入。足を止めた理由は語られず、力のズレ（工夫の戦闘を余裕と誤読）と人柄のズレ（義理の介入を計算と誤読）が同時に成立する二重勘違いの幕開け。"
  - episode_id: 2
    title: "最悪の出会い（【起】前半）"
    summary: "異端の血ゆえに不本意な案件を押し付けられるマーレンとの合同任務開始。道中ノルクの『感情を排した計算の目』が一瞬だけ覗き、「死地を歩いた人間」という確信を与える。苛立ちと不気味さが同居する出会い。"
  - episode_id: 3
    title: "手抜きという名の異常性（【起】後半）"
    summary: "郊外の薬物強化魔獣クエストが表の依頼。魔獣処理後に密造網の末端組織が潜んでいた事実が露見し、マーレンが力押しで半数を制圧するが残りをノルクが打算ラッピングで非殺介入。冷血漢誤読モデルがマーレンに初形成される。"
  - episode_id: 4
    title: "教条の壁と裏の流儀（【承】）"
    summary: "完璧な証拠を揃えた捜査申請が「お前のような出自の者は」と血筋を理由に個人棄却される（冷遇の明示）。追い詰められたマーレンが無謀な単独行動に出ようとしたところをノルクが打算ラッピングで止め、自ら裏の手を切る（人柄のズレ：対マーレン初例）。"
  - episode_id: 5
    title: "絶望のいびつな全力（【転】）"
    summary: "ノルクの『一晩待ちたい』を押し切って強行突入したマーレンがボスの絶対加護に全力を弾かれ心が折れる。ノルクは突入中に並行して設備確認を進め、マーレンの3話分の苦闘を冷静に観察（冷血漢誤読の頂点）。セリファの撤退推奨を無視してノルクの足が止まる。"
  - episode_id: 6
    title: "システム外の蹂躙（【結】前半・最大カタルシス）"
    summary: "セリファ撤退推奨を無視して残った男が『ギルド評価が下がる』と打算を装いながら介入。読者には打算の言い訳が空振りと分かる状態でシステムハッキングと超火力での蹂躙が炸裂する。"
  - episode_id: 7
    title: "押しかけの相棒（【結】後半・エピローグ）"
    summary: "不都合な真実の隠蔽と、マーレンとのバディ（共犯・補完）関係の始まり、ノルクの平穏の終わり。スィグナが『抹消された経歴』に気付き、究極の探求（第零機関）への扉が開く。"
total_chapters: 19
