arc_id: "arc_01"
title: "第1アーク：教条の崩壊と理不尽な救済"
episodes:
  - episode_id: 1
    title: "スラムの邂逅（プロローグ相当）"
    summary: "路地裏でスィグナの窮地へ介入（理由は語られない）。腕で勝てない格上の暗殺者の退路に偽火事で人目を製造し『殺せるが消えられない』状況へ反転させ職業撤退に追い込む——第1話で力のズレと人柄のズレが同時成立する二重勘違いの幕開け。翌日のギルド門前払いと斡旋所への正式登録を経て、冒険者マーレンの下請け案件が回ってくる。"
  - episode_id: 2
    title: "最悪の出会い（【起】前半）"
    summary: "異端の血ゆえに他の冒険者からパーティを忌避され、下請けを雇うしかない冒険者マーレンへの随行任務開始。道中ノルクの『感情を排した計算の目』が一瞬だけ覗き、「死地を歩いた人間」という確信を与える。苛立ちと不気味さが同居する出会い。"
  - episode_id: 3
    title: "手抜きという名の異常性（【起】後半）"
    summary: "郊外の薬物強化魔獣クエストが表の依頼。魔獣処理後に密造網の末端組織が潜んでいた事実が露見し、マーレンが力押しで半数を制圧するが残りをノルクが打算ラッピングで非殺介入。冷血漢誤読モデルがマーレンに初形成される。"
  - episode_id: 4
    title: "教条の壁と裏の流儀（【承】）"
    summary: "完璧な証拠を揃えた捜査申請が「お前のような出自の者は」と血筋を理由に個人棄却される（冷遇の明示）。ノルクが査定官を一言で黙らせるが書類は動かない——個人の威圧は成立するが制度の壁は不変（小カタルシス）。追い詰められたマーレンが無謀な単独行動に出ようとしたところをノルクが打算ラッピングで止め、自ら裏の手を切る（人柄のズレ：対マーレン初例）。情報収集の過程で密造薬物に『旧魔導院の廃棄技術との類似』が見つかり、ノルクだけが表情を殺す（第零機関への伏線）。"
  - episode_id: 5
    title: "絶望のいびつな全力（【転】）"
    summary: "ノルクの『一晩待ちたい』を押し切って強行突入したマーレンがボスの絶対加護に全力を弾かれ心が折れる。ノルクは突入中に並行して設備確認を進め、マーレンの3話分の苦闘を冷静に観察（冷血漢誤読の頂点）。セリファの撤退推奨を無視してノルクの足が止まる。"
  - episode_id: 6
    title: "システム外の蹂躙（【結】前半・最大カタルシス）"
    summary: "セリファ撤退推奨を無視して残った男が『ギルド評価が下がる』と打算を装いながら介入。読者には打算の言い訳が空振りと分かる状態で、加護の要件違反を保持者自身に犯させて自壊させた上での超火力蹂躙が炸裂する。勝利後、代償の頭痛に顔を歪めるノルクをマーレンが目撃し、『依頼は完遂済みだったのに残った＝計算ではなかった』と静かに確信する（打算ラッピングの亀裂：CH15で読者だけが知っていた空振りが、事後の物証でマーレンにも届く）。"
  - episode_id: 7
    title: "押しかけの相棒（【結】後半・エピローグ）"
    summary: "不都合な真実の隠蔽と、マーレンとのバディ（共犯・補完）関係の始まり、ノルクの平穏の終わり。スィグナが『持ち駒で一番使い勝手がいい』とノルクを資産評価する場でマーレンが無言で目を向ける——スィグナ（資産）とマーレン（理解者）の関係性の対比が初めて並置される。スィグナが『抹消された経歴』に気付き、究極の探求（第零機関）への扉が開く。"
total_chapters: 19
