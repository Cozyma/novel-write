arc_id: "arc_01"
title: "第1アーク：教条の崩壊と理不尽な救済"

# このアーク全体を1本の映画スケールとみなし、ハリウッド式4幕構造を持たせる（ARCHITECTURE 2.3）。
# acts＝アークの物語曲線の正本。episode_index＝章を束ねた起承転結の読み下し地図（派生）。

macro_linkage:
  # 03_macro_concept/concept.yaml の全体設定に対する、このアークでの部分割り当て（下位構造）。
  sub_quest: "密造網の薬物精製に混じる『旧魔導院の廃棄技術との類似痕跡』（CH09）にノルクだけが反応し、エピローグでスィグナが『抹消された経歴』に行き当たる——ultimate_mystery（第零機関の二重の抹消）への最初の糸口を一粒だけ残す。"
  sub_crisis: "教条（加護の独占）に下請けは構造的に勝てない。規程を守り抜いたマーレンの完璧な申請が血筋を理由に棄却され、いびつな全力すら加護に弾き返される——core_conflict（出自を差別する教条主義制度）が、制度の壁として個人の前に顕在化する敗北条件。"
  local_evil: "加護を持つ密造網のボス。出自によって礼節を変える教条的傲慢を、固有加護の消失要件として体現する——教条主義（究極の危機）の末端の悪。"
  # 【必須】このアークの最大カタルシス（catharsis_engineのインスタンス）。
  sub_catharsis: "加護の消失要件（出自で礼節を変えないこと）をボス自身に踏み抜かせて自壊させた上で、頭痛の代償を払いながら最適化された規格外の超火力を『雑に』叩き込む蹂躙。catharsis_engine.execution の第1アークでの実体化。"
  # 【必須・二人制】バディ二人の成長段（concept.yaml / characters.yaml の各 roadmap。各1アーク1段以内）。
  roadmap_step:
    nork: "step 1『知られる』——信頼できる他者マーレンが、ノルクの力の『危うさ』を知る（CH17で頭痛の物証を見て『計算ではなかった』と確信）。ノルク本人の自己認識は打算ラッピングのまま据え置き（design_notes参照）。"
    marlen: "step 1『揺らぐ』——絶対視した教条が汚染魔物（CH05）・申請棄却（CH07）・いびつな全力の崩壊（CH14）で完全に折れる（internal_flawの発火）。"

macro_peaks:
  # アーク全体で最大化する変数（探求/報酬/驚き/危機）。priority_variables準拠。
  primary_variable: "報酬"   # 教条のエリートを叩き潰す蹂躙のカタルシス
  secondary_variable: "驚き" # 必死に誤魔化す本人と『深淵の化け物』誤認のギャップ

acts:
  act1_setup:
    chapters: "CH01-04"
    hook: "腕で勝てない格上の暗殺者を、偽火事で人目を製造し『殺せるが消えられない』状況へ反転、賞賛を残した職業撤退に追い込む——第1話で力のズレと人柄のズレが同時成立する二重勘違いの幕開け（CH01）。"
    incident: "ギルド門前払い→灰の斡旋所登録を経て、異端の血ゆえ下請けを雇うしかない冒険者マーレンの随行案件が新人ノルクに回る。高位冒険者（昨夜の暗殺者の表の顔）の公認で実力者神話が立つ（CH02-03）。"
    show_evil:
      fact: "出自（濁り血）で礼節・案件・審査を変える教条主義社会。下請けは陣形の頭数にも数えられず保護規定もない——マーレンの冷遇と剥がれた目で『適当な便利屋』認識が崩れる（CH02-04）。"
      drive_variable: "危機"
  act2a_trouble:
    chapters: "CH05-09"
    wrong_actions:
      - fact: "マーレンが教条の習性対応表で汚染魔物に挑み全滅する（想定外への脆さの初露出。CH05）。"
        drive_variable: "危機"
      - fact: "規程通り完璧な証拠を揃えた捜査申請が『お前のような出自の者は』と血筋を理由に棄却される——教条に従えば報われるという前提の破綻（CH07）。"
        drive_variable: "危機"
    losses: ["制度の壁は個人の威圧では動かない（CH07）", "追い詰められたマーレンが無謀な単独行動に暴発しかける（CH08）", "冷血漢誤読モデルがマーレンに初形成される（CH06）"]
  midpoint:
    chapters: "CH10"
    revelation_or_break:
      fact: "アジトに『見えざる大物』＝加護持ちのボスがいると判明。ノルクの『一晩待つ』提案をマーレンが押し切り、情報不足のまま今夜の強行突入が決定する（戦略決裂＝後戻り不可の行動）。"
      drive_variable: "危機" # 驚きは弱い。詳細は design_notes.midpoint_revelation_weak
    new_intent: "今夜、準備の整わないままアジトへ強行突入する。"
  act2b_fightback:
    chapters: "CH11-14"
    try_with_cost: ["マーレンが教条の枠内で正面突破を図り、通じないと見て封印解除＝いびつな全力を放つ（CH11-13）", "ノルクは退路・設備・遮断結界の稼働を並行確認し隠匿リスクを管理（CH11-13）"]
    rising_cost: ["マーレンの現時点最強の一撃すら加護に弾き返され心が折れる＝all is lost（CH14）", "セリファが撤退推奨を告げる（離脱条件の成立）"]
  act3_finale:
    chapters: "CH15-17（CH18-19はエピローグ）"
    showdown: "撤退推奨を無視して残った男が『ギルド評価が下がる』と打算を装いボスの前に立つ（読者には空振りと分かる）。セリファ演算で加護の消失要件をボス自身に踏み抜かせ自壊させ（CH16）、頭痛の代償を払いつつ最適化超火力で雑に蹂躙する（CH17）。"
    embodiment_of_will:
      fact: "CH14『足が止まる……面倒だ』——離脱できるのに残り、隠匿リスクを冒して切り札を解禁する（古い自分＝息を潜める平穏を破る行為。起点はCH14、完遂はCH16-17）。ただし本人は打算ラッピングのまま、選んだとは認めていない。"
      drive_variable: "報酬"

# 報酬番号の正本（多段報酬連鎖の台帳）。章サマリー・chapter_sequence.csv の【有形報酬N】【無形報酬N】はここを参照する。
reward_chain:
  tangible:
    - id: "有形報酬1"
      content: "裏社会のコネの正式確立（スィグナとの取引成立）"
      chapter: "CH02"
    - id: "有形報酬2"
      content: "下請けとしての優遇認定（実力者の口添えが根拠）"
      chapter: "CH03"
    - id: "有形報酬3"
      content: "無傷の魔物の高額買い取りによる特別ボーナスと密造網の決定的証拠"
      chapter: "CH07"
    - id: "有形報酬4"
      content: "ボスの遺産（不正蓄財の隠し金庫の回収）"
      chapter: "CH17"
    - id: "有形報酬5"
      content: "快適な不労所得のインフラ（スィグナの利権掌握による）"
      chapter: "CH18"
  intangible:
    - id: "無形報酬1"
      content: "スィグナからの『底知れない化け物』評価（力＋人柄の二重誤読）"
      chapter: "CH01"
    - id: "無形報酬2"
      content: "実力者公認の賞賛（内実は畏怖の翻訳。神話の公式化）"
      chapter: "CH03"
    - id: "無形報酬3"
      content: "マーレンの戦慄と誤読による再評価（冷血漢誤読モデルの形成）"
      chapter: "CH06"
    - id: "無形報酬4"
      content: "マーレンの畏怖と気付き（危うさへの理解。バディ関係の基盤）"
      chapter: "CH17"

# 派生：章を束ねた起承転結の読み下し地図（正本は acts と各 chapter_XX_summary.yaml）。
episode_index:
  - episode_id: 1
    chapters: "CH01-02"
    act: "act1_setup"
    title: "スラムの邂逅（プロローグ相当）"
    summary: "路地裏でスィグナの窮地へ介入（理由は語られない）。腕で勝てない格上の暗殺者の退路に偽火事で人目を製造し『殺せるが消えられない』状況へ反転、賞賛を残した職業撤退に追い込む——第1話で力のズレと人柄のズレが同時成立する二重勘違いの幕開け。翌日のギルド門前払いと斡旋所への正式登録を経て、冒険者マーレンの下請け案件が回ってくる。"
  - episode_id: 2
    chapters: "CH03-04"
    act: "act1_setup（【起】前半）"
    title: "最悪の出会い"
    summary: "ギルドで高位冒険者（昨夜の暗殺者の表の顔）が下請けいびりをたしなめ、面白がってノルクを公認で持ち上げる——実力者公認の神話が立つ。その後、異端の血ゆえに下請けを雇うしかない冒険者マーレンへの随行任務開始。道中ノルクの『感情を排した計算の目』が一瞬だけ覗き、「死地を歩いた人間」という確信を与える。苛立ちと不気味さが同居する出会い。"
  - episode_id: 3
    chapters: "CH05-06"
    act: "act2a_trouble（【起】後半）"
    title: "手抜きという名の異常性"
    summary: "郊外の汚染魔物クエスト（精製廃液で習性の壊れた個体）が表の依頼。教条の習性対応表が全滅したマーレンを尻目に、ノルクが残存反射ひとつで誘導し急所一突きで仕留める。処理後、廃液投棄を見回る密造網の末端組織が潜んでいた事実が露見し、マーレンが力押しで半数を制圧するが残りをノルクが打算ラッピングで非殺介入。冷血漢誤読モデルがマーレンに初形成される。"
  - episode_id: 4
    chapters: "CH07-10"
    act: "act2a_trouble→midpoint（【承】）"
    title: "教条の壁と裏の流儀"
    summary: "完璧な証拠を揃えた捜査申請が「お前のような出自の者は」と血筋を理由に個人棄却される（冷遇の明示）。ノルクが査定官を一言で黙らせるが書類は動かない——個人の威圧は成立するが制度の壁は不変（小カタルシス）。追い詰められたマーレンが無謀な単独行動に出ようとしたところをノルクが打算ラッピングで止め、自ら裏の手を切る（人柄のズレ：対マーレン初例）。情報収集の過程で密造薬物に『旧魔導院の廃棄技術との類似』が見つかり、ノルクだけが表情を殺す（第零機関への伏線）。アジトを特定し、ノルクの制止を押し切って強行突入が決定する（midpoint）。"
  - episode_id: 5
    chapters: "CH11-14"
    act: "act2b_fightback（【転】）"
    title: "絶望のいびつな全力"
    summary: "ノルクの『一晩待ちたい』を押し切って強行突入したマーレンがボスの絶対加護に全力を弾かれ心が折れる。ノルクは突入中に並行して設備確認を進め、マーレンの3話分の苦闘を冷静に観察（冷血漢誤読の頂点）。セリファの撤退推奨を無視してノルクの足が止まる。"
  - episode_id: 6
    chapters: "CH15-17"
    act: "act3_finale（【結】前半・最大カタルシス）"
    title: "システム外の蹂躙"
    summary: "セリファ撤退推奨を無視して残った男が『ギルド評価が下がる』と打算を装いながら介入。読者には打算の言い訳が空振りと分かる状態で、加護の要件違反を保持者自身に犯させて自壊させた上での超火力蹂躙が炸裂する。勝利後、代償の頭痛に顔を歪めるノルクをマーレンが目撃し、『依頼は完遂済みだったのに残った＝計算ではなかった』と静かに確信する（打算ラッピングの亀裂：CH15で読者だけが知っていた空振りが、事後の物証でマーレンにも届く）。"
  - episode_id: 7
    chapters: "CH18-19"
    act: "act3_finale（【結】後半・エピローグ）"
    title: "押しかけの相棒"
    summary: "不都合な真実の隠蔽と、マーレンとのバディ（共犯・補完）関係の始まり、ノルクの平穏の終わり。スィグナが『持ち駒で一番使い勝手がいい』とノルクを資産評価する場でマーレンが無言で目を向ける——スィグナ（資産）とマーレン（理解者）の関係性の対比が初めて並置される。スィグナが『抹消された経歴』に気付き、究極の探求（第零機関）への扉が開く。"

# 検証所見・ループ修正の追記先（chapter_summary の design_notes と対称。本編開示義務なし）。
design_notes:
  midpoint_revelation_weak: "CH10のmidpointは『break（ノルク提案を退けた戦略決裂）』と不可逆性で成立するが、テンプレ要件の『驚きの最大化』は弱い。本アークは驚きでなく危機ドリブン——核は勘違い＆教条破綻でありどんでん返し型ではないため（catharsis_engine主従ルール準拠）。欠陥でなくアークの性格として記録。"
  embodiment_vs_roadmap: "embodiment_of_willの行為（CH14で離脱せず残る→CH16-17で切り札解禁）は一見step3『選ぶ』に見えるが、ノルク本人は『面倒だ』と打算ラッピングしたままで選んだと認めていない。自己認識は不動のため roadmap上はstep1『知られる』に留まり、変化はマーレン側（CH17で確信）に起きる。行為と自己認識のズレは本作の勘違いエンジンと同根。is_roadmap_within_one_step の根拠。"
  act_mapping: "日本式起承転結（episode_index側に【起承転結】を保持）→ハリウッド式4幕への対応。『転』（ep5=CH11-14）はmidpointでなくact2b_fightback〜all is lostに対応。midpointは『承』の末尾CH10に置く。"
  buddy_roadmap: "成長検査は二人制（ARCHITECTURE 2.3）。第1アークはノルクstep1『知られる』とマーレンstep1『揺らぐ』が同一事象（CH14-17の教条破綻＋蹂躙＋頭痛の物証）で各1段ずつ前進する——ノルクの自己認識据え置きはマーレンの前進が裏付ける設計。両ロードマップ定義は status: provisional（本作の最重要箇所・各アーク設計時に段定義そのものを見直す）。"

validation_hook:
  is_linked_to_macro_concept: true   # sub_quest=第零機関の糸口／sub_crisis=教条制度の壁／local_evil=教条的ボス、で継承
  is_midpoint_irreversible: true     # CH10強行突入の決定＝後戻り不可（驚きの弱さは design_notes.midpoint_revelation_weak）
  is_finale_embodiment: true         # CH14残る→CH16-17解禁＝隠匿リスクを冒し古い自分を破る行為
  has_catharsis_core: true           # sub_catharsis＝要件自壊＋超火力蹂躙で一文成立
  is_roadmap_within_one_step: true   # 二人制：ノルクstep1・マーレンstep1で各1段、1人以上前進、ノルク据え置きはマーレン前進が裏付け（design_notes.buddy_roadmap）

total_chapters: 19
