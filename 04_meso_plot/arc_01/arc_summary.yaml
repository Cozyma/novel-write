  - episode_id: 2
    title: "最悪の出会い（【起】前半）"
    summary: "マーレンとの合同任務開始と、強烈な苛立ち、そして微かな悪寒。"
  - episode_id: 3
    title: "手抜きという名の異常性（【起】後半）"
