arc_id: "arc_01"
title: "第1アーク：教条の崩壊と理不尽な救済"

# このアーク全体を1本の映画スケールとみなし、本作自身のカタルシス曲線（積み上げ→絶望→蹂躙）を背骨に持たせる（ARCHITECTURE 2.3）。読みレンズは起承転結。
# acts＝アークの物語曲線の正本（各段の構造役割＝role＋drive_variable のみ。出来事の再話はしない）。不可逆点と能動的選択の着地（embodiment）を推進力の検証アンカーとして保持。
# 出来事レベルの事実の正本は各 chapter_XX_summary.yaml、章→段の束ねは chapter_sequence.csv の episode_id 列。

macro_linkage:
  # 03_macro_concept/concept.yaml の全体設定に対する、このアークでの部分割り当て（下位構造）。
  sub_quest: "ボスの汚職とは無関係に、危険な討伐の現場（CH05）の隅に残る『旧魔導院の施設痕跡』にノルクだけが反応し、エピローグでスィグナが『抹消された経歴』に行き当たる——ultimate_mystery（第零機関の二重の抹消）への最初の糸口を一粒だけ残す。"
  sub_crisis: "教条（加護の独占）に下請けは構造的に勝てない。規程を守り抜いたマーレンの完璧な申請が血筋を理由に棄却され、いびつな全力すら加護に弾き返される——core_conflict（出自を差別する教条主義制度）が、制度の壁として個人の前に顕在化する敗北条件。"
  local_evil: "律神特権を持つギルド管理職。『法は格下を縛り、危険と死は格下に、利得は格上の特権』と信じ無謬の公正を装う特権の傲慢——格下の干渉を存在ごと却下する座の加護『無謬の権威』（律神が管理職の座に与える官職装置。setting_worldview.yaml / blessing_types.seat）を占める。揺るがぬ余裕の正体は個人の傲慢ではなく『私は制度そのものである』という座との癒着（接続の自明性）であり、彼が強いのではなく制度に椅子ごと守られている——在任者自身が『制度が自分を吐き出す』と理解した瞬間、比較式の中で己の格が崩れ加護は保持者を守る根拠を失う。不正利得＝危険な討伐を規定人数以下で下請けに使い潰し費用を着服し（死は自己責任で握り潰す）、魔獣素材を買い叩き・横流しして私腹を肥やす——辺境都市の二重依存経済（防衛コスト⇄素材利益）の天秤を利益側に倒し、危険と死を格下へ外部化する構造（setting_worldview.yaml / frontier_economy）。教条主義（究極の危機）の末端の悪。"
  # 【必須】このアークの最大カタルシス（catharsis_engineのインスタンス）。
  sub_catharsis: "ノルクが三波（隠蔽現場の逆用＝『ここはお前の制度が存在しない部屋だ』／CH07の汚職証拠＝『お前の律神の秩序こそが、お前を除名する』／制度に頁のない脅威＝マーレンを死の脅威と認識させる）で『制度はお前を守らない』を分からせ、座との癒着を断つ。セリファが接続のゆらぎを計器として読んだ窓に、立ち上がったマーレンの一撃が通る——格下に触れられぬはずの無謬の権威が、格下の刃で初めて貫かれ、椅子を失った男が『ただの汚職役人』へ転落して呆気なく片付けられる蹂躙（＝観測者ラベル。実態は詰み筋の完成）。勝因はマーレンの力でありノルクは膳立てに徹する。超火力は温存し、認識崩しの連携で着地する（catharsis_engine.execution の認識崩し部の第1アークでの実体化。超火力部・条項告発フルは後アークで初出）。"
  # 【必須・二人制】バディ二人の成長段（concept.yaml / characters.yaml の各 roadmap。各1アーク1段以内）。
  roadmap_step:
    nork: "step 1『知られる』——信頼できる他者マーレンが、ノルクの力の『危うさ』を知る（CH17で頭痛の物証を見て『計算ではなかった』と確信）。ノルク本人の自己認識は打算ラッピングのまま据え置き（design_notes参照）。"
    marlen: "step 1『揺らぐ』——絶対視した教条が手薄な討伐（CH05）・申請棄却（CH07）・全力を『格下の不当な反抗』として却下される敗北（CH14）で完全に折れる（internal_flawの発火）。加えて、最後の勝利が単独の教条ではなくノルクとの連携（彼女の一撃が勝因）で成ったことが step2『認める』の種になる——自覚的受容はまだで、範囲は step1 を超えない（characters.yaml / marlen.growth_roadmap step1）。"

macro_peaks:
  # アーク全体で最大化する変数（探求/報酬/驚き/危機）。priority_variables準拠。
  primary_variable: "報酬"   # 教条のエリートを叩き潰す蹂躙のカタルシス
  secondary_variable: "驚き" # 必死に誤魔化す本人と『底の知れない化け物』誤認のギャップ

acts:
  # 本作自身のカタルシス曲線（積み上げ→絶望→蹂躙）。各段＝role（構造役割の一文）＋drive_variable。読みレンズは起承転結（補助線）。
  setup:        # 起
    chapters: "CH01-04"
    role: "二重勘違い（力のズレ＋人柄のズレ）の同時成立で掴み、出自で礼節・案件・審査を変える教条主義社会と『選べない者同士』の冷遇を提示する。"
    drive_variable: "危機"
  buildup:      # 承（トラブルの積層＋不可逆点）
    chapters: "CH05-10"
    role: "マーレンの教条が連続で機能不全（手薄な討伐→申請棄却→暴走しかけ）に陥る一方、ノルクの裏ルートだけが機能して現場特定へ前進。ボスが律神特権を持つギルド管理職（特権の傲慢）と判明し、準備不足のまま強行突入が確定する。"
    drive_variable: "危機"
    irreversible: "CH10 強行突入の決定＝後戻り不可（準備が整わないまま今夜決行）。"
  despair:      # 転（どん底・all is lost）——マーレン層／ノルク層の二層進行（2026-07-02）
    chapters: "CH11-14"
    role: "【マーレン層＝表】教条の枠内での正面突破→いびつな全力すら『格下の不当な反抗』として無謬の権威に黙殺・却下され all is lost（被差別が敗着）、撤退条件が成立する。【ノルク層＝読者にだけ見える裏】同じ章群で、コスト付きの能動観測により加護の正体を段階的に割る——基準値採取（CH11）→安い仮説『傲慢の挑発』を試して殺す（CH12）→ゆらぎが『制度の想定外』にだけ走ると特定し座の加護＝制度憑依と正体を割り詰み筋が組み上がる（CH13）→部品（制度外の脅威）が折れて詰みが崩れる予算の絶望（CH14）。マーレンの目にはこの裏層が『加勢しない冷血』として映る（冷血漢誤読の燃料）。"
    drive_variable: "危機（読者レイヤーは探求・驚き＝読みのゲーム）"
  catharsis:    # 結（蹂躙＋着地）
    chapters: "CH15-19（CH18-19はエピローグ）"
    role: "撤退できるのに残り、三波で『制度はお前を守らない』を分からせて座との癒着を断ち、セリファが読んだ接続のゆらぎの窓に折れたマーレンを立たせて彼女の一撃を通す（超火力は抜かない＝勝因はマーレンの力）。直後にセリファ高負荷の代償が噴き出し余裕の仮面がマーレンの前で崩れ、roadmap step1（ノルク=知られる／マーレン=揺らぐ）が着地する。"
    drive_variable: "報酬"
    embodiment_of_will: "撤退できるのに残り（CH14）、セリファ高負荷のゆらぎ観測の代償（同僚の残響を危険に晒す）を冒して連携必殺に賭ける＝古い自分（息を潜める平穏）を破る行為。本人は打算ラッピングのまま選んだと認めない（起点CH14・完遂CH16-17）。"

# 報酬番号の正本（多段報酬連鎖の台帳）。章サマリー・chapter_sequence.csv の【有形報酬N】【無形報酬N】はここを参照する。
reward_chain:
  tangible:
    - id: "有形報酬1"
      content: "裏社会のコネの正式確立（スィグナとの取引成立）"
      chapter: "CH02"
    - id: "有形報酬2"
      content: "下請けとしての優遇認定（実力者の口添えが根拠）"
      chapter: "CH03"
    - id: "有形報酬3"
      content: "無傷の魔物の高額買い取りによる特別ボーナスと、ボスの汚職（規定人数以下の使い潰し＋下請けの死の揉み消し）の決定的証拠"
      chapter: "CH07"
    - id: "有形報酬4"
      content: "ボスの遺産（不正蓄財の隠し金庫の回収）"
      chapter: "CH17"
    - id: "有形報酬5"
      content: "快適な不労所得のインフラ（スィグナの利権掌握による）"
      chapter: "CH18"
  intangible:
    - id: "無形報酬1"
      content: "スィグナからの『底知れない化け物』評価（力＋人柄の二重誤読）"
      chapter: "CH01"
    - id: "無形報酬2"
      content: "実力者公認の賞賛（内実は畏怖の翻訳。神話の公式化）"
      chapter: "CH03"
    - id: "無形報酬3"
      content: "マーレンの戦慄と誤読による再評価（冷血漢誤読モデルの形成）"
      chapter: "CH06"
    - id: "無形報酬4"
      content: "マーレンの気付き（連携で勝った直後に代償で崩れるノルクを見て『危うさ＝綱渡り』を理解。バディ関係の基盤）"
      chapter: "CH17"

# 検証所見・ループ修正の追記先（chapter_summary の design_notes と対称。本編開示義務なし）。
design_notes:
  curve_framing: "アーク構造は本作自身のカタルシス曲線（setup→buildup→despair→catharsis＝起承転結）を正本とする。2026-06-09に試みたハリウッド式4幕（midpoint=驚きの最大化/twist・all is lost等の規範ビート）は、本作が危機ドリブンのカタルシス物（勘違い→絶望→蹂躙）でありmidpoint twist要件が常に弱く注釈で打ち消す前提になっていたため撤去（2026-06-16）。借用は『不可逆点（buildup末CH10）』と『能動的選択の着地（embodiment＝catharsis）』の2チェックのみ。不可逆点は『承』の末尾CH10、『転』はdespair（CH11-14）のall is lost。"
  embodiment_vs_roadmap: "embodiment_of_willの行為（CH14で離脱せず残る→CH16-17で連携必殺に賭ける）は一見step3『選ぶ』に見えるが、ノルク本人は『面倒だ』と打算ラッピングしたままで選んだと認めていない。自己認識は不動のため roadmap上はstep1『知られる』に留まり、変化はマーレン側（CH17で確信）に起きる。行為と自己認識のズレは本作の勘違いエンジンと同根。is_roadmap_within_one_step の根拠。"
  buddy_roadmap: "成長検査は二人制（ARCHITECTURE 2.3）。第1アークはノルクstep1『知られる』とマーレンstep1『揺らぐ』が同一事象（CH14-17の教条破綻＋連携の勝利＋頭痛の物証）で各1段ずつ前進する——ノルクの自己認識据え置きはマーレンの前進が裏付ける設計。両ロードマップ定義は status: provisional（本作の最重要箇所・各アーク設計時に段定義そのものを見直す）。"

validation_hook:
  is_linked_to_macro_concept: true   # sub_quest=第零機関の糸口／sub_crisis=教条制度の壁／local_evil=教条的ボス、で継承
  has_irreversible_point: true       # buildup末CH10の強行突入決定＝後戻り不可
  has_embodiment_landing: true       # catharsis：CH14残る→CH16-17でセリファ高負荷の代償を冒し連携必殺に賭ける＝古い自分を破る行為
  has_catharsis_core: true           # sub_catharsis＝認識崩し（座との癒着を断つ）の連携必殺（マーレンの一撃が勝因・超火力温存）で一文成立
  is_roadmap_within_one_step: true   # 二人制：ノルクstep1・マーレンstep1で各1段、1人以上前進、ノルク据え置きはマーレン前進が裏付け（design_notes.buddy_roadmap）

total_chapters: 19
