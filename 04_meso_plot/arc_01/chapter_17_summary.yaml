chapter_id: "CH_17"
arc_linkage: "第1アーク / 結（クライマックス後編）"

chapter_stimulus:
  peak_variable: "報酬" # 連携で確信を砕かれ貫かれた無謬の権威の転落と呆気ない始末

catharsis_core: "無謬の権威を格下の一撃で初めて貫かれ、確信が崩落して『ただの汚職役人』へ転落したボスを、ノルクは超火力を抜くことなく——気だるげな最小の一手で呆気なく片付ける（あれだけ偉そうだった無謬の権威が、無謬の自己像を砕かれた瞬間ただの人で、雑に終わる痛快さ）。隠し金庫もちゃっかり回収。直後——CH16でセリファに加護のゆらぎを読ませ続けた高負荷の代償（同僚の残響に触れた反動）が噴き出し、『涼しい顔の手練れ』の仮面がマーレンの前でだけ崩れ落ちる（壁に手をつき片膝が落ちかけ、焦点が定まらない生身）。ノルクは反射的に背を向けて隠そうとするが、その距離では隠しきれない。マーレンに届くのは三層の物証——崩れた生身（身体）、依頼達成条件はとっくに充足していた事実（行動）、そして『隠そうとした』こと（意図）。隠した危うさが知られ、余裕の誤認が綱渡りの理解へ反転する。"

chapter_acts:
  act1_intro:
    hook: "加護を失い丸裸になったボスの始末。"
  act2_conflict:
    build_up: "ノルクは超火力を抜かない。気だるげな最小の一手（破礼具か一突き）で、無謬を騙った権威を呆気なく片付ける——余裕の演技を最大化したまま（涼しい顔の手練れ像のピーク。この余裕が直後に反転する伏線）。"
  act3_climax:
    turn: "呆気ない決着。ボスの不正蓄財（規定人数以下で浮かせた費用の着服・魔獣素材の横流し・揉み消し料の隠し金庫）をノルクがちゃっかり回収する。だが勝利の直後、CH16でセリファに加護のゆらぎを読ませ続けた高負荷の代償が、演技を上回って噴き出す。"
    cliffhanger: "『涼しい顔の手練れ』の仮面が、マーレンの前でだけ崩れ落ちる——壁に手をつき片膝が落ちかけ、焦点が定まらない生身。ノルクは反射的に背を向けて隠そうとするが、その距離では隠しきれない。崩れた身体・依頼達成条件はとっくに充足していた事実（ギルド評価は関係なかった）・そして『隠そうとした』こと——三層の物証から、マーレンは静かに確信する。代償を払って残ったのは計算ではない、これは綱渡りだ、と。"

design_notes:
  - "【有形報酬4】ボスの遺産（不正蓄財の隠し金庫の回収）。番号の正本は arc_summary.yaml / reward_chain。"
  - "【無形報酬4】マーレンの畏怖と気付き——打算ラッピングの亀裂。CH15で読者だけが知っていた空振りが、事後の三層物証（崩れた生身＝身体／達成条件充足＝行動／隠そうとした仕草＝意図）で彼女に届く。質量の核は『涼しい顔の手練れの仮面が彼女の前で崩れる落差』——頭痛単体でなく、CH16でセリファに加護のゆらぎを読ませ続けた高負荷の代償（同僚の残響に触れた反動＝hidden_want・死の拒絶直結）の噴出として『隠匿の破れ』を事象化することで、roadmap step1（ノルク＝知られる／マーレン＝揺らぐの完成）の決定的着地に見合う重量を持たせる。心酔でなく『危うさ（綱渡り）』への気付き（characters.yaml / marlen concept_relation・marlen.growth_roadmap step1 に準拠、reader_knowledge管理）。"
  - "代償の発露は一過性で死の拒絶・隠匿の範囲内。exposure_level（システム検知）には影響せず、人的目撃はマーレンのみ（reader_knowledge.yaml で管理）。"
  - "超火力（遺技ロード・砲撃特化）は第1アークでは温存＝抜かない。確信崩しの連携で決着するため不要であり、隠匿リスクも冒さない（リスク管理の徹底＝キャラ整合）。存在は『底知れない余力』として匂わせるに留め、初使用と出所開示は後のアーク（concept.yaml / catharsis_engine.series_engine の超火力部）。代償の発生源はCH16で加護のゆらぎを高負荷で読ませ続けた負荷＝同僚の残響に触れた反動（setting_magic.yaml / biological_cost.second_cost）。"

scenes:
  - scene_01: "丸裸のボスを最小の一手で呆気なく片付ける（超火力は抜かない）"
  - scene_02: "蓄財の回収と、CH16の高負荷代償の噴出＝仮面崩落をマーレンが目撃"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
