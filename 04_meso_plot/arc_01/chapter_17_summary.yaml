chapter_id: "CH_17"
arc_linkage: "第1アーク / 結（クライマックス後編）"

chapter_stimulus:
  peak_variable: "報酬" # 理不尽への圧倒的蹂躙

catharsis_core: "余裕の演技を最大化した『雑な・気だるげな』超火力でボスを粉砕・蹂躙し、吹き飛んだ隠し金庫をちゃっかり回収する。直後——演技を上回った代償が噴き出し、『余裕の隠者』の仮面がマーレンの前でだけ崩れ落ちる（壁に手をつき片膝が落ちかけ、焦点が定まらない生身）。ノルクは反射的に背を向けて隠そうとするが、その距離では隠しきれない。マーレンに届くのは三層の物証——崩れた生身（身体）、依頼達成条件はとっくに充足していた事実（行動）、そして『隠そうとした』こと（意図）。隠した危うさが知られ、余裕の誤認が綱渡りの理解へ反転する。"

chapter_acts:
  act1_intro:
    hook: "丸裸になったボスへの反撃。"
  act2_conflict:
    build_up: "ノルクが『雑に・気だるげに』最適化された超火力を放ち、余裕の演技を最大化したままボスを粉砕・蹂躙する（強者の隠者像のピーク——この余裕が直後に反転する伏線）。"
  act3_climax:
    turn: "圧倒的な力による決着。ボスの不正蓄財（レアアイテムや裏金）の隠し金庫が吹き飛び、ノルクがちゃっかり回収する。だが勝利の直後、演技を上回った代償が噴き出す。"
    cliffhanger: "『余裕の隠者』の仮面が、マーレンの前でだけ崩れ落ちる——壁に手をつき片膝が落ちかけ、焦点が定まらない生身。ノルクは反射的に背を向けて隠そうとするが、その距離では隠しきれない。崩れた身体・依頼達成条件はとっくに充足していた事実（ギルド評価は関係なかった）・そして『隠そうとした』こと——三層の物証から、マーレンは静かに確信する。代償を払って残ったのは計算ではない、これは綱渡りだ、と。"

design_notes:
  - "【有形報酬4】ボスの遺産（不正蓄財の隠し金庫の回収）。番号の正本は arc_summary.yaml / reward_chain。"
  - "【無形報酬4】マーレンの畏怖と気付き——打算ラッピングの亀裂。CH15で読者だけが知っていた空振りが、事後の三層物証（崩れた生身＝身体／達成条件充足＝行動／隠そうとした仕草＝意図）で彼女に届く。質量の核は『余裕の隠者の仮面が彼女の前で崩れる落差』——頭痛単体の微小描写でなく『隠匿の破れ』を事象化することで、roadmap step1（ノルク＝知られる／マーレン＝揺らぐの完成）の決定的着地に見合う重量を持たせる。心酔でなく『危うさ（綱渡り）』への気付き（characters.yaml / marlen concept_relation・marlen.growth_roadmap step1 に準拠、reader_knowledge管理）。"
  - "代償の発露は一過性で死の拒絶・隠匿の範囲内。exposure_level（システム検知）には影響せず、人的目撃はマーレンのみ（reader_knowledge.yaml で管理）。"
  - "超火力は遺技ロード（砲撃特化）の使用回。読者向けには正体未開示——出所の説明は後のアークまで伏せる（setting_magic.yaml / legacy_load）。"

scenes:
  - scene_01: "ノルクの最適化された超火力"
  - scene_02: "ボスの排除と莫大な報酬の獲得、マーレンの目撃"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
