chapter_id: "CH_17"
arc_linkage: "第1アーク / 結（クライマックス後編）"

chapter_stimulus:
  peak_variable: "報酬" # 理不尽への圧倒的蹂躙

catharsis_core: "丸裸になったボスへ、頭痛を堪えながら最適化された超火力が『雑に』叩き込まれる蹂躙と、吹き飛んだ隠し金庫のちゃっかり回収。直後——勝利の派手さの裏で、頭痛に顔を歪める姿と『依頼達成条件はとっくに充足していた』という事実が、マーレンにだけ静かに届く。"

chapter_acts:
  act1_intro:
    hook: "丸裸になったボスへの反撃。"
  act2_conflict:
    build_up: "ノルクが頭痛の代償を堪えながら、最適化された超火力を「雑に」放ち、ボスを粉砕・蹂躙する。"
  act3_climax:
    turn: "圧倒的な力による決着。さらにボスの不正蓄財（レアアイテムや裏金）の隠し金庫が吹き飛び、ノルクがちゃっかりそれを回収する。"
    cliffhanger: "絶望から救われたマーレンだけが、勝利の直後に頭痛の代償へ顔を歪めるノルクの『危うさ（綱渡り）』を目撃してしまう。それともう一つ——依頼の達成条件はとっくに充足されていた。ギルド評価は関係なかった。代償を払って残ったのは計算ではない、とマーレンは静かに確信する。"

design_notes:
  - "【有形報酬4】ボスの遺産（不正蓄財の隠し金庫の回収）。番号の正本は arc_summary.yaml / reward_chain。"
  - "【無形報酬4】マーレンの畏怖と気付き——打算ラッピングの亀裂。CH15で読者だけが知っていた空振りが、事後の物証（頭痛の代償＋達成条件充足の事実）で彼女に届く。心酔ではなく『危うさ（綱渡り）』への気付き（characters.yaml / marlen concept_relation のバディ定義に準拠）。"
  - "超火力は遺技ロード（砲撃特化）の使用回。読者向けには正体未開示——出所の説明は後のアークまで伏せる（setting_magic.yaml / legacy_load）。"

scenes:
  - scene_01: "ノルクの最適化された超火力"
  - scene_02: "ボスの排除と莫大な報酬の獲得、マーレンの目撃"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
