chapter_id: "CH_15"
arc_linkage: "第1アーク / 結（クライマックスの入り口）"

chapter_stimulus:
  peak_variable: "探求" # 逆転の予兆

catharsis_core: "とどめの一撃の前に割り込んだ男が『ここで死なれるとギルド評価が下がる』と言い訳する——だが読者は知っている。依頼達成条件はとっくに充足し、撤退推奨は既に告げられていた。打算の言い訳が完全な空振りとして響く中、冷血漢のはずの男は、ノルマの終わった現場から帰らない。"

chapter_acts:
  act1_intro:
    hook: "ボスのとどめの一撃がマーレンに振り下ろされる。"
  act2_conflict:
    build_up: "死を覚悟したマーレンの前に、影が割り込む。セリファの撤退推奨を無視して踏み留まった男が、「ここで死なれるとギルド評価が下がる」と面倒くさそうに立ち塞がる。"
  act3_climax:
    turn: "この介入もマーレンには『損得の計算』として処理される。しかし冷血漢は、下請けのノルマが終わっても帰らない。"
    cliffhanger: "加護が健在のボスに対し、手ぶらに見えるノルクが何をするのかという期待で引く。"

design_notes:
  - "打算ラッピングの空振り構造：読者だけが言い訳の嘘を知っている状態（マーレンには冷血漢誤読のまま）。CH17の物証で彼女にも届く2段設計の1段目。"
  - "CH12から積み上げた冷血漢誤読が、救われたこの瞬間ですら『計算』として処理される——誤読の強度の表現。"
  - "ミクロ強調は【探求】寄り：手ぶらに見えるノルクが何をするのかという期待で次章へ繋ぐ。"

scenes:
  - scene_01: "迫る死とノルクの介入——撤退推奨を無視した選択の実行"
  - scene_02: "打算ラッピングの空振り（読者には見えているが、マーレンには冷血漢誤読のまま）"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
