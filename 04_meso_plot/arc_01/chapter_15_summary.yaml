chapter_id: "CH_15"
arc_linkage: "第1アーク / 結（クライマックスの入り口）"

chapter_stimulus:
  peak_variable: "探求" # 逆転の予兆

chapter_acts:
  act1_intro:
    hook: "ボスのとどめの一撃がマーレンに振り下ろされる。"
  act2_conflict:
    build_up: "死を覚悟したマーレンの前に、影が割り込む。セリファの撤退推奨を無視して踏み留まった男が、「ここで死なれるとギルド評価が下がる」と面倒くさそうに立ち塞がる（打算ラッピング）。しかし読者は知っている——セリファが『依頼達成条件、充足』を告げた後でも彼は出口に向かわなかった。打算の言い訳は完全に空振りしている。"
  act3_climax:
    turn: "CH12から積み上がった冷血漢誤読が、この介入でもマーレンには『損得の計算』として処理される。しかし冷血漢は下請けのノルマが終わっても帰らない。"
    cliffhanger: "加護が健在のボスに対し、手ぶらに見えるノルクが何をするのかという期待で引く。"

scenes:
  - scene_01: "迫る死とノルクの介入——セリファの撤退推奨を無視した選択の実行"
  - scene_02: "打算ラッピングの空振り（読者には見えているが、マーレンには冷血漢誤読のまま）"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
