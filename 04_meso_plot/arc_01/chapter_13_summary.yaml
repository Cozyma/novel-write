chapter_id: "CH_13"
arc_linkage: "第1アーク / 転（偽りのカタルシス）"

chapter_stimulus:
  peak_variable: "驚き" # マーレンの真の姿

catharsis_core: "封印解除の規格外の猛攻がボスを後退させ続け——しかし傷一つ与えられない。代わりに、ボスが初めて合掌を省き、言葉の縁が崩れ始める。力で押すほど勝利ではなく『別の何か』が臨界へ近づいていく——その頂点で、読者にも『これで勝てる』と思わせる渾身の一撃が放たれる。"

chapter_acts:
  act1_intro:
    hook: "封印を解かれたマーレンのいびつな全力が牙を剥く。"
  act2_conflict:
    build_up: "規格外の猛攻でボスを後退させ続けるが、傷一つ与えられない。加護の壁に全力が弾かれるたびに腕が痺れ、体力が削られていく。その傍ら、ノルクが遮断結界の稼働を確認し終える——無表情のまま戦闘を横目に見ている。マーレンの猛攻が激しさを増し、ボスが初めて合掌を省いた。「……お前のような者が……っ！」。言葉の縁が崩れ始めている。だが直接的な一線は、まだ踏み越えていない。"
  act3_climax:
    turn: "現時点での彼女の最強にして最凶の一撃がボスに迫る。"
    cliffhanger: "読者も「これで勝てる」と思うほどの渾身の攻撃が放たれる。ノルクは動かない。"

design_notes:
  - "偽りのカタルシス章：読者にも勝利を予感させる設計のため、報酬としてはカウントしない（chapter_sequence.csv の reward_catharsis 列は「なし」を維持）。"
  - "冷血漢誤読の積み上げ2段目：渾身の戦いを他人事のように観察する無表情。"
  - "加護の要件の伏線3段目：弱体化要件（合掌）が臨界し、加護が弱体化状態に入る。消失要件（出自によって礼節を変えないこと）だけが最後の一線として残る（setting_magic.yaml / anti_mage の二階層要件）。"
  - "ノルクの遮断結界稼働確認がここで完了——CH16の切り札解禁の前提（不協和音の痕跡が残らない環境）が揃う（setting_magic.yaml / dissonance_trace.shielding）。"

scenes:
  - scene_01: "封印解除後の猛攻（ノルク：遮断結界の稼働確認完了）"
  - scene_02: "渾身の一撃の投下"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
