chapter_id: "CH_13"
arc_linkage: "第1アーク / 転（偽りのカタルシス）"

chapter_stimulus:
  peak_variable: "驚き" # マーレンの真の姿

catharsis_core: "封印解除の規格外の猛攻がボスを後退させ続け——しかし傷一つ与えられない。代わりに、揺るがぬはずの余裕が初めて削れ、合掌が省かれ言葉が乱れる。ノルクはその変位の条件を読み切る——ゆらぎは侮辱（CH12）には走らず、序列に前例のない規格外の脅威＝『制度の想定外』にだけ走った。個人はいない、制度を着ている男だ——加護の正体を座の加護（制度憑依）と割り、崩すべきは自己像ではなく『制度は自分を守る』という癒着だと詰み筋が設計図として組み上がる。その頂点で、読者にも『これで勝てる』と思わせる渾身の一撃が放たれる。"

chapter_acts:
  act1_intro:
    hook: "封印を解かれたマーレンのいびつな全力が牙を剥く。"
  act2_conflict:
    build_up: "規格外の猛攻でボスを後退させ続けるが、全力が『格下の不当な反抗』として却下され傷一つ与えられない。届かぬたびに腕が痺れ、体力が削られていく。その傍ら、ノルクは観測の最終照合に入る——無表情のまま戦闘を横目に見ている。マーレンの猛攻が激しさを増し、揺るがぬはずのボスの余裕が初めて削れた——取り繕えず合掌を省く。「……お前のような者が……っ！」。声に、ほんの一瞬ゆらぎが走る。ノルクは変位の条件を突き合わせる——侮辱には無反応（CH12）、規格外の脅威にだけ揺れる。個人の傲慢が燃料なら、逆のはずだ。こいつの余裕は『制度が自分を守っている』という接続の自明性で、制度の想定外＝序列に前例のないものにだけ、制度は処理に詰まる。正体は座の加護——だが癒着そのものは、まだ断てていない。"
  act3_climax:
    turn: "現時点での彼女の最強にして最凶の一撃がボスに迫る。"
    cliffhanger: "読者も「これで勝てる」と思うほどの渾身の攻撃が放たれる。ノルクは動かない。"

design_notes:
  - "偽りのカタルシス章：読者にも勝利を予感させる設計のため、報酬としてはカウントしない（chapter_sequence.csv の reward_catharsis 列は「なし」を維持）。"
  - "冷血漢誤読の積み上げ2段目：渾身の戦いを他人事のように観察する無表情。"
  - "正体特定のロジック（読みのゲームの解決）：ゆらぎの変位条件が答えを割る——侮辱・挑発には変位ゼロ（CH12）、序列に前例のない規格外の脅威には変位あり（本章）。個人の傲慢が燃料なら逆になるはずで、この非対称から『個人はいない、座（制度）を着ている』と特定する（setting_worldview.yaml / blessing_types.seat）。CH11のランク外の違和感（ノルクの搦め手だけ引っかかりなく通る）もここで説明がつく。詰み筋（三波＝制度の射程を切る／制度が除名すると分からせる／制度の想定外を立たせる）はこの特定から設計図として組み上がる——CH16は発明ではなく回収。"
  - "ノルクの観測がここで完了——CH11（基準値）→CH12（変位ゼロの対照）→CH13（初ゆらぎ＝変位条件の特定）の3段が揃い、CH16でセリファが座との接続のゆらぎを計器として読み、癒着が断たれた瞬間の窓を検出する前提になる。旧稿の『隠蔽結界の稼働確認＝切り札解禁の前提』は、内向きの自己強化・受動観測が痕跡を残さない新モデルで前提ごと不要（setting_magic.yaml / dissonance_trace・serifa ゆらぎ観測）。"

scenes:
  - scene_01: "封印解除後の猛攻（ノルク：ゆらぎの変位条件から座の加護＝制度憑依と正体を特定・詰み筋完成）"
  - scene_02: "渾身の一撃の投下"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
