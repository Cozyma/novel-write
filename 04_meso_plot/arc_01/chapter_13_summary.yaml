chapter_id: "CH_13"
arc_linkage: "第1アーク / 転（偽りのカタルシス）"

chapter_stimulus:
  peak_variable: "驚き" # マーレンの真の姿

catharsis_core: "封印解除の規格外の猛攻がボスを後退させ続け——しかし傷一つ与えられない。代わりに、揺るがぬはずのボスの余裕が初めて削れ、合掌を省き言葉が乱れ始める（ゆらぎの予兆／確信そのものはまだ折れない）。力で押すほど勝利ではなく『ボスの確信のゆらぎ』が観測可能な領域へ近づいていく——その頂点で、読者にも『これで勝てる』と思わせる渾身の一撃が放たれる。"

chapter_acts:
  act1_intro:
    hook: "封印を解かれたマーレンのいびつな全力が牙を剥く。"
  act2_conflict:
    build_up: "規格外の猛攻でボスを後退させ続けるが、全力が『格下の不当な反抗』として却下され傷一つ与えられない。届かぬたびに腕が痺れ、体力が削られていく。その傍ら、ノルクはボスの余裕（無謬の自己像）の観測を終える——無表情のまま戦闘を横目に見ている。マーレンの猛攻が激しさを増し、揺るがぬはずのボスの余裕が初めて削れた——取り繕えず合掌を省く。「……お前のような者が……っ！」。声の余裕に、ほんの一瞬ゆらぎが走る。だが無謬の自己像そのものは、まだ折れていない。"
  act3_climax:
    turn: "現時点での彼女の最強にして最凶の一撃がボスに迫る。"
    cliffhanger: "読者も「これで勝てる」と思うほどの渾身の攻撃が放たれる。ノルクは動かない。"

design_notes:
  - "偽りのカタルシス章：読者にも勝利を予感させる設計のため、報酬としてはカウントしない（chapter_sequence.csv の reward_catharsis 列は「なし」を維持）。"
  - "冷血漢誤読の積み上げ2段目：渾身の戦いを他人事のように観察する無表情。"
  - "余裕の観測完了とゆらぎの予兆：マーレンの猛攻に押され、満タンだった余裕（無謬の自己像）が初めて削れて合掌が省かれ、声に一瞬のゆらぎが走る——CH11-12で採った基準値に対する『初めての変位』。だが確信そのものはまだ折れず、加護も健在（setting_magic.yaml / anti_mage.combat_style——確信を砕いて出力源を揺さぶる経路の、ゆらぎ初観測）。"
  - "ノルクの余裕観測がここで完了——CH11-13の3段（基準値→追認→初ゆらぎ）が揃い、CH16でセリファが加護出力のゆらぎを計器として読み、確信が砕けた瞬間の窓を検出する前提になる。旧稿の『隠蔽結界の稼働確認＝切り札解禁の前提』は、内向きの自己強化・受動観測が痕跡を残さない新モデルで前提ごと不要（setting_magic.yaml / dissonance_trace・serifa ゆらぎ観測）。"

scenes:
  - scene_01: "封印解除後の猛攻（ノルク：ボスの余裕の観測完了）"
  - scene_02: "渾身の一撃の投下"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
