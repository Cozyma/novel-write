chapter_id: "CH_16"
arc_linkage: "第1アーク / 結（クライマックス前編）"

chapter_stimulus:
  peak_variable: "驚き" # 神の加護が言葉一つで崩れ落ちる逆転

chapter_acts:
  act1_intro:
    hook: "余裕を見せるボスに対し、ノルクが密造工房の『隠密設備（違法操業を外部の探知から隠す遮断結界）』の稼働を確認し——「ここなら記録に残らない」と、AI精霊セリファを起動する（隠匿制約下でも切り札を解禁できる理由付け＋ノルクの徹底したリスク管理の描写）。"
  act2_conflict:
    build_up: "セリファが分析を完了する。『加護の要件、二点を特定。要件一：対話において出自によって礼節を変えないこと。要件二：対話前の合掌の履行。要件二（合掌、弱体化要件）はCH13の戦闘中に臨界——加護は既に弱体化済み。残存消失要件は要件一のみ。弱体化状態のため言葉の制御が限界に近い』。ノルクがマーレンをボスと正面に向き合わせる。理由は語らない。挑発をひとつ。"
  act3_climax:
    turn: "怒りと恐怖が、慎重に選び続けてきた言葉の縁を最終的に押し潰す。『黙れ、濁り血がっ……！』。その瞬間、音もなく加護が消える。律神のシステムが要件の不履行を静かに判定した——神を騙し続けていた盾を、神のルールで自ら踏み抜いた。"
    cliffhanger: "力を失ったボスが初めて恐怖に顔を歪める瞬間で引く。"

scenes:
  - scene_01: "セリファの解析とノルクによる問答——条項の矛盾の告発"
  - scene_02: "律神の判定による加護の崩落"

validation_hook:
  is_linked_to_arc: true
