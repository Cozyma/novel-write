chapter_id: "CH_16"
arc_linkage: "第1アーク / 結（クライマックス前編）"

chapter_stimulus:
  peak_variable: "驚き" # 格下の一撃が無謬の権威を初めて貫く連携の逆転

catharsis_core: "ノルクが三波でボスの余裕（無謬の自己像＝加護の出力源）を割る——①隠蔽現場を逆用し『ここは記録に残らない＝お前の助けも来ない』と場の支配を奪い（CH01同型）②CH07で握った汚職の決定的証拠を能動的に突きつけて完璧な公正の仮面を剥がし③折れたマーレンを立たせて『格下』を本物の死の脅威と認識させる。セリファは加護出力のゆらぎを計器として読み、確信が砕けて出力が落ちた刹那の窓を告げる（センサーに徹し、要件は解かない）。ノルクの打算ラッピング『格付けは他人の脳内の話だ。当たる場所は、俺が作る』で立ち上がったマーレンの一撃が、その窓に通る——格下の刃が、届かぬはずの無謬の権威を初めて貫く。"

chapter_acts:
  act1_intro:
    hook: "膝をついて折れたままのマーレンと、無謬の自己像を取り戻しかけ余裕を見せるボス。ノルクが前に出る——超火力は抜かない。代わりに、この場そのものを武器にする。"
  act2_conflict:
    build_up: "ノルクは三波で、加護の出力源である『無謬の自己像（確信・余裕）』そのものを崩しにかかる。【第一波・場の支配奪取】ボス自身が下請けの死や証拠を誰にも知られず消すために用意した隠蔽現場——その性質を逆用する。『ここはあんたが、何をしても記録に残らないよう誂えた場所だ。つまり——あんたがここで何をされても、助けは来ない』。誰も見ていない＝絶対安全だったはずの前提が、誰も助けに来ない、へ反転する（CH01の『人目の無い完璧な殺し場＝出口の少ない完璧な袋』と同型）。余裕に最初のヒビ。【第二波・無謬の仮面剥がし】ノルクがCH07で握った汚職の決定的証拠を能動的に突きつける——公正を誓いながら危険案件を格下の下請けに押し付け、その死を握り潰して私腹を肥やした偽善の物証。『無謬の公正？ あんたが格下を何人、記録の外に埋めたか——ここに全部ある』。完璧な公正の体現者という自己像が、外から割られる（自滅を待つのではなく、能動的に剥がす）。確信が大きく揺らぐ。【第三波・死の脅威の認識】ノルクが、折れて膝をついたままのマーレンの前に立つ。彼女を縛ってきたのは、力を振るえば神の履歴に違反が残り序列から弾かれるという恐怖——だが律神の系は、規程を完璧に守り抜いた彼女を今し方『格下・無価値』と切り捨てた（CH14）。守るべき居場所など最初から無く、力を殺す取引は教条自身の手で反故にされている。ノルクはそこを突く。『格付けは他人の脳内の話だ。お前が格下かどうかなんて、あいつが勝手に決めてるだけのこと。……当たる場所は、俺が作る』。〈無敵に勝て〉ではなく〈ここに一発入れろ〉——折れた人間にも手の出せる、具体的な一事に切り縮められた指示。そしてマーレンの力は、加護では奪えず序列でも却下できない『自前の体』（種族由来の規格外の膂力。setting_magic.yaml / combat_contrast.buddy_contrast）——確信が砕けて加護の格付けが揺らいだ今、その窓に通りうる刃は構造上これしかない。社会のために殺し続けてきた膂力を、初めて社会の許可を抜きに解き放つ構えを取る（自分の力を肯定する受容ではなく、抑え込む理由が消えた反射＋具体的指示としての起ち上がり）。ボスはこの瞬間、決して自分に届かないはずの『格下』が本物の死の脅威であることを認識させられ、格下は届かないという無謬の自己像が恐怖で決定的に砕ける。その間、セリファは加護出力のゆらぎを高負荷で読み続けている（同僚の残響を危険に晒し、ノルクはトラウマの揺れを奥歯で抑え込む）。"
  act3_climax:
    turn: "確信が砕けた刹那、加護の出力が落ちる。セリファが計器として、その一瞬を告げる——『出力低下。今です』。要件を解いたのではない。ただ、ゆらぎの底＝窓を読んだだけだ。立ち上がったマーレンの一撃が、その窓に通る——格下の刃として却下され続けてきた刃が、初めて無謬の権威を貫く。届かぬはずのものが、届いた。"
    cliffhanger: "初めて貫かれ、無謬の自己像が音を立てて崩れ落ちたボスが、恐怖に顔を歪める瞬間で引く。"

design_notes:
  - "確信崩し経路の正式実演（setting_magic.yaml / anti_mage.combat_style）：固有加護『無謬の権威』は、要件を解析的に特定して自壊させる（条項告発フル）のではなく、却下の燃料＝保持者の確信・余裕（無謬の自己像）を三波で砕いて剥がす。条項告発フルと超火力は第1アークでは温存し、後アークで初出（concept.yaml / catharsis_engine.series_engine）。保持者にトリガー台詞を吐かせて律神判定で加護を消失させる旧設計（要件自壊＝自滅待ち）は本章では起こさない（撤去）。"
  - "連携必殺＝バディ感の核：勝因はマーレンの一撃（彼女の力が、届かぬはずの権威を貫く）。ノルクは膳立てに徹する——①場の支配奪取（隠蔽現場の逆用＝記録に残らない＝助けも来ない、CH01同型）②無謬の仮面剥がし（CH07の汚職証拠を能動的に突きつけ＝自滅待ちでない。剥がす対象の『公正の体現者という仮面』はCH03・CH07で読者に頭出し済み＝剥がす瞬間の効きが上がる）③マーレンを死の脅威と認識させる。マーレンの頑張りが勝利に直結し、超火力を抜かない物語的正当化を兼ねる（arc_summary / sub_catharsis・embodiment_of_will）。"
  - "マーレンが立ち上がる必然性（三脚／バディ必然性に接続）：存在ごと否定されて折れた人間が立つ動機を、ノルクの台詞の格好良さに頼らせない。①取引の反故——縛りプレイ＝力を殺す動機は『教条に従えば居場所を得られる』取引だが、CH14で律神の系が規程を完璧に守った彼女を『格下・無価値』と切り捨て、その取引を教条自身が反故にした＝抑え込む理由が消える（characters.yaml / marlen internal_flaw・want）。②具体への切り縮め——ノルクの『当たる場所は俺が作る』は〈無敵に勝て〉でなく〈ここに一発入れろ〉。折れた人間にも手の出せる一事に縮める打算ラッピング。③構造的必然——マーレンの力は加護では奪えず序列でも却下できない『自前の体』（setting_magic.yaml / combat_contrast.buddy_contrast）。確信が砕けて加護の格付けが揺らいだ窓に通りうる刃は構造上これしかない＝勝因が彼女でなければ成立しない（バディ必然性）。立ち上がりは自覚的な自己受容ではなく抑え込みの理由喪失＋具体的指示による反射であり、roadmap step1『揺らぐ』に留め step2『認める』の種に置く（自分の力を肯定する受容は後アーク。arc_summary / roadmap_step.marlen）。同じ全否定がCH14で折り・CH16で解放する二面構造は、ノルクの外からの再フレーム（彼女一人では step3 にならない＝バディが要る理由）で初めて反転する。"
  - "セリファは計器役（センサーに徹し解答役にしない）：加護出力のゆらぎを読んで連携の窓を告げるだけで、ゆらぎ自体は作らない（characters.yaml / serifa combat_style・setting_magic.yaml / anti_mage.combat_style）。CH11（基準値）→CH12（追認）→CH13（初ゆらぎ）の3段観測がここで実り、確信が砕けた瞬間の窓検出に繋がる。"
  - "代償の発生源：加護出力のゆらぎを三波の間ずっと高負荷で読ませ続けることが、セリファ（注入された同僚の残響）をすり減らす＝CH17で噴出する代償の発生源（旧稿の『秘匿要件特定の高負荷』から差し替え）。ノルクは同僚の残響に触れる反動とトラウマの揺れを抑え込む（setting_magic.yaml / biological_cost.second_cost・suppression_break・hidden_want直結）。"
  - "マーレンを立たせる打算ラッピング台詞『格付けは他人の脳内の話だ／当たる場所は俺が作る』＝step2『認める』の種（characters.yaml / marlen.growth_roadmap——ただし自覚的な受容はまだで、範囲はstep1を超えない）。彼女を装置として使った残酷さと、彼女の存在そのものが武器になった反転が同居する。理由を語らないこと（L4執筆時の視点・トーン制御に注意）。"
  - "embodiment_of_willの完遂：撤退できたのに残り（CH14）、セリファ高負荷の代償（同僚の残響を危険に晒す）を冒して連携必殺に賭ける＝古い自分（息を潜める平穏）を破る行為。本人は打算ラッピングのまま選んだと認めない（arc_summary / embodiment_of_will・design_notes.embodiment_vs_roadmap）。"
  - "痕跡は残らない：本章でノルクが用いるのは受動観測（ゆらぎ読み）と心理戦・段0〜1のみで、外向きの干渉行使（条項告発・遺技ロード）は使わないため exposure_level は0のまま（setting_magic.yaml / dissonance_trace——内向き・受動観測は痕跡を残さない。旧稿の『隠蔽結界で痕跡を防ぐ』前提は不要）。"

scenes:
  - scene_01: "ノルクの三波——場の支配奪取（記録に残らない＝助けも来ない）→汚職証拠の突きつけ→マーレンを死の脅威に。ボスの余裕（無謬の自己像）の崩壊"
  - scene_02: "セリファがゆらぎの窓を告げる→立ち上がったマーレンの一撃が、無謬の権威を初めて貫く"

