chapter_id: "CH_16"
arc_linkage: "第1アーク / 結（クライマックス前編）"

chapter_stimulus:
  peak_variable: "驚き" # 神の加護が言葉一つで崩れ落ちる逆転

catharsis_core: "遮断結界の稼働を確認した上でセリファを起動し、加護の要件二点を特定——弱体化済みの盾に残る最後の消失要件は『出自によって礼節を変えないこと』。ノルクの挑発ひとつで怒りと恐怖が言葉の縁を押し潰し、『黙れ、濁り血がっ……！』——その瞬間、律神のシステム自身が不履行を判定し、音もなく加護が消える。神を騙し続けた盾が、持ち主の本性で踏み抜かれる。"

chapter_acts:
  act1_intro:
    hook: "余裕を見せるボスに対し、ノルクが密造工房の『隠密設備（違法操業を外部の探知から隠す遮断結界）』の稼働を確認し——「ここなら記録に残らない」と、AI精霊セリファを起動する。"
  act2_conflict:
    build_up: "セリファが分析を完了する。『加護の要件、二点を特定。要件一：対話において出自によって礼節を変えないこと。要件二：対話前の合掌の履行。要件二（合掌、弱体化要件）は戦闘中に臨界——加護は既に弱体化済み。残存消失要件は要件一のみ。弱体化状態のため言葉の制御が限界に近い』。ノルクがマーレンをボスと正面に向き合わせる。理由は語らない。挑発をひとつ。"
  act3_climax:
    turn: "怒りと恐怖が、慎重に選び続けてきた言葉の縁を最終的に押し潰す。『黙れ、濁り血がっ……！』。その瞬間、音もなく加護が消える。律神のシステムが要件の不履行を静かに判定した——神を騙し続けていた盾を、神のルールで自ら踏み抜いた。"
    cliffhanger: "力を失ったボスが初めて恐怖に顔を歪める瞬間で引く。"

design_notes:
  - "条項告発の正式初出し（setting_magic.yaml / anti_mage）：要件違反の誘発型。ノルクが外から無効化するのではなく、保持者自身に踏み抜かせる——『加護の論理は完璧』という世界の前提を守ったままの逆転。"
  - "切り札解禁の理由付け：遮断結界の稼働確認（CH13で完了済み）により不協和音の痕跡が残らない（setting_magic.yaml / dissonance_trace.shielding）。第1アーク終了時点で exposure_level は0のまま（02_dynamic_states/character_states.yaml）。"
  - "要件の二階層の実演：弱体化要件（合掌）はCH11〜13の3段の伏線で臨界済み、消失要件（出自で礼節を変えない）が最後の一線として残る構造（setting_worldview.yaml / blessing_types.unique・setting_magic.yaml / anti_mage）。"
  - "ノルクがマーレンを正面に向き合わせる一手は、彼女を差別感情を引き出す装置として使った、と読める残酷さと、彼女の存在そのものが武器になったという反転が同居する。理由を語らないこと（L4執筆時の視点・トーン制御に注意）。"

scenes:
  - scene_01: "セリファの解析とノルクによる挑発——要件違反の誘発"
  - scene_02: "律神の判定による加護の崩落"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
