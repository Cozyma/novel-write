chapter_id: "CH_16"
arc_linkage: "第1アーク / 結（クライマックス前編）"

chapter_stimulus:
  peak_variable: "驚き" # 神の加護が言葉一つで崩れ落ちる逆転

chapter_acts:
  act1_intro:
    hook: "余裕を見せるボスに対し、ノルクが密造工房の『隠密設備（違法操業を外部の探知から隠す遮断結界）』の稼働を確認し——「ここなら記録に残らない」と、AI精霊セリファを起動する（隠匿制約下でも切り札を解禁できる理由付け＋ノルクの徹底したリスク管理の描写）。"
  act2_conflict:
    build_up: "セリファがボスの加護の条項と彼の実際の行動・言動の矛盾を解析し終える。ノルクがその矛盾を淡々と問いかける（条項告発の問答）。ボスが反論しようとするが言葉が出てこない——律神の秩序を守ると誓いながら密造で秩序を腐らせてきた事実は、どう弁解しても条項と一致しない。"
  act3_climax:
    turn: "反論が尽きた瞬間、律神のシステム自身が条項の無効を判定し、加護が崩れ落ちる。神を騙して得た盾が、神のルールによって剥ぎ取られる。"
    cliffhanger: "力を失ったボスが初めて恐怖に顔を歪める瞬間で引く。"

scenes:
  - scene_01: "セリファの解析とノルクによる問答——条項の矛盾の告発"
  - scene_02: "律神の判定による加護の崩落"

