chapter_id: "CH_16"
arc_linkage: "第1アーク / 結（クライマックス前編）"

chapter_stimulus:
  peak_variable: "驚き" # 格下の一撃が無謬の権威を初めて貫く連携の逆転

catharsis_core: "ノルクが三波でボスの座との癒着（『私は制度そのものだ』という接続の自明性＝加護の出力源）を断つ——①隠蔽現場を逆用し『ここはあんたの制度が存在しない部屋だ。助けも、序列も無い』と制度の射程を切り（CH01同型）②CH07で握った汚職の決定的証拠を突きつけ『お前の律神の秩序こそが、お前を格下と裁き除名する』と分からせ③折れたマーレンを立たせて『序列に頁のない規格外』を本物の死の脅威と認識させる。セリファは座との接続のゆらぎを計器として読み、癒着が断たれ出力が落ちた刹那の窓を告げる（センサーに徹し、要件は解かない）。ノルクの打算ラッピング『格付けは他人の脳内の話だ。当たる場所は、俺が作る』で立ち上がったマーレンの一撃が、その窓に通る——格下の刃が、届かぬはずの無謬の権威を初めて貫く。"

chapter_acts:
  act1_intro:
    hook: "膝をついて折れたままのマーレンと、削れた余裕を取り戻しかけるボス（制度の揺るがなさが戻っていく）。ノルクが前に出る——切り札は抜かない。代わりに、この場そのものを武器にする。"
  act2_conflict:
    build_up: "ノルクは三波で、加護の出力源である『座との癒着（私は制度そのものだという接続の自明性）』を断ちにかかる。【第一波・制度の射程を切る】ボス自身が下請けの死や証拠を誰にも知られず消すために用意した隠蔽現場——その性質を逆用する。『ここはあんたが、何をしても記録に残らないよう誂えた場所だ。つまり——ここには、あんたの制度が無い。助けも、序列も、だ』。誰も見ていない＝絶対安全だったはずの前提が、制度の射程外＝ただの男の部屋、へ反転する（CH01の『人目の無い完璧な殺し場＝出口の少ない完璧な袋』と同型）。ボスは応手として増援・記録係への回線を確かめ——返らない。余裕に最初のヒビ。【第二波・除名の宣告】ノルクがCH07で握った汚職の決定的証拠を突きつける——公正を誓いながら危険な討伐を規定人数以下で格下の下請けに使い潰し、その死を握り潰して私腹を肥やした偽善の物証。『無謬の公正？ あんたが格下を何人、記録の外に埋めたか——ここに全部ある。告発の話じゃない。あんたの律神が、これをどう裁くかの話だ』。司法支配で握り潰せるはずの証拠が、ここでは法でなく宣告として効く——『お前の拠って立つ制度そのものが、お前を除名する側に回る』。私は制度そのものだ、という癒着が軋む。【第三波・死の脅威の認識】ノルクが、折れて膝をついたままのマーレンの前に立つ。彼女を縛ってきたのは、力を振るえば神の履歴に違反が残り序列から弾かれるという恐怖——だが律神の系は、規程を完璧に守り抜いた彼女を今し方『格下・無価値』と切り捨てた（CH14）。守るべき居場所など最初から無く、力を殺す取引は教条自身の手で反故にされている。ノルクはそこを突く。『格付けは他人の脳内の話だ。お前が格下かどうかなんて、あいつが勝手に決めてるだけのこと。……当たる場所は、俺が作る』。〈無敵に勝て〉ではなく〈ここに一発入れろ〉——折れた人間にも手の出せる、具体的な一事に切り縮められた指示。そしてマーレンの力は、加護では奪えず序列でも却下できない『自前の体』（種族由来の規格外の膂力＝律神の序列に前例のない、制度の頁の外の脅威。setting_magic.yaml / combat_contrast.buddy_contrast）——癒着が軋んで格付けが揺らいだ今、その窓に通りうる刃は構造上これしかない。社会のために殺し続けてきた膂力を、初めて社会の許可を抜きに解き放つ構えを取る（自分の力を肯定する受容ではなく、抑え込む理由が消えた反射＋具体的指示としての起ち上がり）。ボスはこの瞬間、制度の比較式が処理できない『前例のない脅威』が本物の死として眼前に立つのを認識させられる——制度はこの部屋に無く、制度は自分を除名し、制度の頁の外から死が来る——三つが繋がり、『私は制度そのものだ』という座との癒着が恐怖で決定的に断たれる。その間、セリファは座との接続のゆらぎを高負荷で読み続けている（同僚の残響を危険に晒し、ノルクはトラウマの揺れを奥歯で抑え込む）。"
  act3_climax:
    turn: "癒着が断たれた刹那、座の加護の出力が落ちる。セリファが計器として、その一瞬を告げる——『接続低下。今です』。要件を解いたのではない。ただ、ゆらぎの底＝窓を読んだだけだ。立ち上がったマーレンの一撃が、その窓に通る——格下の刃として却下され続けてきた刃が、初めて無謬の権威を貫く。届かぬはずのものが、届いた。"
    cliffhanger: "初めて貫かれ、『私は制度そのものだ』という自明が音を立てて崩れ落ちたボスが、生まれて初めて『ただの個人』として恐怖に顔を歪める瞬間で引く。"

design_notes:
  - "認識崩し経路の正式実演（setting_magic.yaml / anti_mage.combat_style・setting_worldview.yaml / blessing_types.seat）：座の加護『無謬の権威』は、要件を解析的に特定して自壊させる（条項告発フル）のではなく、出力源＝座との癒着（『私は制度そのものだ』という接続の自明性）を三波で断つ——『制度はお前を守らない』を三方向（射程外・除名・頁の外）から分からせる。条項告発フルは第1アークでは温存し、後アークで初出（concept.yaml / catharsis_engine.series_engine）。保持者にトリガー台詞を吐かせて律神判定で加護を消失させる旧設計（要件自壊＝自滅待ち）は本章では起こさない（撤去）。"
  - "三波が却下されない根拠（ランク外）：ノルクは無加護＝神の履歴を持たず、座の比較式にランク付けできないため『格下として却下する』処理の対象外——言葉・証拠・場の定義という『干渉』が消されずに届く唯一の経路（物理の勝ち筋ではない＝座の防護は癒着が断たれるまで健在。setting_worldview.yaml / blessing_types.seat 弱点②。CH11で違和感の種→CH13で特定済み）。"
  - "三波の攻防化（演説にしない・L4実装）：各波にボスの応手とノルク側の代償を置いて削り合いにする——第一波→増援・記録係への回線を確かめる（返らない）／第二波→司法支配の合理（『そんな紙切れは握り潰せる』）で受け流しかけ、『除名』の一語で軋む／第三波→比較式の処理が『前例なし』で詰まる。並行してノルクの段1予算の残量とセリファ負荷の漸増を刻む（綱渡りの決着＝concept.yaml / catharsis_engine.priority_rule）。"
  - "連携必殺＝バディ感の核：勝因はマーレンの一撃（彼女の力が、届かぬはずの権威を貫く）。ノルクは膳立てに徹する——①場の支配奪取（隠蔽現場の逆用＝記録に残らない＝助けも来ない、CH01同型）②無謬の仮面剥がし（CH07の汚職証拠を能動的に突きつけ＝自滅待ちでない。剥がす対象の『公正の体現者という仮面』はCH03・CH07で読者に頭出し済み＝剥がす瞬間の効きが上がる）③マーレンを死の脅威と認識させる。マーレンの頑張りが勝利に直結し、切り札を抜かない物語的正当化を兼ねる（arc_summary / sub_catharsis・embodiment_of_will）。"
  - "「なぜ証拠が今になって効くか」（敵を愚かにしない・00_system/SELF_REVIEW.md §3 敵デザインの一貫性）：CH07で握った汚職証拠は通常ボスにとって脅威でない——神の履歴＝司法を律神クランが支配し、格下の告発は制度上握り潰せるため（setting_worldview.yaml / divine_ledger・CH07で実証済）。ボスが証拠を軽視・放置するのは愚行ではなく、司法支配ゆえの合理的な無関心。CH16で効くのは、ノルクがそれを法的告発でなく『お前の律神の秩序そのものが、お前を除名する側に回る』という宣告＝座との癒着を断つ燃料として、用途と場（制度の射程を切った隔離現場）を変えて使うからであって、ボスが間抜けだからではない（思想ゆえの盲点で崩れる正規の負け方）。"
  - "マーレンが立ち上がる必然性（三脚／バディ必然性に接続）：存在ごと否定されて折れた人間が立つ動機を、ノルクの台詞の格好良さに頼らせない。①取引の反故——縛りプレイ＝力を殺す動機は『教条に従えば居場所を得られる』取引だが、CH14で律神の系が規程を完璧に守った彼女を『格下・無価値』と切り捨て、その取引を教条自身が反故にした＝抑え込む理由が消える（characters.yaml / marlen internal_flaw・want）。②具体への切り縮め——ノルクの『当たる場所は俺が作る』は〈無敵に勝て〉でなく〈ここに一発入れろ〉。折れた人間にも手の出せる一事に縮める打算ラッピング。③構造的必然——マーレンの力は加護では奪えず序列でも却下できない『自前の体』＝律神の序列に前例のない制度の頁の外の脅威（setting_magic.yaml / combat_contrast.buddy_contrast）。癒着が断たれ格付けが揺らいだ窓に通りうる刃は構造上これしかない＝勝因が彼女でなければ成立しない（バディ必然性。第三波が彼女の存在そのものである理由も同じ）。立ち上がりは自覚的な自己受容ではなく抑え込みの理由喪失＋具体的指示による反射であり、roadmap step1『揺らぐ』に留め step2『認める』の種に置く（自分の力を肯定する受容は後アーク。arc_summary / roadmap_step.marlen）。同じ全否定がCH14で折り・CH16で解放する二面構造は、ノルクの外からの再フレーム（彼女一人では step3 にならない＝バディが要る理由）で初めて反転する。"
  - "セリファは計器役（センサーに徹し解答役にしない）：座との接続のゆらぎを読んで連携の窓を告げるだけで、ゆらぎ自体は作らない（characters.yaml / serifa combat_style・setting_magic.yaml / anti_mage.combat_style）。CH11（基準値）→CH12（変位ゼロの対照）→CH13（初ゆらぎ＝変位条件の特定）の3段観測がここで実り、癒着が断たれた瞬間の窓検出に繋がる。"
  - "代償の発生源：座との接続のゆらぎを三波の間ずっと高負荷で読ませ続けることが、セリファ（注入された同僚の残響）をすり減らす＝CH17で噴出する代償の発生源（旧稿の『秘匿要件特定の高負荷』から差し替え）。ノルクは同僚の残響に触れる反動とトラウマの揺れを抑え込む（setting_magic.yaml / biological_cost.second_cost・suppression_break・hidden_want直結）。"
  - "マーレンを立たせる打算ラッピング台詞『格付けは他人の脳内の話だ／当たる場所は俺が作る』＝step2『認める』の種（characters.yaml / marlen.growth_roadmap——ただし自覚的な受容はまだで、範囲はstep1を超えない）。彼女を装置として使った残酷さと、彼女の存在そのものが武器になった反転が同居する。理由を語らないこと（L4執筆時の視点・トーン制御に注意）。"
  - "embodiment_of_willの完遂：撤退できたのに残り（CH14）、セリファ高負荷の代償（同僚の残響を危険に晒す）を冒して連携必殺に賭ける＝古い自分（息を潜める平穏）を破る行為。本人は打算ラッピングのまま選んだと認めない（arc_summary / embodiment_of_will・design_notes.embodiment_vs_roadmap）。"
  - "人前に晒す異常は最小：本章でノルクが用いるのは受動観測（ゆらぎ読み）と心理戦・段0〜1のみで、外向きの干渉行使（条項告発・遺技ロード）は使わない＝目撃露出度（exposure_level）は動かない（setting_magic.yaml / concealment_rule。旧稿の『隠蔽結界で痕跡を防ぐ』前提は波形監視の機構ごと削除済み＝2026-07-05）。"

scenes:
  - scene_01: "ノルクの三波——制度の射程を切る（記録に残らない＝助けも序列も無い）→除名の宣告（お前の制度がお前を裁く）→制度の頁の外の脅威（マーレン）。座との癒着の崩壊"
  - scene_02: "セリファが接続のゆらぎの窓を告げる→立ち上がったマーレンの一撃が、無謬の権威を初めて貫く"

