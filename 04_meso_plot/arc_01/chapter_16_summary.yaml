chapter_id: "CH_16"
arc_linkage: "第1アーク / 結（クライマックス前編）"

chapter_stimulus:
  peak_variable: "驚き" # 神の加護が言葉一つで崩れ落ちる逆転

catharsis_core: "隠蔽結界の稼働を確認した上でセリファを高負荷で起動し、固有加護の秘匿要件二点を特定——弱体化済みの盾に残る最後の消失要件は『公言した公正＝出自によって礼節を変えないこと』。ノルクの挑発ひとつで怒りと恐怖が公正の建前を押し潰し、『黙れ、濁り血がっ……！』——その瞬間、律神のシステム自身が"公正を誓いながら出自で礼節を変えた偽善"を不履行と判定し、音もなく加護が消える。無謬を騙った権威が、自分の本性で踏み抜かれる。"

chapter_acts:
  act1_intro:
    hook: "余裕を見せるボスに対し、ノルクが——ボス自身が下請けの死や証拠を記録に残さぬよう用意した『隠蔽設備（探知を遮断する結界）』の稼働を確認し——「ここなら記録に残らない」と、AI精霊セリファを起動する（自分の隠蔽インフラが己の自壊に使われる皮肉）。"
  act2_conflict:
    build_up: "セリファが規格外の高負荷演算で分析を完了する（固有加護の秘匿要件を割るのは並の負荷ではない——同僚の残響を危険に晒し、ノルクはトラウマの揺れを奥歯で抑え込む）。『加護の要件、二点を特定。消失要件：公言した公正＝対話において出自によって礼節を変えないこと。弱体化要件：格上としての儀礼的体面（丁重な物腰・正式な手続き）の保持。弱体化要件は戦闘中に臨界——加護は既に弱体化済み。残存消失要件は公言した公正のみ。弱体化状態のため建前の制御が限界に近い』。ノルクがマーレンをボスと正面に向き合わせる。理由は語らない。挑発をひとつ。"
  act3_climax:
    turn: "怒りと恐怖が、公言し続けてきた公正の建前を最終的に押し潰す。『黙れ、濁り血がっ……！』。その瞬間、音もなく加護が消える。律神のシステムが——公正を誓いながら出自で礼節を変えた偽善を——静かに不履行と判定した。無謬を騙り続けた権威を、自分の偽善で踏み抜いた。"
    cliffhanger: "力を失ったボスが初めて恐怖に顔を歪める瞬間で引く。"

design_notes:
  - "条項告発の正式初出し（setting_magic.yaml / anti_mage）：要件違反の誘発型。ノルクが外から無効化するのではなく、保持者自身に踏み抜かせる——『加護の論理は完璧』という世界の前提を守ったままの逆転。"
  - "切り札解禁の理由付け：隠蔽結界の稼働確認（CH13で完了済み）により不協和音の痕跡が残らない＝exposure_levelは0のまま（setting_magic.yaml / dissonance_trace.shielding・02_dynamic_states/character_states.yaml）。ただし生体負荷・セリファ摩耗の代償はexposureとは別軸で支払われる（結界が防ぐのは外部検知の痕跡のみ）——秘匿要件を割る高負荷がCH17で噴出する代償の発生源。"
  - "要件の二階層の実演：弱体化要件（儀礼的体面）はCH11〜13の3段の伏線で臨界済み、消失要件（公言した公正＝出自で礼節を変えない建前）が最後の一線として残る構造（setting_worldview.yaml / blessing_types.unique・setting_magic.yaml / anti_mage）。効果（格下無効化）と要件（公言した公正の保持）が同一コイン＝無謬の体面が割れた瞬間に無敵が剥がれる。"
  - "ノルクがマーレンを正面に向き合わせる一手は、彼女を差別感情を引き出す装置として使った、と読める残酷さと、彼女の存在そのものが武器になったという反転が同居する。理由を語らないこと（L4執筆時の視点・トーン制御に注意）。"

scenes:
  - scene_01: "セリファの解析とノルクによる挑発——要件違反の誘発"
  - scene_02: "律神の判定による加護の崩落"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
