chapter_id: "CH_18"
arc_linkage: "第1アーク / エピローグ前編"

chapter_stimulus:
  peak_variable: "報酬" # 優越感の獲得とインフラ完成

catharsis_core: "『今のところ私の持ち駒で一番使い勝手がいい』と資産として値踏みするスィグナの横で、マーレンが何も言わずに目だけを向ける——同一人物への正反対の関係（資産として扱う者／危うさを知る唯一の理解者）が、台詞なしで初めて並置される。"

chapter_acts:
  act1_intro:
    hook: "戦闘後の事後処理。ギルドは事件を偶発的な事故（公式のカバーストーリー）として処理する——加護持ちの管理職が格下に討たれた失態は表に出せないため、組織ぐるみで真相が伏せられる。"
  act2_conflict:
    build_up: "真実が隠蔽される中、スィグナがボスの利権（魔獣素材の横流しルートを含む）を乗っ取り裏社会を掌握。ノルクに「快適な不労所得のインフラ」という最大の報酬をもたらす。スィグナが『今のところ私の持ち駒で一番使い勝手がいい』とノルクを端的に評価する場で、マーレンが何も言わずに目だけをスィグナに向ける。"
  act3_climax:
    turn: "マーレンの態度はかつての嫌悪から一変し、力の裏にある『綱渡り』を知る唯一の理解者としての信頼へと変わっている。スィグナが彼を資産として扱い、マーレンが危うさを知る理解者として接する——同じ人物への正反対の関係性が、台詞なしで並置される。"
    cliffhanger: "「この男は放っておけばいつか破滅する」と確信した彼女が、相棒（バディ）として彼に張り付くことを静かに決意する描写で引く。"

design_notes:
  - "【有形報酬5】快適な不労所得のインフラ（スィグナの利権掌握による）。番号の正本は arc_summary.yaml / reward_chain。"
  - "ファン枠後輩のカメオ初出し：事後処理に関わった若い職員が、公式報告（偶発的な事故）と現場の物証（破壊の方向・規模）のズレに気づき、『あの便利屋が全部やった』と勝手に確信する神格化の萌芽。1〜2行に留める（characters.yaml / fan_character）。"
  - "マーレンの態度の転換点：嫌悪→危うさを知る唯一の理解者としての信頼。狂信・崇拝・神格化の語彙はマーレンには使わない——その役割はファン枠と狂信者バーサーカーに温存する（characters.yaml / marlen concept_relation）。"
  - "スィグナの『一番使い勝手がいい持ち駒』はCH02の値踏み（『使い勝手のいい駒』）の回収であり、後続アークでスィグナの変化が映えるための基準点。"

scenes:
  - scene_01: "ギルドによる隠蔽と事後処理——若い職員（ファン枠後輩）が報告と物証のズレに気づく"
  - scene_02: "スィグナの利権掌握と、スィグナ（資産）×マーレン（理解者）の関係性の無言の対比"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
