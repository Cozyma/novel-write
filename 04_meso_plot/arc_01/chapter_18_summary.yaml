chapter_id: "CH_18"
arc_linkage: "第1アーク / エピローグ前編"

chapter_stimulus:
  peak_variable: "報酬" # 優越感の獲得とインフラ完成

chapter_acts:
  act1_intro:
    hook: "戦闘後の事後処理。ギルドは事件をボスの自滅として処理する。"
  act2_conflict:
    build_up: "真実が隠蔽される中、スィグナがボスの利権を乗っ取り裏社会を掌握。ノルクに「快適な不労所得のインフラ」という最大の報酬をもたらす。【有形報酬5: 平穏な生活インフラ】。スィグナが『今のところ私の持ち駒で一番使い勝手がいい』とノルクを端的に評価する場で、マーレンが何も言わずに目だけをスィグナに向ける（台詞なし）。"
  act3_climax:
    turn: "一方、マーレンの態度はかつての嫌悪から一変し、力の裏にある『綱渡り』を知る唯一の理解者としての信頼へと変わっている。スィグナが彼を資産として扱い、マーレンが危うさを知る理解者として接する——同じ人物への正反対の関係性が、台詞なしで並置される。"
    cliffhanger: "「この男は放っておけばいつか破滅する」と確信した彼女が、相棒（バディ）として彼に張り付くことを静かに決意する描写で引く。"

scenes:
  - scene_01: "ギルドによる隠蔽と事後処理。処理に関わった若い職員（ファン枠後輩・カメオ初出し）が、公式報告（ボスの自滅）と現場の物証（破壊の方向・規模が内側からの爆発と一致しない）のズレに気づく。上に報告できる立場にはないが『あの便利屋が全部やった』と確信し、勝手に神格化の萌芽を持つ（1〜2行）"
  - scene_02: "スィグナの利権掌握と、マーレンの態度の変化。スィグナ（持ち駒・資産として評価）とマーレン（危うさを知る唯一の理解者）のノルクへの関係性の対比が無言で示される。"

