chapter_id: "CH_03"
arc_linkage: "第1アーク / 展開（承）の入り口"

chapter_stimulus:
  peak_variable: "驚き" # 恐怖からの過剰評価というギャップ

chapter_acts:
  act1_intro:
    hook: "翌日、不本意ながらギルドへ登録にやってきたノルク。"
  act2_conflict:
    build_up: "受付で、昨夜の暗殺者（表の顔はギルドの上位者）が新人いびりでノルクに絡んでくる。しかしノルクの些細な仕草から、上位者が「昨夜の化け物だ」と気づいてしまう。"
  act3_climax:
    turn: "上位者が恐怖を誤魔化すため、手のひらを返してノルクに過剰な高評価を与え、厄介払いしようとする。【無形報酬2: ギルド上位者からの畏怖】【有形報酬2: 特別枠の好待遇認定】"
    cliffhanger: "その割り当て先として、マーレンが無言で指名される。異端の血を持つ査定官には『正規枠が嫌がる案件』が回ってくる——それが当然とばかりの空気の中、マーレンは何も言わず受け取る。（冷遇の背景①：差別構造が日常として機能していることの初出し）【加護の社会層・初出し：「濁り血」とは言わないが、血筋によって扱いが変わる空気感を無言で示す】頭を抱えるノルクで引く。"

scenes:
  - scene_01: "ギルドでの上位者による新人いびりと正体露見（暗殺者視点の恐怖）"
  - scene_02: "恐怖の過剰評価とマーレンへの押し付け——冷遇の背景（異端の血ゆえの扱い）を無言で受け取るマーレン"

