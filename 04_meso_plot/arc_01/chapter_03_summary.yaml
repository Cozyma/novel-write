chapter_id: "CH_03"
arc_linkage: "第1アーク / 展開（承）の入り口"

chapter_stimulus:
  peak_variable: "驚き" # 実力者公認による神話の公式化

catharsis_core: "下請けいびりをたしなめて現れた高位冒険者が——昨夜、退路を読まれて退いた暗殺者その人であることを読者だけが知っている——内心の冷や汗を完璧な余裕に包み、面白がるようにノルクを無駄に持ち上げる。『実力者公認の新人』という神話がギルド公認で立ち上がる。"

chapter_acts:
  act1_intro:
    hook: "翌日、斡旋所経由案件の手続きと雇い主との顔合わせのため、下請けとしてギルドへ出向くノルク（正規登録はCH02で門前払い済み——下請けは立ち入りのみ許される）。"
  act2_conflict:
    build_up: "受付前で、暇を持て余した冒険者の一団が新顔の下請けに目をつけ、定番のいびりを始める。フロアの奥には、規程と公正の体現者として一目置かれるギルド管理職の姿があり、いびる側もその目の届く範囲では声をひそめる——血筋による扱いの差すら、その『公正』の秩序の内側で当然のように回っている。そこへ高位の上位冒険者が通りかかり、「下請けに絡むのは品がない」と一言で場を収める——昨夜の暗殺者の表の顔である。彼は一目でノルクを認め、内心の冷や汗を完璧な余裕の下に隠す。"
  act3_climax:
    turn: "実力者はいびりを散らした流れのまま、面白がるようにノルクを過剰に持ち上げ始める。「私はこの男を買っている。覚えておくといい」——本人にしか分からない含み（昨夜は見事だった）を込めて。周囲は実力者の公認と受け取り、新人下請けへの扱いが一変する。"
    cliffhanger: "雇い主マーレンとの顔合わせ。規程絶対の冒険者は、適当な態度の便利屋ノルクに強烈な苛立ちを覚え、最悪の空気で任務が始まる。周囲の冒険者たちが『濁り血と組まされる新人』へ向ける憐れみの視線。頭を抱えるノルクで引く。"

design_notes:
  - "暗殺者の格の維持：いびり役は別の冒険者たちに分離し、暗殺者（表の顔＝高位冒険者）は実力者枠として振る舞う。恐怖からの手のひら返しではなく『たしなめ＋面白がりの持ち上げ』——内実は化け物と敵対しないための保身だが、表面は終始余裕（CH01で賞賛しつつ退いた格との連続性）。背景の理屈：高位冒険者という表の顔は闘神加護の要件『強さの実演』を満たす場でもある＝二重生活は加護が強制する生存構造（chapter_01_summary design_notes 撤退の天秤参照）。強さを公に認め讃える『公認の持ち上げ』も闘神文化として一貫する。"
  - "【無形報酬2】実力者公認の賞賛（読者には畏怖の翻訳だと分かる）。【有形報酬2】下請けとしての優遇認定——実力者の口添えが根拠となり、CH02の門前払いとの落差が報酬として機能する。番号の正本は arc_summary.yaml / reward_chain。"
  - "加護の社会層の初出し：『濁り血』とは誰も言わないが、血筋によって扱いが変わるギルドの空気を無言で示す（setting_worldview.yaml / dogmatism.structural_discrimination の実地描写）。CH07でこの空気に台詞として名前がつく前段。"
  - "神話化の公式化の起点：実力者の公認は伝聞より速く広く流通する（concept.yaml / misunderstanding_escalation『スィグナ・ギルド記録が広告代理店化』と同型の機構）。"
  - "ボスの表の顔の頭出し（薄・1点目）：ギルド管理職を『規程と公正の体現者』として遠景に一瞥だけ置く。名前も裏の顔も出さず、フロアの権威＝公正の秩序の主、という印象のアンカーのみ。CH07で同じ表の顔が血筋棄却を『公正』として追認し、CH09-10で裏の汚職ボスと同一人物だと判明する布石——CH16で断つ癒着（『公正の体現者＝制度そのもの』という自己と座の一体化）の仮面側を読者に先に持たせ、除名の宣告（第二波）の効きを上げる（chapter_16_summary.yaml）。氷山：この段階で読者・キャラに汚職と結びつけさせない。"

scenes:
  - scene_01: "ギルドでの下請けいびりと、高位冒険者（昨夜の暗殺者）によるたしなめ＋面白がりの公認持ち上げ"
  - scene_02: "雇い主マーレンとの最悪の顔合わせ——濁り血ゆえ下請けと組むしかない冒険者と、その案件に回された新人の初対面"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
