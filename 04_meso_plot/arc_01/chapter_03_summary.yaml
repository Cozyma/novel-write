chapter_id: "CH_03"
arc_linkage: "第1アーク / 展開（承）の入り口"

chapter_stimulus:
  peak_variable: "驚き" # 恐怖からの過剰評価というギャップ

chapter_acts:
  act1_intro:
    hook: "翌日、斡旋所経由案件の手続きと雇い主との顔合わせのため、下請けとしてギルドへ出向くノルク（正規登録はCH02で門前払い済み——下請けは立ち入りのみ許される）。"
  act2_conflict:
    build_up: "受付で、昨夜の暗殺者（表の顔はギルドの上位冒険者）が下請けいびりでノルクに絡んでくる。しかしノルクの些細な仕草から、上位者が「昨夜の化け物だ」と気づいてしまう。"
  act3_climax:
    turn: "上位者が恐怖を誤魔化すため、手のひらを返してノルクに過剰な高評価を与え、厄介払いしようとする。【無形報酬2: 上位冒険者からの畏怖】【有形報酬2: 下請けとしての優遇認定】"
    cliffhanger: "雇い主マーレンとの顔合わせ。規程絶対の冒険者は、適当な態度の便利屋ノルクに強烈な苛立ちを覚え、最悪の空気で任務が始まる。周囲の冒険者たちが『濁り血と組まされる新人』へ向ける憐れみの視線——血筋によって扱いが変わる空気感が無言で示される。（冷遇の背景①の実地描写：CH02で提示した差別構造をギルドの空気として見せる）【加護の社会層・初出し：「濁り血」とは言わないが、血筋によって扱いが変わる空気感を無言で示す】頭を抱えるノルクで引く。"

scenes:
  - scene_01: "ギルドでの上位冒険者による下請けいびりと正体露見（暗殺者視点の恐怖）"
  - scene_02: "雇い主マーレンとの最悪の顔合わせ——濁り血ゆえ下請けと組むしかない冒険者と、その案件に回された新人下請けの初対面"

