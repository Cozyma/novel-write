chapter_id: "CH_06"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "驚き" # 力と計算の二重誤読——人柄のズレ初出し（対マーレン）

catharsis_core: "マーレンが力押しで半数を制圧した直後、ノルクが『死体が出ると手続きが増える。こっちから辿れる』と割り込んで残り半数を非殺で抜き取り、『これでボーナス確定だな』と報酬を喜ぶ——救いの行動が徹頭徹尾、計算の語彙で実行され、マーレンの中に『先を読んで動く冷血漢』の人物像が形成される。"

chapter_acts:
  act1_intro:
    hook: "揉み消し要員たちと対峙。マーレンがマニュアルで正面から当たり、力押しで半数を制圧する。"
  act2_conflict:
    build_up: "残り半数をマーレンが処理しようとした瞬間、ノルクが「死体が出ると手続きが増える。こっちから辿れる」とため息をつきながら割り込み、非殺で情報だけ抜き取る処理をあっさり完了させる。"
  act3_climax:
    turn: "マーレンには『先を読んで計算で動いた冷血漢』として映る。"
    cliffhanger: "生き延びた連中がボスの汚職（危険な討伐を規定人数以下で下請けに使い潰す不正）の情報を持っている。「これでボーナス確定だな」と報酬を喜ぶノルクに、マーレンが『何もかも計算していた』という確信を深めて引く。"

design_notes:
  - "人柄のズレの初出し（対マーレン）：義理の割り込みが計算と誤読される。冷血漢誤読モデルの形成起点——CH12〜14で3段積み上げ、CH15で読者に空振りを見せ、CH17の物証で亀裂が入る長距離設計の第1点。"
  - "【無形報酬3】マーレンの戦慄と誤読による再評価。番号の正本は arc_summary.yaml / reward_chain。"
  - "対人の分業＝CH16三波の前振り（再定義）：マーレンの物理制圧は人間には通じる（半分）が、生かして情報を抜く『搦め手・対人戦』はノルクの領分——マーレンの教条の型では情報戦が詰む。CH05（魔獣＝マーレンの物理が決め手）との対で『魔獣＝マーレンの領分／対人＝ノルクの領分』の分業を確立する。これがCH16の三波（場の支配・搦め手・対人）の前振りであり、失敗勾配の2段目（CH05教条の判断が詰む→本章で対人の搦め手が詰む→CH12-14で自前の全力すら格付け却下）を成す。"
  - "生存した揉み消し要員の証言が神話化の連鎖の起点になる——CH10で『証言がボスの耳に届いている』描写として回収する（concept.yaml / misunderstanding_escalation）。"

scenes:
  - scene_01: "揉み消し要員との衝突——マーレンの力押し（半数を制圧）"
  - scene_02: "ノルクの割り込みと非殺情報抽出——冷血漢誤読の形成"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
