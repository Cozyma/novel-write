chapter_id: "CH_12"
arc_linkage: "第1アーク / 転（ボス戦開始）"

chapter_stimulus:
  peak_variable: "危機" # 正規手段の完全な敗北

chapter_acts:
  act1_intro:
    hook: "ボスとの交戦開始。マーレンが果敢に切り込む。戦場の端でノルクが奥の設備を確認しながら動いている——マーレンには「なぜ加勢しない」と映る。"
  act2_conflict:
    build_up: "マーレンの正規の剣術がボスの加護の前に傷一つつけられない。ノルクは戦闘に加わらず、退路と遮断設備の確認を淡々と続けている。（冷血漢誤読の積み上げ①：感情なしの計算者として映る）ボスは戦闘中も合掌を欠かさず、マーレンへの言葉を選び続けている——「貴女の技量は確かに特別だ。だが加護を前にしては……」。侮蔑の意図は滲むが言葉の縁は慎重に守られたまま。（加護の要件の伏線②：要件が機械的に維持されていることが分かる）"
  act3_climax:
    turn: "マニュアルの完全な限界を悟ったマーレンが封印解除を決断する。"
    cliffhanger: "「なぜ助けに来ない」という苛立ちを抱えたまま、彼女が縛りを解き放つ。"

scenes:
  - scene_01: "ボス戦（マニュアルの限界）とノルクの並行作業（設備確認継続）"
  - scene_02: "マレーンの封印解除の決意と、ノルクへの苛立ち（冷血漢誤読①）"

validation_hook:
  is_linked_to_arc: true
