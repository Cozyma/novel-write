chapter_id: "CH_12"
arc_linkage: "第1アーク / 転（ボス戦開始）"

chapter_stimulus:
  peak_variable: "危機" # 正規手段の完全な敗北

catharsis_core: "マーレンの正規剣術がボスの固有加護に傷一つつけられない戦闘の傍らで、ノルクは加勢せず退路と遮断設備の確認を淡々と続ける——『なぜ加勢しない』という苛立ちが冷血漢像を固め、彼女は封印解除を決断する。実態は切り札の前提条件の構築だが、それは誰にも見えない。"

chapter_acts:
  act1_intro:
    hook: "ボスとの交戦開始。マーレンが果敢に切り込む。戦場の端でノルクが奥の設備を確認しながら動いている——マーレンには「なぜ加勢しない」と映る。"
  act2_conflict:
    build_up: "マーレンの正規の剣術がボスの加護の前に傷一つつけられない。ノルクは戦闘に加わらず、退路と遮断設備の確認を淡々と続けている。ボスは戦闘中も合掌を欠かさず、マーレンへの言葉を選び続けている——「貴女の技量は確かに特別だ。だが加護を前にしては……」。侮蔑の意図は滲むが、言葉の縁は慎重に守られたまま。"
  act3_climax:
    turn: "マニュアルの完全な限界を悟ったマーレンが封印解除を決断する。"
    cliffhanger: "「なぜ助けに来ない」という苛立ちを抱えたまま、彼女が縛りを解き放つ。"

design_notes:
  - "冷血漢誤読の積み上げ1段目：感情なしの計算者として映る（CH13・CH14と3段で積む）。"
  - "加護の要件の伏線2段目：戦闘中も合掌と言葉選びが機械的に維持されている——要件が習慣として履行されていることが分かる描写。"
  - "ボスの台詞は侮蔑を滲ませつつ言葉の縁を守る——消失要件（出自によって礼節を変えないこと）がまだ保たれている状態の表現。CH13の崩れ始めとの対比。"

scenes:
  - scene_01: "ボス戦（マニュアルの限界）とノルクの並行作業（設備確認継続）"
  - scene_02: "マーレンの封印解除の決意と、ノルクへの苛立ち"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
