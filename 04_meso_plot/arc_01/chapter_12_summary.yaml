chapter_id: "CH_12"
arc_linkage: "第1アーク / 転（ボス戦開始）"

chapter_stimulus:
  peak_variable: "危機" # 正規手段の完全な敗北

catharsis_core: "マーレンの正規剣術が『格下の刃』として存在ごと却下され傷一つ通らない戦闘の傍らで、ノルクは加勢せず退路の確認とボスの余裕（無謬の自己像）の観測を淡々と続ける——『なぜ加勢しない』という苛立ちが冷血漢像を固め、彼女は封印解除を決断する。実態はボスの確信を砕くための基準値の継続観測だが、それは誰にも見えない。"

chapter_acts:
  act1_intro:
    hook: "ボスとの交戦開始。マーレンが果敢に切り込む。戦場の端でノルクが奥の設備を確認しながら動いている——マーレンには「なぜ加勢しない」と映る。"
  act2_conflict:
    build_up: "マーレンの正規の剣術がボスに届かない——加護が『格下の刃』として一切の干渉を存在ごと却下する。ノルクは戦闘に加わらず、退路の確認とボスの余裕の観測を淡々と続けている。ボスは攻め立てられても儀礼的な所作（合掌・丁重な物腰）を欠かさず、マーレンへの言葉を選び続けている——「貴女の技量は認めよう。だが、序列を弁えぬ格下の刃が、私に届く道理はない」。侮蔑の意図は滲むが、声の余裕は微塵も揺らがない。無謬の自己像＝確信が満タンの状態だ。"
  act3_climax:
    turn: "マニュアルの完全な限界を悟ったマーレンが封印解除を決断する。"
    cliffhanger: "「なぜ助けに来ない」という苛立ちを抱えたまま、彼女が縛りを解き放つ。"

design_notes:
  - "冷血漢誤読の積み上げ1段目：感情なしの計算者として映る（CH13・CH14と3段で積む）。"
  - "加護の効果＝『無謬の権威』：格下と見下した相手の干渉を存在ごと却下する（防御で弾くのでなく"そもそも届かない"。"正面で勝てない"の本作での実体。setting_worldview.yaml / blessing_types.unique）。"
  - "余裕の観測の2段目：戦闘中も儀礼的所作（合掌・丁重さ）と言葉選びが機械的に維持されている——格下に何をされても揺るがぬ無謬の自己像＝余裕（確信）が満タンの状態であることが分かる描写（CH11で採った基準値の追認）。"
  - "ボスの台詞は侮蔑を滲ませつつ声の余裕を崩さない——加護の出力源である確信がまだ満タンで微塵も揺らがない状態の表現。CH13で猛攻に余裕が初めて削れる『ゆらぎの予兆』との対比（setting_magic.yaml / anti_mage.combat_style——確信を砕いて出力源を揺さぶる経路）。"

scenes:
  - scene_01: "ボス戦（マニュアルの限界）とノルクの並行作業（退路確認・余裕観測の継続）"
  - scene_02: "マーレンの封印解除の決意と、ノルクへの苛立ち"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
