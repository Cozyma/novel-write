chapter_id: "CH_12"
arc_linkage: "第1アーク / 転（ボス戦開始）"

chapter_stimulus:
  peak_variable: "危機" # 正規手段の完全な敗北

catharsis_core: "マーレンの正規剣術が『格下の刃』として存在ごと却下される戦闘の傍らで、ノルクは安い仮説を実地に試す——観測の所作としての挑発（汚職を仄めかし、格下からの侮辱をぶつける）に、ボスの声の余裕は機械のように一切揺らがない。特権の傲慢なら怒るはずが、怒らない——まるで侮辱の宛先に『個人』がいない。仮説が死に、読みが一段深い正体へ強制される。マーレンには『加勢もせずボスと世間話をしている』としか見えず（冷血漢像の強化）、彼女は封印解除を決断する。"

chapter_acts:
  act1_intro:
    hook: "ボスとの交戦開始。マーレンが果敢に切り込む。戦場の端でノルクが奥の設備を確認しながら動いている——マーレンには「なぜ加勢しない」と映る。"
  act2_conflict:
    build_up: "マーレンの正規の剣術がボスに届かない——加護が『格下の刃』として一切の干渉を存在ごと却下する。ノルクは戦闘に加わらず、退路の確認と余裕の観測を続けながら、CH10で立てた仮説（傲慢の自己確信が燃料）を実地に試す——軽口に見せた挑発で汚職を仄めかし、格下からの侮辱を浴びせる。ボスは攻め立てられても儀礼的な所作（合掌・丁重な物腰）を欠かさない——「貴女の技量は認めよう。だが、序列を弁えぬ格下の刃が、私に届く道理はない」。侮蔑は滲むのに、怒りが無い。値踏みの一薙ぎが飛び、ノルクは段1で紙一重に躱す（挑発の代償＝予算が削れる）。プライドを突いても、個人が怒らない——仮説の死。"
  act3_climax:
    turn: "マニュアルの完全な限界を悟ったマーレンが封印解除を決断する。"
    cliffhanger: "「なぜ助けに来ない」という苛立ちを抱えたまま、彼女が縛りを解き放つ。"

design_notes:
  - "冷血漢誤読の積み上げ1段目：感情なしの計算者として映る（CH13・CH14と3段で積む）。"
  - "加護の効果＝『無謬の権威』：格下と見下した相手の干渉を存在ごと却下する（防御で弾くのでなく"そもそも届かない"。"正面で勝てない"の本作での実体。setting_worldview.yaml / blessing_types.seat）。"
  - "読みのゲームの中間反転（安い答えの死）：読者が最初に立てる自然な仮説『傲慢な自己像を挑発で砕く』を、紙面上で試して殺す——真の答え（座の加護＝制度憑依。特定はCH13）の意外性を、後出しでなく実地の失敗で担保する。挑発は観測の所作（characters.yaml / nork combat_style 手札①）の運用であり無駄打ちではない＝『侮辱の宛先に個人がいない』という最大の手がかりを産む。挑発にはコストを付ける（値踏みの一薙ぎ→段1で回避＝予算の消耗。綱渡りの能動観測）。"
  - "余裕の観測の2段目（変位ゼロの追認）：挑発・侮辱・攻勢のいずれにも儀礼的所作（合掌・丁重さ）と声の余裕が機械的に維持される——CH11の基準値からの変位ゼロ。個人の感情が燃料なら挑発に変位が出るはずで、この無変位こそがCH13の正体特定（制度の想定外にだけ揺れる）の対照データになる（setting_magic.yaml / anti_mage.combat_style）。"

scenes:
  - scene_01: "ボス戦（マニュアルの限界）とノルクの挑発テスト（安い仮説の死・値踏みの一薙ぎを段1で躱す）"
  - scene_02: "マーレンの封印解除の決意と、ノルクへの苛立ち"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
