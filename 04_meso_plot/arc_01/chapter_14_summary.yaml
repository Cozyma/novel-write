chapter_id: "CH_14"
arc_linkage: "第1アーク / 転（真の絶望）"

chapter_stimulus:
  peak_variable: "危機" # 心の完全な折れ

catharsis_core: "最強の一撃が全量弾き返されてマーレンの心が折れた直後、セリファが『依頼達成条件、充足。撤退を推奨します』と告げる——ノルクは出口へ体を向け、そして足が止まる。「……面倒だ」。離脱できるのに残る選択が、誰にも見えない場所で静かに実行される。"

chapter_acts:
  act1_intro:
    hook: "マーレンの最強の一撃がボスに直撃する。"
  act2_conflict:
    build_up: "しかしボスの「理不尽な絶対加護」が発動し、全量が完全に弾き返される。マーレンの武器が砕け、心が完全に折れる。"
  act3_climax:
    turn: "セリファが静かに告げる——「依頼達成条件、充足。撤退を推奨します」。ノルクは出口方向に体を向ける。しかし足が止まる。「……面倒だ」と呟き、短剣の柄に手をかける。"
    cliffhanger: "セリファの撤退推奨を無視して踏み留まる選択。介入の理由は語られない。"

design_notes:
  - "能動的選択の担保の本体（00_system/SELF_REVIEW.md【能動的選択の担保】）：このアークの『損得上は離脱できるのに残る』場面。CH01の『一度通り過ぎて足が止まる』と同型の呼応構造。"
  - "冷血漢誤読の積み上げ3段目（無表情で敗北を見届ける）——同時にこの章の選択が誤読反転の起点になる（CH15で読者に空振りを見せ、CH17の物証でマーレンに届く）。"
  - "ボスの『理不尽な絶対加護』は固有加護の最上位の守り（正面からの全量攻撃を弾く）の表現であり、このボス個体の格を示すもの。『加護持ち全般に攻撃が通らない』という一般則ではない（setting_worldview.yaml / blessing_types.unique）。"

scenes:
  - scene_01: "絶対加護による全量無効化とマーレンの完全な敗北"
  - scene_02: "セリファの撤退推奨→出口へ向く→足が止まる"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
