chapter_id: "CH_14"
arc_linkage: "第1アーク / 転（真の絶望）"

chapter_stimulus:
  peak_variable: "危機" # 心の完全な折れ

catharsis_core: "最強の一撃が『格下の不当な反抗』として黙殺・却下され、規程を完璧に守った彼女が『お前は格下、無価値』と存在ごと否定されて心が折れた直後、セリファが『依頼達成条件、充足。撤退を推奨します』と告げる——ノルクは出口へ体を向け、そして足が止まる。「……面倒だ」。離脱できるのに残る選択が、誰にも見えない場所で静かに実行される——それは義理であると同時に、欠けた部品（制度外の脅威＝彼女）をもう一度立たせて詰みを成立させる、成立確率の低い全張りでもある。"

chapter_acts:
  act1_intro:
    hook: "マーレンの最強の一撃がボスに直撃する。"
  act2_conflict:
    build_up: "しかしボスの座の加護『無謬の権威』が、その一撃を『格下の不当な反抗』として存在ごと黙殺・却下する。届かぬまま武器が砕け、規程を完璧に守り抜いた彼女が『お前は格下、無価値』と存在を否定されて心が完全に折れる。——同じ瞬間、ノルク側では組み上がったばかりの詰み筋から部品が抜け落ちる：三波の第三波『制度の想定外の脅威』は、マーレンが立っていて初めて成立する。折れた今、詰みは崩れ、挑発と回避で削った段1の予算も残り少ない。"
  act3_climax:
    turn: "セリファが静かに告げる——「依頼達成条件、充足。撤退を推奨します」。ノルクは出口方向に体を向ける。しかし足が止まる。「……面倒だ」と呟き、剣の柄に手をかける。"
    cliffhanger: "セリファの撤退推奨を無視して踏み留まる選択。介入の理由は語られない。"

design_notes:
  - "能動的選択の担保の本体（00_system/SELF_REVIEW.md【能動的選択の担保】）：このアークの『損得上は離脱できるのに残る』場面。CH01の『一度通り過ぎて足が止まる』と同型の呼応構造。"
  - "冷血漢誤読の積み上げ3段目（無表情で敗北を見届ける）——同時にこの章の選択が誤読反転の起点になる（CH15で読者に空振りを見せ、CH17の物証でマーレンに届く）。"
  - "ボスの座の加護『無謬の権威』は、格下と見下した相手の干渉を存在ごと却下する（防御で弾くのでなく"そもそも届かない"＝"正面で勝てない"の本作での実体）。『加護持ち全般に攻撃が通らない』という一般則ではない（setting_worldview.yaml / blessing_types.seat）。マーレンの敗北は火力不足でなく"格下と見なされていること自体"＝被差別が敗着（roadmap『揺らぐ』と直結）。しかも格付けの主は個人でなく律神の秩序＝制度そのもの——被差別の敗着が制度の物理として完成する。"
  - "予算の絶望（ノルク層・despair二層進行の裏）：マーレンの絶望＝力の却下に対し、ノルクの絶望は『詰み筋は見えたのに、部品（制度外の脅威）が折れ、予算も尽きかけている』——綱渡りの絶望。残る選択はCH16の三波への全張りとして機能する（arc_summary / acts.despair）。"

scenes:
  - scene_01: "無謬の権威による却下（格下扱いで存在ごと黙殺）とマーレンの完全な敗北"
  - scene_02: "セリファの撤退推奨→出口へ向く→足が止まる"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
