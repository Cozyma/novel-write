chapter_id: "CH_14"
arc_linkage: "第1アーク / 転（真の絶望）"

chapter_stimulus:
  peak_variable: "危機" # 心の完全な折れ

catharsis_core: "最強の一撃が『格下の不当な反抗』として黙殺・却下され、規程を完璧に守った彼女が『お前は格下、無価値』と存在ごと否定されて心が折れた直後、セリファが『依頼達成条件、充足。撤退を推奨します』と告げる——ノルクは出口へ体を向け、そして足が止まる。「……面倒だ」。離脱できるのに残る選択が、誰にも見えない場所で静かに実行される。"

chapter_acts:
  act1_intro:
    hook: "マーレンの最強の一撃がボスに直撃する。"
  act2_conflict:
    build_up: "しかしボスの固有加護『無謬の権威』が、その一撃を『格下の不当な反抗』として存在ごと黙殺・却下する。届かぬまま武器が砕け、規程を完璧に守り抜いた彼女が『お前は格下、無価値』と存在を否定されて心が完全に折れる。"
  act3_climax:
    turn: "セリファが静かに告げる——「依頼達成条件、充足。撤退を推奨します」。ノルクは出口方向に体を向ける。しかし足が止まる。「……面倒だ」と呟き、短剣の柄に手をかける。"
    cliffhanger: "セリファの撤退推奨を無視して踏み留まる選択。介入の理由は語られない。"

design_notes:
  - "能動的選択の担保の本体（00_system/SELF_REVIEW.md【能動的選択の担保】）：このアークの『損得上は離脱できるのに残る』場面。CH01の『一度通り過ぎて足が止まる』と同型の呼応構造。"
  - "冷血漢誤読の積み上げ3段目（無表情で敗北を見届ける）——同時にこの章の選択が誤読反転の起点になる（CH15で読者に空振りを見せ、CH17の物証でマーレンに届く）。"
  - "ボスの固有加護『無謬の権威』は、格下と見下した相手の干渉を存在ごと却下する（防御で弾くのでなく"そもそも届かない"＝"正面で勝てない"の本作での実体）。『加護持ち全般に攻撃が通らない』という一般則ではない（setting_worldview.yaml / blessing_types.unique）。マーレンの敗北は火力不足でなく"格下と見なされていること自体"＝被差別が敗着（roadmap『揺らぐ』と直結）。"

scenes:
  - scene_01: "無謬の権威による却下（格下扱いで存在ごと黙殺）とマーレンの完全な敗北"
  - scene_02: "セリファの撤退推奨→出口へ向く→足が止まる"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
