chapter_id: "CH_02"
arc_linkage: "第1アーク / 導入（起）の解決"

chapter_stimulus:
  peak_variable: "報酬" # 泥臭い工夫で格上を凌ぎ切るカタルシスと勘違いの幕開け

chapter_acts:
  act1_intro:
    hook: "暗殺者の凶刃がノルクに迫るが、彼が「面倒だ」と息を吐きながら防ぐ。"
  act2_conflict:
    build_up: "ノルクが地形利用やフェイントなどの泥臭い『工夫』を総動員し、律神の加護を帯びた格上の暗殺者を相手にギリギリの攻防でいなし続ける。傷をつけたわけではなく、じわじわと不気味な圧をかけることで暗殺者に「深追いできない」と判断させる。終始気だるげな佇まいのせいで、スィグナの目には『実力を隠した余裕の制圧』として映る。暗殺者は底の見えない不気味さに戦慄し、深追いを避けて敗走する（ノルクは追わない）。【加護の戦闘層・初出し：加護持ちには直接傷をつけられないが、退かせることはできるという前提を体験で示す】"
  act3_climax:
    turn: "脅威が去り、スィグナが「なぜ助けた」と問う。ノルクは「路地が塞がれると帰れなかった」と答える（打算ラッピング）。スィグナは『あのタイミングで現れたのは計算だったのか』と確信し、力のズレ（工夫の戦闘を余裕の制圧と誤読）と人柄のズレ（義理の介入を綿密な計算と誤読）が初手から同時に成立する。【無形報酬1: スィグナからの底知れない化け物評価（力＋人柄の二重誤読）】"
    cliffhanger: "スィグナに弱み（あるいは面倒事）を握られ、「明日、灰の斡旋所に来なさい」と強引に裏の所属【有形報酬1: 裏社会のコネ】を決められ、平穏から遠ざかる絶望で引く。"

scenes:
  - scene_01: "ノルクと暗殺者の戦闘（工夫によるギリギリの攻防と暗殺者の敗走）"
  - scene_02: "スィグナによるノルクの強制ギルド登録指示"

