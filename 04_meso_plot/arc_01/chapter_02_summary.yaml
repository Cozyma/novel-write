chapter_id: "CH_02"
arc_linkage: "第1アーク / 導入（起）の背景"

chapter_stimulus:
  peak_variable: "探求" # なぜ正規の仕事をしていないのか——主人公の輪郭

catharsis_core: "朝は「手続きは正しいのに書類が通らない」ギルドの門前払い、夕には「濁り血の雇い主の案件は新人に無言で回す」斡旋所の慣行——選べない者同士が組まされる制度の冷たさが、ノルク側とマーレン側の両方から一日で可視化される（認識系の静かな核）。"

chapter_acts:
  act1_intro:
    hook: "翌朝。正規ギルドの窓口へ寄るが一言で弾かれる。手続きは踏んでいる——ただ書類が通らない。そういうことだった。社会的立場と生活動機が一息で示される。"
  act2_conflict:
    build_up: "灰の斡旋所でスィグナと正式な取引。「昨日のことは計算だったのか」という問いにノルクが打算めかした言い訳で答える。スィグナは既にノルクの経歴を浅く調べており、実態が掴めない異物感を覚えながらも『使い勝手のいい駒』と値踏みしている。"
  act3_climax:
    turn: "最初の依頼が来る。「新人には難しくない案件だ」という前置きが、明らかにそうではない内容であることをノルクは一目で読む。"
    cliffhanger: "雇い主は、濁り血ゆえに他の冒険者からパーティを忌避され、下請けを雇うしかない冒険者マーレン。正規の下請けすら嫌がる雇い主の案件が、新人のノルクへ無言で回される。"

design_notes:
  - "本章は背景情報の章——ノルクの社会的立場（書類が通らない＝抹消された経歴の影）と生活動機を一息で提示する。CH01で先にカタルシスを出しているため、この情報後退は許容される設計（CH01-02の順序はこの意図で確定済み）。"
  - "【有形報酬1】裏社会のコネが正式に確立する（スィグナとの取引成立）。報酬の通し番号は arc_summary.yaml / reward_chain を正本とする。"
  - "冷遇の二重構造の初提示：マーレンは組む相手を選べず、ノルクは雇い主を選べない。CH03のギルドの空気（無言の差別）→CH07の申請棄却（個人攻撃）へ段階的にエスカレートする差別構造の1段目。"
  - "スィグナの値踏み（『使い勝手のいい駒』）は、CH18の『一番使い勝手がいい持ち駒』発言と対になる長距離の言い回し。"

scenes:
  - scene_01: "ギルド門前払い——社会的立場の圧縮説明"
  - scene_02: "灰の斡旋所での正式登録・スィグナの値踏み・最初の依頼（雇い主：冒険者マーレン）の割り当て"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
