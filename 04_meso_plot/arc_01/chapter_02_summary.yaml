chapter_id: "CH_02"
arc_linkage: "第1アーク / 導入（起）の背景"

chapter_stimulus:
  peak_variable: "探求" # なぜ正規の仕事をしていないのか——主人公の輪郭

chapter_acts:
  act1_intro:
    hook: "翌朝。正規ギルドの窓口へ寄るが一言で弾かれる。手続きは踏んでいる——ただ書類が通らない。そういうことだった。社会的立場と生活動機が一息で示される。"
  act2_conflict:
    build_up: "灰の斡旋所でスィグナと正式な取引。「昨日のことは計算だったのか」という問いにノルクが打算ラッピングで答える。スィグナは既にノルクの経歴を浅く調べており、実態が掴めない異物感を覚えながらも『使い勝手のいい駒』と値踏みしている。【有形報酬1: 裏社会のコネ（正式確立）】"
  act3_climax:
    turn: "最初の依頼が来る。「新人には難しくない案件だ」という前置きが、明らかにそうではない内容であることをノルクは一目で読む。"
    cliffhanger: "雇い主は、異端の血ゆえに他の冒険者からパーティを忌避され、下請けを雇うしかない冒険者マーレン。正規の下請けすら嫌がる『濁り血の雇い主』の案件が、新人のノルクに無言で回される。（冷遇①の初出し：差別構造が日常として機能していることの背景提示——冷遇の二重構造：マーレンは組む相手を選べず、ノルクは雇い主を選べない）"

scenes:
  - scene_01: "ギルド門前払い——社会的立場の圧縮説明"
  - scene_02: "灰の斡旋所での正式登録・スィグナの値踏み・最初の依頼（雇い主：冒険者マーレン）の割り当て"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true