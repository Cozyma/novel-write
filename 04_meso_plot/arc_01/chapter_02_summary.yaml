chapter_id: "CH_02"
arc_linkage: "第1アーク / 導入（起）の解決"

chapter_stimulus:
  peak_variable: "報酬" # 泥臭い工夫で格上を凌ぎ切るカタルシスと勘違いの幕開け

chapter_acts:
  act1_intro:
    hook: "暗殺者の凶刃がノルクに迫るが、彼が「面倒だ」と息を吐きながら防ぐ。"
  act2_conflict:
    build_up: "ノルクが地形利用やフェイントなどの泥臭い『工夫』を総動員し、システム加護を持つ格上の暗殺者を相手にギリギリの攻防で凌ぎ切る。終始気だるげな佇まいのせいで、スィグナの目には『実力を隠した余裕の制圧』として映る。暗殺者は底の見えない不気味さに戦慄し、深追いを避けて敗走する（ノルクは追わない）。"
  act3_climax:
    turn: "脅威が去り、助かったスィグナは彼がただ者ではないと確信する。【無形報酬1: スィグナからの極めて高い評価】"
    cliffhanger: "スィグナに弱み（あるいは面倒事）を握られ、「明日、ギルドに登録して私の駒になりなさい」と強引に裏の所属【有形報酬1: 裏社会のコネ】を決められ、平穏から遠ざかる絶望で引く。"

scenes:
  - scene_01: "ノルクと暗殺者の戦闘（工夫によるギリギリの攻防と暗殺者の敗走）"
  - scene_02: "スィグナによるノルクの強制ギルド登録指示"

validation_hook:
