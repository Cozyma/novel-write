chapter_id: "CH_04"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "探求" # 飄々とした男の正体が「違う種類の人間」だという確信

chapter_acts:
  act1_intro:
    hook: "街道調査に出発。道中、ノルクの適当な振る舞いにマーレンの不満が蓄積する。出発前、市場の古本露店の前でノルクの足が無意識に止まる。背表紙を一冊手にとり二秒ほど眺めてから棚に戻し「……また今度」と独り言を落として歩き出す。（quirk初出し：活字への無意識な足止まり）"
  act2_conflict:
    build_up: "魔物の気配が近づく。マーレンが察知する一拍前に、ノルクが適当な口実をつけながら既に最適な位置へ移動している——怯えでも警戒でもなく、死傷の現場に慣れた者が自動的にやる動作として。"
  act3_climax:
    turn: "その一瞬だけ、ノルクの目が変わる。飄々とした薄笑いが消え、出口・射線・脅威の位置を平板に計算する、感情を排した目になる。すぐに元の気だるい顔に戻る。"
    cliffhanger: "この男は死地を何度も歩いてきた種類の人間だ——マーレンがそう確信し、「適当な末端便利屋」という認識が根底から崩れるところで引く。"

scenes:
  - scene_01: "街道での移動と不和"
  - scene_02: "魔物察知の一拍前に動く自動的な行動——マスクが一瞬剥がれる目を目撃するマーレン"

