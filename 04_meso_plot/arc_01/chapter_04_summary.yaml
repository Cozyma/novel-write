chapter_id: "CH_04"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "探求" # 飄々とした男の正体が「違う種類の人間」だという確信

catharsis_core: "魔物の気配にマーレンが気づく一拍前、ノルクは『適当な口実』をつけて既に最適な位置へ動いている——直後の一瞬だけ、飄々とした薄笑いが消えて出口・射線・脅威を平板に計算する目になる。『適当な末端便利屋』というマーレンの認識が、この一瞬の目撃で根底から崩れる。"

chapter_acts:
  act1_intro:
    hook: "街道調査に出発。道中、ノルクの適当な振る舞いにマーレンの不満が蓄積する。出発前、市場の古本露店の前でノルクの足が無意識に止まる。背表紙を一冊手にとり二秒ほど眺めてから棚に戻し「……また今度」と独り言を落として歩き出す。"
  act2_conflict:
    build_up: "魔物の気配が近づく。マーレンが察知する一拍前に、ノルクが適当な口実をつけながら既に最適な位置へ移動している——怯えでも警戒でもなく、死傷の現場に慣れた者が自動的にやる動作として。"
  act3_climax:
    turn: "その一瞬だけ、ノルクの目が変わる。飄々とした薄笑いが消え、出口・射線・脅威の位置を平板に計算する、感情を排した目になる。すぐに元の気だるい顔に戻る。"
    cliffhanger: "この男は死地を何度も歩いてきた種類の人間だ——マーレンがそう確信し、「適当な末端便利屋」という認識が根底から崩れるところで引く。"

design_notes:
  - "quirkの初出し：古本露店で無意識に足が止まる（characters.yaml / nork quirks）。素の顔のアンカーを戦闘の文脈より先に見せておく。"
  - "無意識のリスク管理の癖（characters.yaml / nork speech_rule）が、本章で初めて他者（マーレン）に観測される。CH01では読者向けの武器として、本章では人物理解の手がかりとして、同じ癖が二度機能する。"
  - "マーレンの対ノルク認識の第1段変化：『適当な便利屋』→『死地を歩いてきた種類の人間』。執筆開始後は 02_dynamic_states/reader_knowledge.yaml の誤読モデルの初期化対象。"

scenes:
  - scene_01: "街道での移動と不和（古本露店の足止まりを含む）"
  - scene_02: "魔物察知の一拍前に動く自動的な行動——マスクが一瞬剥がれる目を目撃するマーレン"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
