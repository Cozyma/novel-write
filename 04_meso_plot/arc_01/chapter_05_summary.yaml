chapter_id: "CH_05"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "危機" # 定型対応が通じないピンチ

catharsis_core: "教条の習性対応表が全滅して窮地に陥ったマーレンの傍ら、ノルクは壊れた挙動をその場で読み直し——唯一残った原始反射（甲高い音への硬直）で魔物を誘導し、段1神経同期で滑り込んで急所を一瞬だけ晒す『窓』を作る。『——そこだ』の合図で、制式装備のままのマーレンの一撃が止めを刺す。マニュアルの判断が死んだ場所で、ノルクの読みが標的を作れば彼女の剣は仕事をする——だが本人にも周囲にも『達人ノルクがほぼ独りで処理し、自分は介錯しただけ』と映り、手柄はノルクに流れる（神話化）——マーレン側に残るのは『教条では詰んだ』揺らぎだけだ。仕留めた直後、ノルクには段1の反動が遅れて噛みつく（内心ギリギリの対）。CH16の連携必殺（ノルクが窓を作り・マーレンの一撃が勝因）の縮小コピーとなる前振り。"

chapter_acts:
  act1_intro:
    hook: "郊外の依頼先で、習性の壊れた魔物と遭遇する。夜行性のはずの種が昼に徘徊し、威嚇で退くはずが退かない。マーレンが教条の習性対応表どおりの対応を展開するが、読みがことごとく空振りする。"
  act2_conflict:
    build_up: "対応表の前提ごと外れた挙動に陣形が崩され、マーレン自身の安全が脅かされる。彼女の見立ても、ノルクの最初の見立ても一度は外れる（壊れ方が常識の外にある）——だから読み直す。ノルクはマニュアルではなく目の前の個体を観察し、壊れた挙動の中に唯一残った原始反射——甲高い音への一瞬の硬直——を見つける。マーレンを死なせないため、段1神経同期に手を伸ばす。"
  act3_climax:
    turn: "指笛ひとつで魔物を誘導し、反応強化で硬直の一瞬に滑り込み、リミッター解除で素体にない膂力を一拍だけ偽造して——巨体の急所を一瞬だけ無防備に晒す『窓』を作る。『——そこだ』。短い合図に、制式の片手剣を握ったマーレンの一撃が吸い込まれ、最小の傷で機能を停止させる。教条の判断が詰んでも、ノルクが標的さえ作れば彼女の剣は活きる——読めなくなったら現物から読み直し、当たる場所を作る、それだけのこと。だがマーレンには『達人がほぼ独りで仕留め、自分はとどめを許されただけ』と映り、手柄はノルクに流れる（神話化）。彼女の側に残るのは、教条では詰んだという揺らぎと、あの不可解な流儀が現に効いたという拭いがたい事実だけだ。——仕留めた直後、神経と関節に遅れて差し始める反動を奥歯で噛み殺しながら、ノルクだけが個体の壊れ方に見覚えのある痕跡を認めて一瞬表情を消す（理由は語らない）。"
    cliffhanger: "魔物の死骸の傍、茂みに人の気配。先にこの危険案件に駆り出されて死んだ下請けの痕跡を消しに来た、ボスの揉み消し要員たちが潜んでいた事実が露見する。"

design_notes:
  - "敵の確定（2026-06-12壁打ち／2026-06-16リキャスト）：『薬物で強化された魔物』ではなく『旧魔導院の廃棄技術に類似する痕跡を帯びた汚染で習性の壊れた魔物』。マーレンの敗因を火力不足（CH12〜14のボス戦と重複する失敗の質）ではなく『教条の習性対応表の全滅＝想定外への脆さ』にするための差し替え（characters.yaml / marlen combat_style の弱点の初露出）。"
  - "連携必殺の縮小コピー＝CH16の前振り（本章の主眼）：分業を早期に一度通す——ノルクが読み（壊れた習性）＋段1で『窓（急所を晒す硬直）』を作る膳立て役、マーレンの一撃が止め＝決め手。CH16（ノルクが確信を砕いてゆらぎの窓を作り・マーレンの一撃が無謬の権威を貫く）と同じ分業を、加護なしの物理脅威で誰も自覚しないまま予行する。魔獣＝マーレンの領分（物理の決め手）／対人＝ノルクの領分（CH06の搦め手）の分業の確立点。"
  - "力のズレ＋神話化の初出し（対マーレン）：実態は『読めなくなったら現物から読み直し、当たる場所を作る』という膳立てだが、マーレンには『達人がほぼ独りで仕留め、自分はとどめを許されただけ』と映る——手柄がノルクに流れる（神話化）。マーレン側に残るのは『教条では詰んだ』揺らぎと『あの不可解な流儀が現に効いた』という拭えなさで、step2『認める』（教条の外に効果があると認める）の種に留める。**依存・心酔ではない**——マーレンの成長は対等なバディ／自前の力の解放方向であり、ノルクの力に頼る依存・心酔は2026-06-11の決定（心酔・崇拝・神格化の排除）に反する（characters.yaml / marlen growth_roadmap theme・concept_relation）。"
  - "段1神経同期の対マーレン初出し＋内心ギリギリの対：対暗殺者（CH01）に続く2例目。本章では仕留めでなく『窓を作る滑り込み』に使う——反応強化（神経側）で硬直の一瞬に入り、リミッター解除＝筋力強化（肉体側）で巨体の急所を一拍こじ開ける（速さで凌ぐか力で押すかでコストの色が変わる二軸トレード。setting_magic.yaml / neural_sync）。止めはマーレンの制式の剣（封印解除＝自前の体の解放はCH12-13が初出のため、ここでは型のまま。ノルクが標的を作るから型でも刺さる）。仕留めた直後に反動（神経・関節）が遅れて噛みつくのが内心ギリギリの正体であり、達人の余裕と誤読される（biological_cost.timing）。痕跡は残さない（内向きの自己強化＝dissonance_trace 対象外）。条項告発・遺技ロード・超火力は温存（伏せ札）。"
  - "『相手を縛るルール・習性を読む』戦闘文法の2点目：CH01（稼業の掟を読む）→CH05（壊れた習性の残存反射を読む）→CH16（加護のゆらぎを読む）の一貫ライン（characters.yaml / nork combat_style 手札①）。"
  - "失敗勾配の1段目（再定義）：教条の『判断（習性対応表）』が想定外に全滅し、マーレン単独では詰む（弱点露呈は維持。characters.yaml / marlen combat_style）。倒せたのはノルクの膳立てゆえ＝『単独教条では詰む／ノルクの膳立てがあれば彼女の力が決め手』を植える。勾配＝CH05（教条の判断が詰む・連携で倒す）→CH06（対人の搦め手はノルクの領分／マーレンの型では情報戦が詰む）→CH12-14（自前の全力すら格付けで却下）→CH16（ノルクが確信を砕いてマーレンの一撃が通る＝連携の完成）。despairは温存——手柄がノルクに流れ『自分一人では詰む』無力感が積む分、CH14の単独全否定の絶望が深まる。"
  - "現場の人影の整合：ボスの揉み消し要員（危険案件に駆り出されて死んだ下請けの痕跡を消しに来た）＝中抜き型汚職の実地描写。ボスの汚職とは無関係に、魔物の壊れ方に混じる『旧魔導院の廃棄技術と類似する痕跡』にノルクだけが反応する＝第零機関への長距離伏線の一粒（arc_summary / sub_quest。本編では説明しない・00_system/SELF_REVIEW.md【氷山の規律】）。主従：ボス＝教条テーマ／第零機関＝背景伏線で分離（CH09から本章へ移設）。"
  - "原始反射の具体（甲高い音への硬直・指笛での誘導）は仮置き。L4執筆でより良い手が生まれたら catharsis_core へ還流して上書きしてよい。"

scenes:
  - scene_01: "習性の壊れた魔物との遭遇——教条の習性対応表の全滅とマーレンの危機"
  - scene_02: "ノルクの観察と残存反射による誘導・段1で窓作り→『そこだ』の合図でマーレンの制式の一撃が止め（壊れ方に旧魔導院の痕跡をノルクだけが察知）、直後のボスの揉み消し要員の露見（CH06への接続）"

