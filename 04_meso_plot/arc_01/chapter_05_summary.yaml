chapter_id: "CH_05"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "危機" # 定型対応が通じないピンチ

catharsis_core: "【未設計】この章の戦闘の具体的な手（ノルクがどうやって魔物を処理するか）が決まっていない。それ以前に『薬物強化の魔物』という敵自体が本章の機能（マーレンのマニュアル崩壊の見せ方・CH06の末端組織への接続）に最適かどうかから、壁打ちで再検討する。現状の『最小限の動きで処理』は抽象語であり核ではない。"

chapter_acts:
  act1_intro:
    hook: "郊外の薬物強化された魔物との遭遇。マーレンがマニュアル通りの対応を展開するが、強化個体には致命傷にならない。"
  act2_conflict:
    build_up: "防衛線が突破され、マーレン自身の安全が脅かされる。ノルクが最小限の動きで魔物を処理する。"
  act3_climax:
    turn: "魔物が排除された直後、茂みに人の気配。薬物強化の『管理者』と思しき末端組織の人間たちが現場に潜んでいた事実が露見する。"
    cliffhanger: "表のクエストの裏に、密造網の末端が絡んでいるという予兆で引く。"

design_notes:
  - "力のズレの初出し（対マーレン）：泥臭い工夫による処理が『余裕の制圧』と誤読される設計——ただし具体の手が未設計のため、誤読の説得力も未担保。敵の選定と核の壁打ちをセットで行うこと。"
  - "マーレンの失敗勾配の1段目：魔物には完全に通じない→CH06（人間には半分通じる）→CH12〜14（ボスには全力でも弾かれる）という3段の比較構造の起点。敵を差し替える場合もこの勾配は維持すること。"
  - "CH06への接続：処理の直後に密造網の末端組織の潜伏が露見する（表のクエストと裏の事件の二層構造）。"
  - "語彙の確認事項：本章は『魔物』、arc_summary ep3は『魔獣』と表記が揺れている。敵選定の壁打ち時に正書を確定する（setting_worldview.yaml / geography は『魔物地帯』）。"

scenes:
  - scene_01: "薬物強化魔物との遭遇とマーレンのマニュアル崩壊"
  - scene_02: "ノルクによる処理（手は未設計）と末端組織の露見（CH06への接続）"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: false # 未設計（敵選定から壁打ち待ち）。L4執筆着手の前に必ず解決すること
