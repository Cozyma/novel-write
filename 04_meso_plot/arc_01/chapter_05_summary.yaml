chapter_id: "CH_05"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "危機" # 定型対応が通じないピンチ

catharsis_core: "教条の習性対応表が全部空振りする『習性の壊れた』魔物を、ノルクはその場の観察で読み直し、壊れた挙動に唯一残った原始反射ひとつで誘導して急所を一突きで仕留める——マニュアルが死んだ場所で、観察だけが生きる。マーレンには『初見の異常個体を一瞥で見切った達人』と映る。"

chapter_acts:
  act1_intro:
    hook: "郊外の依頼先で、習性の壊れた魔物と遭遇する。夜行性のはずの種が昼に徘徊し、威嚇で退くはずが退かない。マーレンが教条の習性対応表どおりの対応を展開するが、読みがことごとく空振りする。"
  act2_conflict:
    build_up: "対応表の前提ごと外れた挙動に陣形が崩され、マーレン自身の安全が脅かされる。ノルクはマニュアルではなく目の前の個体を観察し、壊れた挙動の中に唯一残った原始反射——甲高い音への一瞬の硬直——を見つける。"
  act3_climax:
    turn: "指笛ひとつで魔物を誘導し、硬直の一瞬に急所を一突き——最小限の動きで機能停止させる。読めなくなったら現物から読み直す、それだけのことが、マーレンには達人の見切りに見える。——だが仕留めた個体の壊れ方に、ノルクだけが見覚えのある痕跡を認めて一瞬表情を消す（理由は語らない）。"
    cliffhanger: "魔物の死骸の傍、茂みに人の気配。先にこの危険案件に駆り出されて死んだ下請けの痕跡を消しに来た、ボスの揉み消し要員たちが潜んでいた事実が露見する。"

design_notes:
  - "敵の確定（2026-06-12壁打ち／2026-06-16リキャスト）：『薬物で強化された魔物』ではなく『旧魔導院の廃棄技術に類似する痕跡を帯びた汚染で習性の壊れた魔物』。マーレンの敗因を火力不足（CH12〜14のボス戦と重複する失敗の質）ではなく『教条の習性対応表の全滅＝想定外への脆さ』にするための差し替え（characters.yaml / marlen combat_style の弱点の初露出）。"
  - "力のズレの初出し（対マーレン）：実態は『読めなくなったら現物から読み直す』という兵士の基本動作だが、『初見の異常個体を一瞥で見切る達人』と誤読される。"
  - "『相手を縛るルール・習性を読む』戦闘文法の2点目：CH01（稼業の掟を読む）→CH05（壊れた習性の残存反射を読む）→CH16（加護の要件を読む）の一貫ライン（characters.yaml / nork combat_style 手札①）。"
  - "失敗勾配の1段目：魔物（読みが全滅する）→CH06（人間には半分通じる）→CH12〜14（ボスには全力でも弾かれる）。失敗の質を変えることで勾配を立体化する。"
  - "現場の人影の整合：ボスの揉み消し要員（危険案件に駆り出されて死んだ下請けの痕跡を消しに来た）＝中抜き型汚職の実地描写。ボスの汚職とは無関係に、魔物の壊れ方に混じる『旧魔導院の廃棄技術と類似する痕跡』にノルクだけが反応する＝第零機関への長距離伏線の一粒（arc_summary / sub_quest。本編では説明しない・00_system/SELF_REVIEW.md【氷山の規律】）。主従：ボス＝教条テーマ／第零機関＝背景伏線で分離（CH09から本章へ移設）。"
  - "原始反射の具体（甲高い音への硬直・指笛での誘導）は仮置き。L4執筆でより良い手が生まれたら catharsis_core へ還流して上書きしてよい。"

scenes:
  - scene_01: "習性の壊れた魔物との遭遇——教条の習性対応表の全滅とマーレンの危機"
  - scene_02: "ノルクの観察と残存反射による誘導・一突き（壊れ方に旧魔導院の痕跡をノルクだけが察知）、直後のボスの揉み消し要員の露見（CH06への接続）"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
