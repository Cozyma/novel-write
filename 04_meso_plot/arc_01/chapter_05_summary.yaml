chapter_id: "CH_05"
arc_linkage: "第1アーク / 展開（承）"

chapter_stimulus:
  peak_variable: "危機" # 定型対応が通じないピンチ

catharsis_core: "規定の頭数を欠いた手薄な討伐（ボスが規定人数を満たさず安く回した汚職案件）で、教条の規定陣形が組めずマーレンが窮地に陥る——その傍ら、ノルクはマニュアルでなく目の前の獣（獣神の加護で純粋に強い個体）の本能をその場で読み、自然な反射（甲高い音への硬直）を衝いて段1神経同期で滑り込み、急所を一瞬だけ晒す『窓』を作る。『——そこだ』の合図で、制式装備のままのマーレンの一撃が止めを刺す。頭数がいる前提の教条が組めない場所で、ノルクの読みが標的を作れば彼女の剣は仕事をする——だが本人にも周囲にも『達人ノルクがほぼ独りで処理し、自分は介錯しただけ』と映り、手柄はノルクに流れる（神話化）——マーレン側に残るのは『教条では詰んだ』揺らぎだけだ。仕留めた直後、ノルクには段1の反動が遅れて噛みつく（内心ギリギリの対）。CH16の連携必殺（ノルクが窓を作り・マーレンの一撃が勝因）の縮小コピーとなる前振り。"

chapter_acts:
  act1_intro:
    hook: "郊外の討伐依頼。だが規定の頭数も保護も足りない手薄な編成で、危険な個体に当たらされる（ボスが規定人数を満たさず安く回した案件）。マーレンが教条の規定陣形・習性対応表どおりに対応しようとするが、頭数が足りず陣形そのものが組めない・維持できない。"
  act2_conflict:
    build_up: "規定の頭数を前提に組まれた教条の戦術が、人数を削られた編成では機能せず陣形が崩れ、マーレン自身の安全が脅かされる。教条は『正しい』が『組めない』——彼女の見立ても、ノルクの最初の見立ても一度は外れる（手薄さの中で型が回らない）。だからノルクはマニュアルではなく目の前の個体を観察し、獣神の本能のままに動く挙動の中に、頭数に頼らず衝ける一点——甲高い音への一瞬の硬直——を見つける。マーレンを死なせないため、段1神経同期に手を伸ばす。"
  act3_climax:
    turn: "指笛ひとつで個体を誘導し、反応強化で硬直の一瞬に滑り込み、リミッター解除で素体にない膂力を一拍だけ偽造して——巨体の急所を一瞬だけ無防備に晒す『窓』を作る。『——そこだ』。短い合図に、制式の片手剣を握ったマーレンの一撃が吸い込まれ、最小の傷で機能を停止させる。頭数のいる教条が組めなくても、ノルクが標的さえ作れば彼女の剣は活きる——マニュアルが回らないなら現物の獣を直に読み、頭数の要らない当たり所を作る、それだけのこと。だがマーレンには『達人がほぼ独りで仕留め、自分はとどめを許されただけ』と映り、手柄はノルクに流れる（神話化）。彼女の側に残るのは、教条では詰んだという揺らぎと、あの不可解な流儀が現に効いたという拭いがたい事実だけだ。——仕留めた直後、神経と関節に遅れて差し始める反動を奥歯で噛み殺しながら、ノルクだけが討伐現場の隅——朽ちた古い施設の痕跡に見覚えのあるものを認めて一瞬表情を消す（理由は語らない）。"
    cliffhanger: "魔物の死骸の傍、茂みに人の気配。規定の頭数も満たさず危険案件に駆り出されて死んだ下請けの痕跡——その『規定人数以下だった記録』ごと消しに来た、ボスの揉み消し要員たちが潜んでいた事実が露見する。"

design_notes:
  - "敵の確定（2026-06-17再設計）：魔獣＝獣神の加護で純粋に強い真っ当な獣（汚染・異常化はさせない。setting_worldview.yaml / divine_economy.juushin）。マーレンの敗因は魔獣の異常ではなく『ボスが規定人数を満たさず安く回した手薄な編成ゆえ、頭数前提の教条の規定陣形・習性対応表が組めず破綻する』こと＝汚職が戦闘の敗因に直結する（characters.yaml / marlen combat_style の弱点＝想定外への脆さの初露出）。火力不足（CH12〜14のボス戦と重複する失敗の質）とは分離。"
  - "連携必殺の縮小コピー＝CH16の前振り（本章の主眼）：分業を早期に一度通す——ノルクが読み（現物の獣の本能）＋段1で『窓（急所を晒す硬直）』を作る膳立て役、マーレンの一撃が止め＝決め手。CH16（ノルクが確信を砕いてゆらぎの窓を作り・マーレンの一撃が無謬の権威を貫く）と同じ分業を、加護なしの物理脅威で誰も自覚しないまま予行する。魔獣＝マーレンの領分（物理の決め手）／対人＝ノルクの領分（CH06の搦め手）の分業の確立点。"
  - "力のズレ＋神話化の初出し（対マーレン）：実態は『読めなくなったら現物から読み直し、当たる場所を作る』という膳立てだが、マーレンには『達人がほぼ独りで仕留め、自分はとどめを許されただけ』と映る——手柄がノルクに流れる（神話化）。マーレン側に残るのは『教条では詰んだ』揺らぎと『あの不可解な流儀が現に効いた』という拭えなさで、step2『認める』（教条の外に効果があると認める）の種に留める。**依存・心酔ではない**——マーレンの成長は対等なバディ／自前の力の解放方向であり、ノルクの力に頼る依存・心酔は2026-06-11の決定（心酔・崇拝・神格化の排除）に反する（characters.yaml / marlen growth_roadmap theme・concept_relation）。"
  - "段1神経同期の対マーレン初出し＋内心ギリギリの対：対暗殺者（CH01）に続く2例目。本章では仕留めでなく『窓を作る滑り込み』に使う——反応強化（神経側）で硬直の一瞬に入り、リミッター解除＝筋力強化（肉体側）で巨体の急所を一拍こじ開ける（速さで凌ぐか力で押すかでコストの色が変わる二軸トレード。setting_magic.yaml / neural_sync）。止めはマーレンの制式の剣（封印解除＝自前の体の解放はCH12-13が初出のため、ここでは型のまま。ノルクが標的を作るから型でも刺さる）。仕留めた直後に反動（神経・関節）が遅れて噛みつくのが内心ギリギリの正体であり、達人の余裕と誤読される（biological_cost.timing）。痕跡は残さない（内向きの自己強化＝dissonance_trace 対象外）。条項告発・遺技ロード・超火力は温存（伏せ札）。"
  - "『相手を縛るルール・習性を読む』戦闘文法の2点目：CH01（稼業の掟を読む）→CH05（現物の獣の本能を読む＝マニュアルの二次情報でなく目の前の個体）→CH16（加護のゆらぎを読む）の一貫ライン（characters.yaml / nork combat_style 手札①）。"
  - "失敗勾配の1段目（再定義）：教条の戦術が手薄な編成（規定人数以下）で組めず詰み、マーレン単独では窮地（弱点露呈は維持。characters.yaml / marlen combat_style）。倒せたのはノルクの膳立てゆえ＝『単独教条では詰む／ノルクの膳立てがあれば彼女の力が決め手』を植える。勾配＝CH05（教条が頭数不足で詰む・連携で倒す）→CH06（対人の搦め手はノルクの領分／マーレンの型では情報戦が詰む）→CH12-14（自前の全力すら格付けで却下）→CH16（ノルクが確信を砕いてマーレンの一撃が通る＝連携の完成）。despairは温存——手柄がノルクに流れ『自分一人では詰む』無力感が積む分、CH14の単独全否定の絶望が深まる。"
  - "現場の人影の整合：ボスの揉み消し要員（規定人数以下で危険案件に駆り出されて死んだ下請けの痕跡＝『規定人数以下だった記録』を消しに来た）＝汚職の実地描写。汚職＝(主)危険な討伐を規定人数・保護以下の編成で下請けに使い潰し費用を着服／(従)下請けが獲った魔獣素材を買い叩き・横流し（蓄財はCH17、横流し利権はCH18で回収）。第零機関フックはボスの汚職とは無関係に、討伐現場の隅に残る『旧魔導院の施設痕跡』にノルクだけが反応する＝長距離伏線の一粒（魔獣の壊れ方からは切り離し。arc_summary / sub_quest。本編では説明しない・00_system/SELF_REVIEW.md【氷山の規律】）。主従：ボス＝教条テーマ／第零機関＝背景伏線で分離（CH09から本章へ移設）。"
  - "原始反射の具体（甲高い音への硬直・指笛での誘導）は仮置き。L4執筆でより良い手が生まれたら catharsis_core へ還流して上書きしてよい。"

scenes:
  - scene_01: "手薄な編成での危険な討伐——規定人数を欠いて教条の規定陣形が組めずマーレンが窮地"
  - scene_02: "ノルクの観察と自然な反射による誘導・段1で窓作り→『そこだ』の合図でマーレンの制式の一撃が止め（討伐現場の隅の旧施設痕跡をノルクだけが察知）、直後のボスの揉み消し要員の露見（CH06への接続）"

