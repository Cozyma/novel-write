chapter_id: "CH_08"
arc_linkage: "第1アーク / 展開（承）の底"

chapter_stimulus:
  peak_variable: "危機" # 誤闘の深化：教条の機能不全による社会的手詰まり（ミクロは【共感】を強調し、マーレンの挫折に読者を同期させる）

chapter_acts:
  act1_intro:
    hook: "それでも教条に従い、孤立しながら奔走するマーレン。"
  act2_conflict:
    build_up: "正攻法で壁を突破しようとするが、どこに行っても門前払いを食らい、彼女の心が摩耗していく。ついに路地裏で崩れ落ち、『証拠を握り潰した奴のところへ一人で乗り込む』という無謀な行動を口にする。"
  act3_climax:
    turn: "ノルクが「死体が出ると書類が三枚増える」と面倒くさそうに割り込み、マーレンの動きを止める。マーレンには損得で動く計算として映る（人柄のズレ：義理→冷血漢誤読の対マーレン初例）。"
    cliffhanger: "溜め息をひとつついて「じゃあ裏から行くか」——ノルクが自分の裏のルートを切ることを選ぶ。この選択の動機は語られないまま次話へ。"

scenes:
  - scene_01: "マーレンの孤独な奔走と無謀な決断"
  - scene_02: "ノルクの割り込み（打算ラッピング）と裏の手を切る選択（人柄のズレ対マーレン初例）"

