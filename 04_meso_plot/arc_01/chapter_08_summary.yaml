chapter_id: "CH_08"
arc_linkage: "第1アーク / 展開（承）の底"

chapter_stimulus:
  peak_variable: "危機" # 教条の機能不全による社会的手詰まり

catharsis_core: "路地裏で崩れ落ちたマーレンの『証拠を握り潰した奴のところへ一人で乗り込む』を、ノルクが『死体が出ると書類が三枚増える』で止める——そして溜め息一つ、「じゃあ裏から行くか」と自分の裏のルートを切る。救済の決断が完全に損得の語彙で実行され、動機は語られない。"

chapter_acts:
  act1_intro:
    hook: "それでも教条に従い、孤立しながら奔走するマーレン。"
  act2_conflict:
    build_up: "正攻法で壁を突破しようとするが、どこに行っても門前払いを食らい、彼女の心が摩耗していく。ついに路地裏で崩れ落ち、『証拠を握り潰した奴のところへ一人で乗り込む』という無謀な行動を口にする。"
  act3_climax:
    turn: "ノルクが「死体が出ると書類が三枚増える」と面倒くさそうに割り込み、マーレンの動きを止める。マーレンには損得で動く計算として映る。"
    cliffhanger: "溜め息をひとつついて「じゃあ裏から行くか」——ノルクが自分の裏のルートを切ることを選ぶ。この選択の動機は語られないまま次話へ。"

design_notes:
  - "人柄のズレの対マーレン2例目：止め方も助け方も打算の言い訳で包まれる（characters.yaml / nork internal_flaw の打算ラッピング）。動機を語らないことが誤読を深める。"
  - "ミクロ強調は【共感】：マーレンの挫折に読者を同期させる（peak_variable のスコープ運用は 00_system/variable_rules.md 参照）。"
  - "『裏のルートを切る』はノルクにとってコスト（裏社会への借りが増える）であること——その重さはCH09の情報収集の過程で可視化される。"

scenes:
  - scene_01: "マーレンの孤独な奔走と無謀な決断"
  - scene_02: "ノルクの割り込みと裏の手を切る選択"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
