chapter_id: "CH_19"
arc_linkage: "第1アーク / エピローグ後編"

chapter_stimulus:
  peak_variable: "報酬" # 多段報酬が皮肉に完成し、平穏だけが遠ざかる反転オチ

catharsis_core: "資金・環境・コネ——多段報酬がすべて揃った結果、ノルクは最も厄介な人間関係（張り付くバディ・逃がさない斡旋所・経歴を洗う情報屋・上流からの接触・不穏な新しい名前）の中心に据えられる。望んでいた平穏だけが、報酬と引き換えに遠ざかる反転オチ。"

chapter_acts:
  act1_intro:
    hook: "事件後、豊富な資金と環境で元の適当な平穏を満喫しようとするノルク。事件後初めての質の良い宿でまどろむ中、一瞬だけ——薄暗い書棚、古本の紙の匂い、聞き慣れた誰かの声。夢の輪郭を確認する前に意識が戻る。"
  act2_conflict:
    build_up: "しかし、マーレンが「目を離すと何をしでかすか分からない」と公私にわたり相棒（バディ）として張り付き始め、さらにはスィグナも神輿である彼を逃がさない。スィグナは情報屋として彼の経歴を密かに洗うが、ある時期を境に記録が不自然なほど完全に『抹消』されている事実に行き当たる。同時に、上流から『例の便利屋に依頼したい』という接触の気配が届く。加えてスィグナが「聞いたことのない名前が動き始めた」と漏らす一言が不穏な余韻を残す。"
  act3_climax:
    turn: "多段的な有形無形の報酬を得た結果、皮肉にも一番厄介な人間関係の中心に据えられてしまう。"
    cliffhanger: "望んでいた平穏が完全に遠ざかり、ノルクが頭を抱えて第1アークが終了する。"

design_notes:
  - "want二層構造の種まき：ブックカフェの夢の断片（薄暗い書棚・紙の匂い・誰かの声）を説明なしの一瞬で初出し（characters.yaml / nork want）。"
  - "【探求の種】スィグナがノルクの経歴の完全な『抹消』に行き当たる——第零機関への橋渡し。執筆開始時に 02_dynamic_states/resources_states.yaml の長距離台帳へ登録する対象。"
  - "次アーク予告2件：名家の令嬢（上流からの接触の気配）と狂信者バーサーカー（聞いたことのない名前）（characters.yaml / noble_lady・joker_character）。"
  - "ミクロ強調は【共感】：ノルクの不憫さに読者を同期させる。peak_variable【報酬】は皮肉な反転として機能する（00_system/variable_rules.md のスコープ運用）。"

scenes:
  - scene_01: "マーレンのバディ宣言とスィグナの暗躍（経歴抹消・上流からの接触・不穏な名前の三点セット）"
  - scene_02: "ノルクの苦悩とアークの締めくくり"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
