chapter_id: "CH_19"
arc_linkage: "第1アーク / エピローグ後編"

chapter_stimulus:
  peak_variable: "報酬" # 多段報酬が皮肉に完成し、平穏だけが遠ざかる反転オチ（ミクロは【共感】を強調し、ノルクの不憫さに読者を同期させる）

chapter_acts:
  act1_intro:
    hook: "事件後、豊富な資金と環境で元の適当な平穏を満喫しようとするノルク。事件後初めての質の良い宿でまどろむ中、一瞬だけ——薄暗い書棚、古本の紙の匂い、聞き慣れた誰かの声。夢の輪郭を確認する前に意識が戻る。（want二層構造：ブックカフェ夢断片・初出し・説明なし）"
  act2_conflict:
    build_up: "しかし、マーレンが「目を離すと何をしでかすか分からない」と公私にわたり相棒（バディ）として張り付き始め、さらにはスィグナも神輿である彼を逃がさない。スィグナは情報屋として彼の経歴を密かに洗うが、ある時期を境に記録が不自然なほど完全に『抹消』されている事実に行き当たる。【探求の種: 第零機関】同時に、上流から『例の便利屋に依頼したい』という接触の気配が届く（名家の令嬢・次アーク予告）。加えてスィグナが「聞いたことのない名前が動き始めた」と漏らす一言が不穏な余韻を残す（狂信者バーサーカー・次アーク予告）。"
  act3_climax:
    turn: "多段的な有形無形の報酬を得た結果、皮肉にも一番厄介な人間関係の中心に据えられてしまう。"
    cliffhanger: "望んでいた平穏が完全に遠ざかり、ノルクが頭を抱えて第1アークが終了する。"

scenes:
  - scene_01: "マーレンのバディ宣言とスィグナの暗躍（経歴抹消・上流からの接触・不穏な名前の三点セット）"
  - scene_02: "ノルクの苦悩とアークの締めくくり"

