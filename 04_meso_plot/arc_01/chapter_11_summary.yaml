chapter_id: "CH_11"
arc_linkage: "第1アーク / 転（突入）"

chapter_stimulus:
  peak_variable: "驚き" # 読者にだけ見える二層進行

catharsis_core: "マーレンが正面から雑魚を掃討して進む裏で、ノルクの通り道には無音で意識を刈られた見張りが転がっていく——本人は『手伝いが雑な便利屋』の顔のまま、退路とトラップの確認、そしてボスの『無謬の自己像（余裕）』の観測を並行している。読者にだけ二層目が見える進行の先で、最奥の扉が開き、誰に対しても変わらぬ律儀さで合掌するボスが立ちはだかる——その慇懃な余裕こそ、後に砕く確信の満タンの基準値だ。"

chapter_acts:
  act1_intro:
    hook: "「今夜しかない」と先行するマーレン。ノルクは「死なれると面倒だ」と溜め息をつきながら渋々同行する。"
  act2_conflict:
    build_up: "マーレンが正面から雑魚を掃討して深部へ押し進む一方、ノルクは側道や天井を確認しながら遅れてついてくる。ノルクが通った後には無音で意識を刈られた見張りが転がっていくが、正面突破しているマーレンには見えていない。並行して退路とトラップの確認を進める——そして最奥のボスと対峙した瞬間からは、加護を支える出力源（保持者の確信・余裕＝無謬の自己像）を観測しはじめる。後でその確信を砕き、ゆらぎを読むための基準値の採取だ。"
  act3_climax:
    turn: "最奥の扉を開けた瞬間、空気が変わる。男はこちらへ向き直り、双手を静かに胸の前で合わせた——誰に対しても変わらぬ、律儀な所作。だがそれは礼ではなく、格下が何をしようと己は揺るがぬという慇懃な余裕の表れだ。視線はまっすぐマーレンに向けられている。「貴女のような特異な出自の方が、ここまで来られるとは」。言葉は丁寧だが、その目は値踏みだ。ノルクはその余裕の濃さを、満タンの基準値として静かに刻む。"
    cliffhanger: "マーレンが期待していた以上のプレッシャーを放つボスが立ちはだかる。揺るぎない余裕——その確信を崩す窓は、まだ見えない。"

design_notes:
  - "小カタルシスの前置き：雑魚相手なら工夫と奇襲で十二分という描写は、CH12以降のボス戦（固有加護持ち）の無力感との落差を際立てるための設計。"
  - "並行作業の実態は退路・トラップの確認とボスの余裕（無謬の自己像）の観測。見た目は『手伝いが雑な便利屋』、実態はリスク管理と確信崩しの下ごしらえ。第1アークは段0〜1と受動観測のみで痕跡が発生しないため、旧稿の『遮断設備の有無確認（切り札使用の前提）』は前提ごと不要——内向きの自己強化・受動観測は不協和音の痕跡を残さない（setting_magic.yaml / dissonance_trace）。"
  - "余裕の観測の1段目（基準値）：合掌・丁重な物腰・言葉選びは『格下が何をしようと揺るがぬ無謬の自己像』の表れ＝確信が満タンの状態。ここで採った余裕の濃さが基準値となり、CH13で初めて削れ（ゆらぎの予兆）、CH16でセリファがゆらぎを計器として読む窓の検出に繋がる（characters.yaml / nork combat_style 手札①『観測の所作』／serifa ゆらぎ観測）。"

scenes:
  - scene_01: "突入——マーレンの正面突破とノルクの並行作業（退路・トラップ確認）"
  - scene_02: "最奥でのボスとの対峙とノルクの余裕観測（合掌＝無謬の自己像＝基準値の採取）"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
