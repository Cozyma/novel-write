chapter_id: "CH_11"
arc_linkage: "第1アーク / 転（突入）"

chapter_stimulus:
  peak_variable: "驚き" # 読者にだけ見える二層進行

catharsis_core: "マーレンが正面から雑魚を掃討して進む裏で、ノルクの通り道には無音で意識を刈られた見張りが転がっていく——本人は『手伝いが雑な便利屋』の顔のまま、退路・トラップ・遮断設備の確認を並行している。読者にだけ二層目が見える進行の先で、最奥の扉が開き、合掌するボスが立ちはだかる。"

chapter_acts:
  act1_intro:
    hook: "「今夜しかない」と先行するマーレン。ノルクは「死なれると面倒だ」と溜め息をつきながら渋々同行する。"
  act2_conflict:
    build_up: "マーレンが正面から雑魚を掃討して深部へ押し進む一方、ノルクは側道や天井を確認しながら遅れてついてくる。ノルクが通った後には無音で意識を刈られた見張りが転がっていくが、正面突破しているマーレンには見えていない。並行して退路のトラップ確認と工房設備の把握を進める——特に優先しているのは『遮断設備（痕跡を封じる大型制圧機器）』の有無。それがなければ本命の手は使えない。"
  act3_climax:
    turn: "最奥の扉を開けた瞬間、空気が変わる。男はこちらへ向き直り、双手を静かに胸の前で合わせた——誰に対しても変わらぬ、律儀な所作だった。視線はまっすぐマーレンに向けられている。「貴女のような特異な出自の方が、ここまで来られるとは」。言葉は丁寧だが、その目は値踏みだ。"
    cliffhanger: "マーレンが期待していた以上のプレッシャーを放つボスが立ちはだかる。ノルクはまだ設備の確認を終えていない。"

design_notes:
  - "小カタルシスの前置き：雑魚相手なら工夫と奇襲で十二分という描写は、CH12以降のボス戦（固有加護持ち）の無力感との落差を際立てるための設計。"
  - "隠匿の緊張：並行作業の実態は切り札使用の前提条件の構築（遮断設備の有無確認。setting_magic.yaml / dissonance_trace.shielding）。見た目は『手伝いが雑な便利屋』、実態はリスク管理の行動パターン全開。"
  - "加護の要件の伏線1段目：合掌・視線・言葉選びの所作が観察される——CH16でセリファが特定する要件の観測データになる（characters.yaml / nork combat_style 手札①『観測の所作』の文法）。"

scenes:
  - scene_01: "突入——マーレンの正面突破とノルクの並行作業（トラップ確認・設備把握）"
  - scene_02: "最奥でのボスとの対峙（ノルクの準備は未完了）"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
