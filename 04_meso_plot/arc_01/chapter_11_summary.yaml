chapter_id: "CH_11"
arc_linkage: "第1アーク / 転（突入）"

chapter_stimulus:
  peak_variable: "驚き" # マーレンの決意と強行突破

chapter_acts:
  act1_intro:
    hook: "「今夜しかない」と先行するマーレン。ノルクは「死なれると面倒だ」と溜め息をつきながら渋々同行する（打算ラッピング）。"
  act2_conflict:
    build_up: "マーレンが正面から雑魚を掃討して深部へ押し進む一方、ノルクは側道や天井を確認しながら遅れてついてくる。退路のトラップ確認と工房設備の把握——見た目は「手伝いが雑な便利屋」だがリスク管理の行動パターンが全開になっている。特に優先しているのは『遮断設備（痕跡を封じる大型制圧機器）』の有無。それがなければ本命の手は使えない。（隠匿の緊張：切り札使用の前提条件を整えているのがこの並行作業の実態）"
  act3_climax:
    turn: "最奥の扉を開けた瞬間、空気が変わる。"
    cliffhanger: "マーレンが期待していた以上のプレッシャーを放つボスが立ちはだかる。ノルクはまだ設備の確認を終えていない。"

scenes:
  - scene_01: "突入——マーレンの正面突破とノルクの並行作業（トラップ確認・設備把握）"
  - scene_02: "最奥でのボスとの対峙（ノルクの準備は未完了）"

