chapter_id: "CH_10"
arc_linkage: "第1アーク / 承の末尾（不可逆点：強行突入の決定）"

chapter_stimulus:
  peak_variable: "危機" # ボスの正体の判明

catharsis_core: "『もう一晩あれば確実な条件で動ける』というノルクのリスク管理と、『今夜スラムの口封じが始まる——待てない』というマーレンの正義——どちらも正しいまま衝突し、タイムリミットの外圧が強行突入を決める。準備不足という後の絶望の必然が、双方の正しさから組み上がる。"

chapter_acts:
  act1_intro:
    hook: "特定した現場（ボスの隔離施設）周辺の状況確認。"
  act2_conflict:
    build_up: "内部の様子を探る中で、裏のボスが律神特権を悪用するギルド管理職である事実が判明する。スィグナまたはセリファが戦闘の前提を言語化する——固有加護の守りは、正面の打ち合いでは武器の格を問わず上回る。この個体の固有加護は『無謬の権威』——完璧な公正の体現者を装うがゆえに、格下と見下した相手の干渉を存在ごと却下する。剥がすには保持者自身の要件違反（公言した公正を言動で裏切ること）しかなく、その要件は本来ほぼ特定できない。また、ボスは律神への公正・秩序維持を公的に誓う立場でありながら、危険案件を格下の下請けに押し付け死を握り潰して私腹を肥やすという矛盾した実態が明らかになる。加えて聞き込みの断片に、スラムから流れてきた噂話が混じっている——「あの夜の路地で、腕利きの殺し屋が素顔の便利屋一人に何もできず退かされたらしい」。マーレンには雑談にしか聞こえないが、ノルクは無反応のまま別の方を向く。ボス側にも「スラムで妙な手配師が動いている」という情報が届いており、ある種の警戒をしている節がある。"
  act3_climax:
    turn: "そのエリートが積み上げた加護の重さが浮き彫りになる。ノルクは「もう一晩あれば確実な条件で動ける」と主張するが、マーレンは「今夜スラムの口封じが始まる——待てない」と押し切る。"
    cliffhanger: "戦略の不一致が生じたまま、タイムリミットという外圧によって強行突入が決まる。ノルクの溜め息で引く。"

design_notes:
  - "加護戦闘の文法の正式開示：CH01の体験的理解（正面では勝てない・位置取りと損得を攻める）に言語的説明が加わり、CH12以降のマーレン苦闘の前提が整う。説明の語彙は『固有加護は正面の打ち合いでは武器の格を問わず上回る』に限定し、『加護持ちには攻撃が通らない』という一律表現は使わないこと（characters.yaml / nork combat_style 手札④の前提と矛盾するため。setting_worldview.yaml / blessing_types 参照）。"
  - "CH16の条項告発の伏線：ボスの誓約（公正・秩序維持の公言）と行動（危険案件の使い潰し汚職）の矛盾がここで示される——効果（無謬ゆえ格下無効化）と消失要件（公言した公正の保持）が同一コイン。"
  - "神話化エンジンの可視化：CH01の撤退劇とCH06の生存者の証言が、誇張されながらボスの耳まで届いている（concept.yaml / misunderstanding_escalation『敗者の証言が神話化する』の実演）。"
  - "不可逆点：強行突入の決定（カタルシス曲線 buildup 末の後戻り不可点。00_system/ARCHITECTURE.md 2.3・arc_summary.yaml has_irreversible_point 参照）。"
  - "リスク管理 vs 教条の緊急性という対立軸の起点——CH14でノルクが『撤退推奨を無視して残る』選択との対照を形成する。"

scenes:
  - scene_01: "現場（隔離施設）への潜入準備とボスの正体判明（律神特権のギルド管理職・無謬の権威）"
  - scene_02: "ノルクとマーレンの戦略不一致——「一晩待つ」vs「今夜しかない」"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
