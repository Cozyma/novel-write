chapter_id: "CH_10"
arc_linkage: "第1アーク / 転（ミッドポイント直前）"

chapter_stimulus:
  peak_variable: "危機" # ボスの正体の判明

chapter_acts:
  act1_intro:
    hook: "特定したアジト周辺の状況確認。"
  act2_conflict:
    build_up: "内部の様子を探る中で、裏のボスが律神の加護を悪用する汚職エリートである事実が判明する。スィグナまたはセリファが「加護が分厚い相手には正規の武器が通らない」という戦闘メカニクスを台詞で説明する。【加護の戦闘層・正式開示：CH02の体験的理解に言語的説明が加わり、CH12以降のマーレン苦闘の前提が整う】また、ボスは律神の秩序維持を誓う条項で加護を得ている公的な立場でありながら、密造網を運営して秩序を腐らせているという矛盾した実態が明らかになる。【CH16の条項告発の伏線：誓約と行動の矛盾がここで示される】加えて聞き込みの断片に、スラムから流れてきた噂話が混じっている——「あの夜の路地で複数人が瞬殺された、相手は一人、素顔の便利屋」。マーレンには雑談にしか聞こえないが、ノルクは無反応のまま別の方を向く。ボス側にも「スラムで妙な手配師が動いている」という情報が届いており、ある種の警戒をしている節がある。（神話化エンジンの可視化：CH06末端生存者の証言がすでにボスの耳に届いている）"
  act3_climax:
    turn: "そのエリートが積み上げた加護の重さが浮き彫りになる。ノルクは「もう一晩あれば確実な条件で動ける」と主張するが、マーレンは「今夜スラムの口封じが始まる——待てない」と押し切る。"
    cliffhanger: "戦略の不一致が生じたまま、タイムリミットという外圧によって強行突入が決まる。ノルクの溜め息で引く。（リスク管理vs教条urgencyの対立の起点）"

scenes:
  - scene_01: "アジトへの潜入準備とボスの正体判明"
  - scene_02: "ノルクとマーレンの戦略不一致——「一晩待つ」vs「今夜しかない」"

