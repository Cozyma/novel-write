chapter_id: "CH_10"
arc_linkage: "第1アーク / 承の末尾（不可逆点：強行突入の決定）"

chapter_stimulus:
  peak_variable: "危機" # ボスの正体の判明

catharsis_core: "『もう一晩あれば確実な条件で動ける』というノルクのリスク管理と、『今夜スラムの口封じが始まる——待てない』というマーレンの正義——どちらも正しいまま衝突し、タイムリミットの外圧が強行突入を決める。準備不足という後の絶望の必然が、双方の正しさから組み上がる。"

chapter_acts:
  act1_intro:
    hook: "特定した現場（ボスの隔離施設）周辺の状況確認。"
  act2_conflict:
    build_up: "内部の様子を探る中で、裏のボスが律神特権を悪用するギルド管理職である事実が判明する。スィグナまたはセリファが戦闘の前提を言語化する——固有加護の守りは、正面の打ち合いでは武器の格を問わず上回る。この個体の加護は『無謬の権威』——格下と見下した相手の干渉（刃も告発も）を存在ごと却下する強力な却下型で、要件を解析的に特定して自壊させる道は閉ざされている（仕様は行政の非公開事項）。現時点で立てられる攻め筋は一つ——対抗文化の古典『挑発の散弾』の延長で、特権者の傲慢＝自己像の確信を心理的圧力で砕けば出力も揺らぐはず、という仮説（※この安い仮説はCH12で実地に試されて死に、加護の真の正体＝座の加護の特定はCH13。setting_worldview.yaml / blessing_types.seat）。心理戦の燃料候補として、公正を誓う立場と汚職の実態の矛盾＝偽善があり、その決定的証拠はCH07で既に握られている。加えて聞き込みの断片に、スラムから流れてきた噂話が混じっている——「あの夜の路地で、腕利きの殺し屋が素顔の便利屋一人に何もできず退かされたらしい」。マーレンには雑談にしか聞こえないが、ノルクは無反応のまま別の方を向く。ボス側にも「スラムで妙な便利屋が動いている」という情報が届いており、ある種の警戒をしている節がある。"
  act3_climax:
    turn: "そのエリートが積み上げた加護の重さが浮き彫りになる。ノルクは「もう一晩あれば確実な条件で動ける」と主張するが、マーレンは「今夜スラムの口封じが始まる——待てない」と押し切る。"
    cliffhanger: "戦略の不一致が生じたまま、タイムリミットという外圧によって強行突入が決まる。ノルクの溜め息で引く。"

design_notes:
  - "加護戦闘の文法の正式開示：CH01の体験的理解（正面では勝てない・位置取りと損得を攻める）に言語的説明が加わり、CH12以降のマーレン苦闘の前提が整う。説明の語彙は『固有加護は正面の打ち合いでは武器の格を問わず上回る』に限定し、『加護持ちには攻撃が通らない』という一律表現は使わないこと（characters.yaml / nork combat_style 手札④の前提と矛盾するため。setting_worldview.yaml / blessing_types 参照）。"
  - "同一人物の回収：CH03（遠景の一瞥）・CH07（血筋棄却を公正のレトリックで追認）で『公正の体現者』として頭出ししたギルド管理職の表の顔が、裏の汚職ボスと同一人物だと判明する（仮面と裏の二面の接合＝『あの管理職が裏で』のクリック）。読者は半歩先に気づいていてよいが、律神特権・汚職核心の判明は本章が初出（【驚き】の温存）。"
  - "CH16の認識崩し経路の伏線（setting_magic.yaml / anti_mage.combat_style・setting_worldview.yaml / blessing_types.seat）：無謬の権威は座の加護（制度憑依）であり、剥がすには『制度はお前を守らない』と本人に理解させて座との癒着（接続の自明性）を断つ。ただし本章時点の作中仮説は『傲慢の確信を挑発で砕く』止まり——正体の特定はCH12（安い仮説の死）〜CH13（座の特定）の実地観測を経る（読みのゲームの中間反転）。ボスの誓約（公正・秩序維持の公言）と汚職（規定人数以下の使い潰し＋魔獣素材の横流し）の矛盾＝偽善がここで示され、CH07で握る汚職の決定的証拠が、CH16で『お前の制度こそがお前を除名する』と分からせる燃料になる（自滅待ちではない）。なお証拠は通常ボスに無力——神の履歴＝司法を律神クランが支配し格下の告発は握り潰せる（CH07で実証）ため、彼が証拠を恐れないのは愚行でなく司法支配ゆえの合理。CH16では法でなく認識（座との接続）を崩す燃料へ用途を変えて効かせる（敵を愚かにしない）。効果（格下却下）は不変。"
  - "神話化エンジンの可視化：CH01の撤退劇とCH06の生存者の証言が、誇張されながらボスの耳まで届いている（concept.yaml / misunderstanding_escalation『敗者の証言が神話化する』の実演）。"
  - "不可逆点：強行突入の決定（カタルシス曲線 buildup 末の後戻り不可点。00_system/ARCHITECTURE.md 2.3・arc_summary.yaml has_irreversible_point 参照）。"
  - "リスク管理 vs 教条の緊急性という対立軸の起点——CH14でノルクが『撤退推奨を無視して残る』選択との対照を形成する。"

scenes:
  - scene_01: "現場（隔離施設）への潜入準備とボスの正体判明（律神特権のギルド管理職・無謬の権威）"
  - scene_02: "ノルクとマーレンの戦略不一致——「一晩待つ」vs「今夜しかない」"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true
