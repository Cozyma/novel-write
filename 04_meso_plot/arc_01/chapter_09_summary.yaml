chapter_id: "CH_09"
arc_linkage: "第1アーク / 展開（承）の反転"

chapter_stimulus:
  peak_variable: "驚き" # 教条外のアプローチによる解決

catharsis_core: "【仮核】切り札（痕跡の残る外向きの大技）を切れば早い特定作業を、『情報を抜くのに火力は要らない』と封じて人間の手で押す——スィグナ経由で握った揉み消し要員や下請けの関係者の借金台帳から、『金は要らない、帳消しを売る』という逆向きの取引で口を開かせる。脅す代わりに救済を売る取り立ての反転で、あっさりボスの汚職の核心（隔離施設）を特定する。"

chapter_acts:
  act1_intro:
    hook: "ノルクがスィグナの組織（CH01〜02で得た裏ルート）を活用し、情報収集をスタートする。"
  act2_conflict:
    build_up: "マーレンの常識を覆す裏の流儀で、次々と情報が引き出されていく。ノルクは腕力で脅す代わりに、スィグナ経由で揉み消し要員や下請けの関係者の借金台帳を握り、『吐けば帳消しになるよう口を利く』と救済を売る取引で口を開かせる。切り札級の手を使えば早いが、情報を抜くのに痕跡の残る外向きの行使や火力を切る必要はない（それらはアーク終盤まで温存する伏せ札）——だから人間の手で押す。こうしてボスの汚職（危険な討伐を規定人数以下で下請けに使い潰し死を揉み消す不正）の核心と、その隔離施設の位置が手繰り寄せられていく。"
  act3_climax:
    turn: "あっという間にボスの汚職の核心（隔離施設）を特定するノルク。"
    cliffhanger: "教条の外の流儀で次々結果を出すノルクに、マーレンは『正しくないやり方が、現に効いている』という事実を突きつけられる——退けたいのに無視できない。教条の足場がさらに軋む（step1揺らぐの一押し／step2認めるの種。依存ではない）。"

design_notes:
  - "catharsis_core は仮核（2026-06-12のAI提案）：『帳消しを売る逆取引』はL4執筆時により良い手が生まれたら還流して上書きしてよい（00_system/SELF_REVIEW.md【面白さの核の実在検証】の還流ルール）。"
  - "隠匿の緊張の早期種まき：痕跡の残る外向きの大技（条項告発＝加護への干渉／超火力＝遺技ロード）を封じて泥臭い代替を選ぶ構図。封印の理由は二つ——①外向き行使は不協和音の痕跡を残す（内向きの自己強化・受動観測は痕跡なし＝setting_magic.yaml / dissonance_trace）②それらはアーク終盤まで温存する伏せ札であり、情報抽出ごときに火力は不要（人手で足りる）。後アークで外向き行使を解禁すると痕跡＝隠匿制約が戦闘の管理軸に昇格する、その前振り。"
  - "第零機関の長距離伏線（旧魔導院の施設痕跡）は CH05（討伐現場の隅の旧施設痕跡）へ移設済み（旧稿では本章の密造薬物精製工程、2026-06-16稿ではCH05魔獣の壊れ方に置いていた——魔獣を真っ当な獣へ戻したため現場の痕跡へ再付け替え：2026-06-17）。本章は純粋に裏ルートでの汚職の核心特定に専念し、第零機関フックはボスの汚職から切り離す（主従の維持）。"
  - "マーレンの『教条の外にも効く流儀がある』という認めざるを得なさは、CH10で彼女が押し切る障壁を下げる程度の下地に留める。**依存・心酔ではない**——マーレンの成長は対等なバディ／自前の力の解放方向（characters.yaml / marlen growth_roadmap theme・step2『認める』）であり、ノルクの力に頼る依存は2026-06-11の決定（心酔・崇拝・神格化の排除）で対象外。CH10の押し切りの主動機は教条的正義・緊急性（chapter_10_summary / リスク管理 vs 教条の緊急性）であって、力への依存ではない。"

scenes:
  - scene_01: "ノルクによる裏の情報収集——帳消しを売る逆取引"
  - scene_02: "汚職の核心（隔離施設）の特定とマーレンの心境変化"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true # 仮核（還流による上書き前提）
