chapter_id: "CH_09"
arc_linkage: "第1アーク / 展開（承）の反転"

chapter_stimulus:
  peak_variable: "驚き" # 教条外のアプローチによる解決

catharsis_core: "【仮核】セリファなら一瞬で済む特定作業を『人目と記録の有無が確認できない』という理由だけで封印し、人間の手で押す——スィグナ経由で握った揉み消し要員や下請けの関係者の借金台帳から、『金は要らない、帳消しを売る』という逆向きの取引で口を開かせる。脅す代わりに救済を売る取り立ての反転で、あっさりボスの汚職の核心（隔離施設）を特定する。"

chapter_acts:
  act1_intro:
    hook: "ノルクがスィグナの組織（CH01〜02で得た裏ルート）を活用し、情報収集をスタートする。"
  act2_conflict:
    build_up: "マーレンの常識を覆す裏の流儀で、次々と情報が引き出されていく。ノルクは腕力で脅す代わりに、スィグナ経由で揉み消し要員や下請けの関係者の借金台帳を握り、『吐けば帳消しになるよう口を利く』と救済を売る取引で口を開かせる。セリファの演算なら一瞬で済む作業だが、閉鎖空間でも周辺の記録媒体や人目の有無が確認できない——だから人間の手で押す。こうしてボスの汚職（危険案件の使い潰し・下請けの死の揉み消し）の核心と、その隔離施設の位置が手繰り寄せられていく。"
  act3_climax:
    turn: "あっという間にボスの汚職の核心（隔離施設）を特定するノルク。"
    cliffhanger: "結果を出す彼に対し、マーレンの中に「自分にはない力への依存の萌芽」が生まれる。"

design_notes:
  - "catharsis_core は仮核（2026-06-12のAI提案）：『帳消しを売る逆取引』はL4執筆時により良い手が生まれたら還流して上書きしてよい（00_system/SELF_REVIEW.md【面白さの核の実在検証】の還流ルール）。"
  - "隠匿の緊張の早期種まき：本命の手段（セリファ同期）を封印して泥臭い代替を選ぶ構図。封印の理由は不協和音の痕跡（setting_magic.yaml / dissonance_trace）。"
  - "第零機関の長距離伏線（旧魔導院の廃棄技術と類似する痕跡）は CH05（汚染魔物の壊れ方）へ移設済み（旧稿では本章の密造薬物精製工程に置いていた）。本章は純粋に裏ルートでの汚職の核心特定に専念し、第零機関フックはボスの汚職から切り離す（主従の維持）。"
  - "マーレンの『依存の萌芽』はCH10の戦略不一致で彼女が押し切る心理的下地になる（裏の力は結果を出す、という学習）。"

scenes:
  - scene_01: "ノルクによる裏の情報収集——帳消しを売る逆取引"
  - scene_02: "汚職の核心（隔離施設）の特定とマーレンの心境変化"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true # 仮核（還流による上書き前提）
