chapter_id: "CH_09"
arc_linkage: "第1アーク / 展開（承）の反転"

chapter_stimulus:
  peak_variable: "驚き" # 教条外のアプローチによる解決

catharsis_core: "【仮核】セリファなら一瞬で済む特定作業を『人目と記録の有無が確認できない』という理由だけで封印し、人間の手で押す——スィグナ経由で握った末端連中の借金台帳から、『金は要らない、帳消しを売る』という逆向きの取引で口を開かせる。脅す代わりに救済を売る取り立ての反転で、あっさり密造網のアジトを特定する。"

chapter_acts:
  act1_intro:
    hook: "ノルクがスィグナの組織（CH01〜02で得た裏ルート）を活用し、情報収集をスタートする。"
  act2_conflict:
    build_up: "マーレンの常識を覆す裏の流儀で、次々と情報が引き出されていく。ノルクは腕力で脅す代わりに、スィグナ経由で末端連中の借金台帳を握り、『吐けば帳消しになるよう口を利く』と救済を売る取引で口を開かせる。セリファの演算なら一瞬で済む作業だが、閉鎖空間でも周辺の記録媒体や人目の有無が確認できない——だから人間の手で押す。情報収集の過程で、密造薬物の精製工程に『旧魔導院で一度廃棄されたはずの技術と類似する痕跡』という断片が混じっている。提供者は気にしていないが、ノルクだけが一瞬表情を殺して別の方向を向く。理由は語られない。"
  act3_climax:
    turn: "あっという間に密造網のアジトを特定するノルク。"
    cliffhanger: "結果を出す彼に対し、マーレンの中に「自分にはない力への依存の萌芽」が生まれる。"

design_notes:
  - "catharsis_core は仮核（2026-06-12のAI提案）：『帳消しを売る逆取引』はL4執筆時により良い手が生まれたら還流して上書きしてよい（00_system/SELF_REVIEW.md【面白さの核の実在検証】の還流ルール）。"
  - "隠匿の緊張の早期種まき：本命の手段（セリファ同期）を封印して泥臭い代替を選ぶ構図。封印の理由は不協和音の痕跡（setting_magic.yaml / dissonance_trace）。"
  - "第零機関への長距離伏線：旧魔導院の廃棄技術と類似する痕跡。執筆開始時に 02_dynamic_states/resources_states.yaml へ登録する対象（回収は第零機関関連アーク）。"
  - "マーレンの『依存の萌芽』はCH10の戦略不一致で彼女が押し切る心理的下地になる（裏の力は結果を出す、という学習）。"

scenes:
  - scene_01: "ノルクによる裏の情報収集——帳消しを売る逆取引"
  - scene_02: "アジトの特定とマーレンの心境変化"

validation_hook:
  is_linked_to_arc: true
  has_clear_stimulus: true
  has_catharsis_core: true # 仮核（還流による上書き前提）
