chapter_id: "CH_01"
arc_linkage: "[どのアークのどのフェーズ（例：ミッドポイント周辺）に属しているか]"

# 連載1話としての変数刺激構造
chapter_stimulus:
  peak_variable: "危機" # この1話の中で最も高めるマクロ変数

# 【必須】この章の面白さの核（一文で言えなければその章は未設計）
# 「誰が、どんな具体的な手で、何をひっくり返し、読者はどの瞬間に何を感じるか」を書く。
# 「工夫で勝つ」「誤読が深まる」のような要件・抽象語は核ではない。具体的なトリック・逆転・オチを指させること。
# 運用：最終形でなくてよい（仮核で可）。ただし三幕を吊るせる具体性が必須で、「何か面白いことが起きる（はず）」という約束手形は不可。
# 核は戦闘トリックに限らない——関係性の逆転・認識の転回・感情のオチでも可（例：CH18「スィグナが資産として値踏みする横で、マーレンだけが危うさを知る理解者として無言の視線を向ける——同一人物への正反対の関係の初並置」）。要は具体的に指させること。
# 執筆段階（L4）でより良い出来事レベルの発明が生まれた場合は、本文だけに残さず必ずこのフィールドへ還流（上書き更新）すること。
catharsis_core: "[例：暗殺者の『人目を嫌う稼業』を逆手に取り、位置取りで衛兵の巡回路へ押し続けて職業判断としての撤退に追い込む——腕で負けて頭で勝つ瞬間の痛快さ]"

# 連載1話としてのミニ三幕構造（読者のテンション操作）
# 注意：actsには「出来事」だけを書く。設計タグ（〜の初出し・〜の起点・報酬番号等）はdesign_notesへ分離すること。
chapter_acts:
  act1_intro:
    hook: "[冒頭の掴み：前話の引きを受ける、あるいは新たな目的の提示]"
  act2_conflict:
    build_up: "[展開：障害との衝突。ここでpeak_variableを高めていく]"
  act3_climax:
    turn: "[結末：状況の反転や、目的の達成/失敗]"
    cliffhanger: "[次話への引き：絶望的な【危機】で終わるか、小さな【報酬】で満足させる]"

# 設計ペイロード（この章が物語全体に対して担う設計要件・伏線・初出しタグ）
# ループ修正での追記は原則ここに行い、chapter_actsのドラマの背骨を侵食しないこと。
design_notes:
  - "[例：人柄のズレの起点（介入理由は語らない）]"
  - "[例：【無形報酬1: スィグナからの底知れない化け物評価】]"

# この話を構成するシーン群（1〜3シーン程度を想定）
scenes:
  - scene_01: "[シーン概要]"
  - scene_02: "[シーン概要]"

validation_hook:
  is_linked_to_arc: false # 上位アークの進行に寄与しているか
  has_clear_stimulus: false # 1話としてのエンタメ性（フックと引き）があるか
  has_catharsis_core: false # catharsis_coreが「具体的な手」を含む一文として成立しているか（抽象語の言い換えは不可）
