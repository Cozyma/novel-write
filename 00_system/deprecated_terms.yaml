# deprecated_terms.yaml — 廃止語彙・死語台帳
# 設計決定によって「使ってはいけなくなった」語・言い回しのパターン台帳。
#
# 用途: コミット前フック（ARCHITECTURE.md 3章）で実データ領域
#       （01_static_database / 02_dynamic_states / 03_macro_concept / 04_meso_plot / 05_micro_scene / 06_draft_output / 07_final_text）
#       へ全パターンを機械grepし、旧稿残骸を検出する。
# 運用: 決定事項フックで語彙・概念を廃止・置換した際、grep全列挙とセットで必ずここへ登録する。
# 判定: ヒット＝即違反ではなく「文脈確認の対象」（一般語として正当な用例がありうる。noteの除外条件を参照）。
# 対象外: _workspace（旧ドラフトの意図的保管領域。執筆時に参照しないこと自体は TODO.md E項で管理）と 00_system（本台帳・事例引用が自己ヒットするため）。

deprecated_terms:
  - pattern: "魔力切れ|魔力量|魔力残量|魔力を消費|魔力ゲージ|MP"
    reason: "魔力は基層（substrate）として復活（2026-06-16・基層モデル）。ただしキャラの資源ゲージ化は引き続き禁止——RPG的マナ管理の排除という当初意図（2026-06-12）は維持する。"
    replacement: "魔力は『力の出所』を説明する世界の物理であって管理値ではない（setting_worldview.yaml / mana_substrate.design_rule）。ノルクのコストは生体負荷として描く（setting_magic.yaml / biological_cost）。"
    note: "名詞としての『魔力』『魔導院』『魔導具』『魔物』は基層モデルで正当（referent: setting_worldview.yaml / mana_substrate）。死語は『魔力をゲージ管理する用法』のみ。既知の正当ヒット: setting_worldview.yaml / mana_substrate.design_rule の『魔力切れ』『魔力量』（禁止を定義する側の文）。"
  - pattern: "封魔具"
    reason: "三本柱体系への語彙再定義（2026-06-12）"
    replacement: "破礼具（setting_magic.yaml / harei_tools）"
    note: "既知の正当ヒット: setting_magic.yaml / harei_tools の『旧称「封魔具」を再定義』（再定義を記録する側の文）"
  - pattern: "術式阻害"
    reason: "三本柱体系への語彙再定義（2026-06-12）"
    replacement: "条項告発（setting_magic.yaml / anti_mage）"
  - pattern: "警備隊"
    reason: "組織の引き算で削除——ギルド吸収の歴史的経緯へ統合（2026-06-10）"
    replacement: "冒険者ギルド／灰の斡旋所の組織構造（setting_worldview.yaml / organizations）"
  - pattern: "律神の罰則"
    reason: "罰則概念を神の履歴方式（神が記録し、参照の加護持ちが裁く）へ置換（2026-06-12）"
    replacement: "神の履歴（setting_worldview.yaml / divine_ledger）"
  - pattern: "弱みを握|強制登録"
    reason: "CH01旧稿の構図（脅迫による裏社会登録）を『命の借りは仕事で返す』招きへ書き換え（2026-06-12）"
    replacement: "命の借りを口実にした斡旋所への招き（chapter_01_summary.yaml）"
  - pattern: "傷をつけられない|傷つけられない"
    reason: "『加護持ちには一律攻撃が通らない』前提の不採用（2026-06-12）"
    replacement: "加護は正面の打ち合いでは格上を作るが、位置取り・退路・社会的損得までは守らない"
    note: "対加護文脈のみ問題。人間ドラマの一般表現としての用例は正当（要文脈確認）"
  - pattern: "現場査定官|査定官マーレン"
    reason: "マーレンの再定義——査定官（内勤職）ではなく冷遇の正規冒険者（2026-06-12）"
    replacement: "正規冒険者マーレン。『査定官』という語自体はギルド内勤職として有効"
  - pattern: "魔術そのものは使えない"
    reason: "三本柱体系での主人公定義の語彙変更（2026-06-12）"
    replacement: "加護を持たない（無加護。setting_worldview.yaml / vocabulary.unblessed）"
  - pattern: "episode_index"
    reason: "arc_summary の派生散文層（章の出来事を言い換えた読み下し地図）を廃止——構造的に必ずドリフトするため（2026-06-16の実地証拠）。acts は構造役割 role のみへ骨格化した。"
    replacement: "章→段の束ねは chapter_sequence.csv の episode_id 列、出来事の事実は各 chapter_XX_summary.yaml、カタルシス曲線は arc_summary.yaml / acts（role）"
    note: "CSVの列名・値としての『episode_id』は正当（章→段の束ね台帳）。死語は arc_summary 内の『episode_index』ブロックのみ。"
  - pattern: "密造網|密造薬物|密造工房|精製廃液|廃液投棄|末端組織"
    reason: "ボスを密造網の犯罪ボスから『律神特権を悪用するギルド管理職（特権の傲慢）』へリキャスト（2026-06-16）。不正利得は2026-06-17に『危険な討伐を規定人数以下で下請けに使い潰し費用を着服＋魔獣素材の買い叩き・横流し』の二本立てへ具体化（旧『中抜き型に簡約』を更新）。"
    replacement: "ボスの汚職（規定人数以下の使い潰し＋魔獣素材の横流し）／揉み消し要員／隔離施設・秘匿された案件現場（記述語。固有名詞は置かない）"
    note: "第1アークの本文・サマリーでの密造網系は全て死語。一般語の『精製』『廃液』単体が他文脈で正当に出る場合は要文脈確認。『アジト』も旧密造アジトの残骸として注意（隔離施設へ置換済）。第零機関の旧魔導院痕跡はCH09→CH05（討伐現場の旧施設痕跡。魔獣の壊れ方からは切り離し：2026-06-17）へ移設。"
  - pattern: "汚染魔物|汚染で習性|習性の壊れた魔|壊れた習性|壊れた挙動|残存反射|本能の壊れた|廃液汚染"
    reason: "CH05の魔獣を『汚染で習性の壊れた異常個体』から『獣神の加護で純粋に強い真っ当な獣』へ再設計し、敗因を魔獣の異常から『ボスが規定人数以下で回した編成不足ゆえ教条の規定陣形が組めない』へ変更（2026-06-17）。"
    replacement: "魔獣＝獣神の加護持ちの真っ当に強い獣（setting_worldview.yaml / divine_economy.juushin）。敗因＝規定人数以下で教条の規定陣形が組めず破綻。ノルクは現物の獣の本能を読み窓を作る。第零機関フックは魔獣の壊れ方でなく討伐現場の旧施設痕跡へ（chapter_05_summary.yaml）。"
    note: "一般語『汚染』『廃液』単体は他文脈で正当（要文脈確認）。『原始反射』は健常な獣の自然反射として正当——死語は『残存反射＝壊れた挙動に唯一残った』の用法のみ。"
  - pattern: "act1_setup|act2a_trouble|act2b_fightback|act3_finale|wrong_actions|revelation_or_break|show_evil|try_with_cost|rising_cost|is_midpoint_irreversible|is_finale_embodiment"
    reason: "アークのハリウッド式4幕レンズを撤去し、本作自身のカタルシス曲線（setup→buildup→despair→catharsis＝起承転結）へ移行（2026-06-16）。midpoint=twist要件が危機ドリブンの本作で常に弱く注釈で打ち消す負債になっていたため。"
    replacement: "acts の段＝setup/buildup/despair/catharsis、検証アンカー＝has_irreversible_point（buildup）／has_embodiment_landing（catharsis）。借用は不可逆点と能動的選択の着地の2チェックのみ（ARCHITECTURE 2.3）"
    note: "一般語の『midpoint』『setup』単体は対象外（フィールド名としての旧4幕バケツ名のみ死語）。template/arc_summary は移行済み、ヒットは旧アーク草案の残骸を示す。"
  - pattern: "公言した公正|自滅待ち|黙れ、濁り血"
    reason: "第1アークのボス『無謬の権威』の攻略を、旧設計（消失要件＝公言した公正をボス自身に踏み抜かせ律神判定で加護を自壊させる＝自滅待ち）から、確信崩しの連携必殺（却下の燃料＝保持者の確信・余裕を三波で砕き、セリファが読んだゆらぎの窓にマーレンの一撃を通す）へ抜本リデザイン（2026-06-16続）。CH16のトリガー台詞『黙れ、濁り血がっ……！』も連携必殺化で廃止。"
    replacement: "確信崩し経路（setting_magic.yaml / anti_mage.combat_style）。無謬の権威＝余裕（無謬の自己像）依存、確信が砕ければ加護が揺らぐ。攻略は三波＋ゆらぎ観測＋マーレンの一撃（arc_summary.yaml / sub_catharsis・chapter_16_summary.yaml）。"
    note: "【重要・温存】『要件自壊』『条項告発』『消失要件／弱体化要件の二階層』モデルそのものは死語化しない——後アークで論理的要件型の固有加護に対して温存・初出する正規メカニズム（concept.yaml / catharsis_engine.execution の要件自壊部・setting_magic.yaml / anti_mage）。死語なのは『第1アークの無謬の権威を要件自壊（公言した公正の踏み抜き・自滅待ち）で攻略する』という旧設計の適用のみ。/ 一般語『儀礼的体面』はパターン登録しない（一般語として正当）——ただし第1アークのボス戦で旧用法（儀礼的体面＝弱体化要件）が残っていないかは文脈確認の対象（余裕の観測対象に再キー。遮断結界は2026-07-05に波形監視機構ごと完全削除＝下記エントリ参照）。/ 既知の正当ヒット（移行を記録・対比する側の文＝CH09前例と同様に正当）: chapter_10/16_summary.yaml の『自滅待ちではない／自滅待ちでない』、chapter_13/16_summary.yaml の『旧稿の隠蔽結界…前提は不要』『要件自壊＝自滅待ちは撤去』。"
  - pattern: "無謬の自己像|確信崩し|固有加護『無謬の権威』"
    reason: "第1アークのボスの加護を『個人の固有加護（燃料＝無謬の自己像の確信・余裕）』から『座の加護（官職装置・制度憑依）』へ再設計（2026-07-02）。燃料は自己像でなく座との癒着（『私は制度そのものだ』という接続の自明性）、攻略は確信崩しでなく認識崩し（『制度はお前を守らない』を三波で分からせて癒着を断つ）。動機＝二層化despairで読みのゲームが3章紙面に出るため、初手で当たる答え（傲慢の確信）では意外性が持たない——安い仮説はCH12で実地に殺す設計へ。"
    replacement: "座の加護『無謬の権威』（setting_worldview.yaml / blessing_types.seat）／燃料＝座との癒着・接続の自明性／攻略＝認識崩し（setting_magic.yaml / anti_mage.combat_style）／ゆらぎ＝座との接続のゆらぎ。"
    note: "表層描写としての『余裕』『確信』『儀礼所作』は正当（観測対象の外形）。死語は『自己像そのものが加護の出力源』という旧説明と『確信崩し』の攻略名のみ。無加護がランク外＝却下対象外の補助則も blessing_types.seat 弱点②が正本。"
  - pattern: "無双|圧倒されて敗北"
    reason: "L1に残っていた旧草案（2026-06-09『蹂躙による無双カタルシス』採用時）の無双プッシュを撤去し、コンセプトの核を『工夫＋綱渡りの決着×誤認ギャップ』へ正した（2026-07-02。なろう前提が売りを歪めているというユーザー判断）。無双・蹂躙は章・アークの標準決着ではない。"
    replacement: "敵は自分の理屈の内側で詰まされ再構成不能のまま敗北（concept.yaml / catharsis_engine.reaction）／綱渡りの決着（同 priority_rule）。蹂躙は観測者ラベルのみ——超火力を縦の報酬軸の頂点に置く旧設計は2026-07-05に撤去（下記『切り札＝超火力』エントリ参照）。"
    note: "『蹂躙』は死語にしない——観測者から見たラベルとして再定義して温存（ARCHITECTURE 2.3 曲線段名・arc_summary の sub_catharsis 等は正当）。作中人物・風評が『無双』を口にする誤読者の声としての用法も正当（要文脈確認）。characters.yaml の狂信者台詞『力で蹂躙してくれる』・誤読ラベル『格の違いだけで退かせた』・マーレンが蹂躙される側の用法は勘違いエンジンの部品＝正当。"
  - pattern: "グリム"
    reason: "ノルクのコードネーム読みを命名規則（ノルド語ベース・setting_worldview / naming_rules）に合わせ『スカック』（skakkr＝歪んだ・調子外れ）へ置換（2026-07-02）。グリムは独語圏の響きでレジスタ違反だった。"
    replacement: "《不協和音》-スカック-（characters.yaml / nork・naming_rules / term_notation）"
    note: "一般語・他人名としての『グリム』は現状使用なし＝ヒットは旧読みの残骸。_workspace の旧ドラフト・草案（squad_roster_draft 等）は対象外。"
  - pattern: "依存の萌芽|依存の芽|依存の超早期種|力への依存|心酔|崇拝|神格化|妄信|救世主"
    reason: "マーレンの終着点を『心酔する信奉者』から『ノルクの危うさ（綱渡り）を見抜く対等なバディ＋最終的に自前の力を解放する自立』へ統一（2026-06-11決定。台帳未登録のまま旧稿のCH09『力への依存の萌芽』が生き残り、2026-06-16にCH05へ波及・前倒ししかけた残骸をユーザーが検出）。マーレンがノルクの力に頼る『依存』も、対等バディ／自立方向の設計に反するため off-design。"
    replacement: "マーレン＝教条の外の流儀が効くと認め危うさに勘付く（step2『認める』）→役割分担し打算の言い訳を翻訳・訂正する役（step3『委ねる』）→自前の力の解放（step4）→自分の判断で正しさを選ぶ自立（step5）。characters.yaml / marlen growth_roadmap・concept_relation。妄信・神格化・崇拝の役割は後輩ファン枠と狂信者バーサーカーに温存（そちらの文脈なら正当）。"
    note: "【正当ヒット】マーレンの internal_flaw『教条への依存／教条依存』は彼女の中核の誤闘でありこのパターンの『依存』とは別物——『教条依存』『教条への依存』は除外（grep時は文脈確認）。『崇拝・神格化・妄信・救世主』は後輩ファン枠・狂信者バーサーカーに用いる分には正当。死語なのは『マーレンがノルク（の力）に対して抱く心酔・崇拝・神格化・依存』の用法のみ。"
  - pattern: "丸腰の便利屋|丸腰便利屋|丸腰同然|得物は短剣・寸鉄"
    reason: "ノルクの武装再設計（2026-07-03・人間決定）——CH01の丸腰設定を廃止。得物＝使い古した軍用の片手剣（頑丈さだけが取り柄の無銘の実用品・補助に寸鉄）。丸腰では暗殺者の剣を数合防ぐ攻防に無理があった。"
    replacement: "使い古した軍用の片手剣＋補助の寸鉄（正本＝characters.yaml / nork combat_style / output_hook.appearance）"
    note: "死語なのは『ノルクを丸腰・短剣主体と書く』用法のみ。他キャラ・比喩・非ノルク文脈の『丸腰』は正当（要文脈確認）。暗殺者ヴィクテルの『夜の得物は短剣』は別キャラ設定で正当。"
  - pattern: "冷血漢の誤認|二重勘違い|二重の誤読"
    reason: "冷血漢誤認をL1看板（logline・絡まれエンジン）から降格（2026-07-05・序盤ドラフト実態への同期）。ドラフト実証：打算の言い訳は行為で読む観測者（スィグナ）には通らず『底知れなさ』へ合流する＝CH01で成立する誤認は強者誤認一本。冷血漢誤読は『言葉を額面通り受け取る観測者』（第1アークではマーレンのみ・CH06初形成）に限定発火する関係軸装置として存続。"
    replacement: "絡まれエンジン＝強者誤認一本（concept.yaml / logline）。人柄のズレ＝観測者依存の装置（characters.yaml / nork misunderstanding_gap 2026-07-05再定義）。"
    note: "【温存】『冷血漢誤読』（対マーレン装置。CH06/12/13/14/15/17正本・reader_knowledge）は正当——死語は『冷血漢の誤認』を絡まれエンジン・CH01成立として書く用法と『二重勘違い／二重の誤読が同時に機能』の枠組みのみ。既知の正当ヒット: chapter_06_summary の『力と計算の二重誤読』（マーレン一人の中では力＋計算の二重が実際に成立する＝観測者内の記述として正当）、06_draft_output/chapter_01/scene_02_draft の旧セルフパス・改稿ログ内の『二重勘違い』（履歴記録・書き換えない）。"
  - pattern: "底辺手配屋|所属の手配屋|手配屋として"
    reason: "ノルクの役割語のドリフト是正（2026-07-05）——序盤ドラフトの自称・他称は一貫して『便利屋』『下請け』。『手配屋』は灰の斡旋所（店・稼業）の呼称であり、ノルク個人の役割語には使わない。"
    replacement: "下請け便利屋（characters.yaml / nork role）。店・稼業を指す『手配屋』『手配師』は setting_worldview.yaml / ash_rogue が正本。"
    note: "『手配屋』が斡旋所・スィグナ側（店・仕切り・稼業）を指す用法は正当（setting_worldview / ash_rogue、CSV『手配師の起点』等）。死語はノルクの役割語としての用法のみ。"
  - pattern: "超火力|砲撃遺技|砲口触媒|神なき神業"
