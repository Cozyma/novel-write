      rule: "美貌はノルクの打算フレームで一言（『顔は値札。読むのは目つき』系）に留め、カタログ描写しない。"
    speech_rule: "飄々・現実主義・義理堅い。大人の余裕がある口調。"
    dialogue_samples:
      - "正規は嫌がる。こっちで先に回す"
      - "早い話はここで決まる"
      - "たまたまを重ねられるのが腕ってもの"
      - "期待してる"

viktel:
  base:
    name_ja: "ヴィクテル"
    naming: "víg（戦い・討ち果たすこと）＋týr（神）のアレンジ合成＝『戦神のもの』。日本人可読の音へ整形（setting_worldview.yaml / naming_rules 準拠。確定 2026-07-02）。vígの『殺し』の含み＝表の信仰と裏の稼業の二重写し。"
    role: "高位冒険者（ギルド上位の実力者枠）——そして夜の稼業では凄腕の暗殺者（CH01でスィグナを襲った男。二重生活）。"
    background: "闘神の加護持ち。加護の要件『強さの実演』を表の顔（高位冒険者としての公の武名）で満たしながら、『見られてはならない』夜の稼業を回す——二重生活は趣味でなく加護が強制する生存構造（chapter_01_summary / 撤退の天秤 参照）。CH01でノルクに退路ごと読まれて職業判断で撤退し、CH03で表の顔として再会——互いに正体を伏せたまま黙契を結び、『公認』という保険を掛けた。"
    combat_style: "闘神の加護＝速度・反応の超強化（経路を先読みして退路に先回りする、場を支配する質の速さ）。夜の得物は短剣。闇討ちでも滲む『見せる剣』の癖（実演文化の名残＝CH01でノルクに読まれた三点の一つ）。"
  story_hooks:
    want: "表の武名と夜の稼業、二重生活の維持。露見は面子でなく加護の生命線（実演の場）の喪失＝生存問題。"
    internal_flaw: "『見られてはならない』掟と『見られて示す』加護要件の矛盾を縫い合わせて生きている——縫い目を突かれると弱い（CH01の敗因。本人はそれを見事な一手として恨みなく認めた）。"
    concept_relation: "【驚き】を駆動——実力者公認（CH03）で神話を公式化する装置。以後は『ノルクの正体を知る唯一の男がギルド中枢に常在する』という緊張の供給源（公認という名の監視・黙契の均衡）。恨みなき職業人としてノルクを面白がる実力者枠。"
  output_hook:
    appearance: # 視覚タグ（運用は SELF_REVIEW §3c【外見描写の運用】）
      tags: "研がれた剣をそのまま人の形にしたような端正な武人（思ったより若く、人好きのする顔）／軽い実戦装備・飾り気のない使い込まれた長剣（着飾らない＝強さが正装）／無駄のない歩き方・重心が右に乗る癖（CH01の照合点）"
      rule: "格は威圧でなく『場が沸く』人気で描く——**ボスとの差別化（2026-07-02）**：ボス＝律神の静的権威（周囲が静まる・慇懃・文官服）／ヴィクテル＝闘神の武人（周囲が沸く・気安い・実戦の端正さ）。礼節・品位の語彙で叱らせない（律神の文法）——強さの文化で振る舞わせる。"
    speech_rule: "武人の気安い余裕。一人称は『俺』。恨みや凄みを見せず、面白がりで話す。含みは一枚だけ（言い切らない）。笑いは喉の奥で短く。叱るときは礼節でなく強さの文化で（『稽古をつけてやる』）。"
    dialogue_samples:
      - "なんだ、楽しそうだな。混ぜろよ"
      - "暇なんだろう？　なら稽古をつけてやる。実戦形式で"
      - "俺は物覚えがいい方でね"

