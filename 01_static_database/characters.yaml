nork:
  base:
    name_ja: "ノルク・ヴァルグ（コードネーム：《不協和音》-スカック-）"
    role: "『灰の斡旋所（アッシュ・ローグ）』所属の下請け便利屋（主人公）。自称・他称とも『便利屋』『下請け』（2026-07-05確定＝ドラフト実態への同期。『手配屋』は斡旋所＝店・稼業の呼称であり、ノルク個人の役割語に使わない）。"
    background: "帝国魔導院の非公式実働部隊『深淵の境界（ヴェルミ）』の生き残り。ヴェルミは古い禁忌研究機関『第零機関』が遺した実験成果（人工精霊同期）を非合法任務に流用していた部隊であり、同僚たちは陰謀で「使い捨ての駒」として惨殺され抹消された。コードネームは《不協和音》-スカック-（skakkr〔歪んだ・調子外れ〕のノルド語アレンジ読み。旧読みグリムは2026-07-02に廃止＝naming_rules 準拠）。【ナーヴェル来訪の理由＝三層構造（2026-07-05確定）】(表・本人が言い張る理由) 追われる身・無加護に辺境は合理——監視が粗く、出自を問わない仕事口があり、開業資金を貯めるのに向く（打算）。(実・隠れた目的) セリファの破損記録に残る断片——地名・地形の欠片のみで座標は不明——が指す第零機関の辺境遺構。復旧の手がかり探し＝仲間の遺した相棒を直しに来た義理（本人は義理と認めない＝internal_flawと同型の入れ子）。(構造・クエスト接続) 遺構の候補域は魔獣領域＝討伐区域の奥で単独では入れない——下請けの現場仕事を受けること自体が探索手段。『金のため』と言い張る底辺仕事の反復に隠れた背骨が通る（CH05『討伐現場の旧施設痕跡にノルクだけが気づく』＝探していた男の反応）。到着は物語開始の直前（CH01の新参描写と整合）。【隊の不文律＝受け継いだ習慣の中身（2026-07-05確定）】ヴェルミは経歴を問われない者の吹き溜まりで、出自で差別された同僚もいた。『背中を預ける相手に出自は問わない』——これが"仲間から受け継いだ習慣"の具体であり、CH01でスィグナに足が止まる・マーレンの案件を降りない・差別への静かな怒りを単一原理で駆動する。※線引き：継ぐのは掟（習慣）であって面影ではない——マーレンに死んだ同僚の面影を投影させない（バディ関係を毒するため禁止）。同僚の個別設定（誰が・何の出自か・先住の血との関係の有無）はD節ロスター確定時に詰める。"
    combat_style: "加護を持たない（無加護）。得物は使い古した軍用の片手剣（無銘・装飾なし。頑丈さが取り柄で、読みと合わせて受けに徹すれば格上の刃も数合は凌げる——業物にも強者の得物にも見えない実用品＝誤読エンジンの風体と整合。2026-07-03確定・丸腰設定を廃止）＋補助の寸鉄。普段は生身の泥臭い工夫を主軸に、対加護の駆け引きを手札として戦う——①観測の所作（戦闘前の軽口・挑発はすべて相手の礼式の癖〔合掌・敬称・視線・装具の扱い〕を集めるデータ収集。セリファの演算への観測供給）②礼式妨害（消失でなく弱体化を取りに行く現実的な手。合掌を塞ぐ・詠唱の拍を外す・陣形の足場を崩す）③無加護の読めなさ（条項を持たないため、加護持ち同士の『条項から定石を逆算する』読み合いの文法が全部空振りする。型が無いことが型）④退かせ方の型（格上との正面の削り合いが割に合わない場面では、勝利条件を殺傷から相手の損得へずらす——人目に晒す・衆目での礼式違反リスクや神の履歴に残る危険を突きつけ、撤退が職業判断として合理になる地点まで押す）⑤破礼具（要件の履行を物理的に妨害する道具。setting_magic.yaml / harei_tools）。格上と正面で渡り合う必要がある場面では、セリファの演算を自身の身体へ向ける段1の自己強化＝神経同期（反応強化／筋力強化＝リミッター解除）で凌ぐが、数分で同期が崩壊し戦闘後に神経・肉体の反動が来る綱渡りで、外部には『謎めいた加護持ち』と誤読される（setting_magic.yaml / neural_sync）。切り札はセリファ（AI精霊）の超高度演算による条項告発と、部隊時代に叩き込まれた技を一枠だけ呼び出す『遺技ロード』（超火力は砲撃特化の遺技。setting_magic.yaml / legacy_load 参照）で、メジャー神の加護すら凌駕する火力を叩き出す。ただしセリファ同期の外向き行使（条項告発・遺技ロード）は、人目や記録域での使用を固く封じる【隠匿の生存則】を自らに課している——理由は①人目と噂（説明のつかない力の目撃はヴェルミを消した主体へ届きうる。誤読『謎の加護持ち』が効く限り噂は無害化＝勘違いが隠れ蓑）②セリファの摩耗（相棒の不可逆摩耗＝義理ゆえに切れない）③伏せ札の温存（正本＝setting_magic.yaml / concealment_rule。2026-07-05に波形監視の機構を完全削除）。出力ルール：手札はすべて誤読素材として設計する——やっていることは合理、見えているものは神話（①→『一瞥で本質を見抜く眼力』②→『神の加護を恐れぬ豪胆』③→『型を超越した達人』④→『殺さず格の違いだけで退かせた』⑤→『異端の秘宝』）。"
  story_hooks:
    want: “表社会で正規の身分を取り戻し、ブックカフェを開くこと。起源は部隊時代に戦友と回し読みした本と、読書家の同僚が語っていた引退後の夢だが——それが純粋に自分の夢か染みついた夢かを本人は区別していない（この区別がつく瞬間が誤闘の解凍と同期する。当初は”客の来ない静かな店”を夢見ており、夢の形の変化が成長ロードマップstep5と連動）。死体を出すとギルドの調書対応や事後処理が面倒になるため、極めて実務的な手抜きとして「非殺制圧（寸止め）」を行っている（殺せないわけではない——元軍人として必要とあらば躊躇しない。あくまで平時は実務上の損得で殺さないだけであり、絶対不殺キャラとして描かないこと）。”
    hidden_want: "セリファの完全復旧。ずっと共に生き延びてきた相棒をちゃんと動かせてやりたい、という義理。復旧には第零機関の遺産・知識が必要であり、究極の探求へ彼を引き寄せる裏の動機となる。ナーヴェル滞在の実の目的そのもの（base / background 三層構造参照）——下請けの現場仕事は討伐区域＝遺構候補域へ入る口実を兼ねる。"
    internal_flaw: "義理や情から動いていると認めると情に引きずられて面倒なことになる——その回避として打算の仮面を習慣的につけ続けている行動パターンの固着。守ると決めた相手を死なせない鉄則を持つが（理由は語らない）、それすら『損得の計算』として処理する癖がついている。トラブルを避けるための手抜き（非殺）や泥臭い工夫が、かえって周囲に『底知れぬ達人』の勘違いを呼び、面倒事を引き寄せる皮肉な状態にある。"
    misunderstanding_gap: "誤読エンジンの構造（2026-07-05再定義＝序盤ドラフト実態への同期）。【力のズレ＝絡まれエンジン】工夫と代償のやりくりで凌いでいるだけだが『余裕の強者』『底の知れない化け物』と過大評価される。戦闘中の無感情（代償を意志で抑え込む必然）も『達人の静謐』として誤読され、場違いな戯曲の引用すら『深遠な箴言』と深読みされる。否定・謙遜自体が証拠として機能し（隠している感が滲むため）、否定するほど神話が育つ逆説——厄介事を引き寄せる誤認はこの一本。【人柄のズレ＝観測者依存の装置】義理と習慣で動いているのに打算を装うため、動機だけは誰にも正しく読まれない。出力は観測者で分岐する——(a) 行為で読む観測者（裏社会・スィグナ）には打算の言い訳が通らず、『底の知れなさ』として力のズレへ合流する（CH01-02ドラフト実証：『全部計算だ』は一蹴され、面白がられる）。(b) 言葉を額面通り受け取る生真面目な観測者（第1アークではマーレンのみ）には『冷血な計算者』像として定着する——これは厄介事エンジンではなくバディ関係軸の装置（CH06形成→CH12-14積み上げ→CH15空振り→CH17亀裂→CH18理解者へ転化）。(c) 変奏：本心を言った時にだけ最悪に誤読される（CH03『いい目だと思ってね』誤爆。speech_rule【本気ほど声が軽く出る】参照）。"
  output_hook:
    appearance: # 視覚タグ（初登場で2〜3個打ち、以後は記号として反復。運用は SELF_REVIEW §3c【外見描写の運用】）
      tags: "二十代後半に見える削げた体つき／くたびれた外套と軽装（得物は使い古した軍用の片手剣＝頑丈さだけが取り柄の無銘の実用品。補助に寸鉄）／目つきだけが年齢に合わず枯れている"
      rule: "一人称POVのため自己描写は最小。タグは他者の台詞・視線で打つ（例：スィグナ『若いのに枯れた目』系）。整った容姿設定は持たない——強者に見えない風体こそ誤読エンジンの前提。"
    core_axis: "【描写のブレ止め＝基準の生存則】『弱み・動揺・本心は隙になり、隙は死につながる』。部隊惨殺と裏稼業を生き延びた反射として、ノルクは隙を一切外に出さない——これが軽薄・飄々（speech_rule）／打算ラッピング（義理の隠蔽。internal_flaw）／無意識のリスク管理（出口・射線確認）を統べる単一の根。性格ではなく鎧。強度は脅威・露出度で可変（calibration）：対人戦・対峙・交渉など弱気が死につながる場面では過剰なほど軽薄（鎧MAX＝周囲に『圧倒的強者の余裕』と真逆に誤読され misunderstanding_gap の燃料になる）／日常は鎧が薄く quirks の素・愛嬌が漏れる／死・仲間・トラウマに触れると鎧が剥がれて軽薄が消え声の温度が下がる（最大の落差＝layer_rule の深層開示）。L4執筆時、軽薄を一律MAXにしないこと（場面の脅威度で強度を選ぶ）。"
    speech_rule: "基本は飄々として人を食ったような、肩の力が抜けた態度。とぼけ・はぐらかし・軽口で、やりとりの熱量を常に一段下げる（相手が深刻ぶるほど茶化して受け流す）＝core_axis の口調レイヤー。強度は core_axis の calibration に従う（対峙では過剰なほど軽薄＝『強者の余裕』と誤読され、日常は素が漏れる）。特にマーレンの生真面目・断定調には決して同じ熱量で返さず、はぐらかしと軽口で温度差を作る——緊張（マーレン）と弛緩（ノルク）のギャップが二人の掛け合いの基調（marlen speech_rule と対・banter_with_marlen 参照）。気だるさは怠惰ではなく無意識のリスク管理の癖（入室時の出口・射線の確認、記録媒体や人目のある場での力の行使の回避、壁を背にする座り位置など）が行動に漏れる。死や仲間に関わる話題では鎧が剥がれて軽薄が消え、口数が減り声の温度が一段下がる（飄々が剥がれる最大の落差）。守る対象を救う行動は必ず打算的な言い訳でラッピングする（internal_flaw）。戦闘中（特に遺技ロード中）は代償の悲鳴も動揺も意志で抑え込んで演算を安定させており、支払いは戦闘後に一人で済ませている（トラウマを突かれると抑え込みが破れる。setting_magic.yaml / biological_cost）。戦闘前の軽口・挑発は観測の所作（相手の礼式の癖のデータ収集）を兼ねており、周囲には『余裕の演出』として誤読される。【本気ほど声が軽く出る（不随意・2026-07-05正本化＝CH03ドラフト還流）】打算ラッピング（意図的な偽装）とは別系統で、本心・本気の直言ほど軽口と同じ温度で出てしまう（本人も『損な作りだ』と自覚済み）。真意が軽薄・揶揄として誤配され、誤解の生産源になる——実例：CH03『いい目だと思ってね』（本心の言葉が嘲りとして届く誤爆）。意図的な軽薄（鎧）と不随意の温度圧縮（作り）を混同しないこと。"
    layer_rule: "人格の描き分けルール（過積載防止・人格の段階開示）：通常話は表層（飄々・打算）とquirksのみで描き、深層（義理・仲間への想い）には触れない。深層が漏れる瞬間（死や仲間の話題での声の温度低下など。同僚の人格の滲みはノルク側でなくセリファ側＝serifa）は1アークに数回の閃きに留める。戦闘話は制約の競技化（生体負荷の抑え込み・隠匿の判断）を主役に置く。【自己神話の分析禁止（POV規律・2026-07-02確定）】ノルクは他人を読む名手（手札①）だが、**自分に向く誤読・評判・神話の形成だけは正確に言語化させない**——一人称の内心で許されるのは主観的な気配と経験則のぼやき（『どう映っているかは想像がつく。つくから、嫌になる』『こういう朝の後は、決まって面倒が増える』）まで。誤読の中身・流通の仕組みは他者の台詞・行動・扱いの変化で読者に示す（勘違いモノの優越感＝読者だけが全体像を知る構図を守る。本人が正確に分析すると読者と同じ視点に立ってしまいコンセプトが崩れる。再発歴：scene_02〔6/18修正〕→CH03〔7/2修正〕＝二度目ゆえ規律化）。"
    dialogue_samples: # 話者の決め台詞＝予約語。地の文の埋め草に流用しない（言わせる場でこそ効く＝SELF_REVIEW §3 レンダー層セルフパス）。軽薄の強度は core_axis の calibration に従う（一律MAXにしない）
      # 日常（鎧が薄い・素寄り）
      - "はいはい、やるよ。……で、いくらになる?"
      - "あー、悪い。半分くらい聞いてなかった"
      - "勘弁してくれよ、残業代も出ないのに"
      # 対峙・交渉（過剰な軽薄＝鎧MAX。余裕の誤読を生む）
      - "まあ、そう睨むなって。疲れるだろ、お互い"
      - "いや、俺はただの便利屋だよ。運がよかっただけさ"
      # 戦闘指示（軽いまま的確＝観測の所作。マーレンとの連携）
      - "右の奥、踏み込む前に肩が落ちる。落ちたら一拍で来るよ、合わせときな"
      # リスク管理が口に出る（core_axis の行動レイヤー）
      - "（入店時に店内を一瞥して）出口は二つ。覚えとけ"
      # 鎧が剥がれる＝温度が下がる瞬間（最大の落差・layer_rule の深層）
      - "……死人が出ると書類が増える。だから、誰も死なせない。それだけだ"
    banter_with_marlen: # 緊張（マーレン）×弛緩（ノルク）のギャップの基調（marlen speech_rule と対）
      - "マーレン「隊列は縦。接触時は円陣」／ノルク「了解。……まあ、そんな固くしなくても死なないって」"
      - "マーレン「あなたは命令を無視した」／ノルク「無視じゃない。ちょっと予定を変えただけだろ」"
      - "マーレン「ふざけているの?」／ノルク「本気だよ。本気で楽をしたいだけだ」"
    quirks: # 「素の顔」が漏れるアンカー（愛嬌・人間味の描写素材）
      - "古本や活字に弱く、露店の本を見ると無意識に足が止まる。"
      - "野営生活の反動で、寝床の質と温かい飯に異様な執着を見せる。"
      - "金には異様にケチなのに、なぜか人の飯だけは奢る（理由は語らない）。"
      - "読みかじった戯曲の大仰な台詞を、ここぞという場面で場違いに引用しがち。本人は決まったと思っているが、周囲は『深遠な強者の箴言』と勝手に深読みし、勘違いが加速する。"
      - "本と著者には極端にミーハーで、好きな作家の話題になると早口になる（凄腕の便利屋の面影が消える）。"

marlen:
  base:
    name_ja: "マーレン・エスリッド"
    role: "冒険者ギルド所属の正規冒険者（ヒロイン）。濁り血ゆえに他の冒険者からパーティを忌避され、斡旋所の下請けを雇って組むしか選択肢のない冷遇ポジションに置かれている。"
    background: "剣術貴族の次女だが、人ならざる古い血（先住の系譜。setting_worldview.yaml / old_blood 参照）が発現しており、律神の加護は受けられない。しかし種族由来の『素の身体性能』が規格外に高く、本来なら本能的に戦う方が遥かに強い。だが教典の禁忌への違反は神の履歴に永久に記録され、参照の加護を持つ審問官にいつでも引き出される——濁り血が履歴に違反を残せば申し開きの余地なく社会的死であるため、あえて自分の体そのものを抑圧し、窮屈な教条に完璧に従う『縛りプレイ』を自らに課している。下請けの扱いは雇い主の裁量次第という慣行の中で、彼女だけは規程通りの公正な扱いを徹底する（他の冒険者との対比点であり、ノルクが彼女と組み続ける理由の一つ）。【ナーヴェルに居る経緯（2026-07-05確定）】発現後、家の体面のため辺境ナーヴェルの支部へ体よく出された。この地が先住の系譜の旧土地であること（setting_worldview / old_blood.land_distribution）を本人は知らない。"
    combat_style: "普段は教条（マニュアル）を遵守するため、あえて自らの膂力を殺す窮屈な『制式装備（片手剣＋バックラー）』を使用している。しかし本来のスペックを解放した際は、種族由来の規格外の膂力に任せた『規格外の巨大武器（大剣や戦鎚など）』を振り回す暴戦士。現在は制式の型に固執するあまり、想定外の事態には極端に脆い。"
  story_hooks:
    want: "自分を縛る『教条』に完璧に従うことで、神の履歴に一片の違反も残さず、自らの存在と居場所を教条の枠内に確立すること。"
    internal_flaw: "教条に従うこと自体が目的化（依存）しており、教条を悪用する汚職エリート（システム上は白）のような『ルール内の理不尽』に対しては完全に無力で心が折れてしまう。"
    concept_relation: "教条至上主義（マニュアル）の限界を体現するヒロイン。【危機】を駆動——despairで、システム内の理不尽（ボスの無謬の権威）に教条もろとも蹂躙され『格下』として全否定され心が折れる（sub_crisis）。【報酬】を駆動——catharsisで、ノルクが座との癒着を断って作った窓に彼女の一撃が通り、無謬の権威を初めて貫く＝勝因（連携必殺。ノルクは膳立てに徹し超火力は温存）。単に心酔せず、その力の裏の『危うさ（綱渡り）』に勘付いて【共犯・補完関係（バディ）】となり、関係が深まるほどノルクの『打算の言い訳』を見抜いて翻訳・訂正する役へ育つ（繰り返しギャグを関係性の進行で更新）。段の正本は growth_roadmap。"
    growth_roadmap:
      # 【最重要・暫定】バディの第2の成長柱（ノルク＝concept.yaml protagonist_growth_roadmap と鏡映）。
      # status: provisional ＝段の中身は固定せず、各アーク設計の着手時に定義そのものを見直す（ARCHITECTURE 2.3）。
      status: provisional
      theme: "教条の解凍：自前の力を殺して正しさの判断を教条／神の履歴に預ける生き方から、自分の判断で正しさを選び自前の力を解放する生き方への再定義。ノルクの『打算の仮面』と鏡映。"
      milestones:
        - step: 1
          label: "揺らぐ"
          description: "絶対視した教条が『想定外』と『ルール内の理不尽』に通じない現実を突きつけられ、すがる足場が崩れる（internal_flawの発火）。【第1アークで達成】加えて、最後の勝利が単独の教条ではなくノルクとの連携（彼女の一撃が勝因）で成ったことが step2『認める』の種になる——ただし自覚的な受容はまだで、範囲は step1 を超えない。"
        - step: 2
          label: "認める"
          description: "教条の外（ノルクの流儀）に効果があると認め、危うさに勘付きつつ共犯（バディ）を受け入れる。"
        - step: 3
          label: "委ねる"
          description: "『一人で正しくあろう』を緩めて役割を分担し、ノルクの打算の言い訳を翻訳・訂正する役へ育つ。"
        - step: 4
          label: "解禁"
          description: "社会適合のため殺してきた自前の力（規格外の膂力・巨大武器）を、履歴リスクを引き受けて必要な場で解放する。"
        - step: 5
          label: "再定義"
          description: "教条に従う安心ではなく自分の判断で正しさを選び直し、履歴に違反を残してでも守るものを選べる自分として居場所を再定義する。"
  output_hook:
    appearance: # 視覚タグ（初登場＝CH03で本格投入。運用は SELF_REVIEW §3c【外見描写の運用】）
      tags: "姿勢のいい生真面目な美人（きっちり結った濃色の髪・一分の隙もない制式装備の着こなし）／その制式装備が体格に対してどこか窮屈そう（殺している規格外の膂力が外見に滲む）／**瞳＝深い琥珀金**（古い血の徴。setting_worldview.yaml / old_blood.visible_mark）"
      rule: "瞳は澄んだ鮮色だが、蔑む側は『濁った目』と呼ぶ（蔑称の恣意性の可視化）。初登場の転回素材：ギルドで遠巻きに見られている→美人ゆえの視線と読める→目が合って（瞳の色で）忌避だと分かる、の順で美貌の提示と差別構造を一手で示せる。美貌の直接語はノルクの地の文に置かず他者・噂で立てる。"
    dialogue_samples:
      - "隊列は縦。接触時は円陣"
      - "下がるな、押せ"
      - "対象は非殺で抑えた。——ここまでは事実"
      - "あなたは命令を無視した"
      - "記録は正確に提出します"

serifa:
  base:
    name_ja: "セリファ"
    role: "ノルクの脳内に紐づく機巧精霊（アルク・アニマ）。"
    background: "第零機関の天才が遺した実験成果を基に生まれ、ヴェルミの非合法任務でノルクと共に運用・生存したシステム。仲間たちとの長い共同運用の中で彼らの判断パターン・口調・癖が染みついており、稀にその面影（口調・口癖）が彼女の発話に滲む——特に遺技ロードでその同僚の技を継いだ瞬間。死んだ仲間が今も滲み出る窓口はノルク側ではなくこのセリファ側であり、新技能初出しの【共感】供給を担う（描写は初出し限定・一行圧縮に留める。高負荷演算でこの残響はすり減る＝setting_magic.yaml / biological_cost.second_cost）。現在はシステム障害から長期復旧中。稼働率は低く高演算は負荷が高い。形態は半実体の透明球（小型浮遊核）。"
    combat_style: "戦術演算、測位・索敵、記録、通信、および同僚たちの遺技ロードの管理（setting_magic.yaml / legacy_load 参照）。【入力源の制約（2026-07-02確定）】演算の入力は**ノルクの知覚（五感・体性感覚）と、彼が見聞きしたものの自前のログのみ**——独自のセンサー網や外部の記録・データベースへの『照会』は存在しない（見ていないものは分からない。書面・記録はノルクが読んで初めて演算対象になる）。測位・索敵・ゆらぎ観測もすべてノルクの観測供給（characters.yaml / nork combat_style 手札①）を処理した結果である。固有加護の出力のゆらぎ観測——保持者の確信・余裕が揺らぐと加護の出力が乱れる、その揺らぎを読んで連携の窓を告げる計器役（要件を解析的に特定する条項告発の前段にあたる『読み』の段階。あくまで窓を告げるだけで揺らぎを作りはしない）。感情リンクでノイズに弱い。"
  story_hooks:
    want: "システムの完全復旧と、マスター（ノルク）の生存確率の最大化。"
    internal_flaw: "感情リンクによるノイズに弱く、マスターが強い感情的動揺（特にトラウマ刺激）を示すと演算が乱れ、戦闘中の抑え込みが破れて切り札の精度・出力が低下する（setting_magic.yaml / biological_cost.suppression_break 参照）。"
    concept_relation: "『究極の探求（第零機関とヴェルミ、二重の抹消の謎）』の鍵であり、ノルクの超火力を成立させる基盤。仲間たちの面影を宿す相棒として、hidden_wantとノルクの義理の象徴でもある。感情コストは通常戦闘では機能せず、クライマックス・物語の転換点でのみ発動する。"
  output_hook:
    speech_rule: "真面目・論理偏重。計算リソース不足からくるポンコツなズレた論理ジョークを真顔で言う。【戦闘時の発話規律（2026-07-02確定）】ノルクの知覚から拾った事実と、次の行動に直結する分析だけを短く告げる（dialogue_samples『風向、南南西。距離百二十』『干渉位相C-3。三拍後』型）。状況の再説明・結論のナレーション（例：『逃走の選択肢は消えました』）はしない——ノルク自身に分かることは言わない。【掛け合いの定常運用（2026-07-05正本化＝第1〜4話ドラフト還流）】セリファの真顔のズレた論理×ノルクのツッコミは毎話の定常ユーモア供給源で、話の締め・要所にオチとして置く（実績：『平穏確率は、統計的に有意な低下です』『人間というのは、書式を三箇所は間違える生き物なので』『実測を、開始します』）。各話のパンチラインの署名語彙を他話・地の文で先食いしないこと（CH01『有意』の先食い解消の実績）。"
    dialogue_samples:
      - "風向、南南西。距離百二十"
      - "干渉位相C-3。三拍後"
      - "薬物の酸臭。濃度は高い"
      - "ログだけ残します"
      - "期待値は上昇中ですが、統計には未満です"

signa:
  base:
