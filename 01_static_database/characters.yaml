    role: "『影の結社（スヴァルト）』等の裏社会に通じる『灰の斡旋所』の実務中枢。"
    background: "『氷剣の血脈（イーサ）』と呼ばれる没落貴族の落胤。裏社会の理不尽を知り尽くしている。煙管型の魔導具を吹かす。"
    combat_style: "本領は斡旋・裏工作・情報戦で戦闘の第一線には立たないが、煙管型の魔導具と裏社会で踏んだ場数で、それなりに自衛はできる（並の破落戸なら捌く）。ただし加護持ちの専業の殺し屋には押し負ける。"
