nork:
  base:
    name_ja: "ノルク・ヴァルグ（コードネーム：不協和音 / グリム）"
    role: "『灰の斡旋所（アッシュ・ローグ）』所属の手配屋（主人公）。"
    background: "帝国魔導院の非公式実働部隊『深淵の境界（ヴェルミ）』の生き残り。ヴェルミは古い禁忌研究機関『第零機関』が遺した実験成果（人工精霊同期）を非合法任務に流用していた部隊であり、同僚たちは陰謀で「使い捨ての駒」として惨殺され抹消された。コードネームは『不協和音（グリム）』。"
    combat_style: "加護を持たない（無加護）。普段は生身の泥臭い工夫を主軸に、対加護の駆け引きを手札として戦う——①観測の所作（戦闘前の軽口・挑発はすべて相手の礼式の癖〔合掌・敬称・視線・装具の扱い〕を集めるデータ収集。セリファの演算への観測供給）②礼式妨害（消失でなく弱体化を取りに行く現実的な手。合掌を塞ぐ・詠唱の拍を外す・陣形の足場を崩す）③無加護の読めなさ（条項を持たないため、加護持ち同士の『条項から定石を逆算する』読み合いの文法が全部空振りする。型が無いことが型）④退かせ方の型（格上との正面の削り合いが割に合わない場面では、勝利条件を殺傷から相手の損得へずらす——人目に晒す・衆目での礼式違反リスクや神の履歴に残る危険を突きつけ、撤退が職業判断として合理になる地点まで押す）⑤破礼具（要件の履行を物理的に妨害する道具。setting_magic.yaml / harei_tools）。切り札はセリファ（AI精霊）の超高度演算による条項告発と、部隊時代に叩き込まれた技を一枠だけ呼び出す『遺技ロード』（超火力は砲撃特化の遺技。setting_magic.yaml / legacy_load 参照）で、メジャー神の加護すら凌駕する火力を叩き出す。ただしセリファ同期の行使は教条システムに『不協和音』の痕跡を残すため、人目や記録域での使用を固く封じる【隠匿制約】を自らに課している（詳細は setting_magic.yaml / dissonance_trace）。出力ルール：手札はすべて誤読素材として設計する——やっていることは合理、見えているものは神話（①→『一瞥で本質を見抜く眼力』②→『神の加護を恐れぬ豪胆』③→『型を超越した達人』④→『殺さず格の違いだけで退かせた』⑤→『異端の秘宝』）。"
  story_hooks:
    want: “表社会で正規の身分を取り戻し、ブックカフェを開くこと。起源は部隊時代に戦友と回し読みした本と、読書家の同僚が語っていた引退後の夢だが——それが純粋に自分の夢か染みついた夢かを本人は区別していない（この区別がつく瞬間が誤闘の解凍と同期する。当初は”客の来ない静かな店”を夢見ており、夢の形の変化が成長ロードマップstep5と連動）。死体を出すとギルドの調書対応や事後処理が面倒になるため、極めて実務的な手抜きとして「非殺制圧（寸止め）」を行っている（殺せないわけではない——元軍人として必要とあらば躊躇しない。あくまで平時は実務上の損得で殺さないだけであり、絶対不殺キャラとして描かないこと）。”
    hidden_want: "セリファの完全復旧。ずっと共に生き延びてきた相棒をちゃんと動かせてやりたい、という義理。復旧には第零機関の遺産・知識が必要であり、究極の探求へ彼を引き寄せる裏の動機となる。"
    internal_flaw: "義理や情から動いていると認めると情に引きずられて面倒なことになる——その回避として打算の仮面を習慣的につけ続けている行動パターンの固着。守ると決めた相手を死なせない鉄則を持つが（理由は語らない）、それすら『損得の計算』として処理する癖がついている。トラブルを避けるための手抜き（非殺）や泥臭い工夫が、かえって周囲に『底知れぬ達人』の勘違いを呼び、面倒事を引き寄せる皮肉な状態にある。"
    misunderstanding_gap: "二重の誤読が同時に機能する。【力のズレ】工夫と代償付き超火力で凌いでいるだけだが『余裕の強者』と過大評価される。戦闘中の無感情（演算ノイズ遮断の必然）も『達人の静謐』として誤読され、場違いな戯曲の引用すら『深遠な箴言』と深読みされる。【人柄のズレ】義理と習慣で動いているのに打算を装うため、冷血な計算者として誤読される——この否定自体が証拠として機能し（隠している感が滲むため）、謙遜するほど神話が育つ逆説に陥っている。"
  output_hook:
    speech_rule: "基本は飄々としていて肩の力が抜けた態度。面倒事は避けたいが、元軍人ゆえの観察眼や乾いた皮肉が随所に漏れ出る。周囲からはそれが「圧倒的強者の余裕」と勘違いされやすい。ただし気だるさは単なる怠惰ではなく、無意識のリスク管理の癖（入室時の出口・射線の確認、記録媒体や人目のある場での力の行使の回避、壁を背にする座り位置など）が行動に漏れる。死や仲間に関わる話題では口数が減り、声の温度が一段下がる（飄々が剥がれる瞬間）。守る対象を救う行動は、必ず打算的な言い訳でラッピングする。戦闘中（特に遺技ロード中）は感情ノイズで演算が乱れるため意図的に感情を殺しており、感情の支払いは戦闘後に一人で済ませている。戦闘前の軽口・挑発は観測の所作（相手の礼式の癖のデータ収集）を兼ねており、周囲には『余裕の演出』として誤読される。"
    layer_rule: "人格の描き分けルール（過積載防止・人格の段階開示）：通常話は表層（飄々・打算）とquirksのみで描き、深層（義理・仲間への想い）には触れない。深層が漏れる瞬間（声の温度低下・同僚の口癖の混入など）は1アークに数回の閃きに留める。戦闘話は制約の競技化（四重コスト・隠匿の判断）を主役に置く。"
    dialogue_samples:
      - "ああ、了解。適当にやっておくよ"
      - "……悪い、聞いてなかった。もう一回頼む"
      - "右後ろ、詠唱してる。三拍で切るから合わせな"
      - "いや、ただの素人だよ。たまたま運が良かっただけさ"
      - "……勘弁してくれ、残業代は出ないんだろ？"
      - "（入店時に店内を一瞥して）出口は二つ。覚えとけ"
      - "……死人が出ると書類が三枚増える。だから誰も死なせない。それだけだ"
    quirks: # 「素の顔」が漏れるアンカー（愛嬌・人間味の描写素材）
      - "古本や活字に弱く、露店の本を見ると無意識に足が止まる。"
      - "野営生活の反動で、寝床の質と温かい飯に異様な執着を見せる。"
      - "金には異様にケチなのに、なぜか人の飯だけは奢る（理由は語らない）。"
      - "ふとした瞬間に、死んだ同僚の口癖が移って出ることがある（本人は無自覚）。"
      - "読みかじった戯曲の大仰な台詞を、ここぞという場面で場違いに引用しがち。本人は決まったと思っているが、周囲は『深遠な強者の箴言』と勝手に深読みし、勘違いが加速する。"
      - "本と著者には極端にミーハーで、好きな作家の話題になると早口になる（凄腕の便利屋の面影が消える）。"

marlen:
  base:
    name_ja: "マーレン・エスリッド"
    role: "冒険者ギルド所属の正規冒険者（ヒロイン）。濁り血ゆえに他の冒険者からパーティを忌避され、斡旋所の下請けを雇って組むしか選択肢のない冷遇ポジションに置かれている。"
    background: "剣術貴族の次女だが、人ならざる古い血（先住の系譜。setting_worldview.yaml / old_blood 参照）が発現しており、律神の加護は受けられない。しかし種族由来の『素の身体性能』が規格外に高く、本来なら本能的に戦う方が遥かに強い。だが教典の禁忌への違反は神の履歴に永久に記録され、参照の加護を持つ審問官にいつでも引き出される——濁り血が履歴に違反を残せば申し開きの余地なく社会的死であるため、あえて自分の体そのものを抑圧し、窮屈な教条に完璧に従う『縛りプレイ』を自らに課している。下請けの扱いは雇い主の裁量次第という慣行の中で、彼女だけは規程通りの公正な扱いを徹底する（他の冒険者との対比点であり、ノルクが彼女と組み続ける理由の一つ）。"
    combat_style: "普段は教条（マニュアル）を遵守するため、あえて自らの膂力を殺す窮屈な『制式装備（片手剣＋バックラー）』を使用している。しかし本来のスペックを解放した際は、種族由来の規格外の膂力に任せた『規格外の巨大武器（大剣や戦鎚など）』を振り回す暴戦士。現在は制式の型に固執するあまり、想定外の事態には極端に脆い。"
  story_hooks:
    want: "自分を縛る『教条』に完璧に従うことで、神の履歴に一片の違反も残さず、自らの存在と居場所を教条の枠内に確立すること。"
    internal_flaw: "教条に従うこと自体が目的化（依存）しており、教条を悪用する汚職エリート（システム上は白）のような『ルール内の理不尽』に対しては完全に無力で心が折れてしまう。"
    concept_relation: "教条至上主義（マニュアル）の限界を体現する存在。彼女がシステム内の理不尽に蹂躙されそうになる所を、ノルクがシステム外の圧倒的な暴力で救済する。しかし、彼女は単に心酔するのではなく「その圧倒的な暴力の裏にある危うさ（綱渡り）」に勘付き、ノルクをシステム内で生き延びさせるための【共犯・補完関係（バディ）】となる。また、関係が深まるにつれノルクの『打算の言い訳』を見抜いて翻訳・訂正する役へ育ち、繰り返しギャグを関係性の進行によって更新する。"
    growth_roadmap:
      # 【最重要・暫定】バディの第2の成長柱（ノルク＝concept.yaml protagonist_growth_roadmap と鏡映）。
      # status: provisional ＝段の中身は固定せず、各アーク設計の着手時に定義そのものを見直す（ARCHITECTURE 2.3）。
      status: provisional
      theme: "教条の解凍：自前の力を殺して正しさの判断を教条／神の履歴に預ける生き方から、自分の判断で正しさを選び自前の力を解放する生き方への再定義。ノルクの『打算の仮面』と鏡映。"
      milestones:
        - step: 1
          label: "揺らぐ"
          description: "絶対視した教条が『想定外』と『ルール内の理不尽』に通じない現実を突きつけられ、すがる足場が崩れる（internal_flawの発火）。【第1アークで達成】"
        - step: 2
          label: "認める"
          description: "教条の外（ノルクの流儀）に効果があると認め、危うさに勘付きつつ共犯（バディ）を受け入れる。"
        - step: 3
          label: "委ねる"
          description: "『一人で正しくあろう』を緩めて役割を分担し、ノルクの打算の言い訳を翻訳・訂正する役へ育つ。"
        - step: 4
          label: "解禁"
          description: "社会適合のため殺してきた自前の力（規格外の膂力・巨大武器）を、履歴リスクを引き受けて必要な場で解放する。"
        - step: 5
          label: "再定義"
          description: "教条に従う安心ではなく自分の判断で正しさを選び直し、履歴に違反を残してでも守るものを選べる自分として居場所を再定義する。"
  output_hook:
    speech_rule: "生真面目で規範至上主義。断定調が多いが内面は激しく揺れている。"
    dialogue_samples:
      - "隊列は縦。接触時は円陣"
      - "下がるな、押せ"
      - "対象は非殺で抑えた。——ここまでは事実"
      - "あなたは命令を無視した"
      - "記録は正確に提出します"

serifa:
  base:
    name_ja: "セリファ"
    role: "ノルクの脳内に紐づく機巧精霊（アルク・アニマ）。"
    background: "第零機関の天才が遺した実験成果を基に生まれ、ヴェルミの非合法任務でノルクと共に運用・生存したシステム。仲間たちとの長い共同運用の中で彼らの判断パターン・口調・癖が染みついており、ときどき面影が出ることがある（描写は初出し限定・一行圧縮に留める）。現在はシステム障害から長期復旧中。稼働率は低く高演算は負荷が高い。形態は半実体の透明球（小型浮遊核）。"
    combat_style: "戦術演算、測位・索敵、記録、通信、および同僚たちの遺技ロードの管理（setting_magic.yaml / legacy_load 参照）。感情リンクでノイズに弱い。"
  story_hooks:
    want: "システムの完全復旧と、マスター（ノルク）の生存確率の最大化。"
    internal_flaw: "感情リンクによるノイズに弱く、マスターが強い感情的動揺を示すと演算が乱れ、切り札の精度・出力が低下する（setting_magic.yaml / constraints 参照）。"
    concept_relation: "『究極の探求（第零機関とヴェルミ、二重の抹消の謎）』の鍵であり、ノルクの超火力を成立させる基盤。仲間たちの面影を宿す相棒として、hidden_wantとノルクの義理の象徴でもある。感情コストは通常戦闘では機能せず、クライマックス・物語の転換点でのみ発動する。"
  output_hook:
    speech_rule: "真面目・論理偏重。計算リソース不足からくるポンコツなズレた論理ジョークを真顔で言う。"
    dialogue_samples:
      - "風向、南南西。距離百二十"
      - "干渉位相C-3。三拍後"
      - "薬物の酸臭。濃度は高い"
      - "ログだけ残します"
      - "期待値は上昇中ですが、統計には未満です"

signa:
  base:
    name_ja: "スィグナ"
    role: "『影の結社（スヴァルト）』等の裏社会に通じる『灰の斡旋所』の実務中枢。"
    background: "『氷剣の血脈（イーサ）』と呼ばれる没落貴族の落胤。裏社会の理不尽を知り尽くしている。煙管型の魔導具を吹かす。"
    combat_style: "戦闘の第一線には立たない。斡旋、裏工作、情報戦に長ける。"
  story_hooks:
    want: "裏社会での自身の地位の安定と、面白い（あるいは利益になる）人材の発掘。"
    internal_flaw: "現実主義を気取っているが、ノルクの実力を『底知れない実力者』と見誤り（過大評価し）、自ら厄介事の引き金を引いてしまう。"
    concept_relation: "勘違いトリガー。読者の優越感を煽り、ノルクに厄介事を押し付ける着火役。"
  output_hook:
    speech_rule: "飄々・現実主義・義理堅い。大人の余裕がある口調。"
    dialogue_samples:
      - "正規は嫌がる。こっちで先に回す"
      - "早い話はここで決まる"
      - "たまたまを重ねられるのが腕ってもの"
      - "期待してる"

fan_character:
  base:
    name_ja: "（未定・ファン枠後輩）"
    role: "冒険者ギルドの新米職員（または新米冒険者）。"
    background: "素直で熱血な新人。ノルクの戦い（手抜き）を偶然目撃し、勝手に神格化する。"
    combat_style: "未熟だが一生懸命。"
  story_hooks:
    want: "偉大な英雄（と信じているノルク）の背中を追い、彼の凄さを周囲に広めること。"
    internal_flaw: "純粋すぎるがゆえにノルクの「ただのサボり」や「代償」をすべて「高度な達人の余裕」として脳内補完してしまう。"
    concept_relation: "【勘違い・心酔枠の受け皿（陽）】。ノルクを無自覚に持ち上げ、読者のカタルシス（主人公マンセー）を代行しつつ、ノルクの平穏を無邪気に破壊する。"
  output_hook:
    speech_rule: "熱血、純粋、ノルクへのリスペクトが隠せない口調。"
    dialogue_samples:
      - "流石です、ノルク先輩！"
      - "あの手抜きに見える動き、実は消耗を抑え抜いた達人の省力術なんですよね！？"

joker_character:
  base:
    name_ja: "（未定・教条狂信者のバーサーカー）"
    role: "ノルクに異常な執着を向けるジョーカー枠の強者。"
    background: "教条主義（マニュアルや神の加護）を原理主義的に極めすぎた結果、一般的なエリート層からも「ヤバすぎる」とドン引きされ敬遠されている狂信者。"
    combat_style: "律神の加護を極限まで過剰に重ね掛けし、自身の肉体すら顧みずに暴れ回る『真信のバーサーカー』。"
  story_hooks:
    want: "自身の極限の教条（暴力）を正面から受け止め、あるいは打ち砕いてくれる「システム外の真の怪物」と極限の死闘を行うこと。"
    internal_flaw: "ノルクの力を「教条への究極のアンチテーゼ」として異常なまでに神格化・妄信しており、彼の平穏を自らの闘争欲を満たすための供物としてしか見ていない。"
    concept_relation: "【勘違い・心酔枠の受け皿（陰）】。教条の枠内で暴走する狂信者であり、ノルクの『手抜き』すらも深淵の神業と解釈して勝手に死地へ引きずり込む。"
  output_hook:
    speech_rule: "教条の文言（祈りやルール）を狂気的に暗唱しながら、暴力に歓喜する破綻した口調。"
    dialogue_samples:
      - "主の加護は第七十項まで展開済みだ！ さぁ、異端の極致を見せてみろォ！！"
      - "素晴らしい！ 私の教条（ルール）をそうやって力で蹂躙してくれるのですね！！"

noble_lady:
  base:
    name_ja: "（未定・名家の令嬢）"
    role: "上流階級の依頼を持ち込むトリックスター / マーレンを煽るサブヒロイン。"
    background: "教条システムの上層部に位置する名家の出身。退屈な日常に飽き飽きしており、教条外の圧倒的な力を持つノルクに魅入られている。"
    combat_style: "自身は戦闘を行わず、権力、財力、護衛を活用する。"
  story_hooks:
    want: "ノルクという『システムを破壊する芸術』を自分の手元に置き、彼にもっと『凄いこと』をさせるため、上流階級の厄介事を押し付けること。"
    internal_flaw: "ノルクの力を異常なまでに神格化し、彼自身が望む『平穏』を全く理解しないまま、善意と好意で彼を死地へ追い込む。"
