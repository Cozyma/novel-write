nork:
  base:
    role: "『灰の斡旋所（アッシュ・ローグ）』所属の手配屋（主人公）。"
    background: "帝国魔導院『深淵の境界（ヴェルミ）』の生き残り。かつての部隊（同僚たち）は陰謀で「使い捨ての駒」として惨殺され抹消された。コードネームは『不協和音（グリム）』。"
    combat_style: "魔術そのものは使えないが、セリファ（AI精霊）の超高度演算による術式阻害と最適化された近接戦で、メジャー神の加護すら凌駕する物理火力を叩き出す。"
  story_hooks:
    want: "惨殺された同僚たちが遂げられなかった「平穏な日常」を彼らの分まで死守すること。命を使い捨てる帝国への静かな反逆として、あえて高負荷な「非殺制圧」を己に課し、自らの人間性を保とうとしている。"
    internal_flaw: "「ただ息を潜めるだけの生活が本当に理想の平穏なのか？」という自身の内面問題（誤闘）に向き合わず、過去の仲間への責任感から自らを縛り付け、現状維持に逃げ込んでいる。"
    misunderstanding_gap: "本人は工夫や代償付きの超火力で凌いでいるだけだが、周囲からは『底知れぬ実力を持つ余裕の隠者』と圧倒的に過大評価され、さらなる面倒事に巻き込まれていく。"
  output_hook:
    speech_rule: "基本は元軍人の簡潔さ。最小限の配慮と時折の乾いた皮肉を添える。"
    dialogue_samples:
      - "確認した。規程は遵守する"
      - "援護は不要だ。こちらで片付ける"
      - "右後ろ、詠唱。三拍で切る。念のため言うが、円陣は崩していない"
      - "見れば分かる。念のためな。結果も併せて記してくれ"

marlen:
  base:
    role: "ナーヴェル第2警備中隊 副官（ヒロイン）。"
    background: "剣術貴族の次女。被差別種族の血が微発現しており、メジャー神の教条主義社会では「異端」として排除されかねない危うさを持つ。帝都で正しい主張（違法命令拒否）をしたのに左遷され、「正しさ」が通じない世界への絶望を抱えている。"
    combat_style: "片手剣＋バックラー。メジャー神の加護を前提とした正面制圧・鼓舞系だが、想定外の事態（マニュアル外）には極端に脆い。"
  story_hooks:
    want: "[TBD: 壁打ちで決定]"
    internal_flaw: "[TBD: 壁打ちで決定]"
    concept_relation: "[TBD: 壁打ちで決定]"
  output_hook:
    speech_rule: "生真面目で規範至上主義。断定調が多いが内面は激しく揺れている。"
    dialogue_samples:
      - "隊列は縦。接触時は円陣"
      - "下がるな、押せ"
      - "対象は非殺で抑えた。——ここまでは事実"
      - "あなたは命令を無視した"
      - "記録は正確に提出します"

serifa:
  base:
    role: "ノルクの脳内に紐づく機巧精霊（アルク・アニマ）。"
    background: "ノルクと共に非合法実験を生き抜いたシステム。現在はシステム障害から長期復旧中。稼働率は低く、高演算は負荷が高い。形態は半実体の透明球（小型浮遊核）。"
    combat_style: "戦術演算、測位・索敵、記録、通信。感情リンクでノイズに弱い。"
  story_hooks:
    want: "[TBD: 壁打ちで決定]"
    internal_flaw: "[TBD: 壁打ちで決定]"
    concept_relation: "[TBD: 壁打ちで決定]"
  output_hook:
    speech_rule: "真面目・論理偏重。計算リソース不足からくるポンコツな北欧ジョークを真顔で言う。"
    dialogue_samples:
      - "風向、南南西。距離百二十"
      - "干渉位相C-3。三拍後"
      - "薬物の酸臭。濃度は高い"
      - "ログだけ残します"
      - "期待値は上昇中ですが、統計には未満です"

signa:
  base:
    role: "『影の結社（スヴァルト）』等の裏社会に通じる『灰の斡旋所』の実務中枢。"
    background: "『氷剣の血脈（イーサ）』と呼ばれる没落貴族の落胤。裏社会の理不尽を知り尽くしている。煙管型の魔導具を吹かす。"
    combat_style: "戦闘の第一線には立たない。斡旋、裏工作、情報戦に長ける。"
  story_hooks:
    want: "[TBD: 壁打ちで決定]"
    internal_flaw: "[TBD: 壁打ちで決定]"
    concept_relation: "[TBD: 壁打ちで決定]"
  output_hook:
    speech_rule: "飄々・現実主義・義理堅い。大人の余裕がある口調。"
    dialogue_samples:
      - "正規は嫌がる。こっちで先に回す"
      - "早い話はここで決まる"
      - "たまたまを重ねられるのが腕ってもの"
      - "期待してる"


