nork:
  base:
    name_ja: "ノルク・ヴァルグ（コードネーム：不協和音 / グリム）"
    role: "『灰の斡旋所（アッシュ・ローグ）』所属の手配屋（主人公）。"
    background: "帝国魔導院『深淵の境界（ヴェルミ）』の生き残り。かつての部隊（同僚たち）は陰謀で「使い捨ての駒」として惨殺され抹消された。コードネームは『不協和音（グリム）』。"
    combat_style: "魔術そのものは使えないが、セリファ（AI精霊）の超高度演算による術式阻害と最適化された近接戦で、メジャー神の加護すら凌駕する物理火力を叩き出す。"
  story_hooks:
    want: "惨殺された同僚たちが遂げられなかった「平穏な日常」を死守すること。死体を出すと警備隊の調書対応や事後処理が面倒になるため、極めて実務的な手抜きとして「非殺制圧（寸止め）」を行っている。"
    internal_flaw: "過去の仲間への責任感から「平穏な現状維持」に固執するあまり、トラブルを避けるための「手抜き（非殺）」が、かえって周囲に『底知れぬ達人』という勘違いを呼び、面倒事を引き寄せてしまう皮肉な状態にある。"
    misunderstanding_gap: "本人は工夫や代償付きの超火力で凌いでいるだけだが、周囲からは『底知れぬ実力を持つ余裕の隠者』と圧倒的に過大評価され、さらなる面倒事に巻き込まれていく。"
  output_hook:
    speech_rule: "基本は飄々としていて肩の力が抜けた態度。面倒事は避けたいが、元軍人ゆえの観察眼や乾いた皮肉が随所に漏れ出る。周囲からはそれが「圧倒的強者の余裕」と勘違いされやすい。"
    dialogue_samples:
      - "ああ、了解。適当にやっておくよ"
      - "……悪い、聞いてなかった。もう一回頼む"
      - "右後ろ、詠唱してる。三拍で切るから合わせな"
      - "いや、ただの素人だよ。たまたま運が良かっただけさ"
      - "……勘弁してくれ、残業代は出ないんだろ？"

marlen:
  base:
    name_ja: "マーレン・エスリッド"
    role: "冒険者ギルド 治安・規程管理部門の現場査定官（ヒロイン）。"
    background: "剣術貴族の次女だが、異端（被差別部族等）の血が発現しており、教条システムの「正規加護（バフ）」は受けられない。しかし血筋由来の『素の身体性能と魔力量』が規格外に高く、本来なら本能的に戦う方が遥かに強い。だが教条のペナルティ（デバフ）を避けて社会に適合するため、あえて自分のポテンシャルを殺し、窮屈なマニュアルに完璧に従う『縛りプレイ』を自らに課している。"
    combat_style: "普段は教条（マニュアル）を遵守するため、あえて自らの膂力を殺す窮屈な『制式装備（片手剣＋バックラー）』を使用している。しかし本来のスペックを解放した際は、そのヤバい筋力と魔力に任せた『規格外の巨大武器（大剣や戦鎚など）』を振り回す暴戦士。現在は制式の型に固執するあまり、想定外の事態には極端に脆い。"
  story_hooks:
    want: "自分を縛る『教条（マニュアル）』に完璧に従うことで、デバフを回避し、自らの存在と居場所をシステム内に確立すること。"
    internal_flaw: "教条に従うこと自体が目的化（依存）しており、教条を悪用する汚職エリート（システム上は白）のような『ルール内の理不尽』に対しては完全に無力で心が折れてしまう。"
    concept_relation: "教条至上主義（マニュアル）の限界を体現する存在。彼女がシステム内の理不尽に蹂躙されそうになる所を、ノルクがシステム外の圧倒的な暴力で救済する。しかし、彼女は単に心酔するのではなく「その圧倒的な暴力の裏にある危うさ（綱渡り）」に勘付き、ノルクをシステム内で生き延びさせるための【共犯・補完関係（バディ）】となる。"
  output_hook:
    speech_rule: "生真面目で規範至上主義。断定調が多いが内面は激しく揺れている。"
    dialogue_samples:
      - "隊列は縦。接触時は円陣"
      - "下がるな、押せ"
      - "対象は非殺で抑えた。——ここまでは事実"
      - "あなたは命令を無視した"
      - "記録は正確に提出します"

serifa:
  base:
    name_ja: "セリファ"
    role: "ノルクの脳内に紐づく機巧精霊（アルク・アニマ）。"
    background: "ノルクと共に非合法実験を生き抜いたシステム。現在はシステム障害から長期復旧中。稼働率は低く、高演算は負荷が高い。形態は半実体の透明球（小型浮遊核）。"
    combat_style: "戦術演算、測位・索敵、記録、通信。感情リンクでノイズに弱い。"
  story_hooks:
    want: "システムの完全復旧と、マスター（ノルク）の生存確率の最大化。"
    internal_flaw: "感情リンクによるノイズに弱く、論理と状況の板挟みでバグりやすい。"
    concept_relation: "『究極の探求（禁忌部隊・第零機関の謎）』の鍵であり、ノルクの超火力を成立させる基盤。"
  output_hook:
    speech_rule: "真面目・論理偏重。計算リソース不足からくるポンコツなズレた論理ジョークを真顔で言う。"
    dialogue_samples:
      - "風向、南南西。距離百二十"
      - "干渉位相C-3。三拍後"
      - "薬物の酸臭。濃度は高い"
      - "ログだけ残します"
      - "期待値は上昇中ですが、統計には未満です"

signa:
  base:
    name_ja: "スィグナ"
    role: "『影の結社（スヴァルト）』等の裏社会に通じる『灰の斡旋所』の実務中枢。"
    background: "『氷剣の血脈（イーサ）』と呼ばれる没落貴族の落胤。裏社会の理不尽を知り尽くしている。煙管型の魔導具を吹かす。"
    combat_style: "戦闘の第一線には立たない。斡旋、裏工作、情報戦に長ける。"
  story_hooks:
    want: "裏社会での自身の地位の安定と、面白い（あるいは利益になる）人材の発掘。"
    internal_flaw: "現実主義を気取っているが、ノルクの実力を『底知れない実力者』と見誤り（過大評価し）、自ら厄介事の引き金を引いてしまう。"
    concept_relation: "勘違いトリガー。読者の優越感を煽り、ノルクに厄介事を押し付ける着火役。"
  output_hook:
    speech_rule: "飄々・現実主義・義理堅い。大人の余裕がある口調。"
    dialogue_samples:
      - "正規は嫌がる。こっちで先に回す"
      - "早い話はここで決まる"
      - "たまたまを重ねられるのが腕ってもの"
      - "期待してる"

fan_character:
  base:
    name_ja: "（未定・ファン枠後輩）"
    role: "冒険者ギルドの新米（またはマーレンの部下）。"
    background: "素直で熱血な新人。ノルクの戦い（手抜き）を偶然目撃し、勝手に神格化する。"
    combat_style: "未熟だが一生懸命。"
  story_hooks:
    want: "偉大な英雄（と信じているノルク）の背中を追い、彼の凄さを周囲に広めること。"
    internal_flaw: "純粋すぎるがゆえにノルクの「ただのサボり」や「代償」をすべて「高度な達人の余裕」として脳内補完してしまう。"
    concept_relation: "【勘違い・心酔枠の受け皿（陽）】。ノルクを無自覚に持ち上げ、読者のカタルシス（主人公マンセー）を代行しつつ、ノルクの平穏を無邪気に破壊する。"
  output_hook:
    speech_rule: "熱血、純粋、ノルクへのリスペクトが隠せない口調。"
    dialogue_samples:
      - "流石です、ノルク先輩！"
      - "あの手抜きに見える動き、実は魔力温存の極致なんですよね！？"

joker_character:
  base:
    name_ja: "（未定・教条狂信者のバーサーカー）"
    role: "ノルクに異常な執着を向けるジョーカー枠の強者。"
    background: "教条主義（マニュアルや神の加護）を原理主義的に極めすぎた結果、一般的なエリート層からも「ヤバすぎる」とドン引きされ敬遠されている狂信者。"
    combat_style: "教条の正規加護（バフ）を極限まで過剰に重ね掛けし、自身の肉体すら顧みずに暴れ回る『教条的バーサーカー』。"
  story_hooks:
    want: "自身の極限の教条（暴力）を正面から受け止め、あるいは打ち砕いてくれる「システム外の真の怪物」と極限の死闘を行うこと。"
    internal_flaw: "ノルクの力を「教条への究極のアンチテーゼ」として異常なまでに神格化・妄信しており、彼の平穏を自らの闘争欲を満たすための供物としてしか見ていない。"
    concept_relation: "【勘違い・心酔枠の受け皿（陰）】。教条の枠内で暴走する狂信者であり、ノルクの『手抜き』すらも深淵の神業と解釈して勝手に死地へ引きずり込む。"
  output_hook:
    speech_rule: "教条の文言（祈りやルール）を狂気的に暗唱しながら、暴力に歓喜する破綻した口調。"
    dialogue_samples:
      - "主の加護は第七十項まで展開済みだ！ さぁ、異端の極致を見せてみろォ！！"
      - "素晴らしい！ 私の教条（ルール）をそうやって力で蹂躙してくれるのですね！！"

noble_lady:
  base:
    name_ja: "（未定・名家の令嬢）"
    role: "上流階級の依頼を持ち込むトリックスター / マーレンを煽るサブヒロイン。"
    background: "教条システムの上層部に位置する名家の出身。退屈な日常に飽き飽きしており、教条外の圧倒的な力を持つノルクに魅入られている。"
    combat_style: "自身は戦闘を行わず、権力、財力、護衛を活用する。"
  story_hooks:
    want: "ノルクという『システムを破壊する芸術』を自分の手元に置き、彼にもっと『凄いこと』をさせるため、上流階級の厄介事を押し付けること。"
    internal_flaw: "ノルクの力を異常なまでに神格化し、彼自身が望む『平穏』を全く理解しないまま、善意と好意で彼を死地へ追い込む。"
    concept_relation: "【心酔枠・依頼ルート】。メインヒロイン（マーレン）に対して「あなたでは彼の真価は理解できない」とマウントを取る恋敵であり、同時にノルクの平穏を脅かすジョーカー的役割を兼ねる。"
  output_hook:
    speech_rule: "優雅だが傲慢さを隠さないお嬢様言葉。マーレンには嫌味を言い、ノルクには甘く（しかし厄介な）態度をとる。"
    dialogue_samples:
      - "あんな四角四面な役人に、あなたの何が分かるというの？"
      - "さあ、見せてちょうだい。あなたのその素晴らしい力で、このつまらない連中をどう片付けるのかしら"
