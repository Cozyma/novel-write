magic_system:
  artificial_spirit:
    name_ja: "人工精霊同期（アルク・アニマ）"
    sync_mechanics: "人工精霊（セリファ）との同期。神経接続で常時リンクし、精霊維持・演算はノルクの生体に直接負荷をかける。魔力（基層。setting_worldview.yaml / mana_substrate）を人体を媒体に直行で行使する術式系＝**旧神の回路の人工再現**（setting_worldview / zero_institution・divine_economy / pantheon.old_god）——本来その神が担った『成形』と『支払い』のうち、成形はセリファの演算が代行し（必要なら遺技を鋳型にする。legacy_load 参照）、支払いは代行する神が不在のためノルクの神経が負う。人体直行・大出力で魔力を扱う系統は第零機関の禁忌技術のみ＝唯一（魔導具による市井の弱い非神行使とは規模が別物）。"
    constraints: "同期は常時神経に負荷をかけ、連続使用は数分が限界（超えると同期が崩壊する）。外向きの干渉行使（条項告発＝加護への干渉／遺技ロード＝残響再生）を人目・記録域で晒さない規律は concealment_rule（隠匿の生存則）を正本とする。生体負荷（代償）の階層・発露・時間構造・抑え込みとその綻び（トラウマ）・回復・二重コストの体系は biological_cost を正本とする。"
    neural_sync:
      name_ja: "神経同期（段1の自己強化）"
      mechanism: "生身の工夫（段0）では届かない格上と渡り合うために、セリファの演算をノルク自身の身体へ向ける自己強化。二枝ある——【反応強化】高速演算で知覚・予測・体制御を底上げし超反応を得る（主コスト＝神経負荷＝演算が重い）／【筋力強化＝リミッター解除】脳が常時かけている膂力の安全制限を外し、種族的な素体を持たないノルクが一時的に格上の膂力を出す（主コスト＝肉体破壊＝筋・関節・循環器）。"
      constraints: "数分で同期が崩壊する短時間限定。代償は遅延噴出（戦闘後）。段2以降（条項告発・遺技ロード）とは別物で、これは切り札ではなく日常戦闘の一段上の凌ぎ。外部には『謎めいた加護持ち』（反応強化＝看破系／筋力強化＝身体強化系）と誤読される——無加護が超出力を出す以上、世界の理屈（力＝加護）上もっとも自然な誤読であり、深い秘密（無加護ゆえの第零機関の禁忌技術・セリファの存在・切り札の正体）はこの誤読の陰に隠れる。【運用確定（2026-07-07・戦闘カノン再設計）】①基本は入れ切り——必要な半拍だけ差す（〈今。〉の一拍〜数分のフル同期。ノルクの内語は『前借り』）②人前で使ってよい＝外見上は露見しない（上記の誤読が隠匿として機能。隠すのは段2のみ＝concealment_rule）③初出はセリファの宣言〈神経同期、開始します〉で用語を読者へ供給し、以後は地の文で『同期』『前借り』を使用可。"
    fine_craft:
      name_ja: "細工（さいく・極小精密行使。2026-07-07新設＝戦闘カノン再設計）"
      mechanism: "生身の器（setting_worldview.yaml / vessel_model）の『太さ極細×成形精度異常』を攻めに使う——糸一本ぶんの魔力をセリファの演算で精密成形する手仕事。例: 錠の内部を弾く・火花で誘爆・微風で匂いと音を運ぶ・足元の砂を一瞬固める。大出力が常識の世界で誰も開発しない領域＝『見えない指先』。"
      constraints: "出力は物理的に極小——直接の殺傷・破壊は不可（無双の構造的封印は不変）。支払いは神経（微少＝biological_cost.progression の最軽段）。外見上は露見しない——小さすぎて視認されず、気づかれても魔導具と誤認される（隠匿リスクの外。concealment_rule の封印対象は段2のみ）。"
      concept_relation: "読み（手札A）・盤面作り（人目の製造・地形誘導）の実行手段。工夫の絵が『素手の小道具』から『見えない指先』へ立つ（戦闘のショボさ解消の核＝2026-07-07判定H2○）。"
      combat_role: "戦闘の駆け引きは『段をどこまで登らされるか・予算（神経／肉体）が尽きる前に決着できるか』のやりくり。速さで凌ぐ（反応強化＝神経を払う）か力で押す（筋力強化＝肉体を払う）かでコストの色が変わる二軸トレード。マーレンとの鏡映——マーレンは種族由来の自前の膂力を社会的理由で殺す（リミッター）、ノルクは自前の膂力が無く神経／肉体を灼いて偽造する（combat_contrast.buddy_contrast と接続）。"
    biological_cost:
      name_ja: "生体負荷（代償）"
      hierarchy: "代償は一系統だが層が違う。一言なら『神経を灼く生体負荷』。【主軸＝生体負荷】周囲・読者に見える代償（出力比例・遅延噴出・回復型。戦闘中は意志で抑え込み＝余裕の誤認、トラウマで抑え込みが破れる＝suppression_break）。【真の代償＝セリファの不可逆摩耗】ノルクが本当に恐れるのはこちらだが本編では伏せる（second_cost・氷山）。【状況変数＝目撃の露出】説明のつかない力を人目に晒すことで噂・記録として蓄積される社会的コスト（concealment_rule・02_dynamic_states/character_states.yaml / exposure_level）。"
      system: "神経系。魔力の直行行使ゆえ——加護持ちなら神が肩代わりする『行使コスト』を、肩代わりする神が不在（旧神は応答しない）のまま回路を動かすノルクは、自分の神経で払う。演算負荷がノルク自身の神経を直接灼く（同じ魔力という源を、神が払うか・自分が払うか。加護持ちが無傷でバフを得るのと対極——無加護が自分の身体を燃料にする構図。源の定義は setting_worldview.yaml / mana_substrate、系譜の根は divine_economy / pantheon.old_god）。"
      progression: "代償は出力に比例して段階的に表面化する。工夫・破礼具の生身戦闘＝代償なし（日常はケロッとしている＝勘違いエンジンの燃料）／細工（fine_craft）＝微少（指先のかじかみ程度・当日中に消える）／神経同期（段1）＝軽〜中（反応強化は神経側＝頭痛・眩暈、筋力強化＝リミッター解除は肉体側＝筋・関節の痛みと微細損傷。数分で同期が崩壊し戦闘後に反動が来る＝コストの頭出し）／条項告発の演算＝軽（頭痛・眩暈）／遺技ロード＝中（頭痛に視覚の揺らぎ・手の震えが加わる）／最大負荷の行使＝大（視覚の焦点喪失→聴覚の遮断〔耳鳴り・無音〕→平衡・運動神経の脱力〔片膝・手の震え〕→ピークで循環器の決壊〔鼻血・目の充血〕の順で噴く。この段に該当する大技の存否・正体は未定義スロット＝legacy_load 参照）。【発露の持続の目安（2026-07-07・あくまで目安＝機械ルール化しない）】半拍の前借＝当日中に消える軽微／数分のフル同期＝翌日まで／段2級＝数日で回復。蓄積・悪化する仕様は存在しない（recovery の回復型を再確認）。"
      timing: "遅延噴出。同期中は神経の悲鳴を意志で抑え込んで演算を安定させる——これが戦闘中の異様な冷静さの正体であり、周囲に『強者の余裕／達人の静謐』と誤認される。緊張が切れた瞬間に抑え込みが解け、抑えていた分が一気に噴き出す。支払いは戦闘後に一人で（characters.yaml / nork speech_rule と整合）。"
      suppression_break: "この抑え込みを破る唯一の内的トリガーがトラウマ刺激。敵がトラウマを突くと、感情リンク経由で抑え込みが効かなくなり、代償が前倒しで暴れる／演算精度が落ちる（クライマックス・物語の転換点限定で発動）。別の力（第4のコスト）ではなく主軸の抑え込みの綻びであり、切り札を内側から崩す弱点として今後のプロットで利用可能。感情リンクの機構は characters.yaml / serifa と連動。"
      recovery: "非対称①——ノルクの身体は回復型。一回の激しい代償も数日で回復し、不可逆には削れない（綱渡りだが消耗品ではない）。例外の候補（最大負荷の行使で回復型の限界を超える裏技）は、大技の存否と共に未定義スロット（legacy_load 参照・凍結）。"
      second_cost: "非対称②（二重コストの核）——不可逆の摩耗はセリファ側に生じる。高負荷演算は注入された同僚たちの残響を『全体的に』すり減らし（特定の技が特定の人格を削るのではない＝legacy_load.constraints③ 技≠人格を維持）、復旧を遅らせ、最悪は精神ごと失う（第4のコスト）。ノルクが本当に恐れる代償は自分の身体でなく『仲間の最後の欠片の喪失』であり、hidden_want・死の拒絶と直結する。外向きの大技ほどこの摩耗が大きく、第1アークで切り札を抜かない最大の理由がこの摩耗＝仲間の欠片を失うリスクである（温存の重心。legacy_load.cost・CH17）。本編では中身を伏せる（氷山の規律）。"
      misread: "症状を抑え込む鉄の自制が『余裕』と誤認される。仮面が崩れる瞬間を間近で見た者だけが綱渡り＝危うさに気づく（chapter_17_summary / roadmap step1『知られる』の着地点）。"
  anti_mage:
    name_ja: “条項告発（教条問答）”
    mechanism: “セリファが相手の加護の発動条件（条項）を超高度演算で解析し、その条項が要求する要件と相手の実際の言動・行動との不履行を特定する。加護の論理自体は神の設計のため完璧であり、外部から穴を突いて無効化することはできない。ただし保持者が自ら要件を満たさなくなった時点で、律神のシステム自身が不履行を判定し加護が消失する。セリファが要件と不履行の根拠を供給し、ノルクが問答の誘導あるいは要件違反を犯させる状況を作り出すという役割分担。固有加護の消失要件は神託として本人にのみ下り口外も禁じられているため（setting_worldview.yaml / blessing_types）、本来は特定がほぼ不可能——世間の対抗文化が当てずっぽうの『挑発の散弾』に留まる中、セリファは言動と加護出力の揺らぎの相関から要件を解析的に逆算する『狙撃』であり、この精度こそが切り札の希少性の根拠。”
    constraints: “行動による礼式（表礼）の加護にのみ有効。内心の信仰（真信）に基づく加護は誓約と行動が一致しているため矛盾が生じず通じない。加護の要件には二階層がある——【弱体化要件】は違反しても加護は消えず出力が低下するのみ（例：合掌などの礼式行動）。【消失要件】は違反した時点で律神のシステムが不履行を判定し加護が即時消失する（例：本質的な誓約の破棄）。弱体化要件の臨界は消失要件の違反検知感度を高め、より小さなトリガーで消失しやすくなる。”
    combat_style: “教条の条項を守っているように見せて実態は違反しているエリートたちへのカウンター。加護の消失後の制圧は工夫・段1・遺技で足りる（火力比べにしない）。ただし加護の前提が論理的な要件ではなく保持者の認識（確信・余裕、あるいは座との接続の自明性＝『私は制度そのものだ』という無自覚の大前提）である場合は、要件を解析的に特定するより、その認識を心理的圧力で崩して出力源ごと揺さぶる連携が有効——この場合セリファは要件特定ではなく加護出力・接続のゆらぎを観測する計器役に回る（第1アークの『無謬の権威』は座の加護〔setting_worldview.yaml / blessing_types.seat〕で、『制度はお前を守らない』を三波で分からせて接続の自明性を崩す経路。条項告発フルは温存する）。”
  legacy_load:
    name_ja: "遺技ロード（仮称）"
    mechanism: "セリファに注入された同僚たちの精神（残響）から、各人の特化技能を『術式パターン・身体運用の記録』として一時的にロードし、ノルクの肉体で再生する（源＝魔力・成形＝セリファの演算・行使媒体＝ノルクの身体。sync_mechanics と一致。人体直行・大出力で魔力を扱う系統は第零機関の禁忌技術のみ＝唯一性の核）。【未定義スロット（2026-07-05＝『切り札＝超火力』等式の撤去）】形見の中に砲撃級の大技（身体スケールを超える外への大出力）があるか——その存否・理論（成形・出力経路・触媒の要否・触媒なし裏技の有無）・見え方は未確定の凍結スロット（第2アーク設計時に存否から判断。旧・砲撃遺技理論〔神なき神業・砲口触媒・触媒なし裏技〕は候補として git 履歴に退避）。"
    constraints: "①ロスターは有限——死んだ同僚の人数分のみの閉じた集合であり、拡張しない（形見の目録）。②同時ロードは一枠のみで、切替には演算負荷が伴う。普段の戦闘は生身の泥臭い工夫が主軸であり、ロードはあくまで切り札。③ロードされるのは技能の記録であって人格ではない——技が完璧に再生できることは、人格が残っていることを証明しない（hidden_wantの『確かめたい』の曖昧性を死守する設計ルール）。"
    concept_relation: "同僚の技を継いで戦うこと。ロードするたびにその同僚の身体運用・戦闘の癖がノルクの動きに混ざり込み、wantと戦闘メカニクスが一本化する。新技能の初出しはその同僚の人柄・過去の開示とセットで行い、【驚き】【共感】を連載に定期供給する。ただし混じるのはノルク側には『技・動き』のみで、人柄・口調の発露はセリファ側に出す（器の二分——ノルク＝技の器／セリファ＝人格の器。characters.yaml / serifa）。"
    cost: "二軸——【生体負荷】回復型（biological_cost.progression：遺技ロード＝中／最大負荷の行使＝大の段階発露）。【残響摩耗】不可逆。高負荷演算はセリファに注入された同僚たちの残響を『全体的に』すり減らす（特定の技が特定の人格を削るのではない＝constraints③『技≠人格』を維持。技と人格は別物だが、再生の演算負荷そのものが器＝セリファ全体を摩耗させる）。最悪はセリファの破局＝残響ごと喪失（biological_cost.second_cost）。負荷の大きい行使ほど両軸のコストが跳ね、第1アークで切り札を抜かない最大の理由が、この残響摩耗＝仲間の最後の欠片を失うリスクである（hidden_want・死の拒絶直結。温存の重心）。"
    progression: "【縦の報酬軸】ロードできる遺技と扱える予算は固定でなく、セリファの復旧（第零機関の謎に依存）とともに少しずつ開く＝連載の縦の報酬。新しい遺技の解禁＝その同僚の人柄・過去の開示（【驚き】【共感】）。ロスターは有限（constraints①の形見の目録）だが『使える状態にあるか』が復旧で段階開放される。復旧が進むほど残響摩耗のリスクも下がる（予算が増える）が、敵スケールが上がるため綱渡りは解消しない（強化＝やりくり対象の追加）。縦の報酬軸の頂点イベント（何をどう解禁するか）は特定の技に固定せず、各アーク設計時に決める（未定義スロット）。concept.yaml / catharsis_engine.series_engine.arsenal_progression。"

  concealment_rule:
    name_ja: "隠匿の生存則（切り札を人前で切らない理由）"
    mechanism: "魔法的な監視機構は存在しない（2026-07-05確定＝旧 dissonance_trace〔教条システムによる波形の自動検知・遮断結界〕を完全削除。律神は一クランに格下げ済みであり、世界規模の監視網は多神経済と整合しない）。ノルクが外向きの行使（条項告発・遺技ロード）を人目・記録域で固く封じる理由は三つ——①【人目と噂】説明のつかない力の目撃は噂として流通し、ヴェルミを消した主体に『生き残りがいる』と届きうる（脅威の経路は機械でなく人の口。concept.yaml / stakes.lose）。ただし誤読『謎の加護持ち』が効いている限り噂は無害化される＝勘違いエンジンが文字通りの隠れ蓑（neural_sync.constraints・characters.yaml / nork combat_style 出力ルール）。②【セリファの摩耗】外向き高負荷は相棒の不可逆摩耗（biological_cost.second_cost）を削る——義理ゆえに切れない（感情の制約。温存の重心）。③【伏せ札の温存】最後まで伏せる実利（concept.yaml / catharsis_engine.execution）。"
    operation: "目撃露出度は `02_dynamic_states/character_states.yaml` の nork.exposure_level（説明のつかない力を人前で見せた蓄積＝噂・神話化の燃料）として数値管理する。閾値による追跡イベントの自動発火は行わず、投入タイミングはストーリー優先で人間が判断する。"
    concept_relation: "隠匿は機械のルールではなく、感情と社会の制約——①は勘違いエンジン（誤読が隠れ蓑）に、②は応援燃料（仲間の思い＝hidden_want）に直結する。追っ手の顔は『ヴェルミを消した主体』＝究極の探求の敵そのもの（謎と脅威が同一線）。"

  harei_tools:
    name_ja: "破礼具（はれいぐ）"
    mechanism: "加護そのものに干渉する魔法的な道具ではなく、要件の履行を物理的に妨害する道具群（発声を奪う煙、手指を絡める鎖、陣形の目印を消す粉など）。旧称『封魔具』を三本柱体系に合わせて再定義したもの。加護の弱体化要件（礼式）が物理的所作である以上、所作を潰せば出力は落ちる——ノルクの装備一式が一貫して『加護でなく要件を攻める』思想で揃っている根拠。"
    misread: "観測者には『加護を封じる異端の秘宝』に見える（実態はただの煙と鎖と粉）。"

  combat_contrast:
    name_ja: "戦闘スタイルの対比"
    marlen_style: "片手剣＋バックラーによる正統派の防御・押し出し。マニュアル通りの“受けて貫く”陣形維持だが、想定外の事態（ノルクの戦法など）には脆い。"
    nork_style: "手札4系統（2026-07-07再設計）——A読み（観測・解析・予測）／B同期（段1の入れ切り・人前可）／C細工（極小精密行使・見えない指先）／D形見（切り札・封印。練り直し待ち）。得物は使い古した軍用の片手剣（頑丈さが取り柄）と寸鉄。教条から完全に逸脱した戦術（正本は characters.yaml / nork combat_style）。"
    buddy_contrast: "借り物の力（加護）が支配する世界における、二種類の『自前』——マーレンは自前の体（種族由来の身体性能。加護では奪えない＝剥がされない）、ノルクは自前の技（鍛錬と遺技。要件を剥がす側に回れる）。バディの補完関係（剥がす者と剥がされない者）は力の体系上の必然である。"
