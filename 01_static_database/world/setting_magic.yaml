magic_system:
  artificial_spirit:
    name_ja: "人工精霊同期（アルク・アニマ）"
    sync_mechanics: "人工精霊（セリファ）との同期。魔力チャネルで常時リンクし、精霊維持・演算にノルクの魔力を消費する。"
    constraints: "常時魔力を消費し、高演算時は頭痛や眩暈などの負荷（代償）が伴う。感情ノイズにも弱く（特にノルクがトラウマ＝部隊惨殺の記憶を想起して動揺すると、感情リンク経由で演算が乱れ、切り札の精度・出力が低下する）、連続使用は数分が限界。さらに同期演算の行使は教条システム側に『不協和音』の痕跡（ログ）を残すため、隠匿制約（dissonance_trace 参照）の対象となる。加えて高負荷演算はセリファの復旧を遅らせ、最悪の場合は保持された同僚たちの精神ごと失われるシステムダウンの危険を伴う（第4のコスト）。"
  anti_mage:
    name_ja: "詠唱阻害／構造改変（システム・ハック）"
    mechanism: "セリファの超高度演算を用い、相手の術式や『教条マニュアルの論理的な穴』をハッキングする。逆相の波長をぶつけて魔法を暴発させたり、絶対的であるはずの教条バフに論理エラーを起こさせて強制シャットダウン（無効化）させることができる。ノルク自身の魔力ではなく、圧倒的な計算力に依存する対システム・対魔法戦術。"
    combat_style: "教条（マニュアル）通りの詠唱や陣形に頼るエリートたちの魔術を、“乱して穿つ”ことで無効化し、規格外の物理火力で制圧する。"
  legacy_load:
    name_ja: "遺技ロード（仮称）"
    mechanism: "セリファに注入された同僚たちの精神（残響）から、各人の特化技能を『術式パターン・身体運用の記録』として一時的にロードし、ノルクの肉体で再生する。代償付きの超火力は、砲撃特化の同僚の遺技の一つ。"
    constraints: "①ロスターは有限——死んだ同僚の人数分のみの閉じた集合であり、拡張しない（形見の目録）。②同時ロードは一枠のみで、切替には演算負荷が伴う。普段の戦闘は生身の泥臭い工夫が主軸であり、ロードはあくまで切り札。③ロードされるのは技能の記録であって人格ではない——技が完璧に再生できることは、人格が残っていることを証明しない（hidden_wantの『確かめたい』の曖昧性を死守する設計ルール）。"
    concept_relation: "戦闘＝弔い。技能を使うたび死んだ同僚と共に戦うことになり、wantと戦闘メカニクスが一本化する。新技能の初出しはその同僚の人柄・過去の開示とセットで行い、【驚き】【共感】を連載に定期供給する。ロード時に当該同僚の癖・口癖が漏れる（ノルクのquirksと呼応）。"

  dissonance_trace:
    name_ja: "不協和音の痕跡（隠匿制約）"
    mechanism: "第零機関の抹消事件以降、教条システムは人工精霊同期による干渉波形『不協和音』を異常として自動検知・記録している。ノルクがシステムハックや超火力を行使するたびに痕跡（ログ）が蓄積され、抹消の実行者側に「生き残りの存在」を知らせるシグナルとなる。"
    operation: "痕跡の蓄積は `02_dynamic_states/character_states.yaml` の nork.exposure_level として数値管理する。ただし閾値による追跡イベントの自動発火は行わず、イベント投入のタイミングはストーリー優先で人間が判断する。"
    concept_relation: "【究極の探求】との接続点。教条システムがなぜ不協和音を監視しているのかは、第零機関がなぜ創設され抹消されたのかという謎と同一線上にあり、敵の正体を伏せたまま【危機】の基底値を時差的・雪だるま式に押し上げる（逆カタルシスエンジン）。"

  combat_contrast:
    name_ja: "戦闘スタイルの対比"
    marlen_style: "片手剣＋バックラーによる正統派の防御・押し出し。マニュアル通りの“受けて貫く”陣形維持だが、想定外の事態（ノルクの戦法など）には脆い。"
    nork_style: "短剣や寸鉄、封魔具を用いた一撃離脱。無音接近と妨害を主軸とする、教条から完全に逸脱した戦術。"
