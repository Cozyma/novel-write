magic_system:
  artificial_spirit:
    name_ja: "人工精霊同期（アルク・アニマ）"
    sync_mechanics: "人工精霊（セリファ）との同期。神経接続で常時リンクし、精霊維持・演算はノルクの生体に直接負荷をかける。魔力（基層。setting_worldview.yaml / mana_substrate）を、神を介さず人体を媒体に直行で行使する術式系——魔力を成形・行使する主体は、加護では神／この系統では神の代わりにセリファの演算（必要なら遺技を鋳型にする）が成形し、ノルクの身体が行使の媒体になる（legacy_load 参照）。人体直行・大出力で魔力を扱う系統は第零機関の禁忌技術のみ＝唯一（魔導具による市井の弱い非神行使とは規模が別物）。"
    constraints: "同期は常時神経に負荷をかけ、連続使用は数分が限界（超えると同期が崩壊する）。痕跡（不協和音）を残すのは外向きの干渉行使（条項告発＝加護への干渉／遺技ロード＝残響再生）のみで、内向きの自己強化（神経同期＝反応強化・筋力強化）と受動観測（加護出力のゆらぎ読み）は干渉波形を出さず痕跡を残さない——隠匿制約（dissonance_trace 参照）の対象は外向き行使に限る。生体負荷（代償）の階層・発露・時間構造・抑え込みとその綻び（トラウマ）・回復・二重コストの体系は biological_cost を正本とする。"
    neural_sync:
      name_ja: "神経同期（段1の自己強化）"
      mechanism: "生身の工夫（段0）では届かない格上と渡り合うために、セリファの演算をノルク自身の身体へ向ける自己強化。二枝ある——【反応強化】高速演算で知覚・予測・体制御を底上げし超反応を得る（主コスト＝神経負荷＝演算が重い）／【筋力強化＝リミッター解除】脳が常時かけている膂力の安全制限を外し、種族的な素体を持たないノルクが一時的に格上の膂力を出す（主コスト＝肉体破壊＝筋・関節・循環器）。"
      constraints: "数分で同期が崩壊する短時間限定。代償は遅延噴出（戦闘後）。痕跡は残さない（内向き＝dissonance_trace 対象外）。段2以降（条項告発・遺技ロード・超火力）とは別物で、これは切り札ではなく日常戦闘の一段上の凌ぎ。外部には『謎めいた加護持ち』（反応強化＝看破系／筋力強化＝身体強化系）と誤読される——無加護が超出力を出す以上、世界の理屈（力＝加護）上もっとも自然な誤読であり、深い秘密（無加護ゆえの第零機関の禁忌技術・セリファの存在・超火力の規模）はこの誤読の陰に隠れる。"
      combat_role: "戦闘の駆け引きは『段をどこまで登らされるか・予算（神経／肉体）が尽きる前に決着できるか』のやりくり。速さで凌ぐ（反応強化＝神経を払う）か力で押す（筋力強化＝肉体を払う）かでコストの色が変わる二軸トレード。マーレンとの鏡映——マーレンは種族由来の自前の膂力を社会的理由で殺す（リミッター）、ノルクは自前の膂力が無く神経／肉体を灼いて偽造する（combat_contrast.buddy_contrast と接続）。"
    biological_cost:
      name_ja: "生体負荷（代償）"
      hierarchy: "代償は一系統だが層が違う。一言なら『神経を灼く生体負荷』。【主軸＝生体負荷】周囲・読者に見える代償（出力比例・遅延噴出・回復型。戦闘中は意志で抑え込み＝余裕の誤認、トラウマで抑え込みが破れる＝suppression_break）。【真の代償＝セリファの不可逆摩耗】ノルクが本当に恐れるのはこちらだが本編では伏せる（second_cost・氷山）。【状況変数＝隠匿の痕跡】行使を記録され追跡を招く社会的コスト（遮断設備の有無で発生・dissonance_trace）。"
      system: "神経系。魔力の直行行使ゆえ——加護持ちなら神が肩代わりする『行使コスト』を、神を介さないノルクは自分の神経で肩代わりする。演算負荷がノルク自身の神経を直接灼く（同じ魔力という源を、神が払うか・自分が払うか。加護持ちが無傷でバフを得るのと対極——無加護が自分の身体を燃料にする構図。源の定義は setting_worldview.yaml / mana_substrate）。"
      progression: "代償は出力に比例して段階的に表面化する。工夫・破礼具の生身戦闘＝代償なし（日常はケロッとしている＝勘違いエンジンの燃料）／神経同期（段1）＝軽〜中（反応強化は神経側＝頭痛・眩暈、筋力強化＝リミッター解除は肉体側＝筋・関節の痛みと微細損傷。数分で同期が崩壊し戦闘後に反動が来る＝コストの頭出し）／条項告発の演算＝軽（頭痛・眩暈）／遺技ロード＝中（頭痛に視覚の揺らぎ・手の震えが加わる）／最適化超火力＝大（視覚の焦点喪失→聴覚の遮断〔耳鳴り・無音〕→平衡・運動神経の脱力〔片膝・手の震え〕→ピークで循環器の決壊〔鼻血・目の充血〕の順で噴く）。"
      timing: "遅延噴出。同期中は神経の悲鳴を意志で抑え込んで演算を安定させる——これが戦闘中の異様な冷静さの正体であり、周囲に『強者の余裕／達人の静謐』と誤認される。緊張が切れた瞬間に抑え込みが解け、抑えていた分が一気に噴き出す。支払いは戦闘後に一人で（characters.yaml / nork speech_rule と整合）。"
      suppression_break: "この抑え込みを破る唯一の内的トリガーがトラウマ刺激。敵がトラウマを突くと、感情リンク経由で抑え込みが効かなくなり、代償が前倒しで暴れる／演算精度が落ちる（クライマックス・物語の転換点限定で発動）。別の力（第4のコスト）ではなく主軸の抑え込みの綻びであり、切り札を内側から崩す弱点として今後のプロットで利用可能。感情リンクの機構は characters.yaml / serifa と連動。"
      recovery: "非対称①——ノルクの身体は回復型。一回の激しい代償も数日で回復し、不可逆には削れない（綱渡りだが消耗品ではない）。唯一の例外＝超火力を砲口触媒なしで撃つ最後の裏技。このときだけ砲口応力が生身に及び、回復型の限界を超えてノルク自身の身体にも不可逆・致命の損傷リスクが生じる（legacy_load.mechanism ③）。"
      second_cost: "非対称②（二重コストの核）——不可逆の摩耗はセリファ側に生じる。高負荷演算は注入された同僚たちの残響を『全体的に』すり減らし（特定の技が特定の人格を削るのではない＝legacy_load.constraints③ 技≠人格を維持）、復旧を遅らせ、最悪は精神ごと失う（第4のコスト）。ノルクが本当に恐れる代償は自分の身体でなく『仲間の最後の欠片の喪失』であり、hidden_want・死の拒絶と直結する。超火力（砲撃遺技）はこの摩耗が最大であり、第1アークで抜かない本当の理由は痕跡（隠匿）ではなくこの摩耗＝仲間の欠片を失うリスクである（温存の重心。legacy_load.cost・CH17）。本編では中身を伏せる（氷山の規律）。"
      misread: "症状を抑え込む鉄の自制が『余裕』と誤認される。仮面が崩れる瞬間を間近で見た者だけが綱渡り＝危うさに気づく（chapter_17_summary / roadmap step1『知られる』の着地点）。"
  anti_mage:
    name_ja: “条項告発（教条問答）”
    mechanism: “セリファが相手の加護の発動条件（条項）を超高度演算で解析し、その条項が要求する要件と相手の実際の言動・行動との不履行を特定する。加護の論理自体は神の設計のため完璧であり、外部から穴を突いて無効化することはできない。ただし保持者が自ら要件を満たさなくなった時点で、律神のシステム自身が不履行を判定し加護が消失する。セリファが要件と不履行の根拠を供給し、ノルクが問答の誘導あるいは要件違反を犯させる状況を作り出すという役割分担。固有加護の消失要件は神託として本人にのみ下り口外も禁じられているため（setting_worldview.yaml / blessing_types）、本来は特定がほぼ不可能——世間の対抗文化が当てずっぽうの『挑発の散弾』に留まる中、セリファは言動と加護出力の揺らぎの相関から要件を解析的に逆算する『狙撃』であり、この精度こそが切り札の希少性の根拠。”
    constraints: “行動による礼式（表礼）の加護にのみ有効。内心の信仰（真信）に基づく加護は誓約と行動が一致しているため矛盾が生じず通じない。加護の要件には二階層がある——【弱体化要件】は違反しても加護は消えず出力が低下するのみ（例：合掌などの礼式行動）。【消失要件】は違反した時点で律神のシステムが不履行を判定し加護が即時消失する（例：本質的な誓約の破棄）。弱体化要件の臨界は消失要件の違反検知感度を高め、より小さなトリガーで消失しやすくなる。”
    combat_style: “教条の条項を守っているように見せて実態は違反しているエリートたちへのカウンター。遺技ロードと組み合わせ、加護の消失後に超火力で制圧する。ただし加護の前提が論理的な要件ではなく保持者の確信・余裕（無謬の自己像など）そのものである固有加護に対しては、要件を解析的に特定するより、その確信を心理的圧力で砕いて出力源ごと揺さぶる連携が有効——この場合セリファは要件特定ではなく加護出力のゆらぎを観測する計器役に回る（第1アークの『無謬の権威』はこの経路で攻略し、条項告発フルと超火力は温存する。blessing_types.unique の固有加護の多様性に由来）。”
  legacy_load:
    name_ja: "遺技ロード（仮称）"
    mechanism: "セリファに注入された同僚たちの精神（残響）から、各人の特化技能を『術式パターン・身体運用の記録』として一時的にロードし、ノルクの肉体で再生する。代償付きの超火力は、砲撃特化の同僚の遺技の一つ——ただし剣技など身体スケールの遺技と違い、身体出力を超えた『外への大出力』なので理論を要する：①源＝魔力（基層・他段と同じ。setting_worldview.yaml / mana_substrate）②成形・行使主体＝通常の加護は神が魔力を成形するが、超火力では神の代わりにセリファの超高度演算が砲撃遺技（同僚の術式パターン）を鋳型に魔力を成形・行使する（＝神なき神業）③出力経路＝成形した魔力を物理触媒（砲口となる外部の媒体）を通して外へ直行行使する。砲口は神スケールの行使に伴う反動・応力を受け止める要であり、触媒があればノルクは行使コスト（神経・循環器）の支払いで済む（人体を神スケールの魔力の通り道にすること自体が第零機関の禁忌＝唯一性の核。sync_mechanics と一致）。通常時のコストが二軸とも最大になるのは理論的必然——神が肩代わりしない神スケールの行使コストを神経・循環器が丸ごと払い（biological_cost大）、セリファに神スケール演算を強いて残響摩耗も最大になる（cost・second_cost）。【触媒無しの裏技＝最大コスト】砲口となる触媒が無い場合、ノルクは自分の身体を直接砲口に使う——行使コストに加えて砲口応力までも生身が受けるため、回復型（biological_cost.recovery 非対称①）の限界を超えてノルク自身の身体にも不可逆・致命の損傷が及ぶ。残響摩耗（セリファ側）が常に最大なのに加え、自分の体まで賭ける文字通り最後の裏技。触媒の正体・砲撃の具体的な見え方（実体弾か・斬撃の拡大か等）は氷山に伏せ、初使用の状況に合わせてL4で確定する（現時点では未確定）。"
    constraints: "①ロスターは有限——死んだ同僚の人数分のみの閉じた集合であり、拡張しない（形見の目録）。②同時ロードは一枠のみで、切替には演算負荷が伴う。普段の戦闘は生身の泥臭い工夫が主軸であり、ロードはあくまで切り札。③ロードされるのは技能の記録であって人格ではない——技が完璧に再生できることは、人格が残っていることを証明しない（hidden_wantの『確かめたい』の曖昧性を死守する設計ルール）。"
    concept_relation: "同僚の技を継いで戦うこと。ロードするたびにその同僚の身体運用・戦闘の癖がノルクの動きに混ざり込み、wantと戦闘メカニクスが一本化する。新技能の初出しはその同僚の人柄・過去の開示とセットで行い、【驚き】【共感】を連載に定期供給する。ただし混じるのはノルク側には『技・動き』のみで、人柄・口調の発露はセリファ側に出す（器の二分——ノルク＝技の器／セリファ＝人格の器。characters.yaml / serifa）。"
    cost: "二軸——【生体負荷】回復型（biological_cost.progression：遺技ロード＝中／超火力＝大の段階発露）。【残響摩耗】不可逆。高負荷演算はセリファに注入された同僚たちの残響を『全体的に』すり減らす（特定の技が特定の人格を削るのではない＝constraints③『技≠人格』を維持。技と人格は別物だが、再生の演算負荷そのものが器＝セリファ全体を摩耗させる）。最悪はセリファの破局＝残響ごと喪失（biological_cost.second_cost）。超火力（砲撃遺技）は両軸とも最大であり、第1アークで抜かない本当の理由は痕跡（隠匿）ではなく、この残響摩耗＝仲間の最後の欠片を失うリスクである（hidden_want・死の拒絶直結。温存の重心）。"
    progression: "【縦の報酬軸】ロードできる遺技と扱える予算は固定でなく、セリファの復旧（第零機関の謎に依存）とともに少しずつ開く＝連載の縦の報酬。新しい遺技の解禁＝その同僚の人柄・過去の開示（【驚き】【共感】）。ロスターは有限（constraints①の形見の目録）だが『使える状態にあるか』が復旧で段階開放される。復旧が進むほど残響摩耗のリスクも下がる（予算が増える）が、敵スケールが上がるため綱渡りは解消しない（強化＝やりくり対象の追加）。超火力の解禁は摩耗リスクを賭ける最大の感情イベントとして後アークに置く。concept.yaml / catharsis_engine.series_engine.arsenal_progression。"

  dissonance_trace:
    name_ja: "不協和音の痕跡（隠匿制約）"
    mechanism: "第零機関の抹消事件以降、教条システムは人工精霊同期による干渉波形『不協和音』を異常として自動検知・記録している。検知対象は外向きの干渉行使のみ——ノルクが条項告発（加護への干渉）や遺技ロード（残響再生）を行使するたびに、発生源の位置情報・波形パターンがアドレス付きのログとして蓄積され、抹消の実行者側に「生き残りの存在と居場所」を知らせるシグナルとなる。内向きの自己強化（神経同期＝反応強化・筋力強化）と受動観測（加護出力のゆらぎ読み）は干渉波形を出さないため痕跡を残さない。第1アークはノルクが段0〜1と観測しか用いないため痕跡が発生せず（exposure_level は0のまま）、隠匿制約が戦闘の管理軸として効いてくるのは条項告発・遺技ロード・超火力を解禁する後アークである。"
    shielding: "遮断設備（遮断結界）は不協和音の波形を空間内に封じ込める機材。遮断設備内で行使した場合、波形は外部に漏れず教条システムへのアドレス付きログが生成されない（exposure_level が増加しない）。遮断なしで行使した場合、波形が拡散してアドレスが特定されexposure_levelが増加する。これが隠匿制約の実質的な理由であり、ノルクが公共の場・記録域での使用を固く封じている根拠。"
    operation: "痕跡の蓄積は `02_dynamic_states/character_states.yaml` の nork.exposure_level として数値管理する。ただし閾値による追跡イベントの自動発火は行わず、イベント投入のタイミングはストーリー優先で人間が判断する。"
    concept_relation: "【究極の探求】との接続点。教条システムがなぜ不協和音を監視しているのかは、第零機関がなぜ創設され抹消されたのかという謎と同一線上にあり、敵の正体を伏せたまま【危機】の基底値を時差的・雪だるま式に押し上げる（逆カタルシスエンジン）。"

  harei_tools:
    name_ja: "破礼具（はれいぐ）"
    mechanism: "加護そのものに干渉する魔法的な道具ではなく、要件の履行を物理的に妨害する道具群（発声を奪う煙、手指を絡める鎖、陣形の目印を消す粉など）。旧称『封魔具』を三本柱体系に合わせて再定義したもの。加護の弱体化要件（礼式）が物理的所作である以上、所作を潰せば出力は落ちる——ノルクの装備一式が一貫して『加護でなく要件を攻める』思想で揃っている根拠。"
    misread: "観測者には『加護を封じる異端の秘宝』に見える（実態はただの煙と鎖と粉）。"

  combat_contrast:
    name_ja: "戦闘スタイルの対比"
    marlen_style: "片手剣＋バックラーによる正統派の防御・押し出し。マニュアル通りの“受けて貫く”陣形維持だが、想定外の事態（ノルクの戦法など）には脆い。"
    nork_style: "短剣や寸鉄、破礼具を用いた一撃離脱。無音接近と要件妨害を主軸とする、教条から完全に逸脱した戦術（対加護の手札の型は characters.yaml / nork combat_style 参照）。"
    buddy_contrast: "借り物の力（加護）が支配する世界における、二種類の『自前』——マーレンは自前の体（種族由来の身体性能。加護では奪えない＝剥がされない）、ノルクは自前の技（鍛錬と遺技。要件を剥がす側に回れる）。バディの補完関係（剥がす者と剥がされない者）は力の体系上の必然である。"
