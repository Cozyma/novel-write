worldview:
  geography:
    city_navel:
      name_ja: "都市ナーヴェル"
      description: "帝国南端の交易・防衛拠点。山岳の鉱山村、密林遺跡、魔物地帯に囲まれ、人と物と情報が渦巻く。行政と民間の境界が曖昧で、双影通りという境界では裏取引が横行する。"
      atmosphere: "「正義」だけでは動かず、「面子」だけでも回らない現実主義の土地勘。だが、権威（教条）の支配も確実に根を張っている。"
      frontier_economy: "ナーヴェル存立の根幹は魔獣との二重依存——魔物地帯（獣神のドメイン。divine_economy）の魔獣は(1)溢れれば都市を襲う脅威であり常時の討伐・防衛を要する一方、(2)獣神加護を宿す体は魔力を濃く帯び（mana_substrate）、その素材（魔力結晶・加護器官・毛皮）が魔導具原料・交易の主産品＝都市の富の源泉でもある。脅威が尽きれば経済が枯れ、溢れれば都市が滅ぶ綱渡りの均衡の上に成り立つ辺境都市。討伐＆素材経済の管理はギルドが握る（organizations.guild）。"
  systems:
    mana_substrate:
      name_ja: "魔力（基層）"
      description: "世界に遍在するエネルギーの基層。神の所有物ではなく、神も人も『使う側』に過ぎない物理的な媒体。魔物はこれを体内に帯び、魔導具はこれを蓄えて弱く用い、魔導院はこれを研究する（『魔』を冠する語彙の実体）。"
      wielding: "魔力は『行使コスト』を伴い、それを誰が払うかで力の系統が分かれる——(1)加護系＝神が信者に代わって魔力を行使し、行使コストを肩代わりする（だから信者は無傷。条項＝神に肩代わりさせる契約手続き。神の肩代わり容量は信仰総量で決まる＝distribution_law）。(2)術式系（人工精霊同期）＝旧神の回路の人工再現（organizations / zero_institution・pantheon.old_god）——本来コストを肩代わりする神が不在のまま回路だけを動かすため、支払いを術者自身の神経が負う（setting_magic.yaml / artificial_spirit）。加護とノルクの代償の対極（同じ源を、神が払うか・自分が払うか）はここに根を持つ——並行する例外システムではなく、『行使コストは神が払う』という世界共通の一法則の、支払人不在ケース（基層モデルの例外条項を解消 2026-07-06）。"
      design_rule: "魔力はキャラの資源ゲージにはしない（『魔力切れ』『魔力量』等の数値管理は禁止）。あくまで『力の出所はどこか』を説明する世界の物理であって管理値ではない（2026-06-12の魔力廃止の当初意図＝RPG的マナの排除は、この基層化で維持する）。魔導具による非神の弱い行使は市井に存在するが、人体を生きた媒体に魔力を直行・大出力で行使する術式系は第零機関の禁忌技術のみ＝唯一（神の専売規模への侵犯ゆえ抹消された。ノルクの希少性の根拠。基層モデル 2026-06-16）。【器モデルとの整合（2026-07-07）】vessel_model の導入により戦闘資源としての実在は認めるが、数値ゲージ化の禁止は維持——残量・消耗は定性（出力の陰り・術の選び方・呼吸）で描き、数値では管理しない。"
    vessel_model:
      name_ja: "器（うつわ・給力の受け手モデル）"
      description: "神の力も魔力も、受け手の『器』を通してしか現世に出ない（2026-07-07確定・戦闘リソース論＝_workspace/arc01_combat_canon_draft.md §F''）。器は個人ごとに【太さ】（瞬間にどれだけ通せるか＝瞬間出力の上限）と【深さ】（一度にどれだけ湛えられるか＝持久・連発の総量）の有限な二軸を持つ。さらに、流す行為そのものが精神力（脳の処理）を消費する——出力制御は集中を食う（全陣営共通の第三の資源。ノルクの神経払いはこの極端形＝setting_magic.yaml / biological_cost）。神の総量が無限に近くとも受け手側が有限であるため、短期予算の有限化と『払い方の調整』（細く長く流すか・太く一気に流すか＝本人の技量）が戦闘の意思決定になる。"
      rank_badge: "位階＝器の測定等級。ただし世界共通の絶対尺度ではなく、教団・ギルドなど各組織が発行するバッジ（『律神のBクラス相当』のような換算話法が世間に流通する）。実体（器）と社会表示（バッジ）は別物であり、バッジは誤読する——誤読エンジンの資源的培地。現行の台帳の外にいるノルクはバッジを持たない＝測定不能（divine_economy / protagonist_position と接続）。"
      recovery: "基本は祈り・休息によるレート回復で、戦闘中はほぼ回復しない（出し切るか温存するかの駆け引きが毎戦闘に立つ）。ただし固有の回復ギミック（特定の加護・礼式・環境による特殊回復）は存在してよい——強さの根がそのまま当たり所になる同一コイン設計の素材。礼式は資源の燃料計ではない（発動・維持の形式＝条件側）が、回復・出力補助のギミックとして機能する設計は可（2026-07-07判定）。"
      reading: "器の残量は外から直接見えないが、出力の陰り・呼吸・術の選び方（節約に入ったか）に滲む。セリファは出力のゆらぎを検知できる（計器としての事実まで＝characters.yaml / serifa）。位階差＝器の桁差は正面からは覆らないが、支払わせ方（空振り・維持費の高い型の強要・時間延ばし）で深さを削れる——読みのゲームの資源的裏付け。"
      god_tendency: "資源の使い方には神系統ごとの傾向がある（闘神系＝瞬発大出力・燃費悪／律神系＝持続効率・節約／獣神系＝帳簿を持たない純度）——ただし個人差・流派差で必ず崩す（画一化しない。傾向は読みの起点であって答えではない。2026-07-07確定）。"
    divine_economy:
      name_ja: "神々と信仰＝実利の循環（世界の中核エンジン）"
      core_engine: "この世界では信仰が物理的な実利（加護＝実力）に変換される。ゆえに思想は『正しいから』ではなく『強くなるから』信じられ、信じて従うほど加護で報われて自己強化され、廃れない。各神は一つの思想・価値観であり、その信者集団はクラン化して増殖する。信者・縄張り・資源（＝総出力。distribution_law）を奪い合うため思想対立が構造的に絶えない——これが『次々と厄介事が絡んでくる』連載駆動の世界側の根拠（concept.yaml / core_conflict・series_engine）。"
      reinforcement_loop: "distribution_law（神の総出力＝信仰総量、個への濃さ＝総量÷誓約者数）と直結する。信者を増やすほど神が強くなるため、布教・改宗の強制・他神の排斥が実利として合理になり、衝突がメカニクスとして駆動する。"
      protagonist_position: "全員が『思想＝力』であるこの経済の中で、ノルク（無加護）だけがどの神にも属さない例外＝剥がせる加護を持たない。だから読み合いの文法が通じず（characters.yaml / nork）、どの思想陣営にも属さないワイルドカードとして危険視・過大評価される。彼の主題的な唯一性の世界側の根拠。"
      clan_structure: "世界は多神クランの多極構造であり一枚岩ではない。律神クランが運営実務（行政・ギルド・審判）を握る最有力派閥だが、他神クランがそれぞれ別の権力ドメインを持って拮抗する。出自差別・加護独占は世界全体の制度ではなく『律神クラン固有の病理』であり、第1アークの敵パターンに過ぎない（dogmatism 参照）。"
      pantheon: # arc1で可視化する3柱＋氷山。要件＝各神の思想そのもの。
        ritsushin: "律神：秩序・序列・手続き。ドメイン＝行政・ギルド運営・審判（神の履歴）。要件＝公正/手続きの体面。arc1のボスのクラン。詳細は dogmatism。"
        toushin: "闘神（とうしん）：強さこそ正義。ドメイン＝武力・傭兵・決闘文化。要件＝強さの実演。arc1では暗殺者が保持（『腕では勝てない』の根拠。CH01）。"
        juushin: "獣神（じゅうしん）：純粋な本能・生命力。ドメイン＝辺境・魔物地帯。信者＝本能のままに生きる獣そのもの（信仰＝獣性の純度）。要件＝本能への純度。arc1では魔獣が保持（生物として純粋に強い。CH05）。"
        iceberg: "他神（商神・医神・死神など）は氷山に沈め、アーク進行で開示する（disclosure_rule）。"
        old_god: "旧神（きゅうしん・DB確定 2026-07-06・本編未開示）：現在の神々の経済が成立する以前に先住の系譜が奉じていたマイナーな古い神。**現在は不在**（死没か沈黙か消されたかは未定義スロット）であり、現行経済の台帳——信仰総量・神の履歴・座の比較式——のどこにも存在しない。古い血（systems / old_blood）と、その力の人工再現（organizations / zero_institution）の根。不在であることが二つの帰結を生む——①この系統の力は現行の読み合い・ランク付けの外にある（『無加護なのに出力がある』の説明はこれで一本化。無加護＝現行の台帳に居ないことなので、CH16『履歴を持たず比較式にランク付け不能』の勝ち筋は無傷）②行使コストを肩代わりする神が居ないため、支払いは術者の神経が負う（mana_substrate.wielding）。**凍結**：名・教義・消えた経緯・distribution_law との関係（少数信仰＝高出力の理屈は出力インフレ源のため触らない）・マーレン覚醒の可否は第2アーク設計時まで未定義スロット。"
      disclosure_rule: "神の『存在・所属』は早期に出てよい（多神クラン乱立を読者に示すため）。ただし『要件を読み合う加護バトルを章の核にする』のは1アーク1柱まで（arc1＝律神）。闘神・獣神は arc1 では浅く出し（強さ・生物的脅威の説明に留め）、要件攻略を核にしない。"
      general_mechanics: "distribution_law（deity 配下）と faith_mechanics（真信／表礼）は律神に限らず全神に適用される汎用メカニクス。各神で要件＝思想が異なるだけ（闘神＝強さの実演、獣神＝本能への純度…）。神の履歴／審判（divine_ledger）のみ律神固有（秩序の神が司法を持つ＝律神クランが行政・司法を握る根拠）。"
    dogmatism:
      name_ja: "教条主義（律神クランの体制）"
      scope_note: "これは世界全体の支配制度ではなく、運営実務を握る最有力派閥『律神クラン』固有の体制であり、第1アークの敵パターン（divine_economy 参照）。出自差別・加護独占もこのクランの病理であって世界の普遍法則ではない。"
      core_rule: "律神の定めた条項（教条・詠唱手順・陣形）を遵守した者が律神の加護を得られる複合型の支配体制。律神は信仰の総量が加護の総出力を規定するため、広く信仰を集める分だけ他神クランと比べ圧倒的な加護量を持ち（distribution_law）、それを背景に運営実務（行政・ギルド・審判）の主導権を握っている。"
      deity:
        name_ja: "律神（りつしん）"
        description: "人間社会を支配する秩序の神。条項への適合が加護発動の条件であり、内心の信仰がなくとも表面的な礼式・儀式の遵守でも発動する。この仕様がエリートによる加護の政治的独占を可能にしている。"
        other_gods: "世界には多神が存在し、各神＝各思想がクラン化して拮抗する（divine_economy）。律神クランは自クランの正統性を掲げ他神を低く見るが、それは支配の建前であって世界全体が律神一神なわけではない。"
        distribution_law: "分配則——神の総出力は信仰総量で決まり、個々への加護の濃さは総量を誓約者の数で割った配分になる。律神は莫大な総量を莫大な信者へ薄く広く配る（だから要件も軽い礼式で済む）。マイナー神は小さな総量を少数の誓約者へ集中投下するため加護は濃いが、神の存在維持が少数の信者に依存するため要件が重い（生活を捧げる級の誓約）。連載運用規律は divine_economy / disclosure_rule に移管（神の存在は早期開示可・要件攻略を章の核にするのは1アーク1柱）。"
      blessing_types:
        universal:
          name_ja: "普遍加護（ふへんかご）"
          description: "教典の礼式（詠唱手順・陣形・所作）の遵守によって誰にでも発動する標準的な加護。要件は教典として公開されており、出力は薄く広い。要件が公開ゆえ『礼式の妨害』という対抗手段も世間に知られている。"
        unique:
          name_ja: "固有加護（こゆうかご）"
          description: "授与の儀で神託として個別に下る契約型の強力な加護。エリート・強者の力の中核。消失要件（本質的誓約）は本人にのみ開示され、要件を口外すること自体が誓約の軽視＝消失要件違反となる（メタ要件）。このため保持者は要件を墓まで持っていき、消失要件のサンプルは構造的に世へ出回らない——要件特定が本来ほぼ不可能であることの根拠（暫定確定 2026-06-12）。"
        seat:
          name_ja: "座の加護（ざのかご・官職装置）"
          description: "律神クランのみが運用する第三の類型（確定 2026-07-02）。個人ではなく『秩序の代行者たる座（官職）』に律神が与える常設加護で、在任者は着任の儀で座と接続される。骨格は『律神の秩序における格の比較式』——干渉の可否を、座の格と干渉者の格の機械的な比較で判定し、格下の干渉（刃・告発・抗議）を存在ごと却下する。個人の鍛錬や信心を問わず座に宿るため、行政中枢の管理職ほど強い座を占める——『法は格下を縛り、危険と死は格下に、利得は格上の特権』という体制の物理的実体。仕様は行政の非公開事項（口外禁止のメタ要件でなく制度上の秘匿）。弱点は二つ、いずれも座に由来する：①出力の根は『在任者と座の接続の自明性』（私は制度そのものだという無自覚の確信）——在任者自身が『制度は自分を守らない／制度が自分を吐き出す』と認識した瞬間、比較式の中で己の格が崩れ、加護は保持者を守る根拠を失う（接続のゆらぎ。外形上は余裕・儀礼所作の崩れとして観測できる）②神の履歴を持たない無加護は比較式にランク付けできず『格下として却下する』処理の対象外——ただし通るのは干渉（言葉・証拠・場の定義）であって物理の勝ち筋ではない（座は在任者の防護・威圧も底上げしており、接続が崩れるまでは剥がれない）。接続が崩れれば底上げごと消え、在任者はただの役人に戻る。"
      divine_ledger:
        name_ja: "神の履歴（審判機構）"
        description: "律神は教典の定める禁忌への違反を、可視の印ではなく『履歴』として保持する。履歴は誰にでも見えるものではなく、参照の加護（審問官職などに授与される固有加護）を持つ者のみが対象者の履歴を参照・審判できる。神が記録し、人が裁く——履歴の参照権を体制側が独占していることが支配装置として機能する。なお日常的な礼式の不履行は『加護が無い』だけで違反ではなく、履歴に残るのは教典の禁忌への明確な違反のみ。"
      counter_culture:
        name_ja: "対抗文化（挑発の散弾）"
        description: "要件違反を誘発して加護を消す・弱める発想自体は決闘・法廷の古典戦術として存在する。ただし固有加護の消失要件は秘匿のため、どの挑発が刺さるかは当てずっぽうの『散弾』にしかならない（だから貴族は感情制御の礼法教育を受ける）。セリファの演算は言動と加護出力の揺らぎの相関から要件を解析的に特定する『狙撃』であり、前例との差は精度にある（切り札の希少性の根拠。setting_magic.yaml / anti_mage 参照）。"
      true_faith_treatment:
        name_ja: "真信者の扱い（敬遠の理由）"
        description: "①制御不能——真信者は神にのみ従い、利益誘導・恫喝が効かない（礼式者は出世で操縦できる）。②内部告発リスク——真信者は字義を全て守るため『礼式だけ守って実態は違反』という体制運用そのものを異端視する。エリートにとって最大の脅威は無加護の下層ではなく本物の信者。③歴史的前例——かつて真信の聖者が体制を粛清しかけた事件があり、以後体制は真信者を列聖して中枢から遠ざける運用を確立した（昇進ではなく祭り上げ＝飼い殺し）。"
      faith_mechanics:
        surface_faith: "礼式（れいしき）／表礼（ひょうれい）：内心の信仰を伴わない儀式・振る舞いによる加護獲得。律神の仕様上これでも加護が発動するため、エリートが悪用できる抜け穴になっている。"
        true_faith: "真信（しんしん）：内心の信仰を伴う真の遵守。加護の出力と精度が礼式と比較して別格になる。教条狂信者バーサーカーの強さの源泉。"
      elite_oppression: "能力に劣るエリートたちは、家柄と「礼式としての条項遵守」によって加護を独占。加護というゲタを履くことで、実質的な武力でも下層をアゴで使っている。"
      structural_discrimination: "このシステムは現在、貴族やギルド特権層の既得権益ツールと化している。異端の血を引く者やシステムに同調できない者は加護から弾かれ、社会の底辺で危険な泥仕事を強いられる構造的な差別を生んでいる。"
      vocabulary:
        blessing: "加護（かご）：律神が与える神的保護・強化。「加護の展開」で能動的な使用を指す。「加護が厚い」で強度を表す。条項番号で管理される（第○条）。"
        privileged_slang: "清血（きよち）：加護の乗りが良い正統血筋への俗称。褒め言葉・格付けとして使われる非公式語。"
        discriminated_slang: "濁り血（にごりち）：血筋が加護の発現を阻害するという根拠のない民間信仰から生まれた蔑称。公式教典には存在しないが社会に定着している。教条上は明確な違反でないにもかかわらず、先入観で排除される者に用いられる（マーレン等）。"
        unblessed: "無加護（むかご）：加護を持たない者を指す中立的な事実語。表記の二層（2026-07-02）——正式・事務語＝無加護（書類・制度・報告の場）／口語・蔑みの場＝《加護無し》（人の口に上るときの語。naming_rules / term_notation 参照）。加護持ち同士の戦闘は互いの条項から定石を逆算する読み合いが文法だが、無加護には条項が無く照合が空振りする（ノルクの戦闘特性の語彙的基盤。characters.yaml / nork 参照）。"
    old_blood:
      name_ja: "古い血（先住の系譜）"
      description: "『濁り血』と蔑まれる異端の血の実体は、人ならざる先住の系譜である（DB確定・本編未開示）。**血の根＝旧神**（divine_economy / pantheon.old_god・DB確定 2026-07-06）——現在の神々の経済以前にこの系譜が奉じた古い神の血筋であり、種族由来の身体性能は現行のどの神の加護でも奪えない・与えられない自前の力。どこまで人でないか・旧神との接続の細部（覚醒の可否を含む）は未開示・凍結の探求項目（氷山の規律）。本編では一貫して『根拠のない民間信仰による差別』としてのみ描く（長距離台帳: 02_dynamic_states/resources_states.yaml / muddy_blood_paradox）。"
      visible_mark: "外見上の徴は**瞳の色にだけ**出る（確定 2026-07-02）——虹彩が人の標準域を外れる（マーレンは深い琥珀金。光の加減で燃えるように見える）。実際には濁りとは正反対の、澄んだ鮮やかな色であり、蔑む側がそれを『濁った目』『混じりの目』と呼ぶ——**蔑称の恣意性が視覚で示される**設計。徴は瞳のみで他は人と変わらないため、目を合わせるか明かりの下で初めて分かる＝一目の距離での差別が成立する根拠（遠目には分からない）。瞳の色が何に由来するか（何の血か）は未開示のまま。"
      land_distribution: "【土地の分布（2026-07-05確定＝A+B統合リファクタ）】ナーヴェル一帯は先住の系譜の旧土地で、古い血の発現率が他地域より高い。本編では統計として語らず『この街は濁り血が多い』程度の空気で示す（氷山）。第零機関が辺境に実験場を置いた理由と同根（organizations / zero_institution）。マーレン（エスリッド家の次女）がこの地の支部へ出された人事も、この分布の上に乗る——本人は土地と血の接続を知らない。ノルクとマーレンの出会いは表面上『選べない者同士』の偶然のまま、歴史の層では同じ過去（第零機関と先住の血）の両面が同じ土地に引き寄せられた必然。"
  organizations:
    guild:
      name_ja: "冒険者ギルド"
      description: "依頼の受付・管理・査定を行う事務機関。元々は実力主義の民間組織だったが、貴族側（エリート層）が『加護を得るための実績や要件』を合法的に独占するため、権力で丸ごと吸収・乗っ取った。現在は帰属子弟（コネ組）の冒険者が安全に加護を得るための特権装置と化している。"
      raison_detre: "ギルドの実体的な存在理由は、辺境都市ナーヴェルの根幹である魔獣討伐＆素材経済（geography / frontier_economy）の管理・独占にある——討伐依頼の受付・査定、および魔獣素材の流通・利権の差配を握る。律神クランが運営実務として掌握する権力装置の経済的裏付け。加護持ちの貴族子弟が『おいしい討伐・素材利権』を取り、危険な掃討・廃棄・後始末は斡旋所の下請けへ丸投げする分業も、この利権構造の現れ。"
      staff_vocabulary: "査定官（さていかん）：ギルド職員。依頼成果の査定や捜査権等の申請審査を行う内勤職。冒険者とは別の立場（マーレンは査定官ではない）。"
      adventurers: "ギルドに登録した実行者層。貴族子弟中心（加護持ち）。危険な泥仕事は斡旋所の下請けへ丸投げするのが常態で、下請けの扱い（指揮・配置・危険負担）は雇い主である冒険者の裁量に委ねられ、保護規定はほぼ無い。また教条の陣形規定において下請けは頭数に数えられない（装備・荷駄と同じ扱い）——教条上『存在しない』ため陣形義務を負わず自由に動ける。雇い主が正面の型を維持し、下請けが型の外（死角・搦め手）を拾う分業の制度的根拠であり、『システムから見えない者』というテーマと一致する皮肉。"
    ash_rogue:
      name_ja: "灰の斡旋所（アッシュ・ローグ） / 手配屋"
      description: "冒険者が嫌がる「マニュアル外の泥仕事」を安値で請ける非正規の下請け人材プール（傭務取扱所）。所属者は雇われた案件の手続き等で下請けとしてギルドにも立ち入る。扱いは雇い主の冒険者の裁量次第のため立場は弱い。スィグナが仕切り、ノルクが所属する。"
    zero_institution:
      name_ja: "第零機関"
      description: "かつて帝国魔導院の深部に存在した古い禁忌研究機関。在籍した規格外の天才（人物像は未定）が人工精霊同期（アルク・アニマ）の実験を行っていたが、機関ごと抹消された。創設と抹消の理由は本作の【究極の探求】であり現時点では未開示。抹消を実行した主体（何者かは未開示）は今も存在し、『存在しない男』＝生き残りの露見は人の目と噂の経路で彼らに届きうる——ノルクの隠匿の生存則（setting_magic.yaml / concealment_rule）の脅威側の根拠。【研究の核と辺境遺構（2026-07-05確定＝A+B統合リファクタ／2026-07-06・旧神由来で同根化）】研究の核は『古い血（先住の系譜）＝旧神の血筋の力の人工再現』——不在の神の回路を人の手で組み直す禁忌（divine_economy / pantheon.old_god）であり、人工精霊同期はその成果。セリファ＝不在の神の代行を機械でやる試みであり、支払う神が居ないぶん代価が術者の神経に落ちる（mana_substrate.wielding）。機序・適合条件・天才の意図は未開示の探求項目（氷山）。本体は魔導院深部だが、研究対象＝先住の系譜の旧土地である辺境ナーヴェル一帯に実験場・付属施設を置いていた——CH05の討伐現場に残る『旧施設痕跡』の正体。ノルクが遺構を求めてこの街へ来た理由（characters.yaml / nork background 三層構造）と、この地に濁り血が多い理由（old_blood / land_distribution）は同じ歴史の両面。"
    vermi:
      name_ja: "深淵の境界（ヴェルミ）"
      description: "帝国魔導院の非公式実働部隊。第零機関が遺した天才の実験成果（人工精霊同期）を回収・流用し、非合法任務（裏仕事）に投入していた。ノルクとセリファはここで運用されたが、部隊は陰謀により「使い捨ての駒」として惨殺・抹消された。第零機関（古い研究側）とヴェルミ（流用した実働側）は別組織であり、二重の抹消の繋がりが謎の縦軸となる。"
  naming_rules:
    name_ja: "命名規則（固有名詞の音の統一）"
    base: "人名・氏族名・地名は**ノルド語（古ノルド語・北欧語彙）ベース＋アレンジあり**を基調とする（正本化 2026-07-02。ユーザー確定の基調方針）。**アレンジの目的は日本人読者に馴染む発音・字面**——カタカナで読みやすく・呼びやすく（拗音・促音の連続や長すぎる名を避ける）、辞書形をそのまま使わず音を崩す・組み替える。『それらしい響き』の統一が目的であって語源クイズにしない。命名時に語源の含みを仕込むのは可（例：ヴァルグ=vargr〔狼・無法者〕、イーサ=氷のルーン、ヴィクテル=víg+týr〔戦神のもの・殺しの含み〕）だが、本編で語源を解説しない。"
    registers: "レジスタ分け（音の出自で系統を示す）：①一般人名・家名・地名＝ノルド系（ノルク・ヴァルグ／マーレン・エスリッド／スィグナ／ナーヴェル 等）②第零機関・人工精霊系の技術語彙＝非ノルドの異質なレジスタ（セリファ／アルク・アニマ 等——世界の外から来た技術、という音の記号）③ヴェルミ部隊のコードネーム＝音楽用語＋ノルド系の読み（《不協和音》-スカック-〔skakkr＝歪んだ・調子外れ〕等。_workspace/01_macro_notes/squad_roster_draft.md の命名テーマ）④神・加護・制度の語彙＝和語・漢語（律神・加護・濁り血 等＝土着の信仰語彙）。"
    usage: "新規の固有名詞（人名・地名・組織名）を作る際は本規則を参照してから命名する。2ファイル以上で使う名は characters.yaml / 本ファイルへ定義を置いてから使用（語彙の単一出典＝ARCHITECTURE 2.1）。"
    term_notation: "用語表記（確定 2026-07-02）：世界の用語は日本語表記を**《》で囲む**——《加護無し》《濁り血》《不協和音》等（初出・強調・人の口に上る蔑称や符丁で用いる。地の文の一般名詞用法まで全てを囲まない）。必要に応じてカタカナのルビをハイフン囲みで添える——《不協和音》-スカック-（ルビの読みはノルド系レジスタ。skakkr＝歪んだ・調子外れ）。**セリファの脳内発話は〈〉**（用語の《》と衝突するため。2026-07-02に全ドラフトを〈〉へ移行済み）。なろう投稿時の変換注意：なろうのルビ記法は『漢字《ルビ》』のため、投稿版ではルビ付き用語を『｜不協和音《スカック》』形式へ変換する。"
