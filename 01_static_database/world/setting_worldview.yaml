worldview:
  geography:
    city_navel:
      name_ja: "都市ナーヴェル"
      description: "帝国南端の交易・防衛拠点。山岳の鉱山村、密林遺跡、魔物地帯に囲まれ、人と物と情報が渦巻く。行政と民間の境界が曖昧で、双影通りという境界では裏取引が横行する。"
      atmosphere: "「正義」だけでは動かず、「面子」だけでも回らない現実主義の土地勘。だが、権威（教条）の支配も確実に根を張っている。"
  systems:
    dogmatism:
      name_ja: "教条主義システム"
      core_rule: "メジャー神の定めたマニュアル（教条・詠唱手順・陣形）を政治的に遵守した者だけが「正規の加護（システム的バフ）」を得られる複合型支配システム。"
      elite_oppression: "能力に劣るエリートたちは、家柄と「政治的なマニュアルへの同調」によってこのバフを独占。バフというゲタを履くことで、実質的な武力でも下層をアゴで使っている。"
      structural_discrimination: "このシステムは現在、貴族やギルド特権層の既得権益ツールと化している。異端の血を引く者やシステムに同調できない者は「バフ」から弾かれ、社会の底辺で危険な泥仕事を強いられる構造的な差別を生んでいる。"
  organizations:
    guild:
      name_ja: "冒険者ギルド"
      description: "元々は実力主義の民間組織だったが、貴族側（エリート層）が『システム加護（バフ）を得るための実績や要件』を合法的に独占するため、権力で丸ごと吸収・乗っ取った。現在は帰属子弟（コネ組）が安全にバフを得るための特権装置と化しており、危険な泥仕事は非正規の下請け（手配屋）や現場の非エリートへ丸投げしている。"
    ash_rogue:
      name_ja: "灰の斡旋所（アッシュ・ローグ） / 手配屋"
      description: "ギルドの特権層が嫌がる「マニュアル外の泥仕事」を安値で押し付けられる非正規の下請け機関（傭務取扱所）。スィグナが仕切り、ノルクが所属する。"
    zero_institution:
      name_ja: "第零機関"
      description: "かつて帝国魔導院の深部に存在した古い禁忌研究機関。在籍した規格外の天才（人物像は未定）が人工精霊同期（アルク・アニマ）の実験を行っていたが、機関ごと抹消された。創設と抹消の理由は本作の【究極の探求】であり現時点では未開示。教条システムが『不協和音』の波形を監視している（setting_magic.yaml / dissonance_trace）のは、この抹消事件の後処理に由来する。"
    vermi:
      name_ja: "深淵の境界（ヴェルミ）"
      description: "帝国魔導院の非公式実働部隊。第零機関が遺した天才の実験成果（人工精霊同期）を回収・流用し、非合法任務（裏仕事）に投入していた。ノルクとセリファはここで運用されたが、部隊は陰謀により「使い捨ての駒」として惨殺・抹消された。第零機関（古い研究側）とヴェルミ（流用した実働側）は別組織であり、二重の抹消の繋がりが謎の縦軸となる。"
